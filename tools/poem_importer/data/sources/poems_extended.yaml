  translation: 辽阔的南国秋空千里冷落凄凉，江水随天空流去，秋天更无边无际。极目遥望远处的山岭，只引起我对国土沦落的忧愁和愤恨，还有那群山像女人头上的玉簪和螺髻。西下的太阳斜照着这楼头，在长空远飞离群孤雁的悲鸣声里，还有我这流落江南的思乡游子。我看着这宝刀，狠狠地把楼上的栏杆都拍遍了，也没有人领会我现在登楼的心意。 别说鲈鱼切碎了能烹成佳肴美味，西风吹遍了，不知张季鹰已经回来了没？像只为自己购置田地房产的许汜，应怕惭愧去见才气双全的刘备。可惜时光如流水一般过去，我真担心着风雨飘荡中的国家，真像桓温所说树也已经长得这么大了！叫谁去请那些披红着绿的歌女，来为我擦掉英雄失意的眼泪！
