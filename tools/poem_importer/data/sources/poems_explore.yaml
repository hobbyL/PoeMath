- id: poem_exp_016
  title: 望蓟门
  author: 祖咏
  dynasty: 唐
  layer: explore
  is_required: false
  difficulty: 3
  content: '燕台一望客心惊，笳鼓喧喧汉将营。

    万里寒光生积雪，三边曙色动危旌。

    沙场烽火侵胡月，海畔云山拥蓟城。

    少小虽非投笔吏，论功还欲请长缨。

    '
