  - 抒情
  - 五言古诗
- id: poem_ext_164
  title: 宣州谢脁楼饯别校书叔云
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '弃我去者，昨日之日不可留；

    乱我心者，今日之日多烦忧。

    长风万里送秋雁，对此可以酣高楼。

    蓬莱文章建安骨，中间小谢又清发。

    俱怀逸兴壮思飞，欲上青天览明月。

    抽刀断水水更流，举杯销愁愁更愁。

    人生在世不称意，明朝散发弄扁舟。

    '
  annotations:
  - word: 长风
    meaning: 远风，大风
  - word: 此
    meaning: 指上句的长风秋雁的景色
  - word: 酣高楼
    meaning: 畅饮于高楼
  - word: 蓬莱
    meaning: 此指东汉时藏书之东观
  - word: 蓬莱文章
    meaning: 借指李云的文章
  translation: "抛弃我而去的，是昨日之日不可挽留；扰乱我心的，是今日之日多烦忧。长风万里送走秋雁，对此可以畅饮于高楼。蓬莱文章有建安风骨，中间小谢又清新秀发。都怀着逸兴壮思飞扬，想要上青天揽取明月。抽刀断水水更流，举杯消愁愁更愁。人生在世不能称意，明朝散发驾起小舟。"
  appreciation: "李白饯别族叔李云。开篇节奏跳荡，中幅写逸兴，结以「抽刀断水」「散发弄扁舟」，豪放与苦闷并出，是其七古名篇。"
  background: "天宝末李白在宣城谢脁楼饯别族叔李云（校书郎）时所作。"
  famous_lines:
  - 人生在世不称意，明朝散发弄扁舟。
