  difficulty: 4
  content: '听风听雨过清明。愁草瘗花铭。楼前绿暗分携路，一丝柳、一寸柔情。料峭春寒中酒，交加晓梦啼莺。

    西园日日扫林亭。依旧赏新晴。黄蜂频扑秋千索，有当时、纤手香凝。惆怅双鸳不到，幽阶一夜苔生。

    '
  annotations:
  - word: 风入松
    meaning: 词牌名
  - word: 清明
    meaning: 清明节
  - word: 听风听雨
