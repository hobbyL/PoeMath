- id: poem_ext_151
  title: 宿业师山房期丁大不至
  author: 孟浩然
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '夕阳度西岭，群壑倏已暝。

    松月生夜凉，风泉满清听。

    樵人归欲尽，烟鸟栖初定。

    之子期宿来，孤琴候萝径。

    '
  annotations:
  - word: 度
    meaning: 过、落
  - word: 壑
    meaning: 山谷
  - word: 倏
    meaning: 一下子
  - word: 满清听
    meaning: 满耳都是清脆的响声
  - word: 樵人
    meaning: 砍柴的人
  translation: 夕阳越过了西边的山岭，千山万壑忽然昏暗静寂。 月照松林更觉夜晚清凉，风声泉声共鸣分外清晰。 山中砍柴人差不多走尽，烟霭中鸟儿刚归巢安息。 丁大约定今晚来寺住宿，独自抚琴站在山路等你。
  appreciation: 此诗写诗人在山中等候友人到来而友人仍不至时的情景。前六句展示了山寺一带黄昏时美丽的自然景色。诗人先后描绘夕阳西下、群壑昏暝、松际月出、风吹清泉、樵人归尽、烟鸟栖定等生动的意象，渲染环境气氛。随着景致的流动，时间在暗中转换，环境越来越清幽。孟浩然在山水诗中，很善于表现自然景物在时间中的运动变化。山区寻常的景物，一经作者妙笔点染，便构成一幅清丽幽美的图画。 这首诗所描绘的自然景物形象，不仅仅准确地表现出山中从薄暮到深夜的时态特征，而且融统着诗人期盼知音的心情。特别是“松月生夜凉，风泉满清听”两句，写诗人见松月而觉夜凉，听见泉而感山幽，细致入微地传达出日暮山间听泉时的全部感受，很有韵味。全篇前六句都是融情入景，到了第七句，才点出“之子期宿来”，然后在第八字再点出一个“候”字。“孤琴候萝径”，以“孤”修饰琴，更添了孤清之感。
    孤琴的形象，兼有期待知音之意。而用“萝”字修饰“径”，也似有意似无意地反衬诗人的孤独。因为藤萝总是互相攀援、枝蔓交错地群生的。这一句诗，在整幅山居秋夜幽寂清冷的景物背景上，生动地勾勒出了诗人的自我形象，使人如见这位风神散朗的诗人，抱着琴，孤零零地伫立在洒满月色的萝径上，望眼欲穿地期盼友人的到来。诗的收尾非常精彩。
