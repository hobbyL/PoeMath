- id: poem_ext_159
  title: 寄全椒山中道士
  author: 韦应物
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '今朝郡斋冷，忽念山中客。

    涧底束荆薪，归来煮白石。

    欲持一瓢酒，远慰风雨夕。

    落叶满空山，何处寻行迹。

    '
  annotations:
  - word: 全椒
    meaning: 地名，在今安徽
  - word: 道士
    meaning: 修道之人
  - word: 涧底
