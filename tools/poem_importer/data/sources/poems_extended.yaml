- id: poem_ext_270
  title: 菩萨蛮·赤阑桥尽香街直
  author: 陈克
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 3
  content: '赤阑桥尽香街直，笼街细柳娇无力。

    金碧上青空，花晴帘影红。

    黄衫飞白马，日日青楼下。

    醉眼不逢人，午香吹暗尘。

    '
  annotations:
  - word: 菩萨蛮
    meaning: 词牌名
  - word: 赤阑桥
