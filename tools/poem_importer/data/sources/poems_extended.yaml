- id: poem_ext_148
  title: 梦李白二首·其二
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '浮云终日行，游子久不至。

    三夜频梦君，情亲见君意。

    告归常局促，苦道来不易。

    江湖多风波，舟楫恐失坠。

    出门搔白首，若负平生志。

    冠盖满京华，斯人独憔悴。

    孰云网恢恢，将老身反累。

    千秋万岁名，寂寞身后事。

    '
