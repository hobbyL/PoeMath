- id: poem_ext_114
  title: 无题·来是空言去绝踪
  author: 李商隐
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '来是空言去绝踪，月斜楼上五更钟。

    梦为远别啼难唤，书被催成墨未浓。

    蜡照半笼金翡翠，麝熏微度绣芙蓉。

    刘郎已恨蓬山远，更隔蓬山一万重！

    '
  annotations:
  - word: 空言
    meaning: 空洞的诺言
  - word: 绝踪
    meaning: 没有踪迹
  - word: 蓬山
    meaning: 蓬莱仙山，喻难以到达之处
  translation: "说来要来只是空话，一去便音信全无；月影斜照高楼，五更钟声敲响。梦里因远别而哭，醒来却唤不回；书信仓促写成，墨汁还未研浓。烛光半笼着翡翠被，麝香微微透过绣芙蓉。刘郎已恨蓬莱山远，我与你更隔着一万重蓬山！"
  appreciation: "李商隐写相思阻隔。「梦为远别」「书被催成」写情之急切；结句「更隔蓬山一万重」把恨意推到极致，是无题诗中的名篇。"
  background: "李商隐《无题》组诗之一，写远别相思，具体所指难考，可作深情恋歌读。"
  famous_lines:
  - 刘郎已恨蓬山远，更隔蓬山一万重！
  tags:
  - 唐诗三百首
  - 记梦
  - 爱情
  - 思念
  - 七言律诗
- id: poem_ext_115
  title: 无题·飒飒东风细雨来
  author: 李商隐
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '飒飒东风细雨来，芙蓉塘外有轻雷。

    金蟾啮锁烧香入，玉虎牵丝汲井回。

    贾氏窥帘韩掾少，宓妃留枕魏王才。

    春心莫共花争发，一寸相思一寸灰！

    '
  annotations:
  - word: 飒飒
    meaning: 风声
  - word: 芙蓉塘
    meaning: 荷花池
  - word: 贾氏窥帘
    meaning: 典故，贾充女偷看韩寿
  translation: "飒飒东风夹着细雨，芙蓉塘外隐约有轻雷。金蟾形的香炉锁着香，玉虎辘轳牵绳汲井又回。贾氏曾隔帘窥见年少的韩寿，宓妃曾为曹植留下玉枕。春心不要与花争着开放，一寸相思终成一寸灰！"
  appreciation: "上半写春雨香井的幽闭世界，下半用典故写情之难遂，结句「一寸相思一寸灰」沉痛斩截，是李商隐无题的代表收束。"
  background: "李商隐无题诗。以春心、相思为题，寄托深曲，历代解读不一。"
  famous_lines:
  - 春心莫共花争发，一寸相思一寸灰！
  tags:
  - 唐诗三百首
  - 女子
  - 相思
  - 爱情
  - 七言律诗
- id: poem_ext_116
  title: 无题·昨夜星辰昨夜风
  author: 李商隐
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '昨夜星辰昨夜风，画楼西畔桂堂东。

    身无彩凤双飞翼，心有灵犀一点通。

    隔座送钩春酒暖，分曹射覆蜡灯红。

    嗟余听鼓应官去，走马兰台类转蓬。

    '
  annotations:
  - word: 画楼
    meaning: 装饰华丽的楼阁
  - word: 桂堂
    meaning: 桂木建造的厅堂
  - word: 身无彩凤
    meaning: 自身没有彩凤的双翼
  - word: 心有灵犀
    meaning: 心灵相通
  translation: "昨夜星辰、昨夜的风，在画楼西畔、桂堂东边。身上没有彩凤的双翅，心里却有灵犀一点相通。隔座传钩春酒暖，分队射覆蜡灯红。可叹我听见鼓声便要去应官，骑着马往兰台，像转蓬一样飘零。"
  appreciation: "「身无彩凤双飞翼，心有灵犀一点通」写情意相通而形迹难聚，千古名句；尾联转入仕途飘泊，身世之感与恋情交织。"
  background: "李商隐无题名篇。写宴会上的邂逅与情愫，结以应官走马的自叹。"
  famous_lines:
  - 嗟余听鼓应官去，走马兰台类转蓬。
  tags:
