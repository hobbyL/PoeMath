  - 春天
  - 对仗
  - 七言绝句
- id: poem_core_034
  title: 晓出净慈寺送林子方
  author: 杨万里
  dynasty: 宋
  grade: 2
  semester: 下
  textbook_unit: 语文二年级下·课文15
  is_required: true
  difficulty: 1
  content: '毕竟西湖六月中，风光不与四时同。

    接天莲叶无穷碧，映日荷花别样红。

    '
  pinyin: 'bì jìng xī hú liù yuè zhōng ， fēng guāng bù yǔ sì shí tóng 。

    jiē tiān lián yè wú qióng bì ， yìng rì hé huā bié yàng hóng 。

    '
  annotations:
  - word: 净慈寺
    meaning: 杭州西湖南岸的寺庙
  - word: 林子方
    meaning: 诗人的朋友
  - word: 毕竟
    meaning: 到底
  - word: 四时
    meaning: 四季
  - word: 接天
    meaning: 与天边相接
  - word: 别样
    meaning: 格外、特别
  translation: 到底是六月的西湖啊，风光和其他季节完全不同。碧绿的莲叶连接天边一望无际，阳光照耀下的荷花格外鲜红。
  appreciation: 此诗先声夺人以"毕竟"领起，然后用"接天""映日"两句写尽西湖夏日荷花的壮丽，是写荷花的千古名篇。
  background: 杨万里于公元1187年在杭州为友人林子方送行时所作。
  famous_lines:
  - 接天莲叶无穷碧，映日荷花别样红
  tags:
  - 西湖
  - 荷花
  - 送别
  - 夏天
  - 七言绝句
- id: poem_core_035
  title: 绝句（迟日）
  author: 杜甫
  dynasty: 唐
  grade: 3
  semester: 下
  textbook_unit: 语文三年级下·课文1
  is_required: false
  difficulty: 2
  content: '迟日江山丽，春风花草香。

    泥融飞燕子，沙暖睡鸳鸯。

    '
  pinyin: 'chí rì jiāng shān lì ， chūn fēng huā cǎo xiāng 。

    ní róng fēi yàn zi ， shā nuǎn shuì yuān yāng 。

    '
  annotations:
  - word: 迟日
    meaning: 春日，春天白天渐长，所以叫迟日
  - word: 丽
    meaning: 美丽
  - word: 泥融
    meaning: 泥土变得湿润松软
  - word: 鸳鸯
    meaning: 一种水鸟，常成对出现
  translation: 春天的太阳照耀着美丽的江山，春风送来花草的芳香。湿软的泥地里燕子飞来飞去衔泥筑巢，温暖的沙滩上鸳鸯静静地睡着。
  appreciation: 全诗四句四景，动静结合。前两句写大景——日丽风香，后两句写小景——燕飞鸯睡，色彩明快，表达了诗人对春天的喜悦。
  background: 杜甫居于成都草堂时期，享受难得的安宁生活，此诗写春日闲适之景。
  famous_lines:
  - 泥融飞燕子，沙暖睡鸳鸯
  tags:
  - 春天
  - 写景
  - 动物
  - 五言绝句
- id: poem_core_036
  title: 惠崇春江晚景
  author: 苏轼
  dynasty: 宋
  grade: 3
  semester: 下
  textbook_unit: 语文三年级下·课文1
  is_required: true
  difficulty: 2
  content: '竹外桃花三两枝，春江水暖鸭先知。

    蒌蒿满地芦芽短，正是河豚欲上时。

    '
  pinyin: 'zhú wài táo huā sān liǎng zhī ， chūn jiāng shuǐ nuǎn yā xiān zhī 。

    lóu hāo mǎn dì lú yá duǎn ， zhèng shì hé tún yù shàng shí 。

    '
  annotations:
  - word: 惠崇
    meaning: 北宋僧人，善画
  - word: 蒌蒿
    meaning: 一种草本植物，嫩茎可食
  - word: 芦芽
    meaning: 芦苇的嫩芽
  - word: 河豚
    meaning: 一种鱼，春天从海洋洄游到江河
  - word: 欲上
    meaning: 将要逆流而上
  translation: 竹林外两三枝桃花初放，鸭子在水中嬉戏，它们最先感知到春江水变暖了。河滩上长满了蒌蒿，芦苇也开始抽出嫩芽，这正是河豚将要逆流而上的时候。
  appreciation: 这是一首题画诗，诗人由画面联想到画外，"春江水暖鸭先知"成为千古名句，写出了春天到来的最早信号。
  background: 苏轼为僧人惠崇所画的《春江晚景》题诗，化静为动，由画入诗。
  famous_lines:
  - 竹外桃花三两枝，春江水暖鸭先知
  tags:
  - 春天
  - 题画诗
  - 写景
  - 七言绝句
- id: poem_core_037
  title: 三衢道中
  author: 曾几
  dynasty: 宋
  grade: 3
  semester: 下
  textbook_unit: 语文三年级下·课文1
  is_required: true
  difficulty: 2
  content: '梅子黄时日日晴，小溪泛尽却山行。

    绿阴不减来时路，添得黄鹂四五声。

    '
  pinyin: 'méi zi huáng shí rì rì qíng ， xiǎo xī fàn jìn què shān xíng 。

    lǜ yīn bù jiǎn lái shí lù ， tiān dé huáng lí sì wǔ shēng 。

    '
  annotations:
  - word: 三衢
    meaning: 今浙江衢州，因境内有三衢山得名
  - word: 梅子黄时
    meaning: 指初夏时节，梅子成熟变黄
  - word: 泛
    meaning: 乘船
  - word: 却
    meaning: 再、又
  - word: 绿阴
    meaning: 绿树成荫
  translation: 梅子变黄的时节天天都是晴天，乘船走完了小溪的水路又走上了山路。路上绿树成荫和来时一样浓密，还多了黄鹂鸟四五声悦耳的啼叫。
  appreciation: 此诗写初夏山行的愉悦。"不减"与"添得"妙用对比，写出山行比来路更好的惊喜，读来心情舒畅。
  background: 曾几是南宋诗人，此诗写他在三衢道上旅行的见闻与感受。
  famous_lines:
  - 绿阴不减来时路，添得黄鹂四五声
  tags:
  - 写景
  - 夏天
  - 山行
  - 七言绝句
- id: poem_core_038
  title: 雪梅
  author: 卢钺
  dynasty: 宋
  grade: 4
  semester: 上
  textbook_unit: 语文四年级上·课文9
  is_required: false
  difficulty: 2
  content: '梅雪争春未肯降，骚人阁笔费评章。

    梅须逊雪三分白，雪却输梅一段香。

    '
  pinyin: 'méi xuě zhēng chūn wèi kěn xiáng ， sāo rén gé bǐ fèi píng zhāng 。

    méi xū xùn xuě sān fēn bái ， xuě què shū méi yī duàn xiāng 。

    '
  annotations:
  - word: 降
    meaning: 服输
  - word: 骚人
    meaning: 诗人、文人
  - word: 阁笔
    meaning: 搁笔，放下笔
  - word: 评章
    meaning: 评论、评判
  - word: 逊
    meaning: 比不上
  translation: 梅花和雪花争相报春，谁也不肯认输，让诗人放下笔来费心评判。梅花在白色上比雪差三分，雪花却在香气上输给了梅花。
  appreciation: 此诗将梅雪拟人化，巧妙表达了各有所长的哲理，语言轻快而富有趣味。
  background: 卢钺是宋代诗人，此诗以梅雪比较，寓意各有所长、不可偏废。
  famous_lines:
  - 梅须逊雪三分白，雪却输梅一段香
  tags:
  - 咏物
  - 梅花
  - 雪
  - 哲理
  - 七言绝句
- id: poem_core_039
  title: 凉州词
  author: 王翰
  dynasty: 唐
  grade: 4
  semester: 上
  textbook_unit: 语文四年级上·课文21
  is_required: true
  difficulty: 3
  content: '葡萄美酒夜光杯，欲饮琵琶马上催。

    醉卧沙场君莫笑，古来征战几人回？

    '
  pinyin: 'pú táo měi jiǔ yè guāng bēi ， yù yǐn pí pa mǎ shàng cuī 。

    zuì wò shā chǎng jūn mò xiào ， gǔ lái zhēng zhàn jǐ rén huí ？

    '
  annotations:
  - word: 夜光杯
    meaning: 用白玉制成的酒杯，能在月光下发光
  - word: 琵琶
    meaning: 一种弦乐器，此指军中奏乐催促出征
  - word: 沙场
    meaning: 战场
  - word: 征战
    meaning: 出征打仗
  translation: 用精美的夜光杯斟满葡萄美酒，正要喝的时候，马上传来催促出征的琵琶声。就算醉倒在战场上你也不要笑，自古以来出征打仗的人有几个能活着回来？
  appreciation: 此诗写军中宴饮场面，豪迈中有悲壮。结尾反问句既写出了将士们视死如归的豪情，也暗含了对战争的深沉感慨。
  background: 王翰为盛唐边塞诗人，此诗写戍边将士在出征前的宴饮场景。
  famous_lines:
  - 醉卧沙场君莫笑，古来征战几人回
  tags:
  - 边塞
  - 军旅
  - 豪放
  - 七言绝句
- id: poem_core_040
  title: 夏日绝句
  author: 李清照
  dynasty: 宋
  grade: 4
  semester: 上
  textbook_unit: 语文四年级上·课文21
  is_required: true
  difficulty: 3
  content: '生当作人杰，死亦为鬼雄。

    至今思项羽，不肯过江东。

    '
  pinyin: 'shēng dāng zuò rén jié ， sǐ yì wéi guǐ xióng 。

    zhì jīn sī xiàng yǔ ， bù kěn guò jiāng dōng 。

    '
  annotations:
  - word: 人杰
    meaning: 人中的豪杰
  - word: 鬼雄
    meaning: 鬼中的英雄
  - word: 项羽
    meaning: 秦末起义军领袖，楚霸王
  - word: 江东
    meaning: 长江以东的地区，项羽的故乡
  translation: 活着就应当做人中的豪杰，死了也要做鬼中的英雄。直到今天人们还在怀念项羽，因为他宁死也不肯渡江回到故乡。
  appreciation: 此诗借咏项羽表达对南宋朝廷偏安不思进取的不满，气势磅礴，掷地有声，是李清照豪放风格的代表。
  background: 南宋建炎三年（1129年），李清照随丈夫南渡，路过乌江项羽自刎处时有感而作。
  famous_lines:
  - 生当作人杰，死亦为鬼雄
  tags:
  - 爱国
  - 咏史
  - 豪放
  - 五言绝句
- id: poem_core_041
  title: 宿新市徐公店
  author: 杨万里
  dynasty: 宋
  grade: 4
  semester: 下
  textbook_unit: 语文四年级下·课文1
  is_required: true
  difficulty: 2
  content: '篱落疏疏一径深，树头新绿未成阴。

    儿童急走追黄蝶，飞入菜花无处寻。

    '
  pinyin: 'lí luò shū shū yī jìng shēn ， shù tóu xīn lǜ wèi chéng yīn 。

    ér tóng jí zǒu zhuī huáng dié ， fēi rù cài huā wú chù xún 。

    '
  annotations:
  - word: 新市
    meaning: 今浙江德清新市镇
  - word: 篱落
    meaning: 篱笆
  - word: 疏疏
    meaning: 稀稀疏疏
  - word: 一径深
    meaning: 一条小路伸向远方
  - word: 急走
    meaning: 快跑
  translation: 稀稀疏疏的篱笆旁，一条小路通向远方，树上新长出的嫩叶还没有形成树荫。小孩子飞快地追赶黄蝴蝶，蝴蝶飞进菜花丛中再也找不到了。
  appreciation: 后两句捕捉了儿童追蝶的生动瞬间，黄蝶与菜花同色是诗眼，充满童趣与田园气息。
  background: 杨万里南宋诗人，号诚斋，此诗写于旅途中在新市徐公店歇息时所见。
  famous_lines:
  - 儿童急走追黄蝶，飞入菜花无处寻
  tags:
  - 田园
  - 儿童
  - 春天
  - 七言绝句
- id: poem_core_042
  title: 清平乐·村居
  author: 辛弃疾
  dynasty: 宋
  grade: 4
  semester: 下
  textbook_unit: 语文四年级下·课文1
  is_required: true
  difficulty: 3
  content: '茅檐低小，溪上青青草。

    醉里吴音相媚好，白发谁家翁媪？

    大儿锄豆溪东，中儿正织鸡笼。

    最喜小儿亡赖，溪头卧剥莲蓬。

    '
  pinyin: 'máo yán dī xiǎo ， xī shàng qīng qīng cǎo 。

    zuì lǐ wú yīn xiāng mèi hǎo ， bái fà shuí jiā wēng ǎo ？

    dà ér chú dòu xī dōng ， zhōng ér zhèng zhī jī lóng 。

    zuì xǐ xiǎo ér wáng lài ， xī tóu wò bāo lián péng 。

    '
  annotations:
  - word: 清平乐
    meaning: 词牌名
  - word: 茅檐
    meaning: 茅草屋的屋檐
  - word: 吴音
    meaning: 吴地方言
  - word: 相媚好
    meaning: 互相说着亲热的话
  - word: 翁媪
    meaning: 老翁和老妇
  - word: 亡赖
    meaning: 同"无赖"，顽皮
  - word: 卧剥莲蓬
    meaning: 趴着剥莲蓬
  translation: 低矮的茅屋旁，小溪边长满青草。微醉中听到老夫妻用吴地方言亲切地交谈。大儿子在溪东豆田里锄草，二儿子在编鸡笼。最可爱的是小儿子，趴在溪边剥莲蓬吃。
  appreciation: 全词描绘了一幅恬静温馨的农家生活画面，老夫妻相亲相爱，三个儿子各有其事，尤其小儿子的"亡赖"形象最为生动可爱。
  background: 辛弃疾晚年退居信州（今江西上饶）时所作，借田园生活表达内心的宁静。
  famous_lines:
  - 最喜小儿亡赖，溪头卧剥莲蓬
  tags:
  - 田园
  - 家庭
  - 儿童
  - 宋词
- id: poem_core_043
  title: 芙蓉楼送辛渐
  author: 王昌龄
  dynasty: 唐
  grade: 4
  semester: 下
  textbook_unit: 语文四年级下·课文22
  is_required: true
  difficulty: 3
  content: '寒雨连江夜入吴，平明送客楚山孤。

    洛阳亲友如相问，一片冰心在玉壶。

    '
  pinyin: 'hán yǔ lián jiāng yè rù wú ， píng míng sòng kè chǔ shān gū 。

    luò yáng qīn yǒu rú xiāng wèn ， yī piàn bīng xīn zài yù hú 。

    '
  annotations:
  - word: 芙蓉楼
    meaning: 在今江苏镇江
  - word: 辛渐
    meaning: 诗人的朋友
  - word: 寒雨
    meaning: 寒冷的秋雨
  - word: 连江
    meaning: 雨水与江面连成一片
  - word: 平明
    meaning: 天亮的时候
  - word: 冰心
    meaning: 像冰一样晶莹纯洁的心
  - word: 玉壶
    meaning: 玉做的壶，比喻高洁
  translation: 冷雨连着江水在夜里来到吴地，天亮时送走友人，远望楚山显得格外孤单。如果洛阳的亲友问起我的情况，就说我的心像玉壶中的冰一样纯洁。
  appreciation: “一片冰心在玉壶”是千古名句，以冰玉自喻表明诗人心志高洁，不为世俗所染。
  background: 王昌龄被贬江宁（今南京）丞时，送好友辛渐北上洛阳时所作。
  famous_lines:
  - 洛阳亲友如相问，一片冰心在玉壶
  tags:
  - 送别
  - 明志
  - 七言绝句
  - 名篇
- id: poem_core_044
  title: 塞下曲
  author: 卢纶
  dynasty: 唐
  grade: 4
  semester: 下
  textbook_unit: 语文四年级下·课文22
  is_required: true
  difficulty: 3
  content: '月黑雁飞高，单于夜遁逃。

    欲将轻骑逐，大雪满弓刀。

    '
  pinyin: 'yuè hēi yàn fēi gāo ， chán yú yè dùn táo 。

    yù jiāng qīng jì zhú ， dà xuě mǎn gōng dāo 。

    '
  annotations:
  - word: 月黑
    meaning: 没有月光，夜色昏暗
  - word: 单于
    meaning: 匈奴首领
  - word: 遁逃
    meaning: 逃跑
  - word: 轻骑
    meaning: 轻装快速的骑兵
  - word: 逐
    meaning: 追赶
  translation: 月色昏黑，大雁受惊高飞，单于趁黑夜悄悄逃跑。将军正要率领轻骑兵追赶，大雪纷飞落满了弓和刀。
  appreciation: 全诗仅二十字，却营造出一幅夜色茫茫、雪花飘飘的追击场面，将士的英武和战斗的紧张跃然纸上。
  background: 卢纶是中唐诗人，《塞下曲》组诗共六首，此为第三首。
  famous_lines:
  - 欲将轻骑逐，大雪满弓刀
  tags:
  - 边塞
  - 军旅
  - 五言绝句
- id: poem_core_045
  title: 墨梅
  author: 王冕
  dynasty: 元
  grade: 4
  semester: 下
  textbook_unit: 语文四年级下·课文22
  is_required: true
  difficulty: 3
  content: '吾家洗砚池头树，朵朵花开淡墨痕。

    不要人夸好颜色，只留清气满乾坤。

    '
  pinyin: 'wú jiā xǐ yàn chí tóu shù ， duǒ duǒ huā kāi dàn mò hén 。

    bù yào rén kuā hǎo yán sè ， zhǐ liú qīng qì mǎn qián kūn 。

    '
  annotations:
  - word: 洗砚池
    meaning: 洗毛笔砚台的池子，典出王羲之
  - word: 淡墨痕
    meaning: 淡淡的墨色痕迹，指水墨画的梅花
  - word: 清气
    meaning: 清香之气，也指高洁的品格
  - word: 乾坤
    meaning: 天地
  translation: 我家洗砚池边有一棵梅树，朵朵梅花绽放带着淡淡的墨色。它不需要人们夸赞它的颜色好看，只愿留下清香之气充满天地之间。
  appreciation: 这是一首题画诗，借梅花自喻。"不要人夸好颜色，只留清气满乾坤"表达了诗人不求虚名、只求高洁品格的志向。
  background: 王冕是元代著名画家、诗人，擅画梅花，此诗题于自己的墨梅画上。
  famous_lines:
  - 不要人夸好颜色，只留清气满乾坤
  tags:
  - 咏物
  - 梅花
  - 明志
  - 七言绝句
- id: poem_core_046
  title: 示儿
  author: 陆游
  dynasty: 宋
  grade: 5
  semester: 上
  textbook_unit: 语文五年级上·课文12
  is_required: true
  difficulty: 3
  content: '死去元知万事空，但悲不见九州同。

    王师北定中原日，家祭无忘告乃翁。

    '
  pinyin: 'sǐ qù yuán zhī wàn shì kōng ， dàn bēi bù jiàn jiǔ zhōu tóng 。

    wáng shī běi dìng zhōng yuán rì ， jiā jì wú wàng gào nǎi wēng 。

    '
  annotations:
  - word: 元知
    meaning: 本来就知道。元，通"原"
  - word: 九州同
    meaning: 全国统一
  - word: 王师
    meaning: 指宋朝的军队
  - word: 中原
    meaning: 黄河中下游地区
  - word: 家祭
    meaning: 家中祭祀祖先
  - word: 乃翁
    meaning: 你的父亲，指陆游自己
  translation: 我本来就知道人死去后一切都空了，只是悲伤看不到国家的统一。将来朝廷军队向北收复中原的那一天，家祭时不要忘记告诉你们的父亲。
  appreciation: 全诗以简朴直白的语言表达深沉的爱国情怀，"但悲不见九州同"一句道出诗人临终最大的遗憾，是南宋爱国诗的绝唱。
  background: 宋宁宗嘉定二年（1210）冬，陆游临终前留给儿子的遗嘱诗，时年八十五岁。
  famous_lines:
  - 王师北定中原日，家祭无忘告乃翁
  tags:
  - 爱国
  - 遗嘱
  - 七言绝句
  - 名篇
- id: poem_core_047
  title: 题临安邸
  author: 林升
  dynasty: 宋
  grade: 5
  semester: 上
  textbook_unit: 语文五年级上·课文12
  is_required: true
  difficulty: 3
  content: '山外青山楼外楼，西湖歌舞几时休？

    暖风熏得游人醉，直把杭州作汴州。

    '
  pinyin: 'shān wài qīng shān lóu wài lóu ， xī hú gē wǔ jǐ shí xiū ？

    nuǎn fēng xūn dé yóu rén zuì ， zhí bǎ háng zhōu zuò biàn zhōu 。

    '
  annotations:
  - word: 临安
    meaning: 南宋都城，今浙江杭州
  - word: 邸
    meaning: 旅店
  - word: 熏
    meaning: 吹拂
  - word: 汴州
    meaning: 北宋都城，今河南开封
  translation: 青山之外还有青山，高楼之外还有高楼，西湖上的歌舞什么时候才停止？温暖的风把游人吹得如痴如醉，简直把杭州当成了汴州。
  appreciation: 全诗以反问和讽刺的笔调揭露南宋统治者偏安一隅、纸醉金迷的丑态，末句"直把杭州作汴州"是千古名句，锋芒毕露。
  background: 南宋偏安杭州后，权贵沉溺于享乐，林升在临安一家旅店墙上题下此诗以讽刺。
  famous_lines:
  - 暖风熏得游人醉，直把杭州作汴州
  tags:
  - 讽刺
  - 忧国
  - 七言绝句
  - 名篇
- id: poem_core_048
  title: 己亥杂诗
  author: 龚自珍
  dynasty: 清
  grade: 5
  semester: 上
  textbook_unit: 语文五年级上·课文12
  is_required: true
  difficulty: 3
  content: '九州生气恃风雷，万马齐喑究可哀。

    我劝天公重抖擞，不拘一格降人材。

    '
  pinyin: 'jiǔ zhōu shēng qì shì fēng léi ， wàn mǎ qí yīn jiū kě āi 。

    wǒ quàn tiān gōng chóng dǒu sǒu ， bù jū yī gé jiàng rén cái 。

    '
  annotations:
  - word: 九州
    meaning: 中国
  - word: 生气
    meaning: 生气勃勃的局面
  - word: 恃
    meaning: 依靠
  - word: 万马齐喑
    meaning: 所有的马都沉寂无声，比喻死气沉沉
  - word: 究
    meaning: 终究
  - word: 抖擞
    meaning: 振作、奋发
  translation: 中华大地要焕发生机勃勃的局面，必须依靠风雷激荡的巨变，而现在这样万马齐喑的沉闷局面实在让人悲哀。我奉劝上天要重新振作精神，不要拘泥于一种规格降下更多的人才。
  appreciation: 全诗以雄奇的想象和恢宏的气魄呼唤变革，"我劝天公重抖擞，不拘一格降人材"是振聋发聩的呐喊。
  background: 道光十九年（己亥1839），龚自珍辞官南归途中所作，共315首，此为第125首。
  famous_lines:
  - 我劝天公重抖擞，不拘一格降人材
  tags:
  - 变革
  - 人才
  - 七言绝句
  - 名篇
- id: poem_core_049
  title: 山居秋暝
  author: 王维
  dynasty: 唐
  grade: 5
  semester: 上
  textbook_unit: 语文五年级上·课文21
  is_required: true
  difficulty: 3
  content: '空山新雨后，天气晚来秋。

    明月松间照，清泉石上流。

    竹喧归浣女，莲动下渔舟。

    随意春芳歇，王孙自可留。

    '
  pinyin: 'kōng shān xīn yǔ hòu ， tiān qì wǎn lái qiū 。

    míng yuè sōng jiān zhào ， qīng quán shí shàng liú 。

    zhú xuān guī huàn nǚ ， lián dòng xià yú zhōu 。

    suí yì chūn fāng xiē ， wáng sūn zì kě liú 。

    '
  annotations:
  - word: 暝
    meaning: 日落，天色将晚
  - word: 空山
    meaning: 空旷寂静的山
  - word: 竹喧
    meaning: 竹林中的喧闹声
  - word: 浣女
    meaning: 洗衣的女子
  - word: 春芳歇
    meaning: 春天的花草凋谢了
  - word: 王孙
    meaning: 原指贵族子弟，此处诗人自指
  translation: 空旷的山中刚下过一场新雨，天气清爽秋意浓浓。明亮的月光透过松林洒下来，清澈的泉水在山石上流淌。竹林里传出洗衣女子归家的欢笑声，莲叶摇动是渔船顺流而下。任凭春天的花草凋零，秋色宜人我自可久留。
  appreciation: 全诗以清幽的笔调描绘山居秋晚的宁静之美，动静结合、声色相衬，被称为"诗中有画"的典范。
  background: 王维晚年隐居辋川别业时所作，反映其半官半隐的生活。
  famous_lines:
  - 明月松间照，清泉石上流
  tags:
  - 山水
  - 秋天
  - 隐逸
  - 五言律诗
  - 名篇
- id: poem_core_050
  title: 枫桥夜泊
  author: 张继
  dynasty: 唐
  grade: 5
  semester: 上
