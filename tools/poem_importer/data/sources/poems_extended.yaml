- id: poem_ext_086
  title: 宿桐庐江寄广陵旧游
  author: 孟浩然
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '山暝闻猿愁，沧江急夜流。

    风鸣两岸叶，月照一孤舟。

    建德非吾土，维扬忆旧游。

    还将两行泪，遥寄海西头。

    '
  annotations:
