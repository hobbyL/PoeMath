- id: poem_exp_398
  title: 减字木兰花·双龙对起
  author: 苏轼
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '钱塘西湖有诗僧清顺，所居藏春坞，门前有二古松，各有凌霄花络其上，顺常昼卧其下。

    时余为郡，一日屏骑从过之，松风骚然，顺指落花求韵，余为赋此。

    双龙对起，白甲苍髯烟雨里。

    疏影微香，下有幽人昼梦长。

    湖风清软，双鹊飞来争噪晚。

    翠飐红轻，时下凌霄百尺英。

    '
