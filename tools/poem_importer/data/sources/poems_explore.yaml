- id: poem_exp_220
  title: 一剪梅·咏柳
  author: 夏完淳
  dynasty: 明
  layer: explore
  is_required: false
  difficulty: 3
  content: '无限伤心夕照中，故国凄凉，剩粉余红。

    金沟御水自西东，昨岁陈宫，今岁隋宫。

    往事思量一晌空，飞絮无情，依旧烟笼。

    长条短叶翠濛濛，才过西风，又过东风。

    '
