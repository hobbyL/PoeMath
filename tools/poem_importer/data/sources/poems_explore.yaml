- id: poem_exp_518
  title: 一斛珠·洛城春晚
  author: 苏轼
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 3
  content: '洛城春晚。

    垂杨乱掩红楼半。

    小池轻浪纹如篆。

    烛下花前，曾醉离歌宴。

    自惜风流云雨散。

    关山有限情无限。

    待君重见寻芳伴。

    为说相思、目断西楼燕。

