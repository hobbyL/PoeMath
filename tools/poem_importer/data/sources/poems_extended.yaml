- id: poem_ext_265
  title: 与高适薛据同登慈恩寺浮图
  author: 岑参
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '塔势如涌出，孤高耸天宫。

    登临出世界，磴道盘虚空。

    突兀压神州，峥嵘如鬼工。

    四角碍白日，七层摩苍穹。

    下窥指高鸟，俯听闻惊风。

    连山若波涛，奔凑似朝东。

    青槐夹驰道，宫馆何玲珑。

    秋色从西来，苍然满关中。

    五陵北原上，万古青濛濛。

    净理了可悟，胜因夙所宗。

    誓将挂冠去，觉道资无穷。

    '
  annotations:
  - word: 慈恩寺
    meaning: 唐代长安寺庙
  - word: 浮图
    meaning: 佛塔
  - word: 塔势
    meaning: 塔的形态
  translation: "塔势如涌出，孤高耸天宫。登临出世界，磴道盘虚空。突兀压神州，峥嵘如鬼工。四角碍白日，七层摩苍穹。下窥指高鸟，俯听闻惊风。连山若波涛，奔凑如朝东。青槐夹驰道，宫馆何玲珑。秋色从西来，苍然满关中。五陵北原上，万古青濛濛。净理了可悟，胜因夙所宗。誓将挂冠去，觉道资无穷。（白话大意：慈恩寺塔高耸入云，登临如出尘世；俯瞰山河宫苑，秋色满关中。诗人由此感悟佛理，萌生退隐求道之意。）"
  appreciation: "岑参与高适、薛据等同登大雁塔所作。写塔之高峻用一连串夸张与比喻，后半转入苍茫秋色与出世之思，气象雄阔。"
  background: "天宝十一载（752）秋，岑参与高适、薛据、杜甫等同登长安慈恩寺塔，各有诗作。"
