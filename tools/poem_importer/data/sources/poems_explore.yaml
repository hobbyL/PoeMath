    万里来游还望远，三年多难更凭危。

    白头吊古风霜里，老木沧波无限悲。

    天入平湖晴不风，夕帆和雁正浮空。

    楼头客子杪秋后，日落君山元气中。

    北望可堪回白首，南游聊得看丹枫。

    翰林物色分留少，诗到巴陵还未工。

