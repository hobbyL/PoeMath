  - word: 渡江云
    meaning: 词牌名
  - word: 送春
    meaning: 送别春天
  - word: 和韵
    meaning: 依韵唱和
  translation: "《渡江云·揭浩斋送春和韵》篇幅适中。抓住「君看取，年年潘令河阳。」，大致能把握诗中情味。"
  appreciation: "《渡江云·揭浩斋送春和韵》情致细、字面美。吴澄写情往往点到即止。"
