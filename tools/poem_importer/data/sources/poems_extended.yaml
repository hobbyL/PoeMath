  - 夏天
  - 怀人
  - 友情
  - 五言古诗
- id: poem_ext_151
  title: 宿业师山房期丁大不至
  author: 孟浩然
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '夕阳度西岭，群壑倏已暝。

    松月生夜凉，风泉满清听。

    樵人归欲尽，烟鸟栖初定。

    之子期宿来，孤琴候萝径。

    '
  annotations:
  - word: 度
    meaning: 过、落
  - word: 壑
    meaning: 山谷
  - word: 倏
    meaning: 一下子
  - word: 满清听
    meaning: 满耳都是清脆的响声
  - word: 樵人
    meaning: 砍柴的人
  translation: "夕阳越过西岭，群壑忽然昏暗。松间月升起，夜凉生；风中泉声满耳清听。樵人将要归尽，归鸟栖定。等的人约好要来过夜，我抱着孤琴在萝径上等候。"
  appreciation: "孟浩然写山寺候友不至。前写夜色与声响，结以「孤琴候萝径」，等待而不焦躁，清幽中见真情。"
  background: "孟浩然宿业师山房，等候友人丁大未至而作。"
  famous_lines:
