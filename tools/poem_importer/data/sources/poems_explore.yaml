  - 古诗词
- id: poem_exp_290
  title: 国风·邶风·泉水
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '毖彼泉水，亦流于淇。

    有怀于卫，靡日不思。

    娈彼诸姬，聊与之谋。

    出宿于泲，饮饯于祢，女子有行，远父母兄弟。

    问我诸姑，遂及伯姊。

    出宿于干，饮饯于言。

    载脂载舝，还车言迈。

    遄臻于卫，不瑕有害？

    我思肥泉，兹之永叹。

    思须与漕，我心悠悠。

    驾言出游，以写我忧。

    '
  annotations:
  - word: 泉水
    meaning: 泉水流淌
  - word: 邶风
    meaning: 邶国的民歌
  - word: 淇水
    meaning: 河名
  translation: "那汩汩的泉水，也流入淇水。怀想卫国，无日不思。美好的诸姬，姑且与她们商量。出宿在泲，饮饯在祢；女子出嫁，远离父母兄弟。问我的诸姑，连带伯姊。出宿在干，饮饯在言。上好油脂、安好车辖，掉转车头出发。很快到卫，该不会有害吧？我想着肥泉，就此长叹。想着须与漕，我心悠悠。驾车出游，以排遣我的忧。"
  appreciation: "《邶风·泉水》卫女思归。肥泉永叹、驾言出游，乡思深长。"
  background: "《诗经·邶风·泉水》。"
  famous_lines:
  - 驾言出游，以写我忧。
  tags:
  - 思乡
  - 诗经
  - 古诗词
- id: poem_exp_291
  title: 载驰
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '载驰载驱，归唁卫侯。

    驱马悠悠，言至于漕。

    大夫跋涉，我心则忧。

    既不我嘉，不能旋反。

    视尔不臧，我思不远。

    既不我嘉，不能旋济？

    视尔不臧，我思不閟。

    陟彼阿丘，言采其蝱。

    女子善怀，亦各有行。

    许人尤之，众稚且狂。

    我行其野，芃芃其麦。

    控于大邦，谁因谁极？

    大夫君子，无我有尤。

    百尔所思，不如我所之。

    '
  annotations:
  - word: 载驰
    meaning: 驱车疾行
  - word: 归唁
    meaning: 回去吊唁
  translation: "赶着车马奔驰，回去吊唁卫侯。驱马悠悠，到了漕邑。大夫跋涉而来，我心忧愁。你们不赞成我，我也不能返回……我的心不是石头，不能转动；我的心不是席子，不能卷起。"
  appreciation: "许穆夫人《载驰》。爱国救卫，是《诗经》中女诗人名篇。"
  background: "《诗经·鄘风·载驰》，许穆夫人作。"
