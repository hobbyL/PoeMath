  is_required: false
  difficulty: 3
  content: '六曲阑干偎碧树，杨柳风轻，展尽黄金缕。

    谁把钿筝移玉柱，穿帘海燕双飞去。

    满眼游丝兼落絮，红杏开时，一霎清明雨。

    浓睡觉来莺乱语，惊残好梦无寻处。

