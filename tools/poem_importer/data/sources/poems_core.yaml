- id: poem_core_051
  title: 长相思
  author: 纳兰性德
  dynasty: 清
  grade: 5
  semester: 上
  textbook_unit: 语文五年级上·课文21
  is_required: false
  difficulty: 3
  content: '山一程，水一程，身向榆关那畔行，夜深千帐灯。

    风一更，雪一更，聒碎乡心梦不成，故园无此声。

    '
  pinyin: 'shān yī chéng ， shuǐ yī chéng ， shēn xiàng yú guān nà pàn xíng ， yè shēn qiān zhàng dēng 。

    fēng yī gēng ， xuě yī gēng ， guō suì xiāng xīn mèng bù chéng ， gù yuán wú cǐ shēng 。

    '
  annotations:
  - word: 程
    meaning: 道路、路程
  - word: 榆关
    meaning: 山海关的别称
  - word: 那畔
    meaning: 那边
  - word: 更
    meaning: 古代夜间计时单位，一夜分五更
  - word: 聒
    meaning: 声音嘈杂
  - word: 故园
    meaning: 故乡
  translation: 翻过一座座山，蹚过一条条水，我随着队伍向山海关那边行进，夜深了千顶帐篷都亮着灯火。风一更雪一更，风雪声吵得我思乡的心碎乱难以入睡，故乡是没有这种声音的。
  appreciation: 词以"山一程，水一程"和"风一更，雪一更"的复沓句式，将行军之艰与思乡之切写得回肠荡气。末句"故园无此声"含蓄深沉，余味无穷。
  background: 康熙二十一年（1682）二月，纳兰性德随康熙帝出关东巡祭祖，行至山海关外途中所作。
  famous_lines:
  - 风一更，雪一更，聒碎乡心梦不成，故园无此声
  tags:
