  - 宋词三百首
  - 豪放
  - 秋天
  - 怀人
  - 古诗词
- id: poem_ext_417
  title: 峨眉山月歌
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '峨眉山月半轮秋，影入平羌江水流。

    夜发清溪向三峡，思君不见下渝州。

    '
  annotations:
  - word: 峨眉山
    meaning: 四川峨眉山
  - word: 月
    meaning: 月亮
  - word: 半轮秋
    meaning: 半圆形的秋月
  - word: 平羌
    meaning: 平羌江
  translation: "峨眉山上，秋月只剩半轮；月影倒映在平羌江水中缓缓流淌。夜里从清溪出发驶向三峡，想着你却见不到，船已驶向渝州。"
  appreciation: "李白少年出蜀之作。二十八字中嵌入峨眉山、平羌江、清溪、三峡、渝州五处地名，却自然流畅，写山水行旅与对友人的思念。"
  background: "开元十三年（725）李白离蜀东游时所作。"
