- id: poem_ext_341
  title: 寇准读书
  author: 佚名
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 4
  content: '初，张咏在成都，闻准入相，谓其僚属曰：“寇公奇材，惜学术不足尔。

    ”及准出陕，咏适自成都罢还，准严供帐，大为具待。

    咏将去，准送之郊，问曰：“何以教准？

    ”咏徐曰：“《霍光传》不可不读也。

    ”准莫谕其意，归，取其传读之，至“不学无术”，笑曰：“此张公谓我矣。

    ”

    '
