- id: poem_ext_183
  title: 古从军行
  author: 李颀
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '白日登山望烽火，黄昏饮马傍交河。

    行人刁斗风沙暗，公主琵琶幽怨多。

    野云万里无城郭，雨雪纷纷连大漠。

    胡雁哀鸣夜夜飞，胡儿眼泪双双落。

    闻道玉门犹被遮，应将性命逐轻车。

    年年战骨埋荒外，空见蒲桃入汉家。

    '
  annotations:
  - word: 烽火
    meaning: 古代一种警报
  - word: 饮马
    meaning: 给马喂水
  - word: 傍
    meaning: 顺着
  - word: 交河
    meaning: 古县名，故城在今新疆吐鲁番西面
  - word: 行人
    meaning: 出征战士
  translation: 白天登山观察报警的烽火台，黄昏时牵马饮水靠近交河边。 昏暗的风沙传来阵阵刁斗声，如同汉代公主琵琶充满幽怨。 旷野云雾茫茫万里不见城郭，雨雪纷纷笼罩着无边的沙漠。 哀鸣的胡雁夜夜从空中飞过，胡人士兵个个眼泪双双滴落。 听说玉门关已被挡住了归路，战士只有追随将军拼命奔波。 年年战死的尸骨埋葬于荒野，换来的只是西域葡萄送汉家。
  appreciation: “从军行”是乐府古题。此诗借汉皇开边，讽玄宗用兵。实写当代之事，由于怕触犯忌讳，所以题目加上一个“古”字。它对当代帝王的好大喜功，穷兵黩武，视人民生命如草芥的行径，加以讽刺，悲多于壮。全诗记叙从军之苦，充满非战思想。万千尸骨埋于荒野，仅换得葡萄归种中原，显然得不偿失。 诗开首先写紧张的从军生活。白天爬上山去观望四方有无举烽火的边警；黄昏时候又到交河边上让马饮水（交河在今新疆吐鲁番西面，这里借指边疆上的河流）。三、四句的“公主琵琶”是指汉朝细君公主远嫁乌孙国时所弹的琵琶曲调，当然，这不会是欢乐之声，而只是哀怨之调。一、二句写“白日”、“黄昏”的情况，三、四句接着描绘夜晚的情况：风沙弥漫，一片漆黑，只听得见军营中巡夜的打更声和那如泣如诉的幽怨的琵琶声。景象非常肃穆而凄凉。“行人”，是指出征将士，这样就与下一句的公主出塞之声，引起共鸣了。
    接着，诗人又着意渲染边陲的环境。军营所在，四顾荒野，无城郭可依，“万里”极言其辽阔；雨雪纷纷，以至与大漠相连，其凄冷酷寒的情状亦可想见。以上六句，写尽了从军生活的艰苦。接下来，似乎应该正面点出“行人”的哀怨之感了。可是诗人却别具机杼，背面傅粉，写出了“胡雁哀鸣夜夜飞，胡儿眼泪双双落”两句。胡雁胡。
