- id: poem_ext_312
  title: 避地司空原言怀
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '南风昔不竞，豪圣思经伦。

    刘琨与祖逖，起舞鸡鸣晨。

    虽有匡济心，终为乐祸人。

    我则异于是，潜光皖水滨。

    卜筑司空原，北将天柱邻。

    雪霁万里月，云开九江春。

    俟乎太阶平，然后托微身。

    倾家事金鼎，年貌可长新。

    所愿得此道，终然保清真。

    弄景奔日驭，攀星戏河津。

    一随王乔去，长年玉天宾。

    '
