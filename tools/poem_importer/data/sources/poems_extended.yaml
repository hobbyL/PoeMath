- id: poem_ext_090
  title: 望洞庭湖赠张丞相
  author: 孟浩然
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '八月湖水平，涵虚混太清。

    气蒸云梦泽，波撼岳阳城。

    欲济无舟楫，端居耻圣明。

    坐观垂钓者，徒有羡鱼情。

    '
  annotations:
  - word: 涵虚
    meaning: 包含天空，指天空倒映在水中
  - word: 涵
    meaning: 包容
  - word: 虚
    meaning: 虚空，空间
  - word: 混太清
    meaning: 与天混为一体
  - word: 太清
    meaning: 指天空
  translation: 八月洞庭湖水暴涨几与岸平，水天一色交相辉映迷离难辨。 云梦大泽水气蒸腾白白茫茫，波涛汹涌似乎把岳阳城撼动。 想要渡湖却苦于找不到船只，圣明时代闲居又觉愧对明君。 坐看垂钓之人多么悠闲自在，可惜只能空怀一片羡鱼之情。
  appreciation: 张丞相即张九龄，也是著名的诗人，官至中书令，为人正直。孟浩然想进入政界，实现自己的理想，希望有人能给予引荐。他在入京应试之前写这首诗给张九龄，就含有这层意思。 诗的前四句写洞庭湖壮丽的景象和磅礴的气势，后四句是借此抒发自己的政治热情和希望。 开头两句交代了时间，写出了浩瀚的湖水。湖水和天空浑然一体，景象是阔大的。“涵”，有包含的意思。“虚”，指高空。高空为水所包含，即天倒映在水里。“太清”指天空。“混太清”即水天相接。
