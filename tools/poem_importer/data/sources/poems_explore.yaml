    朱颜青鬓，拥雕戈西戍。

    笑儒冠、自来多误。

    功名梦断，却泛扁舟吴楚。

    漫悲歌、伤怀吊古。

    烟波无际，望秦关何处。

    叹流年、又成虚度。

