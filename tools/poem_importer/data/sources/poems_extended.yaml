- id: poem_ext_117
  title: 春雨
  author: 李商隐
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '怅卧新春白袷衣，白门寥落意多违。

    红楼隔雨相望冷，珠箔飘灯独自归。

    远路应悲春晼晚，残霄犹得梦依稀。

    玉珰缄札何由达，万里云罗一雁飞。

    '
  annotations:
  - word: 白袷衣
    meaning: 即白夹衣，唐人以白衫为闲居便服
  - word: 白门
    meaning: 指今江苏南京市
  - word: 红楼
    meaning: 华美的楼房，多指女子的住处
  - word: 珠箔
    meaning: 珠帘，此处比喻春雨细密
  - word: 晼晚
    meaning: 夕阳西下的光景，此处还蕴涵年复一年、人老珠黄之意
  translation: 新春时节，我穿着白夹衣，怅然地卧在床上；白门寂寞，令我心中万分感伤。 隔着蒙蒙细雨凝视着那座红楼，只觉得凄冷茫茫，我只好顶着珠帘般的细雨，在依稀闪烁的灯光中黯然归来。 凄楚的暮春，遥远的路途，哪里可以寄托我的悲凄伤感？缠绵的思绪，化做空泛的梦，在残宵的梦中依稀与你相见。 有玉珰一双作为信物，怎么样才可以送达；我只有寄希望于万里长空中，那一只刚刚飞来的鸿雁。
  appreciation: 一个春雨绵绵的早晨，诗中的男主人公穿着白布夹衫，和衣怅卧。他的心中究竟隐藏着什么？究竟何以如此呢？诗在点明怅卧之后，用一句话作了概括的交待 ：“白门寥落意多违 。”据南朝民歌《杨叛儿》：“暂出白门前，杨柳可藏乌。欢作沉水香，侬作博山炉 。”白门当指男女欢会之所。过去的欢会处，今日寂寞冷落，不再看见对方的踪影。与所爱者分离的失意，便是他愁思百结地怅卧的原因。怅卧中，他的思绪浮动，回味着最后一次访见对方的情景：“红楼隔雨相望冷，珠箔飘灯独自归。”仍然是对方住过的那座熟悉的红楼，但是他没有勇气走进去，甚至没有勇气再靠近它一点，只是隔着雨凝视着。往日在他的感觉里，是那样亲切温存的红楼，如今是那样地凄寒。在这红楼前，他究竟站了多久，也许连自己都不清楚。他发现周围的街巷灯火已经亮了，雨从亮着灯光的窗口前飘过，恍如一道道珠帘。在这珠帘的闪烁中，他才迷蒙地沿着悠长而又寂寥的雨巷独自走回来。
    他是这样地茫然若失，所爱者的形影，始终在他的脑际萦回。“远路应悲春晼晚，残宵犹得梦依稀。”他想象着 ，在远方的那人也应为春之将暮而伤感吧？如今蓬山远隔，只有在残宵的短梦中依稀可以相会了。强烈的思念 ，促使他修下书札，侑以玉珰一双，作为寄书的信物 。这是奉。
