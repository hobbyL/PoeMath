- id: poem_ext_112
  title: 无题·凤尾香罗薄几重
  author: 李商隐
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '凤尾香罗薄几重，碧文圆顶夜深缝。

    扇裁月魄羞难掩，车走雷声语未通。

    曾是寂寥金烬暗，断无消息石榴红。

    斑骓只系垂杨岸，何处西南任好风。

    '
  annotations:
  - word: 凤尾
    meaning: 凤纹的
  - word: 香罗
    meaning: 有香气的丝罗帐
  - word: 碧文圆顶
    meaning: 绿色花纹的圆顶帐
  translation: "凤尾香罗薄薄几重，碧纹圆顶的帐子夜里还在缝。团扇裁成月魄，羞涩难掩；车声如雷走过，话却未能通。曾在寂寥中看金烬渐暗，断无消息时石榴花又红。斑骓只系在垂杨岸，哪里能任西南好风吹送？"
  appreciation: "李商隐写相思阻隔。由缝帐、羞掩、车过语未通，写到消息全无，「何处西南任好风」盼望而无望，细腻凄美。"
  background: "李商隐无题诗，写恋情受阻与盼聚，寄托之说亦多。"
  famous_lines:
  - 斑骓只系垂杨岸，何处西南任好风。
  tags:
  - 唐诗三百首
  - 思念
  - 七言律诗
- id: poem_ext_113
  title: 无题·相见时难别亦难
  author: 李商隐
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '相见时难别亦难，东风无力百花残。

    春蚕到死丝方尽，蜡炬成灰泪始干。

    晓镜但愁云鬓改，夜吟应觉月光寒。

    蓬山此去无多路，青鸟殷勤为探看。

    '
  annotations:
  - word: 东风无力百花残
    meaning: 这里指百花凋谢的暮春时节
  - word: 丝方尽
    meaning: 丝，与“思”谐音，以“丝”喻“思”，含相思之意
  - word: 蜡炬
    meaning: 蜡烛
  - word: 泪始干
    meaning: 泪，指燃烧时的蜡烛油，这里取双关义，指相思的眼泪
  - word: 晓镜
    meaning: 早晨梳妆照镜子
  translation: "相见本就很难，离别更加难；东风无力，百花凋残。春蚕到死丝才吐尽，蜡烛成灰泪才流干。清晨对镜只愁云鬓改色，夜里吟诗该感到月光清寒。蓬莱仙山离此并不远，愿青鸟殷勤为我去探看。"
  appreciation: "李商隐《无题》写相思。「春蚕到死丝方尽，蜡炬成灰泪始干」以谐音与意象写至死不渝，是爱情诗中的绝唱。"
  background: "李商隐无题诗代表作，具体所指众说纷纭，可作深情恋歌读。"
  famous_lines:
  - 蓬山此去无多路，青鸟殷勤为探看。
  tags:
