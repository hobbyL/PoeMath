  - word: 戍
    meaning: 防守
  - word: 南浦
    meaning: 南郊外水边地
  - word: 清江
    meaning: 指锦江
  translation: "西山白雪下三城有戍守，南浦清江边是万里桥。海内风尘，诸弟阻隔；天涯涕泪，一身遥远。只把迟暮之年交给多病，未有点滴功劳报答圣朝。骑马出郊极目远望，不忍看人事一天天萧条。"
  appreciation: "杜甫成都野望。由西山南浦写到兄弟阻隔、身老多病，结以人事萧条，家国之忧与个人迟暮交织。"
