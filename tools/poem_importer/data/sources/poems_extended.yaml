- id: poem_ext_178
  title: 长相思·其一
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '长相思，在长安。

    络纬秋啼金井阑，微霜凄凄簟色寒。

    孤灯不明思欲绝，卷帷望月空长叹。

    美人如花隔云端！

    上有青冥之长天，下有渌水之波澜。

    天长路远魂飞苦，梦魂不到关山难。

    长相思，摧心肝！

    '
