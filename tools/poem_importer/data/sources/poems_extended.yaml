- id: poem_ext_145
  title: 下终南山过斛斯山人宿置酒
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '暮从碧山下，山月随人归。

    却顾所来径，苍苍横翠微。

    相携及田家，童稚开荆扉。

    绿竹入幽径，青萝拂行衣。

    欢言得所憩，美酒聊共挥。

    长歌吟松风，曲尽河星稀。

    我醉君复乐，陶然共忘机。

    '
