- id: poem_exp_377
  title: 菩萨蛮·芭蕉
  author: 张鎡
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 3
  content: '风流不把花为主。

    多情管定烟和雨。

    潇洒绿衣长。

    满身无限凉。

    文笺舒卷处。

    似索题诗句。

    莫凭小阑干。

    月明生夜寒。

