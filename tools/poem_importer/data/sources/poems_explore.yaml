  - 乐府
  - 豪迈
  - 登高
  - 抒怀
  - 古诗词
- id: poem_exp_024
  title: 橘柚垂华实
  author: 佚名
  dynasty: 两汉
  layer: explore
  is_required: false
  difficulty: 3
  content: '橘柚垂华实，乃在深山侧。

    闻君好我甘，窃独自雕饰。

    委身玉盘中，历年冀见食。

    芳菲不相投，青黄忽改色。

    人倘欲我知，因君为羽翼。

    '
  annotations:
  - word: 橘柚
    meaning: 橘子和柚子
  - word: 华实
    meaning: 美好的果实
  - word: 嘉树
    meaning: 美好的树木
  translation: "橘柚的垂华实，乃在的深山侧。闻君的好我甘，窃独的自雕饰。委身的玉盘中，历年的冀见食。芳菲的不相投，青黄的忽改色。人倘的欲我知，因君的为羽翼。"
  appreciation: "《橘柚垂华实》中「人倘欲我知，因君为羽翼。」最见精神。佚名写咏物，画面清楚。"
  background: "两汉佚名《橘柚垂华实》。"
  famous_lines:
  - 人倘欲我知，因君为羽翼。
  tags:
  - 咏物
  - 古诗词
- id: poem_exp_034
  title: 醉高歌带摊破喜春来·旅中
  author: 顾德润
  dynasty: 元
  layer: explore
  is_required: false
  difficulty: 4
  content: '长江远映青山，回首难穷望眼。

    扁舟来往蒹葭岸，烟锁云林又晚。

    篱边黄菊经霜暗，囊底青蚨逐日悭。

    破情思晚砧鸣，断愁肠檐马韵，惊客梦晓钟寒。

    归去难，修一缄回两字报平安。

    '
  annotations:
  - word: 醉高歌
    meaning: 曲牌名
  - word: 旅中
    meaning: 旅途中
  - word: 客愁
    meaning: 旅人的愁思
  translation: "长江远映青山，回首难穷遥望眼。扁舟来到往蒹葭岸，烟锁云林又晚。篱边黄菊经霜暗，囊底青蚨逐日悭。破情思晚砧鸣，断愁肠檐马韵，惊客梦晓钟寒。归去往难，修一缄回两字报平安。"
  appreciation: "《醉高歌带摊破喜春来·旅中》中「归去难，修一缄回两字报平安。」最见精神。顾德润写景，画面清楚。"
  background: "元顾德润《醉高歌带摊破喜春来·旅中》。"
  famous_lines:
  - 归去难，修一缄回两字报平安。
