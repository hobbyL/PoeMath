  - 儿童
  - 七言绝句
- id: poem_core_055
  title: 从军行
  author: 王昌龄
  dynasty: 唐
  grade: 5
  semester: 下
  textbook_unit: 语文五年级下·课文9
  is_required: true
  difficulty: 3
  content: '青海长云暗雪山，孤城遥望玉门关。

    黄沙百战穿金甲，不破楼兰终不还。

    '
  pinyin: 'qīng hǎi cháng yún àn xuě shān ， gū chéng yáo wàng yù mén guān 。

    huáng shā bǎi zhàn chuān jīn jiǎ ， bù pò lóu lán zhōng bù huán 。

    '
  annotations:
  - word: 青海
    meaning: 青海湖，在今青海省
  - word: 长云
    meaning: 层层叠叠的云
  - word: 雪山
    meaning: 指祁连山
  - word: 玉门关
    meaning: 汉代通往西域的要塞，在今甘肃敦煌西
  - word: 穿
    meaning: 磨破
  - word: 金甲
    meaning: 战士穿的铠甲
  - word: 楼兰
    meaning: 汉代西域国名，这里泛指西北的敌人
  translation: 青海湖上空乌云弥漫遮暗了祁连雪山，孤城遥望着远方的玉门关。将士们身经百战黄沙磨破了铠甲，不打败楼兰誓不生还。
  appreciation: 全诗以雄浑壮阔的景象和铿锵有力的语言，展现将士誓死报国的豪情，"不破楼兰终不还"成为千古名句。
  background: 王昌龄任江宁丞时所作《从军行》七首之四，反映盛唐将士的爱国豪情。
  famous_lines:
