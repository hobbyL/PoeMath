- id: poem_exp_286
  title: 宣州送裴坦判官往舒州时牧欲赴官归京
  author: 杜牧
  dynasty: 唐
  layer: explore
  is_required: false
  difficulty: 3
  content: '日暖泥融雪半消，行人芳草马声骄。

    九华山路云遮寺，清弋江村柳拂桥。

    君意如鸿高的的，我心悬旆正摇摇。

    同来不得同归去，故国逢春一寂寥！

    '
