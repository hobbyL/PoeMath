- id: poem_ext_345
  title: 无衣
  author: 佚名
  dynasty: 先秦
  layer: extended
  is_required: false
  difficulty: 3
  content: '岂曰无衣？

    七兮。

    不如子之衣，安且吉兮。

    岂曰无衣？

    六兮。

