- id: poem_ext_019
  title: 听筝
  author: 李端
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '鸣筝金粟柱，素手玉房前。

    欲得周郎顾，时时误拂弦。

    '
  annotations:
  - word: 鸣筝
    meaning: 弹奏筝曲
  - word: 金粟
    meaning: 古也称桂为金粟，这里当是指弦轴之细而精美
  - word: 柱
    meaning: 定弦调音的短轴
  - word: 素手
    meaning: 指弹筝女子纤细洁白的手
  - word: 玉房
    meaning: 指玉制的筝枕
  translation: 金粟轴的古筝发出优美的声音，那素手拨筝的美人坐在玉房前。 想尽了办法为博取周郎的青睐，你看她故意地时时拨错了琴弦。
  appreciation: 这首小诗轻捷洒脱，寥寥数语，就在读者面前展示了一幅线条流畅，动态鲜明的舞台人物速写图。 “鸣筝金粟柱，素手玉房前。”诗的一二句写弹筝的女子纤手拨筝，正处于弹奏状态。筝是一种弦乐器。从唐诗中所描写的筝来看，筝是十三根弦，如：“花脸云鬟坐玉楼，十三弦里一时愁”（白居易《听崔七妓人筝》）。“大艑高船一百尺，清声促柱十三弦”（刘禹锡《夜闻商人船中筝》）。此诗是速写，当然必须抓住最能突出主题的部分。
  background: 入选《唐诗三百首》，由 yxcs/poems-db 原始数据整理。
