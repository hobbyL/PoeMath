- id: poem_ext_212
  title: 鹊桥仙·纤云弄巧
  author: 秦观
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 3
  content: '纤云弄巧，飞星传恨，银汉迢迢暗度。金风玉露一相逢，便胜却人间无数。(度通：渡)

    柔情似水，佳期如梦，忍顾鹊桥归路。两情若是久长时，又岂在朝朝暮暮。

