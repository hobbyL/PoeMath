  - 惜别
  - 五言律诗
- id: poem_ext_261
  title: 咏蝉
  author: 骆宾王
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '西陆蝉声唱，南冠客思深。

    不堪玄鬓影，来对白头吟。

    露重飞难进，风多响易沉。

    无人信高洁，谁为表予心？

    '
  annotations:
  - word: 西陆
    meaning: 指秋天
  - word: 南冠
    meaning: 楚冠，这里是囚徒的意思
  - word: 玄鬓
    meaning: 指蝉的黑色翅膀，这里比喻自己正当盛年
  - word: 白头吟
    meaning: 乐府曲名
  - word: 露重
    meaning: 秋露浓重
  translation: "秋天蝉声唱着，南冠囚徒客思正深。不堪看蝉的玄鬓之影，来对着我白头吟叹。露重飞难进，风多响易沉。无人相信你的高洁，谁来表白我的心？"
  appreciation: "骆宾王狱中咏蝉。以蝉之高洁自喻，「露重飞难进，风多响易沉」写处境艰难，是咏物寄托名篇。"
  background: "骆宾王因事下狱，闻蝉而作，一题《在狱咏蝉》。"
  famous_lines:
  - 无人信高洁，谁为表予心？
  tags:
  - 咏物
  - 唐诗三百首
  - 五言律诗
- id: poem_ext_262
  title: 酬程延秋夜即事见赠
  author: 韩翃
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '长簟迎风早，空城澹月华。

    星河秋一雁，砧杵夜千家。

    节候看应晚，心期卧亦赊。

    向来吟秀句，不觉已鸣鸦。

    '
  annotations:
  - word: 酬
    meaning: 以诗回赠
  - word: 即事
    meaning: 就眼前之事写诗
  - word: 星河
    meaning: 银河
  translation: "长簟早迎着风，空城淡着月华。星河秋空一只雁，砧杵夜响千家。节候看来已晚，心期睡着也嫌远。一直吟着你的秀句，不觉已是鸡鸣鸦噪。"
  appreciation: "韩翃秋夜酬赠。「星河秋一雁，砧杵夜千家」写秋夜工稳；结以吟句到天明，见友情与诗兴。"
  background: "韩翃酬程延秋夜见赠而作。"
  famous_lines:
  - 向来吟秀句，不觉已鸣鸦。
  tags:
