- id: poem_exp_575
  title: 咏雪
  author: 刘义庆
  dynasty: 南北朝
  layer: explore
  is_required: false
  difficulty: 4
  content: '谢太傅寒雪日内集，与儿女讲论文义。

    俄而雪骤,公欣然曰：“白雪纷纷何所似？

    ”兄子胡儿曰：“撒盐空中差可拟。

    ”兄女曰：“未若柳絮因风起。

    ”公大笑乐。

    即公大兄无奕女，左将军王凝之妻也。

    '
