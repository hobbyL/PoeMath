- id: poem_exp_201
  title: 雉子班
  author: 佚名
  dynasty: 两汉
  layer: explore
  is_required: false
  difficulty: 3
  content: '雉子，班如此。

    之于雉梁。

    无以吾翁孺，雉子。

    知得雉子高蜚止，黄鹄蜚，之以千里，王可思。

    雄来蜚从雌，视子趋一雉。

    雉子，车大驾马滕，被王送行所中。

    尧羊蜚从王孙行。

