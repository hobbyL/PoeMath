  translation: "望着你消失在烟水阔处，挥手泪湿佩巾。飞鸟没入何处？青山空对着人。长江上一帆远去，落日里五湖春色。谁见汀洲上，相思愁着白蘋。"
  appreciation: "刘长卿饯别。烟水、飞鸟、一帆、落日，送别画面完整；结以汀洲白蘋，相思悠长。"
  background: "刘长卿饯别王十一南游时所作。"
