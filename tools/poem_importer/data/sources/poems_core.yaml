- id: poem_core_113
  title: 望岳
  author: 杜甫
  dynasty: 唐
  is_required: true
  difficulty: 3
  content: '岱宗夫如何？齐鲁青未了。

    造化钟神秀，阴阳割昏晓。

    荡胸生曾云，决眦入归鸟。

    会当凌绝顶，一览众山小。

    '
  annotations:
  - word: "岱宗"
    meaning: "泰山别称，五岳之首"
  - word: "夫如何"
    meaning: "到底怎么样呢"
  - word: "齐鲁"
    meaning: "古代齐国在泰山之北，鲁国在泰山之南"
  - word: "造化"
    meaning: "大自然"
  - word: "钟"
    meaning: "汇聚、专注"
  - word: "曾云"
    meaning: "层云；「曾」通「层」"
  - word: "决眦"
    meaning: "睁大眼睛；眦，眼眶"
  - word: "会当"
    meaning: "终当、一定要"
  translation: 巍峨的泰山，到底如何雄伟？走出齐鲁，依然可见那青青的峰顶。 神奇自然汇聚了千种美景，山南山北分隔出清晨和黄昏。 层层白云，荡涤胸中沟壑；翩翩归鸟，飞入赏景眼圈。 定要登上泰山顶峰，俯瞰群山，豪情满怀。
  appreciation: 这首诗是杜甫青年时代的作品，充满了诗人青年时代的浪漫与激情。全诗没有一个“望”字，却紧紧围绕诗题“望岳”的“望”字着笔，由远望到近望，再到凝望，最后是俯望。诗人描写了泰山雄伟磅礴的气象，抒发了自己勇于攀登，傲视一切的雄心壮志，洋溢着蓬勃向上的朝气。 首句“岱宗夫如何？”写乍一望见泰山时，高兴得不知怎样形容才好的那种揣摹劲和惊叹仰慕之情，非常传神。岱是泰山的别名，因居五岳之首，故尊为岱宗。“夫如何”，就是“到底怎么样呢？”“夫”字在古文中通常是用于句首的语气助词，这里把它融入诗句中，是个新创，很别致。这个“夫”字，虽无实在意义，却少它不得，所谓“传神写照，正在阿堵中”。可谓匠心独具。
    接下来“齐鲁青未了”一句，是经过一番揣摹后得出的答案。它没有从海拔角度单纯形容泰山之高，也不是像谢灵运《泰山吟》那样用“崔崒刺云天”这类一般化的语言来形容，而是别出心裁地写出自己的体验──在古代齐鲁两大国的国境外还能望见远远横亘在那里的泰山，以距离之远来烘托出泰山之高。泰山之南为鲁，泰山之北为齐，所以这一句描写出的地理特点，在写其他山岳时不能挪用。明代莫如忠《登东郡望岳楼》特别提出这句诗，并认为无人能继。
    “造化钟神秀，阴阳割昏晓”两句，写近望中。
  background: "杜甫青年时期游历齐赵、望泰山而作。全诗无「望」字而处处写望，抒发勇攀高峰的壮志。"
  famous_lines:
  - 会当凌绝顶，一览众山小。
  tags:
  - 唐诗三百首
  - 初中古诗
  - 写景
  - 写山
  - 写鸟
  - 励志
  - 哲理
  grade: 5
