- id: poem_ext_131
  title: 野望
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '西山白雪三城戍，南浦清江万里桥。

    海内风尘诸弟隔，天涯涕泪一身遥。

    惟将迟暮供多病，未有涓埃答圣朝。(惟通：唯)

    跨马出郊时极目，不堪人事日萧条。

