  - 七言律诗
- id: poem_ext_120
  title: 送魏万之京
  author: 李颀
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '朝闻游子唱离歌，昨夜微霜初渡河。

    鸿雁不堪愁里听，云山况是客中过。

    关城树色催寒近，御苑砧声向晚多。

    莫见长安行乐处，空令岁月易蹉跎。

    '
  annotations:
  - word: 魏万
    meaning: 李颀的朋友
  - word: 之京
    meaning: 到京城去
  - word: 朝天
    meaning: 朝见天子
  translation: "清晨听见游子唱离歌，昨夜微霜才初渡河。鸿雁不堪在愁里听，云山更是客中经过。关城树色催着寒近，御苑砧声向晚渐多。莫只见长安行乐之处，空让岁月容易蹉跎。"
  appreciation: "李颀送魏万之京。鸿雁云山写客愁，结以勿蹉跎，既送又勉，是盛唐送别名篇。"
  background: "李颀送友人魏万赴长安而作。"
  famous_lines:
