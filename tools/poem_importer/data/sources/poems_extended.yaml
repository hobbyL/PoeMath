  - id: poem_ext_058
    title: 过香积寺
    author: 王维
    dynasty: 唐
    layer: extended
    is_required: false
    difficulty: 3
    content: |
      不知香积寺，数里入云峰。
      古木无人径，深山何处钟。
      泉声咽危石，日色冷青松。
      薄暮空潭曲，安禅制毒龙。
    annotations:
      - {word: "入云峰", meaning: "登上入云的高峰"}
      - {word: "钟", meaning: "寺庙的钟鸣声"}
      - {word: "咽", meaning: "呜咽"}
      - {word: "危", meaning: "高的，陡的"}
      - {word: "冷青松", meaning: "为青松所冷"}
    translation: >-
      不知道香积寺在什么地方，攀登好几里误入云拥群峰。 古木参天却没有人行路径，深山里何处传来古寺鸣钟。 山中泉水撞危石响声幽咽，松林里日光照射也显寒冷。 黄昏时来到空潭隐蔽之地，安然地修禅抑制心中毒龙。
    appreciation: >-
      入选《唐诗三百首》的经典作品。
    background: 入选《唐诗三百首》，由 yxcs/poems-db 原始数据整理。
    famous_lines: ["薄暮空潭曲，安禅制毒龙"]
    tags: ["唐诗三百首", "写景", "五言律诗"]

  - id: poem_ext_059
    title: 辋川闲居赠裴秀才迪
    author: 王维
    dynasty: 唐
    layer: extended
    is_required: false
    difficulty: 3
    content: |
      寒山转苍翠，秋水日潺湲。
      倚杖柴门外，临风听暮蝉。
      渡头馀落日，墟里上孤烟。
      复值接舆醉，狂歌五柳前。
    annotations:
      - {word: "转", meaning: "转为，变为"}
      - {word: "苍翠", meaning: "青绿色，苍为灰白色，翠为墨绿色"}
      - {word: "潺湲", meaning: "水流声"}
      - {word: "听暮蝉", meaning: "聆听秋后的蝉儿的鸣叫"}
      - {word: "暮蝉", meaning: "秋后的蝉，这里是指蝉的叫声"}
    translation: >-
      寒山转变得格外郁郁苍苍，秋水日日舒缓地流向远方。 我柱杖伫立在茅舍的门外，迎风细听着那暮蝉的吟唱。 渡头那边太阳快要落山了，村子里的炊烟一缕缕飘散。 又碰到裴迪这个接舆酒醉，在恰如陶潜的我面前讴狂。
    appreciation: >-
      寒山转苍翠，秋水日潺湲。倚杖柴门外，临风听暮蝉。渡头馀落日，墟里上孤烟。复值接舆醉，狂歌五柳前。 此诗所要极力表现的是辋川的秋景。一联和三联写山水原野的深秋晚景，诗人选择富有季节和时间特征的景物：苍翠的寒山、缓缓的秋水、渡口的夕阳，墟里的炊烟，有声有色，动静结合，勾勒出一幅和谐幽静而又富有生机的田园山水画。诗的二联和四联写诗人与裴迪的闲居之乐。倚杖柴门，临风听蝉，把诗人安逸的神态，超然物外的情致，写得栩栩如生；
    background: 入选《唐诗三百首》，由 yxcs/poems-db 原始数据整理。
