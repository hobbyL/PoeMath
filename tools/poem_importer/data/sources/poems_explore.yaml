  translation: "绿阵连着烟际，风雨化成精节。玉露含着青紫，沁透哲人的心。"
  appreciation: "佚名咏甘蔗。精节、沁彻哲心，咏物有理趣。"
  background: "古佚名《咏甘蔗》。"
  famous_lines:
