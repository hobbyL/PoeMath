  - 诗经
  - 写鱼
  - 古诗词
- id: poem_exp_306
  title: 小雅·瓠叶
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '幡幡瓠叶，采之亨之。

    君子有酒，酌言尝之。

    有兔斯首，炮之燔之。

    君子有酒，酌言献之。

    有兔斯首，燔之炙之。

    君子有酒，酌言酢之。

    有兔斯首，燔之炮之。

    君子有酒，酌言酬之。

    '
  annotations:
