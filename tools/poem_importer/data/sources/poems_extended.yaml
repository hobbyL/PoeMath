- id: poem_ext_069
  title: 赠孟浩然
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '吾爱孟夫子，风流天下闻。

    红颜弃轩冕，白首卧松云。

    醉月频中圣，迷花不事君。

    高山安可仰，徒此揖清芬。

    '
