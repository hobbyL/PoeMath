- id: poem_core_123
  title: 秋浦歌
  author: 李白
  dynasty: 唐
  grade: 4
  semester: 上
  textbook_unit: 经典必背
  is_required: false
  difficulty: 2
  content: '白发三千丈，缘愁似个长。

    不知明镜里，何处得秋霜。'
  pinyin: 'bái fà sān qiān zhàng ， yuán chóu sì gè cháng 。

    bù zhī míng jìng lǐ ， hé chù dé qiū shuāng 。'
  annotations:
  - word: 秋浦
    meaning: 在今安徽省贵池县西
  - word: 缘
    meaning: 因为
  - word: 个
    meaning: 这样
  - word: 秋霜
    meaning: 喻白发
  translation: 白发有三千丈那么长，是因为愁绪就有这样长。不知道镜子里面，是从哪里得来了满头秋霜般的白发。
  appreciation: 以"白发三千丈"的夸张起笔，将无形的愁绪化为有形的白发，极具感染力。
  background: 李白游秋浦时所作，以白发喻愁思。
  famous_lines:
  - 白发三千丈，缘愁似个长
  tags:
  - 愁绪
  - 夸张
  - 五言绝句
  - 名篇
- id: poem_core_124
  title: 使至塞上
  author: 王维
  dynasty: 唐
  grade: 5
  semester: 上
  textbook_unit: 经典必背
  is_required: true
  difficulty: 3
  content: '单车欲问边，属国过居延。

    征蓬出汉塞，归雁入胡天。

    大漠孤烟直，长河落日圆。

    萧关逢候骑，都护在燕然。'
  pinyin: 'dān chē yù wèn biān ， shǔ guó guò jū yán 。

    zhēng péng chū hàn sài ， guī yàn rù hú tiān 。

    dà mò gū yān zhí ， cháng hé luò rì yuán 。

    xiāo guān féng hòu qí ， dū hù zài yān rán 。'
  annotations:
  - word: 单车
    meaning: 一辆车，形容轻车简从
  - word: 问边
    meaning: 慰问边疆
  - word: 属国
    meaning: 典属国的简称，这里指使臣
  - word: 居延
    meaning: 地名，在今甘肃张掖
  - word: 征蓬
    meaning: 飘飞的蓬草，喻远行之人
  - word: 萧关
    meaning: 古关名，在今宁夏固原
  - word: 候骑
    meaning: 侦察骑兵
  - word: 都护
    meaning: 边疆重镇的军事长官
  - word: 燕然
    meaning: 燕然山，在今蒙古境内
  translation: 乘着一辆马车出使边塞，经过了属国居延。像飘飞的蓬草飞出汉朝的边关，又像归雁飞入了胡人的天地。大沙漠中一缕孤烟直直升起，黄河边上一轮落日浑圆。在萧关遇到了侦察的骑兵，才知道都护正驻扎在燕然前线。
  appreciation: '"大漠孤烟直，长河落日圆"被王国维赞为"千古壮观"，是唐诗写景的至高境界。'
  background: 王维奉命出使河西节度使幕府，途经边塞所作。
  famous_lines:
  - 大漠孤烟直，长河落日圆
  tags:
  - 边塞
  - 写景
  - 五言律诗
  - 名篇
- id: poem_core_125
  title: 鸟鸣涧
  author: 王维
  dynasty: 唐
  grade: 3
  semester: 上
  textbook_unit: 经典必背
  is_required: false
  difficulty: 2
  content: '人闲桂花落，夜静春山空。

    月出惊山鸟，时鸣春涧中。'
  pinyin: 'rén xián guì huā luò ， yè jìng chūn shān kōng 。

    yuè chū jīng shān niǎo ， shí míng chūn jiàn zhōng 。'
  annotations:
  - word: 闲
    meaning: 安静，悠闲
  - word: 空
    meaning: 空旷，空寂
  - word: 惊
    meaning: 惊动
  - word: 时鸣
    meaning: 不时地啼叫
  - word: 涧
    meaning: 山间流水的沟
  translation: 人的心闲静下来才能感觉到桂花飘落，夜晚寂静使春天的山谷显得更加空旷。月亮出来惊动了栖息的山鸟，它们不时地在春天的山涧中鸣叫。
  appreciation: 以动衬静，鸟鸣反衬出山涧的幽静，"人闲"二字是全诗的关键。
  background: 王维隐居辋川时所作，描写春夜山间的宁静景色。
  famous_lines:
  - 月出惊山鸟，时鸣春涧中
  tags:
  - 写景
  - 山水
  - 五言绝句
  - 名篇
- id: poem_core_126
  title: 约客
  author: 赵师秀
  dynasty: 宋
  grade: 4
  semester: 上
  textbook_unit: 经典必背
  is_required: false
  difficulty: 2
  content: '黄梅时节家家雨，青草池塘处处蛙。

    有约不来过夜半，闲敲棋子落灯花。'
  pinyin: 'huáng méi shí jié jiā jiā yǔ ， qīng cǎo chí táng chù chù wā 。

    yǒu yuē bù lái guò yè bàn ， xián qiāo qí zǐ luò dēng huā 。'
  annotations:
  - word: 黄梅时节
    meaning: 梅子成熟的时节，即梅雨季节
  - word: 灯花
    meaning: 灯芯燃烧后结成的花状物
  translation: 梅雨时节，家家户户都被烟雨笼罩着，长满青草的池塘里到处是蛙声。已经过了半夜约好的客人还没来，我百无聊赖地闲敲棋子，把灯花都震落了。
  appreciation: '"闲敲棋子落灯花"将等待友人不至的寂寞与闲适写得极为传神。'
  background: 赵师秀等候友人下棋不至，写下这首情趣盎然的小诗。
  famous_lines:
  - 有约不来过夜半，闲敲棋子落灯花
  tags:
  - 生活
  - 等待
  - 七言绝句
- id: poem_core_127
  title: 题破山寺后禅院
  author: 常建
  dynasty: 唐
  grade: 5
  semester: 下
  textbook_unit: 经典必背
  is_required: false
  difficulty: 3
  content: '清晨入古寺，初日照高林。

    曲径通幽处，禅房花木深。

    山光悦鸟性，潭影空人心。

    万籁此都寂，但余钟磬音。'
  pinyin: 'qīng chén rù gǔ sì ， chū rì zhào gāo lín 。

    qū jìng tōng yōu chù ， chán fáng huā mù shēn 。

    shān guāng yuè niǎo xìng ， tán yǐng kōng rén xīn 。

    wàn lài cǐ dōu jì ， dàn yú zhōng qìng yīn 。'
  annotations:
  - word: 破山寺
    meaning: 即兴福寺，在今江苏常熟虞山
  - word: 后禅院
    meaning: 寺庙后面的禅房
  - word: 初日
    meaning: 早晨的太阳
  - word: 曲径
    meaning: 弯曲的小路
  - word: 万籁
    meaning: 各种声响
  - word: 钟磬
    meaning: 寺院敲击的钟和磬
  translation: 清晨走进这座古老的寺庙，初升的太阳照耀着高大的树林。弯曲的小路通向幽静的地方，禅房掩映在花草树木之中。山光明媚使飞鸟更加快乐，潭水清澈倒影让人心中杂念消除。万物的声音此刻都沉寂了，只剩下悠扬的钟磬之声。
  appreciation: '"曲径通幽处"已成为常用成语，全诗营造出清幽脱俗的意境。'
  background: 常建游览破山寺后禅院时所作。
  famous_lines:
  - 曲径通幽处，禅房花木深
  tags:
  - 写景
  - 禅意
  - 五言律诗
  - 名篇
- id: poem_core_128
  title: 晚春
  author: 韩愈
  dynasty: 唐
  grade: 4
  semester: 下
  textbook_unit: 经典必背
  is_required: false
  difficulty: 2
  content: '草树知春不久归，百般红紫斗芳菲。

    杨花榆荚无才思，惟解漫天作雪飞。'
  pinyin: 'cǎo shù zhī chūn bù jiǔ guī ， bǎi bān hóng zǐ dòu fāng fēi 。

    yáng huā yú jiá wú cái sī ， wéi jiě màn tiān zuò xuě fēi 。'
  annotations:
  - word: 不久归
    meaning: 春天即将过去
  - word: 斗芳菲
    meaning: 争相展示美丽的花朵
  - word: 杨花
    meaning: 柳絮
  - word: 榆荚
    meaning: 榆树的果实
  - word: 才思
    meaning: 才华和心思
  - word: 惟解
    meaning: 只知道
  translation: 花草树木知道春天即将归去，都想留住春天的脚步，竞相争艳。杨花和榆荚虽然没有美丽的颜色，却也不甘寂寞，只知道漫天飞舞，化作雪花一般。
  appreciation: 以拟人手法写花木惜春，连不起眼的杨花榆荚也在争春，妙趣横生。
  background: 韩愈晚年所作，借晚春之景抒发感悟。
  famous_lines:
  - 草树知春不久归，百般红紫斗芳菲
  tags:
  - 春天
  - 写景
  - 七言绝句
- id: poem_core_129
  title: 商山早行
  author: 温庭筠
  dynasty: 唐
  grade: 6
  semester: 上
  textbook_unit: 经典必背
  is_required: false
  difficulty: 3
  content: '晨起动征铎，客行悲故乡。

    鸡声茅店月，人迹板桥霜。

    槲叶落山路，枳花明驿墙。

    因思杜陵梦，凫雁满回塘。'
  pinyin: 'chén qǐ dòng zhēng duó ， kè xíng bēi gù xiāng 。

    jī shēng máo diàn yuè ， rén jì bǎn qiáo shuāng 。

    hú yè luò shān lù ， zhǐ huā míng yì qiáng 。

    yīn sī dù líng mèng ， fú yàn mǎn huí táng 。'
  annotations:
  - word: 征铎
    meaning: 远行车马上的铃铛
  - word: 茅店
    meaning: 茅草搭建的旅店
  - word: 槲
    meaning: 一种落叶乔木
  - word: 枳
    meaning: 一种落叶灌木
  - word: 驿
    meaning: 驿站
  - word: 杜陵
    meaning: 在今陕西西安东南
  - word: 凫雁
    meaning: 野鸭和大雁
  - word: 回塘
    meaning: 弯曲的水塘
  translation: 清晨起床车马铃铛叮当作响，出门远行的人不禁思念故乡。鸡声嘹亮，茅草旅店映着残月；板桥上覆盖着清霜，留下行人的足迹。枯败的槲叶落满了山路，枳树花开照亮了驿站的围墙。因此想起了昨夜的杜陵之梦，只见成群的凫雁在弯曲的池塘里嬉戏。
  appreciation: '"鸡声茅店月，人迹板桥霜"十字写尽早行的情景，纯用名词意象叠加，被誉为唐诗中最精彩的对偶句之一。'
  background: 温庭筠旅途中清晨出发时所作。
  famous_lines:
  - 鸡声茅店月，人迹板桥霜
  tags:
  - 羁旅
  - 思乡
  - 五言律诗
  - 名篇
- id: poem_core_130
  title: 赠花卿
  author: 杜甫
  dynasty: 唐
  grade: 4
  semester: 上
  textbook_unit: 经典必背
  is_required: false
  difficulty: 2
  content: '锦城丝管日纷纷，半入江风半入云。

    此曲只应天上有，人间能得几回闻。'
  pinyin: 'jǐn chéng sī guǎn rì fēn fēn ， bàn rù jiāng fēng bàn rù yún 。

    cǐ qǔ zhǐ yīng tiān shàng yǒu ， rén jiān néng dé jǐ huí wén 。'
  annotations:
  - word: 花卿
    meaning: 成都尹崔光远的部将花敬定
  - word: 锦城
    meaning: 即成都
  - word: 丝管
    meaning: 弦乐器和管乐器，泛指音乐
  translation: 锦城里日日都有美妙的音乐声，一半随着江风飘去，一半飞入了云端。这样美妙的乐曲只应该天上才有，人间能有几回听到呢？
  appreciation: '"此曲只应天上有，人间能得几回闻"成为赞美音乐的经典名句。'
  background: 杜甫在成都时赠给花敬定的诗。
  famous_lines:
  - 此曲只应天上有，人间能得几回闻
  tags:
  - 音乐
  - 赞美
  - 七言绝句
  - 名篇
