- id: poem_exp_294
  title: 采苓
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '采苓采苓，首阳之巅。

    人之为言，苟亦无信。

    舍旃舍旃，苟亦无然。

    人之为言，胡得焉？

    采苦采苦，首阳之下。

    人之为言，苟亦无与。

    舍旃舍旃，苟亦无然。

    人之为言，胡得焉？

    采葑采葑，首阳之东。

    人之为言，苟亦无从。

    舍旃舍旃，苟亦无然。

    人之为言，胡得焉？

    '
  annotations:
  - word: 苓
    meaning: 甘草
  - word: 采
    meaning: 采摘
  - word: 首阳
    meaning: 山名
  translation: "采苓采苓，在首阳之巅。别人的话，且不要信。丢开丢开，且不要以为然。别人的话，能得到什么？……"
  appreciation: "《诗经·唐风·采苓》。戒信谗言，反复叮嘱。"
  background: "《诗经·唐风·采苓》。"
  famous_lines:
  - 人之为言，胡得焉？
  tags:
  - 咏物
  - 诗经
  - 古诗词
- id: poem_exp_295
  title: 秦风·无衣
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '岂曰无衣？

    与子同袍。

    王于兴师，修我戈矛。

    与子同仇！

    岂曰无衣？

    与子同泽。

    王于兴师，修我矛戟。

    与子偕作！

    岂曰无衣？

    与子同裳。

    王于兴师，修我甲兵。

    与子偕行！

    '
  annotations:
