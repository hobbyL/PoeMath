- id: poem_exp_297
  title: 衡门
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '衡门之下，可以栖迟。

    泌之洋洋，可以乐饥。

    岂其食鱼，必河之鲂？

    岂其取妻，必齐之姜？

    岂其食鱼，必河之鲤？

    岂其取妻，必宋之子？

    '
  annotations:
  - word: 衡门
    meaning: 横木为门，简陋的门
  - word: 可以
    meaning: 可以在此
  translation: "衡门显得之下，可以的栖迟。泌之显得洋洋，可以的乐饥。岂其显得食鱼，必河的之鲂？。岂其显得取妻，必齐的之姜？。岂其显得食鱼，必河的之鲤？。岂其显得取妻，必宋的之子？。"
  appreciation: "《衡门》中「岂其取妻，必宋之子？」最见精神。佚名写哲理，画面清楚。"
