- id: poem_exp_409
  title: 虞美人·秋感
  author: 吴文英
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 3
  content: '背庭缘恐花羞坠。

    心事遥山里。

    小帘愁卷月笼明。

    一寸秋怀禁得、几蛩声。

    井梧不放西风起。

    供与离人睡。

    梦和新月未圆时。

    起看檐蛛结网、又寻思。

    '
