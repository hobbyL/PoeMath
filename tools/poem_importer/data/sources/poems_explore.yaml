  - 古诗词
- id: poem_exp_307
  title: 大雅·灵台
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '经始灵台，经之营之。

    庶民攻之，不日成之。

    经始勿亟，庶民子来。

    王在灵囿，麀鹿攸伏。

    麀鹿濯濯，白鸟翯翯。

    王在灵沼，於牣鱼跃。

    虡业维枞，贲鼓维镛。

    於论鼓钟，於乐辟廱。

    於论鼓钟，於乐辟廱。

    鼍鼓逢逢。

    蒙瞍奏公。

    '
  annotations:
  - word: 灵台
    meaning: 周文王建造的高台
  - word: 经始
    meaning: 开始营建
  translation: "先秦佚名《大雅·灵台》铺得开。前半场面密，后半情志显，「蒙瞍奏公。」附近最吃紧。"
  appreciation: "《大雅·灵台》咏物见志。佚名写物而不粘滞。"
  background: "先秦咏物之作《大雅·灵台》，佚名。"
  famous_lines:
  - 蒙瞍奏公。
  tags:
  - 咏物
  - 诗经
  - 古诗词
- id: poem_exp_308
  title: 周颂·臣工
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '嗟嗟臣工，敬尔在公。

    王厘尔成，来咨来茹。

    嗟嗟保介，维莫之春，亦又何求？

    如何新畲？

    於皇来牟，将受厥明。

    明昭上帝，迄用康年。

    命我众人：庤乃钱镈，奄观铚艾。

    '
  annotations:
  - word: 周颂
    meaning: 周代祭祀用的乐歌
  - word: 臣工
    meaning: 臣子和百官
  translation: "先秦佚名《周颂·臣工》写农事。起如「嗟嗟臣工，敬尔在公。 王厘尔成，来咨来茹。…」，结以「命我众人：庤乃钱镈，奄观铚艾。」，脉络分明。"
  appreciation: "读完不妨停在最有力的一句——往往是「命我众人：庤乃钱镈，奄观铚艾。」。佚名的力度在收束。"
  background: "《周颂·臣工》为佚名所作，读者多从此感受其农事。"
  famous_lines:
  - 命我众人：庤乃钱镈，奄观铚艾。
  tags:
  - 农事
  - 诗经
  - 古诗词
- id: poem_exp_309
  title: 周颂·噫嘻
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '噫嘻成王，既昭假尔。

    率时农夫，播厥百谷。

    骏发尔私，终三十里。

    亦服尔耕，十千维耦。

    '
  annotations:
  - word: 噫嘻
    meaning: 感叹词
  - word: 成王
    meaning: 周成王
  translation: "啊啊，成王已经昭示到来。率领这些农夫，播种各种谷物。赶快开发你们的私田，直到三十里。也服从你们的耕作，上万对耦耕。"
  appreciation: "《周颂·噫嘻》写成王劝农。骏发私田、十千维耦，是周初籍田劝耕的祀歌。"
  background: "《诗经·周颂》篇，成王春耕籍田之歌。"
  famous_lines:
  - 亦服尔耕，十千维耦。
  tags:
  - 农事
  - 诗经
  - 古诗词
- id: poem_exp_310
  title: 周颂·良耜
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '畟畟良耜，俶载南亩。

    播厥百谷，实函斯活。

    或来瞻女，载筐及莒，其饟伊黍。

    其笠伊纠，其镈斯赵，以薅荼蓼。

    荼蓼朽止，黍稷茂止。

    获之挃挃，积之栗栗。

    其崇如墉，其比如栉。

    以开百室，百室盈止，妇子宁止。

    杀时犉牡，有捄其角。

    以似以续，续古之人。

    '
  annotations:
  - word: 良耜
    meaning: 好的耒耜（农具）
  - word: 穫
    meaning: 收获
  translation: "《周颂·良耜》较长，建议分段。佚名整体写农事，名句「以似以续，续古之人。」可作线索。"
  appreciation: "《周颂·良耜》景与情互相生发，农事贯穿。名句「以似以续，续古之人。」是入口。"
  background: "佚名篇什之一，主题与农事相关。"
  famous_lines:
  - 以似以续，续古之人。
  tags:
  - 农事
