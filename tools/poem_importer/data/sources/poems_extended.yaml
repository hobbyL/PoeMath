- id: poem_ext_238
  title: 送杨氏女
  author: 韦应物
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '永日方戚戚，出行复悠悠。

    女子今有行，大江溯轻舟。

    尔辈苦无恃，抚念益慈柔。

    幼为长所育，两别泣不休。

    对此结中肠，义往难复留。

    自小阙内训，事姑贻我忧。

    赖兹托令门，任恤庶无尤。

    贫俭诚所尚，资从岂待周。

    孝恭遵妇道，容止顺其猷。

    别离在今晨，见尔当何秋。

    居闲始自遣，临感忽难收。

    归来视幼女，零泪缘缨流。

    '
  annotations:
  - word: 杨氏女
    meaning: 嫁到杨家的女儿
  - word: 永日
    meaning: 整天
  - word: 尔辈
    meaning: 你们
  - word: 贫俭
    meaning: 贫穷俭朴
  translation: "整日正戚戚不乐，出行的路又悠悠。女儿今天出嫁，大江上溯着轻舟。你们苦于早失母亲，抚念起来我更慈柔。幼的由长的抚育，两下分别泣不成休。对此中肠纠结，义当前往难以再留。自小缺少母亲的内训，侍奉公婆令我忧。幸好托付到好人家，体恤下大概无尤。贫俭诚然是我所尚，资从岂能优厚。孝恭与妇道，忠告又须再三重复。不要我未归时，就望着望乡的楼。懒懒的望着，心已分成两头。归来再看幼女，泪水沿着帽缨流。"
  appreciation: "韦应物送女出嫁。抚孤、嘱妇道、归视幼女零泪，父爱细腻真挚，是送女诗中的至情之作。"
