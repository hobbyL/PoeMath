  appreciation: 此诗想像巧妙，信手拈来，不露造作之痕。诗中语语浓艳，字字流葩，读这首诗，如觉春风满纸，花光满眼，人面迷离，无须刻画，自然使人觉得这是牡丹，是美人玉色，而不是别的。 第一首，以牡丹花比贵妃的美艳。首句以云霞比衣服，以花比容貌；二句写花受春风露华润泽，犹如妃子受君王宠幸；三句以仙女比贵妃；四句以嫦娥比贵妃。这样反复作比，塑造了艳丽有如牡丹的美人形象。然而，诗人采用云、花、露、玉山、瑶台、月色，一色素淡字眼，赞美了贵妃的丰满姿容，却不露痕迹。
