- id: poem_ext_060
  title: 归嵩山作
  author: 王维
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '清川带长薄，车马去闲闲。

    流水如有意，暮禽相与还。

    荒城临古渡，落日满秋山。

    迢递嵩高下，归来且闭关。

    '
