- id: poem_exp_293
  title: 椒聊
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '椒聊之实，蕃衍盈升。

    彼其之子，硕大无朋。

    椒聊且，远条且。

    椒聊之实，蕃衍盈匊。

    彼其之子，硕大且笃。

    椒聊且，远条且。

    '
  annotations:
  - word: 椒聊
    meaning: 花椒树
  - word: 蕃衍
    meaning: 繁殖茂盛
  translation: "花椒串串果实，繁衍满升。那个人啊，高大无比。花椒啊，香气远扬啊。花椒串串果实，繁衍满捧。那个人啊，高大又厚道。花椒啊，香气远扬啊。"
  appreciation: "《诗经·唐风·椒聊》。以花椒繁衍起兴，赞人之硕大笃厚。"
  background: "《诗经·唐风·椒聊》。"
  famous_lines:
  - 椒聊且，远条且。
  tags:
  - 咏物
  - 诗经
  - 写人
  - 古诗词
- id: poem_exp_294
  title: 采苓
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '采苓采苓，首阳之巅。

    人之为言，苟亦无信。

    舍旃舍旃，苟亦无然。

    人之为言，胡得焉？

    采苦采苦，首阳之下。

    人之为言，苟亦无与。

    舍旃舍旃，苟亦无然。

    人之为言，胡得焉？

    采葑采葑，首阳之东。

    人之为言，苟亦无从。

    舍旃舍旃，苟亦无然。

    人之为言，胡得焉？

    '
  annotations:
  - word: 苓
    meaning: 甘草
  - word: 采
    meaning: 采摘
  - word: 首阳
    meaning: 山名
  translation: "采苓采苓，在首阳之巅。别人的话，且不要信。丢开丢开，且不要以为然。别人的话，能得到什么？……"
  appreciation: "《诗经·唐风·采苓》。戒信谗言，反复叮嘱。"
  background: "《诗经·唐风·采苓》。"
  famous_lines:
  - 人之为言，胡得焉？
  tags:
  - 咏物
  - 诗经
  - 古诗词
- id: poem_exp_295
  title: 秦风·无衣
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '岂曰无衣？

    与子同袍。

    王于兴师，修我戈矛。

    与子同仇！

    岂曰无衣？

    与子同泽。

    王于兴师，修我矛戟。

    与子偕作！

    岂曰无衣？

    与子同裳。

    王于兴师，修我甲兵。

    与子偕行！

    '
  annotations:
  - word: 秦风
    meaning: 秦国的民歌
  - word: 无衣
    meaning: 没有衣服
  - word: 同袍
    meaning: 共穿战袍
  - word: 同仇
    meaning: 共同对敌
  translation: "谁说没有衣裳？与你同袍。王要兴师，修好我的戈矛，与你同仇！谁说没有衣裳？与你同泽。王要兴师，修好我的矛戟，与你一起行动！谁说没有衣裳？与你同裳。王要兴师，修好我的甲兵，与你同行！"
  appreciation: "《秦风·无衣》写同仇敌忾。与子同袍、同仇，是《诗经》军旅名篇。"
  background: "《诗经·秦风·无衣》。"
  famous_lines:
  - 与子偕行！
  tags:
  - 爱国
  - 诗经
  - 赞美
  - 古诗词
- id: poem_exp_296
  title: 渭阳
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '我送舅氏，曰至渭阳。

    何以赠之？

    路车乘黄。

    我送舅氏，悠悠我思。

    何以赠之？

    琼瑰玉佩。

    '
  annotations:
  - word: 渭阳
    meaning: 渭水北岸
  - word: 舅
    meaning: 舅舅
  translation: "我送舅氏，送到渭阳。拿什么赠他？路车与乘黄。我送舅氏，悠悠我思。拿什么赠他？琼瑰玉佩。"
  appreciation: "《秦风·渭阳》送舅。渭阳赠佩，甥舅情深，后成典故。"
  background: "《诗经·秦风·渭阳》。"
  famous_lines:
  - 琼瑰玉佩。
  tags:
  - 送别
  - 诗经
  - 怀人
  - 古诗词
- id: poem_exp_297
  title: 衡门
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '衡门之下，可以栖迟。

    泌之洋洋，可以乐饥。

    岂其食鱼，必河之鲂？

    岂其取妻，必齐之姜？

    岂其食鱼，必河之鲤？

    岂其取妻，必宋之子？

    '
  annotations:
  - word: 衡门
    meaning: 横木为门，简陋的门
  - word: 可以
    meaning: 可以在此
  translation: "横木为门之下，可以栖息。泌水洋洋，可以乐而忘饥。难道吃鱼，一定要黄河的鲂？难道娶妻，一定要齐国的姜？难道吃鱼，一定要黄河的鲤？难道娶妻，一定要宋国的子？"
  appreciation: "《诗经·陈风·衡门》。安贫自乐，不慕高门。"
  background: "《诗经·陈风·衡门》。"
  famous_lines:
  - 岂其取妻，必宋之子？
  tags:
  - 哲理
  - 诗经
  - 爱情
  - 古诗词
- id: poem_exp_298
  title: 匪风
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '匪风发兮，匪车偈兮。

    顾瞻周道，中心怛兮。

    匪风飘兮，匪车嘌兮。

    顾瞻周道，中心吊兮。

    谁能亨鱼？

    溉之釜鬵。

    谁将西归？

    怀之好音。

    '
  annotations:
  - word: 匪风
    meaning: 那风
  - word: 飘
    meaning: 飘荡
  translation: "不是风发吗？不是车疾驰吗？回望大路，心中悲伤。不是风飘吗？不是车疾吗？回望大路，心中悼念。谁能烹鱼？我来洗净锅。谁将西归？请带去好消息。"
  appreciation: "《诗经·桧风·匪风》。顾瞻周道中心怛，思周之忧。"
  background: "《诗经·桧风·匪风》。"
  famous_lines:
  - 怀之好音。
  tags:
  - 思乡
  - 诗经
  - 写风
  - 古诗词
- id: poem_exp_299
  title: 蜉蝣
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '蜉蝣之羽，衣裳楚楚。

    心之忧矣，於我归处。

    蜉蝣之翼，采采衣服。

    心之忧矣，於我归息。

    蜉蝣掘阅，麻衣如雪。

    心之忧矣，於我归说。

    '
  annotations:
  - word: 蜉蝣
    meaning: 一种短命昆虫
  - word: 羽
    meaning: 翅膀
  - word: 朝生暮死
    meaning: 早上出生晚上死去
  translation: "蜉蝣的羽，衣裳楚楚。心之忧矣，我将归何处。蜉蝣的翼，采采衣服。心之忧矣，我将归息……麻衣如雪。心之忧矣，我将归说。"
  appreciation: "《诗经·曹风·蜉蝣》。朝生暮死之虫，喻人生短暂。"
  background: "《诗经·曹风·蜉蝣》。"
  famous_lines:
  - 心之忧矣，於我归说。
  tags:
  - 咏物
  - 诗经
  - 古诗词
- id: poem_exp_300
  title: 下泉
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '冽彼下泉，浸彼苞稂。

    忾我寤叹，念彼周京。

    冽彼下泉，浸彼苞萧。

    忾我寤叹，念彼京周。

    冽彼下泉，浸彼苞蓍。

    忾我寤叹，念彼京师。

    芃芃黍苗，阴雨膏之。

    四国有王，郇伯劳之。

    '
  annotations:
  - word: 下泉
    meaning: 地下泉水
  - word: 郇伯
    meaning: 周代贤臣
  translation: "寒冷那下泉，浸泡着苞稂。慨然我寤叹，思念那周京……芃芃黍苗，阴雨膏之。四国有王，郇伯劳之。"
  appreciation: "《诗经·曹风·下泉》。念周京、望郇伯，思治。"
  background: "《诗经·曹风·下泉》。"
  famous_lines:
  - 四国有王，郇伯劳之。
  tags:
  - 咏物
  - 诗经
  - 怀古
  - 古诗词
- id: poem_exp_301
  title: 鸱鸮
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '鸱鸮鸱鸮，既取我子，无毁我室。

    恩斯勤斯，鬻子之闵斯。

    迨天之未阴雨，彻彼桑土，绸缪牖户。

    今女下民，或敢侮予？

    予手拮据，予所捋荼。

    予所蓄租，予口卒瘏，曰予未有室家。

    予羽谯谯，予尾翛翛，予室翘翘。

    风雨所漂摇，予维音哓哓！

    '
  annotations:
  - word: 鸱鸮
    meaning: 猫头鹰
  - word: 既取
    meaning: 已经夺取
  - word: 子
    meaning: 孩子
  translation: "猫头鹰啊猫头鹰，你已夺走我的孩子，不要再毁我的窝。恩爱勤劳，养育孩子真可怜。趁天还没阴雨，取那桑根皮，缠好门窗。现在你们下民，谁敢欺侮我？……"
  appreciation: "《诗经·豳风·鸱鸮》。禽言诗，写护巢育子，周公东征之喻说。"
  background: "《诗经·豳风·鸱鸮》。"
  famous_lines:
  - 风雨所漂摇，予维音哓哓！
  tags:
  - 哲理
  - 诗经
  - 写鸟
  - 寓理
  - 古诗词
- id: poem_exp_302
  title: 小雅·四牡
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '四牡騑騑，周道倭迟。

    岂不怀归？

    王事靡盬，我心伤悲。

    四牡騑騑，啴啴骆马。

    岂不怀归？

    王事靡盬，不遑启处。

    翩翩者鵻，载飞载下，集于苞栩。

    王事靡盬，不遑将父。

    翩翩者鵻，载飞载止，集于苞杞。

    王事靡盬，不遑将母。

    驾彼四骆，载骤骎骎。

    岂不怀归？

    是用作歌，将母来谂。

    '
  annotations:
  - word: 四牡
    meaning: 四匹公马
  - word: 周道
    meaning: 大路
  - word: 靡盬
    meaning: 没有止息
  translation: "四匹公马跑不停，大路迂回又漫长。难道不想归？王事没有完，我心伤悲……翩翩的鵻鸟，飞上又飞下，落在柞树上。王事没完，不能奉养父亲。"
  appreciation: "《诗经·小雅·四牡》。使臣思归不得，王事靡盬。"
  background: "《诗经·小雅·四牡》。"
  famous_lines:
  - 是用作歌，将母来谂。
  tags:
  - 思乡
  - 诗经
  - 怀人
  - 古诗词
- id: poem_exp_303
  title: 菁菁者莪
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '菁菁者莪，在彼中阿。

    既见君子，乐且有仪。

    菁菁者莪，在彼中沚。

    既见君子，我心则喜。

    菁菁者莪，在彼中陵。

    既见君子，锡我百朋。

    泛泛杨舟，载沉载浮。

    既见君子，我心则休。

    '
  annotations:
  - word: 菁菁
    meaning: 茂盛的样子
  - word: 莪
    meaning: 一种植物
  translation: "菁菁的萝蒿，在那山阿。既见君子，乐且有仪……泛泛杨舟，载沉载浮。既见君子，我心则休。"
  appreciation: "《诗经·小雅·菁菁者莪》。见君子而乐，是乐育人材之诗。"
  background: "《诗经·小雅·菁菁者莪》。"
  famous_lines:
  - 既见君子，我心则休。
  tags:
  - 写景
  - 诗经
  - 爱情
  - 古诗词
- id: poem_exp_304
  title: 小雅·鼓钟
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '鼓钟将将，淮水汤汤，忧心且伤。

    淑人君子，怀允不忘。

    鼓钟喈喈，淮水湝湝，忧心且悲。

    淑人君子，其德不回。

    鼓钟伐鼛，淮有三洲，忧心且妯。

    淑人君子，其德不犹。

    鼓钟钦钦，鼓瑟鼓琴，笙磬同音。

    以雅以南，以籥不僭。

    '
  annotations:
  - word: 鼓钟
    meaning: 敲钟
  - word: 将将
    meaning: 铿锵作响
  - word: 淮水
    meaning: 淮河
  translation: "鼓钟将将，淮水汤汤，忧心且伤。善人君子，怀思不能忘。鼓钟喈喈，淮水湝湝，忧心且悲。善人君子，其德不邪。鼓钟伐鼛，淮有三洲，忧心且忧。善人君子，其德不差。鼓钟钦钦，鼓瑟鼓琴，笙磬同音。以雅以南，以籥不僭。"
  appreciation: "《小雅·鼓钟》。淮水鼓钟中怀君子，忧思深长。"
  background: "《诗经·小雅·鼓钟》。"
  famous_lines:
  - 以雅以南，以籥不僭。
  tags:
  - 咏物
  - 诗经
  - 怀人
  - 古诗词
- id: poem_exp_305
  title: 鱼藻
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '鱼在在藻，有颁其首。

    王在在镐，岂乐饮酒。

    鱼在在藻，有莘其尾。

    王在在镐，饮酒乐岂。

    鱼在在藻，依于其蒲。

    王在在镐，有那其居。

    '
  annotations:
  - word: 鱼
    meaning: 鱼
  - word: 藻
    meaning: 水草
  - word: 在藻
    meaning: 在水草间
  translation: "鱼在藻中，大着它的头。王在镐京，欢乐饮酒。鱼在藻中，长着它的尾。王在镐京，饮酒欢乐。鱼在藻中，依着蒲草。王在镐京，安然居住。"
  appreciation: "《诗经·小雅·鱼藻》。鱼藻起兴，写王者安乐。"
  background: "《诗经·小雅·鱼藻》。"
  famous_lines:
  - 王在在镐，有那其居。
  tags:
  - 咏物
  - 诗经
  - 写鱼
  - 古诗词
- id: poem_exp_306
  title: 小雅·瓠叶
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '幡幡瓠叶，采之亨之。

    君子有酒，酌言尝之。

    有兔斯首，炮之燔之。

    君子有酒，酌言献之。

    有兔斯首，燔之炙之。

    君子有酒，酌言酢之。

    有兔斯首，燔之炮之。

    君子有酒，酌言酬之。

    '
  annotations:
  - word: 瓠叶
    meaning: 葫芦叶
  - word: 幡幡
    meaning: 翻转的样子
  translation: "翻飞的瓠叶，采来烹它。君子有酒，斟上请尝。有只兔头，炮了烤了。君子有酒，斟上献客。有只兔头，烤了炙了。君子有酒，斟上还敬。有只兔头，炮了烤了。君子有酒，斟上劝酬。"
  appreciation: "《小雅·瓠叶》写宴饮。瓠叶烹兔、献酢酬，礼简情真。"
  background: "《诗经·小雅·瓠叶》。"
  famous_lines:
  - 君子有酒，酌言酬之。
  tags:
  - 咏物
  - 诗经
  - 宴饮
  - 古诗词
- id: poem_exp_307
  title: 大雅·灵台
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '经始灵台，经之营之。

    庶民攻之，不日成之。

    经始勿亟，庶民子来。

    王在灵囿，麀鹿攸伏。

    麀鹿濯濯，白鸟翯翯。

    王在灵沼，於牣鱼跃。

    虡业维枞，贲鼓维镛。

    於论鼓钟，於乐辟廱。

    於论鼓钟，於乐辟廱。

    鼍鼓逢逢。

    蒙瞍奏公。

    '
  annotations:
  - word: 灵台
    meaning: 周文王建造的高台
  - word: 经始
    meaning: 开始营建
  translation: "开始营建灵台，经营它、营造它。庶民来攻作，不几天就建成。开始不求急，庶民如子而来。王在灵囿，母鹿伏着。母鹿濯濯肥美，白鸟翯翯洁白。王在灵沼，满池鱼跃。木架上横着枞齿，大鼓大钟。论起鼓钟，欢乐在辟雍。论起鼓钟，欢乐在辟雍。鼍鼓逢逢响。盲乐师奏起乐章。"
  appreciation: "《大雅·灵台》写文王建灵台。庶民子来、灵囿灵沼，颂德与祥和。"
  background: "《诗经·大雅·灵台》。"
  famous_lines:
  - 蒙瞍奏公。
  tags:
  - 咏物
  - 诗经
  - 古诗词
- id: poem_exp_308
  title: 周颂·臣工
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '嗟嗟臣工，敬尔在公。

    王厘尔成，来咨来茹。

    嗟嗟保介，维莫之春，亦又何求？

