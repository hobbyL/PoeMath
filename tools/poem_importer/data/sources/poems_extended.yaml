  - word: 竟夕
    meaning: 终宵，即一整夜
  - word: 怜
    meaning: 爱
  translation: 茫茫的海上升起一轮明月，此时你我都在天涯共相望。 有情之人都怨恨月夜漫长，整夜里不眠而把亲人怀想。 熄灭蜡烛怜爱这满屋月光，我披衣徘徊深感夜露寒凉。 不能把美好的月色捧给你，只望能够与你相见在梦乡。
  appreciation: 《望月怀远》是一首月夜怀念远人的诗，是作者在离乡时，望月而思念远方亲人而写的。起句“海上生明月”意境雄浑阔大，是千古佳句。它和谢灵运的“池塘生春草”，鲍照的“明月照积雪”，谢朓的“大江流日夜”以及作者自己的“孤鸿海上来”等名句一样，看起来平淡无奇，没有一个奇特的字眼，没有一分点染的色彩，脱口而出，却自然具有一种高华浑融的气象。这一句完全是景，点明题中的“望月”。第二句“天涯共此时”，即由景入情，转入“怀远”。
