- id: poem_exp_295
  title: 秦风·无衣
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '岂曰无衣？

    与子同袍。

    王于兴师，修我戈矛。

    与子同仇！

    岂曰无衣？

    与子同泽。

    王于兴师，修我矛戟。

    与子偕作！

    岂曰无衣？

    与子同裳。

    王于兴师，修我甲兵。

    与子偕行！

    '
  annotations:
  - word: 秦风
    meaning: 秦国的民歌
  - word: 无衣
    meaning: 没有衣服
  - word: 同袍
    meaning: 共穿战袍
  - word: 同仇
    meaning: 共同对敌
  translation: "谁说没有衣裳？与你同袍。王要兴师，修好我的戈矛，与你同仇！谁说没有衣裳？与你同泽。王要兴师，修好我的矛戟，与你一起行动！谁说没有衣裳？与你同裳。王要兴师，修好我的甲兵，与你同行！"
  appreciation: "《秦风·无衣》写同仇敌忾。与子同袍、同仇，是《诗经》军旅名篇。"
  background: "《诗经·秦风·无衣》。"
  famous_lines:
  - 与子偕行！
  tags:
