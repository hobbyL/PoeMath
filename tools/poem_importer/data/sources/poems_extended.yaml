  translation: "黄昏从碧山下山，山月跟人一起归来。回头看走过的小路，苍苍横在翠微之间。与友人携手到田家，孩童打开荆扉。绿竹引入幽径，青萝拂着衣裳。欢言得了歇处，美酒一起挥杯。长歌吟着松风，曲尽时河星已稀。我醉了你也快乐，陶然共忘机心。"
  appreciation: "李白写下山访友置酒，景清而情真。「我醉君复乐，陶然共忘机」收束自然，是田园交游诗中的明朗之作。"
