    '
  pinyin: 'zhòu chū yún tián yè jì má ， cūn zhuāng ér nǚ gè dāng jiā 。

    tóng sūn wèi jiě gòng gēng zhī ， yě bàng sāng yīn xué zhòng guā 。

    '
  annotations:
  - word: 耘田
    meaning: 在田间除草
  - word: 绩麻
    meaning: 把麻搓成线
  - word: 各当家
    meaning: 各人都担负起家庭的责任
  - word: 未解
    meaning: 不懂
  - word: 供
    meaning: 从事
  - word: 傍
    meaning: 靠近
  translation: 白天到田里除草，晚上搓麻线，村里的男男女女各自担当家务。年幼的孩童虽然不懂耕田织布，也在桑树阴下学着大人种瓜。
  appreciation: 全诗以生动的笔触描绘农家夏日忙碌的劳动场景，最后一句"也傍桑阴学种瓜"写出孩童模仿大人的天真情态，充满生活气息。
  background: 范成大晚年退居故乡石湖时所作组诗《四时田园杂兴》，共60首，此为夏日部分第七首（总第31首）。
  famous_lines:
  - 童孙未解供耕织，也傍桑阴学种瓜
