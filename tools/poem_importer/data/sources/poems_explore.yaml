- id: poem_exp_602
  title: 送裴十八图南归嵩山二首
  author: 李白
  dynasty: 唐
  layer: explore
  is_required: false
  difficulty: 4
  content: '何处可为别，长安青绮门。

    胡姬招素手，延客醉金樽。

    临当上马时，我独与君言。

    风吹芳兰折，日没鸟雀喧。

    举手指飞鸿，此情难具论。

    同归无早晚，颍水有清源。

    君思颍水绿，忽复归嵩岑。

    归时莫洗耳，为我洗其心。

    洗心得真情，洗耳徒买名。

    谢公终一起，相与济苍生。

    '
  annotations:
  - word: 裴十八
    meaning: 排行十八的裴姓友人
  - word: 嵩山
    meaning: 五岳之一
  translation: "何处可为别？长安青绮门。胡姬招着素手，请客醉金樽。临要上马时，我独与你言。风吹芳兰折，日没鸟雀喧。举手指着飞鸿，此情难说尽。同归不论早晚，颍水有清源。你思颍水绿，忽然又归嵩岑。归时莫洗耳，为我洗其心。洗心得真情，洗耳只是买名。谢公终会再起，相与救济苍生。"
  appreciation: "李白送裴图南归嵩山。指飞鸿、济苍生，友情与用世并见。"
  background: "唐李白《送裴十八图南归嵩山》二首。"
  famous_lines:
  - 谢公终一起，相与济苍生。
