- id: poem_ext_406
  title: 虞美人·扁舟三日秋塘路
  author: 陈与义
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 4
  content: '余甲寅岁自春官出守湖州。

    秋杪，道中荷花无复存者。

    乙卯岁，自琐闼以病得请奉祠，卜居青墩镇。

    立秋后三日行。

    舟之前后如朝霞相映，望之不断也。

    以长短句记之。

    扁舟三日秋塘路，平度荷花去。

    病夫因病得来游，更值满川微雨洗新秋。

    去年长恨拏舟晚，空见残荷满。

    今年何以报君恩，一路繁花相送过青墩。

    '
