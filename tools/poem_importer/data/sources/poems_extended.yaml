- id: poem_ext_338
  title: 南乡子·重九涵辉楼呈徐君猷
  author: 苏轼
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 3
  content: '霜降水痕收。

    浅碧鳞鳞露远洲。

    酒力渐消风力软，飕飕。

    破帽多情却恋头。

    佳节若为酬。

    但把清尊断送秋。

    万事到头都是梦，休休。

    明日黄花蝶也愁。

    '
  annotations:
  - word: 南乡子
    meaning: 词牌名
  - word: 重九
    meaning: 重阳节
  - word: 涵辉楼
    meaning: 楼名
  - word: 徐君猷
    meaning: 苏轼友人
  translation: "霜降后水落，浅处露出碧色沙洲，细浪像鱼鳞。隐约的酒旗映着西边落日；几座山峰清瘦，像在商量黄昏要不要下雨。寂寞地倚着高竹，翠袖生寒，泪痕点点。未必明天不起风；平地上说变就变的风波，都交给酒杯深浅去消磨吧。"
  appreciation: "苏轼重九日在涵辉楼呈徐君猷。秋景清苦，客中情味落在「酒」上，景与情相生。"
  background: "苏轼重九日在涵辉楼呈友人徐君猷所作。"
