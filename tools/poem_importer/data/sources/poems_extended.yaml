  - word: 东城
    meaning: 城东
  - word: 高且长
    meaning: 又高又长
  translation: "东城又高又长，逶迤自相连接。回风动地而起，秋草萋萋已绿。四时更变化，岁暮何其速！晨风怀着苦心，蟋蟀伤于局促。荡涤放开情志，何必自我束缚？燕赵多佳人，美者颜如玉。穿着罗裳衣，当户理清曲。音响何等悲！弦急知柱促。驰情整巾带，沉吟且踯躅。想化作双飞燕，衔泥巢在君屋。"
  appreciation: "《古诗十九首》之一。由岁暮放情到听曲驰情，结愿为双燕，汉诗生命与爱情主题的交织。"
