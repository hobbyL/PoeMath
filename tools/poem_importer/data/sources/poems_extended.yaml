- id: poem_ext_259
  title: 送李中丞之襄州
  author: 刘长卿
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '流落征南将，曾驱十万师。

    罢归无旧业，老去恋明时。

    独立三边静，轻生一剑知。

    茫茫江汉上，日暮欲何之。

    '
  annotations:
