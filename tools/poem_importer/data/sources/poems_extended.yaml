- id: poem_ext_102
  title: 蜀先主庙
  author: 刘禹锡
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '天地英雄气，千秋尚凛然。势分三足鼎，业复五铢钱。

    得相能开国，生儿不象贤。凄凉蜀故妓，来舞魏宫前。

    '
