    月随碧山转，水合青天流。

    杳如星河上，但觉云林幽。

    归路方浩浩，徂川去悠悠。

    徒悲蕙草歇，复听菱歌愁。

    岸曲迷后浦，沙明瞰前洲。

    怀君不可见，望远增离忧。

    '
