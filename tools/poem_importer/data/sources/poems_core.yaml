  translation: 一支断戟沉没在泥沙之中铁还没有完全腐蚀，磨洗之后认出是三国时期的遗物。如果东风不帮助周瑜的话，铜雀台上就会深锁着大乔小乔了。
  appreciation: 全诗以小物件引出大历史，后两句以假设翻案，认为赤壁之战的胜负取决于机遇，构思新奇独到。
  background: 杜牧游赤壁古战场时偶得一支断戟有感而作。
