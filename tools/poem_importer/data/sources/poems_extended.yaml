- id: poem_ext_087
  title: 早寒江上有怀
  author: 孟浩然
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '木落雁南度，北风江上寒。

    我家襄水曲，遥隔楚云端。

    乡泪客中尽，孤帆天际看。

    迷津欲有问，平海夕漫漫。

    '
  annotations:
