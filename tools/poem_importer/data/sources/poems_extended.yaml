- id: poem_ext_216
  title: 金缕歌·陪履斋先生沧浪看梅
  author: 吴文英
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 4
  content: '乔木生云气。访中兴、英雄陈迹，暗追前事。战舰东风慳借便，梦断神州故里。旋小筑、吴宫闲地。华表月明归夜鹤，叹当时、花竹今如此。枝上露，溅清泪。

    遨头小簇行春队。步苍苔、寻幽别坞，问梅开未。重唱梅边新度曲，催发寒梢冻蕊。此心与、东君同意。后不如今今非昔，两无言、相对沧浪水。怀此恨，寄残醉。

    '
  annotations:
  - word: 金缕歌
    meaning: 词牌名
  - word: 履斋
    meaning: 吴潜的号
  - word: 沧浪
    meaning: 沧浪亭
  - word: 看梅
    meaning: 赏梅
  translation: 高大的树木上翻滚吞吐着云气，我们为了瞻仰大宋中兴英雄韩世中的业绩，追思前朝的旧事，而共同来到这里。当年的东风是多么的吝惜，甚至不肯让将军的战舰借一点儿力，给战船乘风破敌的便利。致使抗金，恢复神州河山大业功亏一箦，致使将军收复中原的大志，如同梦境般虚幻迷离。韩将军只好含恨返回故里，在吴宫旧址筑起一座休闲的小筑。如果他能化成仙鹤落在这个华表上，一定会深深叹息从前繁茂的花竹，如今却如此萧条冷寂。枝头花梢上洒落清露点点，仿佛是淌下无数清冷的泪滴。
    吴太守领着游春的队伍沿着长满清苔的小径石梯，去寻找将军旧日的别墅遗迹，看一看那里的梅花开了没有？在梅花边我们重唱新度的词曲，要用歌声把沉睡的梅蕊唤直起，再把美丽的春光带回大地。我此时的心情，与春风和使君相同无异。如今的情景不如往昔，以后的岁月恐怕连今天也比不上了。对着沧浪亭下。
