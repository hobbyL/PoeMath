    meaning: 指公元1076年（宋神宗熙宁九年）
  - word: 达旦
    meaning: 到天亮
  - word: 子由
    meaning: 苏轼的弟弟苏辙的字
  - word: 天上宫阙
    meaning: 指月中宫殿
  - word: 归去
    meaning: 回去，这里指回到月宫里去
  translation: "明月什么时候开始有？我端起酒杯问青天。不知天上的宫殿，今夜是哪一年。我想乘风回到天上去，又怕琼楼玉宇太高，受不住那份清寒。起身跳舞，玩赏清影，哪里像在人间。月亮转向朱红色的阁楼，低低照进雕花的窗户，照着没有睡意的人。不应有恨，为什么偏偏在人分别时变圆？人有悲欢离合，月有阴晴圆缺，这事自古难两全。只希望人能长久健康，即使相隔千里也能共赏这美好的明月。"
  appreciation: "苏轼中秋望月怀子由。上片出世与入世的徘徊，下片落到人间离合，结句「千里共婵娟」旷达而深情，是中秋词的巅峰。"
  background: "宋神宗熙宁九年（1076）中秋，苏轼在密州作，时与弟苏辙分别已久。"
