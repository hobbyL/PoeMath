  content: '三万里河东入海，五千仞岳上摩天。

    遗民泪尽胡尘里，南望王师又一年。

    '
  pinyin: 'sān wàn lǐ hé dōng rù hǎi ， wǔ qiān rèn yuè shàng mó tiān 。

    yí mín lèi jìn hú chén lǐ ， nán wàng wáng shī yòu yī nián 。

    '
  annotations:
  - word: 将晓
    meaning: 天快亮的时候
  - word: 篱门
    meaning: 竹篱笆门
  - word: 三万里河
    meaning: 指黄河
  - word: 五千仞岳
    meaning: 指西岳华山。仞，古代长度单位
  - word: 摩天
    meaning: 碰到天，形容山高
  - word: 遗民
