- id: poem_ext_130
  title: 客至
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '舍南舍北皆春水，但见群鸥日日来。

    花径不曾缘客扫，蓬门今始为君开。

    盘飧市远无兼味，樽酒家贫只旧醅。

    肯与邻翁相对饮，隔篱呼取尽馀杯。(馀通：余)

    '
