  title: 咏孤石
  author: 惠标
  dynasty: 南北朝
  layer: explore
  is_required: false
  difficulty: 3
  content: '中原一孤石，地理不知年。

    根含彭泽浪，顶入香炉烟。

    崖成二鸟翼，峰作一芙莲。

    何时发东武，今来镇蠡川。

    '
