- id: poem_exp_412
  title: 水龙吟·小沟东接长江
  author: 苏轼
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '小沟东接长江，柳堤苇岸连云际。

    烟村潇洒，人闲一哄，渔樵早市。

    永昼端居，寸阴虚度，了成何事。

    但丝莼玉藕，珠粳锦鲤，相留恋，又经岁。

    因念浮丘旧侣，惯瑶池、羽觞沈醉。

    青鸾歌舞，铢衣摇曳，壶中天地。

    飘堕人间，步虚声断，露寒风细。

    抱素琴，独向银蟾影里，此怀难寄。

    '
