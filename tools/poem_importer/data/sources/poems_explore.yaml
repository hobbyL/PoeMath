- id: poem_exp_044
  title: 鹦鹉曲·野渡新晴
  author: 冯子振
  dynasty: 元
  layer: explore
  is_required: false
  difficulty: 3
  content: '孤村三两人家住，终日对野叟田父。

    说今朝绿水平桥，昨日溪南新雨。

    碧天边岩穴云归，白鹭一行飞去。

    便芒鞋竹杖行春，问底是青帘舞处？

    '
