- id: poem_exp_156
  title: 白马篇
  author: 李白
  dynasty: 唐
  layer: explore
  is_required: false
  difficulty: 4
  content: '龙马花雪毛，金鞍五陵豪。

    秋霜切玉剑，落日明珠袍。

    斗鸡事万乘，轩盖一何高。

    弓摧南山虎，手接太行猱。

    酒后竞风采，三杯弄宝刀。

    杀人如剪草，剧孟同游遨。

    发愤去函谷，从军向临洮。

    叱咤经百战，匈奴尽奔逃。

    归来使酒气，未肯拜萧曹。

    羞入原宪室，荒淫隐蓬蒿。

    '
