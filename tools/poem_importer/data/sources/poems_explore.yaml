- id: poem_exp_299
  title: 蜉蝣
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '蜉蝣之羽，衣裳楚楚。

    心之忧矣，於我归处。

    蜉蝣之翼，采采衣服。

    心之忧矣，於我归息。

    蜉蝣掘阅，麻衣如雪。

    心之忧矣，於我归说。

    '
  annotations:
