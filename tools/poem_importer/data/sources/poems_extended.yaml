  translation: 长相思呵长相思，我们相思在长安。 秋天蟋蟀常悲鸣，声声出自金井阑；薄霜凄凄送寒气，竹席已觉生凉寒。 夜里想她魂欲断，孤灯伴我昏暗暗；卷起窗帘望明月，对月徒然独长叹。 如花似玉美人呵，仿佛相隔在云端！ 青青冥冥呵，上是无边无垠的蓝天；清水渺渺呵，下是浩浩汤汤的波澜。 天长长来地迢迢，灵魂飞越多辛苦；关山重重相阻隔，梦魂相见也艰难。 长相思呵长相思，每每相思摧心肝！
