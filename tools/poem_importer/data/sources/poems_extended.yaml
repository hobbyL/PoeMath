  - word: 相
    meaning: 此指诸葛亮
  - word: 不象贤
    meaning: 此言刘备之子刘禅不肖，不能守业
  - word: 妓
    meaning: 女乐，实际也是俘虏
  translation: "英雄气概充塞天地，千秋之后仍凛然。当年势分三足鼎立，志在恢复汉家基业。得到贤相能够开国，生下的儿子却不肖。凄凉的是蜀国旧日歌妓，如今来到魏宫前起舞。"
  appreciation: "刘禹锡吊刘备庙。前颂英雄开国，后叹后主不肖、故妓舞魏宫，兴亡之感沉痛。"
  background: "刘禹锡过蜀先主（刘备）庙而作的咏史诗。"
