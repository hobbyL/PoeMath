- id: poem_ext_064
  title: 草
  author: 白居易
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '离离原上草，一岁一枯荣。

    野火烧不尽，春风吹又生。

    远芳侵古道，晴翠接荒城。

    又送王孙去，萋萋满别情。

    '
  annotations:
  - word: 离离
    meaning: 青草茂盛的样子
  - word: 一岁一枯荣
    meaning: 枯，枯萎
  - word: 远芳侵古道
    meaning: 芳，指野草那浓郁的香气
  - word: 远芳
    meaning: 草香远播
  - word: 晴翠
    meaning: 草原明丽翠绿
  translation: "原野上青草茂盛，一年一度枯萎又繁荣。野火烧不尽它，春风一吹又重新生长。远处的芳草侵入古道，晴日下的翠绿连向荒城。又一次送别游子远去，萋萋春草满含离别之情。"
  appreciation: "白居易借原上草写生命力与离情。前四句「野火烧不尽，春风吹又生」写草之坚韧；后四句以萋萋芳草托送别，情景交融，是小学与唐诗选本中的经典。"
  background: "白居易《赋得古原草送别》节选或通行选本常题作《草》。作于少年时期，以草喻别情。"
