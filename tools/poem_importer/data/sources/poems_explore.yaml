- id: poem_exp_190
  title: 乡愁
  author: 余光中
  dynasty: 近代
  layer: explore
  is_required: false
  difficulty: 4
  content: '小时候，

    乡愁是一枚小小的邮票，

    我在这头，

    母亲在那头。

    长大后，

    乡愁是一张窄窄的船票，

    我在这头，

    新娘在那头。

    后来啊，

    乡愁是一方矮矮的坟墓，

    我在外头，

    母亲在里头。

    而现在，

    乡愁是一湾浅浅的海峡，

    我在这头，

    大陆在那头。

    '
  annotations:
