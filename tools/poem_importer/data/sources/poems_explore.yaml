  - word: 客
    meaning: 诗人自称
  - word: 笳
    meaning: 汉代流行于塞北和西域的一种类似于笛子的管乐器，此处代指号角
  - word: 三边
    meaning: 古称幽、并、凉为三边
  - word: 危旌
