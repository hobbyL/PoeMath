- id: poem_ext_189
  title: 望月有感
  author: 白居易
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '自河南经乱，关内阻饥，兄弟离散，各在一处。因望月有感，聊书所怀，寄上浮梁大兄、於潜七兄、乌江十五兄，兼示符离及下邽弟妹。时难年荒世业空，弟兄羁旅各西东。

    田园寥落干戈后，骨肉流离道路中。

    吊影分为千里雁，辞根散作九秋蓬。

    共看明月应垂泪，一夜乡心五处同。

    '
  annotations:
  - word: 时难
    meaning: 时局艰难
  - word: 田园
    meaning: 家乡田地
  - word: 雁行
    meaning: 兄弟的行列
  - word: 吊影
    meaning: 对着影子自怜
  translation: 自从河南地区经历战乱，关内一带漕运受阻致使饥荒四起，我们兄弟也因此流离失散，各自在一处。因为看到月亮而有所感触，便随性写成诗一首来记录感想，寄给在浮梁的大哥、在於潜的七哥，在乌江的十五哥和在符离、下邽的弟弟妹妹们看。 家业在灾年中荡然一空，兄弟分散各自你西我东。 战乱过后田园荒芜寥落，骨肉逃散在异乡道路中。 吊影伤情好像离群孤雁，漂泊无踪如断根的秋蓬。 同看明月都该伤心落泪，一夜思乡心情五地相同。
  appreciation: 自河南经乱，关内阻饥，兄弟离散，各在一处。因望月有感，聊书所怀，寄上浮梁大兄、於潜七兄、乌江十五兄，兼示符离及下邽弟妹。 时难年荒世业空，弟兄羁旅各西东。田园寥落干戈后，骨肉流离道路中。吊影分为千里雁，辞根散作九秋蓬。共看明月应垂泪，一夜乡心五处同。 这是一首感情浓郁的抒情诗。全诗意在写经乱之后，怀念诸位兄弟姊妹。 此诗读来如听诗人倾诉自己身受的离乱之苦。在这战乱饥馑灾难深重的年代里，祖传的家业荡然一空，兄弟姊妹抛家失业，羁旅行役，天各一方。回首兵燹后的故乡田园，一片寥落凄清。破敝的园舍虽在，可是流离失散的同胞骨肉，却各自奔波在异乡的道路之中。诗的前两联就是从“时难年荒”这一时代的灾难起笔，以亲身经历概括出战乱频年、家园荒残、手足离散这一具有典型意义的苦难的现实生活。接着诗人再以“雁”、“蓬”作比：手足离散各在一方，犹如那分飞千里的孤雁，只能吊影自怜；辞别故乡流离四方，又多么像深秋中断根的蓬草，随着萧瑟的西风，飞空而去，飘转无定。“吊影分为千里雁，辞根散作九秋蓬”两句，一向为人们所传诵。诗人不仅以千里孤雁、九秋断蓬作了形象贴切的比拟，而且以吊影分飞与辞根离散这样传神的描述，赋予它们孤苦凄惶的情态，深刻揭示了饱经战乱的零落之苦。
