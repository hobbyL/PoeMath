  layer: explore
  is_required: false
  difficulty: 3
  content: '雪藏梅，烟著柳。

    依约上春时候。

    初送雁，欲闻莺。

    绿池波浪生。

    探花开，留客醉。

    忆得去年情味。

    金盏酒，玉炉香。

    任他红日长。

