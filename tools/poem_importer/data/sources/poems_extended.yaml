- id: poem_ext_336
  title: 桃源忆故人·暮春
  author: 苏轼
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 3
  content: '华胥梦断人何处，听得莺啼红树。

    几点蔷薇香雨，寂寞闲庭户。

    暖风不解留花住，片片着人无数。

    楼上望春归去，芳草迷归路。

    '
