  appreciation: "李商隐答令狐绹。以嵩云秦树写两地，结以茂陵病相如自况，落寞而有身份，是其七绝名篇。"
  background: "会昌五年前后李商隐闲居洛阳，寄令狐绹（时任郎中）而作。"
