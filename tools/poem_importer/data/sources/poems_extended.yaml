  - word: 致此身
    meaning: 意即以此身为国君报效尽力
  translation: "灞原风雨停定，晚间见雁行频频。落叶是他乡的树，寒灯是独夜的人。空园白露滴着，孤壁与野僧为邻。寄住郊扉已久，何年才能致身通达？"
  appreciation: "马戴灞上秋居。「落叶他乡树，寒灯独夜人」对仗工稳，客况凄清；结以何年致此身，见不遇之慨。"
  background: "晚唐马戴秋日寄居灞上而作。"
