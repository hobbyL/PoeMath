  tags:
  - 写景
  - 春天
  - 古诗词
- id: poem_exp_039
  title: 行台闲咏
  author: 石玠
  dynasty: 明
  layer: explore
  is_required: false
  difficulty: 3
  content: '清于池水净于苔，会府潭潭暂作台。

    夜月半庭人未宿，春云满眼杏将开。

    榆关道路犹堪走，麟阁功勋岂易陪。

    莫信蓬莱相离远，塞鸿多自日边来。

    '
  annotations:
  - word: 行台
    meaning: 临时官署
  - word: 闲咏
    meaning: 闲暇吟咏
  - word: 野色
    meaning: 郊野的景色
  translation: "清于的池水净在于苔，会府的潭潭暂在作台。夜月的半庭人在未宿，春云的满眼杏在将开。榆关的道路犹在堪走，麟阁的功勋岂在易陪。莫信的蓬莱相在离远，塞鸿的多自日在边来。"
  appreciation: "《行台闲咏》中「莫信蓬莱相离远，塞鸿多自日边来。」最见精神。石玠写景，画面清楚。"
