  translation: 我敬重孟先生的庄重潇洒，他为人高尚风流倜傥闻名天下。 少年时鄙视功名不爱官冕车马，高龄白首又归隐山林摒弃尘杂。 明月夜常常饮酒醉得非凡高雅，他不事君王迷恋花草胸怀豁达。 高山似的品格怎么能仰望着他？只在此揖敬他芬芳的道德光华！
  appreciation: 李白的律诗，不屑为格律所拘束，而是追求古体的自然流走之势，直抒胸臆，透出一股飘逸之气。李白与孟浩然的友谊是诗坛上的一段佳话。二人彼此结识，固然不乏饮酒唱和、携手邀游的乐趣，但是至为重要的，则是在追求情感的和谐一致，寻求灵性飘逸的同伴和知音。史载孟浩然曾隐鹿门山，年四十余客游京师，终以“当路无人”，还归故园。而李白竟亦有类似的经历。他少隐岷山，又隐徂徕山.后被玄宗召至京师，供奉翰林。终因小人谗毁，被赐金放还。
