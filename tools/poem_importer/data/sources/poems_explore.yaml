- id: poem_exp_061
  title: 咏竹五首
  author: 憨山德清
  dynasty: 明
  layer: explore
  is_required: false
  difficulty: 4
  content: '寒飞千尺玉，清洒一林霜。

    纵是尘心重，相看亦顿忘。

    矫矫凌云姿，风生龙夜吼。

    霜雪不知年，真吾岁寒友。

    霜干寒如玉，风枝响似琴。

    潇湘一夜雨，滴碎客中心。

    叶落根偏固，心虚节更高。

    一林寒吹发，清夜伴松涛。

    淇澳春云碧，潇湘夜雨寒。

    虚窗人静听，飒飒响琅玕。

    '
