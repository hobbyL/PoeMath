- id: poem_ext_111
  title: 无题·重帏深下莫愁堂
  author: 李商隐
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '重帏深下莫愁堂，卧后清宵细细长。

    神女生涯原是梦，小姑居处本无郎。

    风波不信菱枝弱，月露谁教桂叶香。

    直道相思了无益，未妨惆怅是清狂。

    '
  annotations:
  - word: 帏
    meaning: 帐子、幔幕
  - word: 神女
    meaning: 即宋玉《神女赋》中的巫山神女
  - word: 小姑句
    meaning: 古乐府《青溪小姑曲》：“小姑所居，独处无郎
  - word: 风波句
    meaning: 意谓菱枝虽是弱质，却不相信会任凭风波欺负
  - word: 直道
    meaning: 即使，就说
  translation: 重重帷幕深垂，我孤居莫愁堂；独卧不眠，更觉静夜漫漫长长。 巫山神女艳遇楚王，原是梦幻；青溪小姑住所，本就独处无郎。 我是柔弱菱枝，偏遭风波摧残；我是铃芳桂叶，却无月露香。 虽然深知沉溺相思，无益健康；我却痴情到底，落个终身清狂。
  appreciation: 李商隐的七律无题，艺术上最成熟，最能代表其无题诗的独特艺术风貌。这首七律无题，内容是抒写青年女子爱情失意的幽怨，相思无望的苦闷，又采取女主人公深夜追思往事的方式，因此，女主人公的心理独白就构成了诗的主体。她的身世遭遇和爱情生活中某些具体情事就是通过追思回忆或隐或显地表现出来的。 这首诗侧重于抒写女主人公的身世遭遇之感，写法非常概括。一开头就撇开具体情事，从女主人公所处的环境氛围写起。层帷深垂，幽邃的居室笼罩着一片深夜的静寂。独处幽室的女主人公自思身世，辗转不眠，倍感静夜的漫长。这里尽管没有一笔正面抒写女主人公的心理状态，但透过这静寂孤清的环境气氛，读者几乎可以触摸到女主人公的内心世界，感觉到那帷幕深垂的居室中弥漫着一层无名的幽怨。
    颔联进而写女主人公对自己爱情遇合的回顾。上句用巫山神女梦遇楚王事，下句用乐府《神弦歌·清溪小姑曲》：“小姑所居，独处无郎。”意思是说，追思往事，在爱情上尽管也象巫山神女那样，有过自己的幻想与追求，但到头来不过是做了一场幻梦而已；直到现在，还正像清溪小姑那样，独处无郎，终身无托。这一联虽然用了两个典故，却几乎让人感觉不到有用典的痕迹，真正达到了驱使故典如同己出的程度。特别是它虽然写得非常概括，却并不。
