  translation: 人生旅途常有别离不易相见，就像参星商星实在难得相遇。 今夜又是一个什么吉日良辰，让我们共同在这烛光下叙谈。 青春壮健年少岁月能有多少，转瞬间你我都已经两鬓如霜。 昔日往来的朋友一半已去世，我内心激荡不得不连声哀叹。 没想到我们已分别廿个春秋，今天还能亲临你家里的厅堂。 相分别是你还没有结婚成家，倏忽间你的子女已成帮成行。 他们彬彬有礼笑迎父亲老友，亲切地询问我来自什么地方？
    还来不及讲述完所有的往事，你就催促儿女快把酒菜摆上。 冒着夜雨剪来了青鲜的韭菜，呈上新煮的黄米饭让我品尝。 主人感慨见面的机会太难得，开怀畅饮一连喝干了十几杯。 一连喝干十几杯还没有醉意，令我感动你对老友情深意长。 明日分别后又相隔千山万水，茫茫的世事真令人愁绪难断。
