  - word: 杨氏女
    meaning: 嫁到杨家的女儿
  - word: 永日
    meaning: 整天
  - word: 尔辈
    meaning: 你们
  - word: 贫俭
    meaning: 贫穷俭朴
  translation: 我整日忧郁而悲悲戚戚，女儿就要出嫁遥远地方。 今天她要远行去做新娘，乘坐轻舟沿江逆流而上。 你姐妹自幼尝尽失母苦，念此我就加倍慈柔抚养。 妹妹从小全靠姐姐养育，今日两人作别泪泣成行。 面对此情景我内心郁结，女大当嫁你也难得再留。 你自小缺少慈母的教训，侍奉婆婆的事令我担忧。 幸好依仗你夫家好门第，信任怜恤不挑剔你过失。 安贫乐俭是我一贯崇尚，嫁妆岂能做到周全丰厚。 望你孝敬长辈遵守妇道，仪容举止都要符合潮流。
    今晨我们父女就要离别，再见到你不知什么时候。 闲居时忧伤能自我排遣，临别感伤情绪一发难收。 回到家中看到孤单小女，悲哀泪水沿着帽带滚流。
