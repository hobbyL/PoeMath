- id: poem_core_109
  title: 杂诗
  author: 佚名
  dynasty: 唐
  is_required: true
  difficulty: 2
  content: '近寒食雨草萋萋，著麦苗风柳映堤。

    等是有家归未得，杜鹃休向耳边啼。

    '
  annotations:
  - word: "寒食"
    meaning: "节令名，在清明前一两日，旧俗禁火吃冷食"
  - word: "萋萋"
    meaning: "草木茂盛的样子"
  - word: "著"
    meaning: "附着；吹拂"
  - word: "等是"
    meaning: "同样是"
  - word: "杜鹃"
    meaning: "鸟名，啼声凄切，易触动乡思"
  translation: "时近寒食，细雨中春草萋萋；风吹麦苗，杨柳映着河堤。我同别人一样有家却不能回去，杜鹃啊，请不要再在我耳边凄厉地啼叫。"
  appreciation: "诗写寒食时节有家难归的羁旅之苦。前两句绘春雨、麦苗、堤柳，景色明媚；后两句陡转，以杜鹃啼血反衬思乡，含蓄而沉痛。"
  background: "唐人杂诗，写寒食前后的乡思，入选《唐诗三百首》。作者一说无名氏。"
  famous_lines:
