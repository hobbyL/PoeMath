  - word: 长安
    meaning: 今陕西省西安市
  - word: 络纬
    meaning: 昆虫名，又名莎鸡，俗称纺织娘
  - word: 金井阑
    meaning: 精美的井阑
  - word: 簟色寒
    meaning: 指竹席的凉意
  - word: 帷
    meaning: 窗帘
  translation: "长相思，在长安。络纬秋夜啼于金井栏边，微霜凄凄，竹席生寒。孤灯不明，相思欲绝，卷起帷帐望月空自长叹。美人如花，隔在云端！上有青冥长天，下有绿水波澜。天长路远，魂飞苦；梦魂也难越过关山。长相思，摧心肝！"
  appreciation: "李白乐府写相思。由秋夜孤灯写到美人隔云端，再以天长路远、梦魂难到收束，「长相思，摧心肝」回环有力。"
  background: "李白《长相思》其一，乐府旧题，写长安相思，一说寄托君臣遇合之感。"
  famous_lines:
  - 长相思，摧心肝！
  tags:
  - 唐诗三百首
  - 乐府
  - 思念
  - 伤怀
- id: poem_ext_179
