- id: poem_exp_535
  title: 淡黄柳·空城晓角
  author: 姜夔
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '客居合肥南城赤阑桥之西，巷陌凄凉，与江左异。

    唯柳色夹道，依依可怜。

    因度此阕，以纾客怀。

    空城晓角，吹入垂杨陌。

    马上单衣寒恻恻。

    看尽鹅黄嫩绿，都是江南旧相识。

    正岑寂，明朝又寒食。

    强携酒、小桥宅。

    怕梨花落尽成秋色。

    燕燕飞来，问春何在？

    唯有池塘自碧。

    '
