- id: poem_ext_139
  title: 江州重别薛六柳八二员外
  author: 刘长卿
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '生涯岂料承优诏，世事空知学醉歌。

    江上月明胡雁过，淮南木落楚山多。

    寄身且喜沧洲近，顾影无如白发何。

    今日龙钟人共弃，愧君犹遣慎风波。

