- id: poem_exp_576
  title: 荀巨伯探病友
  author: 刘义庆
  dynasty: 南北朝
  layer: explore
  is_required: false
  difficulty: 4
  content: '荀巨伯远看友人疾值胡贼攻郡，友人语巨伯曰：“吾今死矣，子可去。

    ”巨伯曰：“远来相视，子令吾去，败义以求生，岂荀巨伯所行邪？

    ”贼既至，谓巨伯曰：“大军至，一郡尽空，汝何男子，而敢独止？

    “巨伯曰：“友人有疾，不忍委之，宁以我身代友人命。

    ”贼相谓曰：“我辈无义之人，而入有义之国。

    ”遂班军而还，一郡并获全。

    '
