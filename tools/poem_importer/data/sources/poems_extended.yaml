- id: poem_ext_374
  title: 满庭芳·山抹微云
  author: 秦观
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 4
  content: '山抹微云，天连衰草，画角声断谯门。

    暂停征棹，聊共引离尊。

    多少蓬莱旧事，空回首、烟霭纷纷。

    斜阳外，寒鸦万点，流水绕孤村。

    销魂。

    当此际，香囊暗解，罗带轻分。

    谩赢得、青楼薄幸名存。

    此去何时见也，襟袖上、空惹啼痕。

    伤情处，高城望断，灯火已黄昏。

    '
  annotations:
  - word: 满庭芳
    meaning: 词牌名
  - word: 山抹微云
    meaning: 山上轻抹着微云
  - word: 天粘衰草
    meaning: 天际与枯草相接
  translation: "远山像一抹淡云，衰草连天，城头画角吹起归程。暂且停下远行的船，一起再饮一杯离别的酒。多少美好旧事，空自回首，只剩烟雾般的记忆。斜阳外，几只寒鸦，流水绕过孤村。就在这令人销魂的时刻，暗暗解下香囊，轻轻分开罗带。到头来只落得青楼里薄情的名声。这一走何时再见面？衣袖上徒留泪痕。伤心处，高城望断，灯火已是黄昏。"
  appreciation: "秦观写别情。起句「山抹微云」清丽，中幅叙事，结尾高城灯火，韵味悠长。"
