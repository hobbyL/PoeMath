- id: poem_ext_132
  title: 登柳州城楼寄漳汀封连四州
  author: 柳宗元
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '城上高楼接大荒，海天愁思正茫茫。

    惊风乱飐芙蓉水，密雨斜侵薜荔墙。

    岭树重遮千里目，江流曲似九回肠。

    共来百越文身地，犹自音书滞一乡。

    '
  annotations:
  - word: 接
    meaning: 连接
  - word: 一说，目接，看到大荒
    meaning: 旷远的广野
  - word: 惊风
    meaning: 急风
  - word: 乱飐
    meaning: 吹动
  - word: 芙蓉
    meaning: 指荷花
  translation: 从城上高楼远眺空旷的荒野，如茫茫海天般的愁思涌了出来。 急风胡乱地掀动水中的荷花，密雨斜打在长满薜荔的墙上。 山上的树重重遮住了远望的视线，江流曲折就像九转的回肠。 我们一起来到百越这个少数民族地区，虽然处于一地音书却阻滞难通。
  appreciation: 这首抒情诗，赋中有比，象中含兴，情景交融，凄楚动人。 全诗先从“登柳州城楼”写起。首句“城上高楼”，于“楼”前着一“高”字，立身愈高，所见愈远。作者长途跋涉，好容易才到柳州，却急不可耐地登上高处，为的是要遥望战友们的贬所，抒发难于明言的积愫。“接大荒”之“接”字，是说城上高楼与大荒相接，乃楼上人眼中所见。于是感物起兴，“海天愁思正茫茫”一句，即由此喷涌而出，展现在诗人眼前的是辽阔而荒凉的空间，望到极处，海天相连。而自己的茫茫“愁思”，也就充溢于辽阔无边的空间了。这么辽阔的境界和这么深广的情意，作者却似乎毫不费力地写入了这第一联，摄诗题之魂，并为以下的逐层抒写展开了宏大的画卷。
    第二联“惊风乱飐芙蓉水，密雨斜侵薜荔墙”，写的是近处所见。惟其是近景，见得真切，故写得细致。就描绘风急雨骤的景象而言，这是“赋”笔，而赋中又兼有比兴。屈原《离骚》有云：“制芰荷以为衣兮，集芙蓉以为裳。不吾知其亦已兮，苟余情其信芳。”又云：“擥木根以结茝兮，贯薜荔之落蕊；矫菌桂以纫蕙兮，索胡绳之纚纚。謇吾法大前修兮，非世俗之所服。”在这里，芙蓉与薜荔，正象征着人格的美好与芳洁。登城楼而望近处，从所见者中特意拈出芙蓉与薜荔，显然是它们在暴风雨中的情状使诗人。
