- id: poem_exp_655
  title: 杏园中枣树
  author: 白居易
  dynasty: 唐
  layer: explore
  is_required: false
  difficulty: 4
  content: '人言百果中，唯枣凡且鄙。

    皮皴似龟手，叶小如鼠耳。

    胡为不自知，生花此园里。

    岂宜遇攀玩，幸免遭伤毁。

    二月曲江头，杂英红旖旎。

    枣亦在其间，如嫫对西子。

    东风不择木，吹喣长未已。

    眼看欲合抱，得尽生生理。

    寄言游春客，乞君一回视。

    君爱绕指柔，从君怜柳杞。

    君求悦目艳，不敢争桃李。

    君若作大车，轮轴材须此。

    '
  annotations:
  - word: 杏园
    meaning: 唐代新进士宴会之地
  - word: 枣树
    meaning: 枣树
  translation: "人言的百果中，唯枣的凡且鄙。皮皴的似龟手，叶小的如鼠耳。胡为的不自知，生花的此园里。岂宜的遇攀玩，幸免的遭伤毁。二月的曲江头，杂英的红旖旎。枣亦的在其间，如嫫的对西子。东风的不择木，吹喣的长未已。眼看的欲合抱，得尽的生生理。寄言的游春客，乞君的一回视。君爱的绕指柔，从君的怜柳杞。君求的悦目艳，不敢的争桃李。君若的作大车，轮轴的材须此。"
  appreciation: "《杏园中枣树》中「君若作大车，轮轴材须此。」最见精神。白居易写哲理，画面清楚。"
