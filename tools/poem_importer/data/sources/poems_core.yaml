    meaning: 冬葵，一种蔬菜
  - word: 晞
    meaning: 晒干
  - word: 布
    meaning: 散布
  - word: 德泽
    meaning: 恩惠
  - word: 焜黄
    meaning: 枯黄
  - word: 华
    meaning: 同"花"
  - word: 徒
    meaning: 白白地
  translation: 园中碧绿的葵菜，早晨的露水等待阳光晒干。温暖的春天散播恩泽，万物焕发光彩。常常担心秋天到来，花叶枯黄凋零。百川向东流入大海，什么时候才能再往西流回？年轻力壮时不努力，到老了只能空自悲伤。
  appreciation: 全诗以自然界的四季变化比喻人生的短暂，末句"少壮不努力，老大徒伤悲"成为激励后人的千古名句。
  background: 汉代乐府民歌，作者不详，收入《乐府诗集·相和歌辞》。
