    meaning: 梁孝王在梁地大兴土木，以睢阳为中心，根据自然景色，修建了一个很大的花园，称东苑，也叫菟园，后人称为梁园
  - word: 茂陵
    meaning: 今陕西兴平县东北，以汉武帝陵墓而得名
