    meaning: 凋残，零落
  - word: 风流儒雅
    meaning: 指宋玉文采华丽潇洒，学养深厚渊博
  - word: 萧条”句
    meaning: 意谓自己虽与宋玉隔开几代，萧条之感却是相同
  - word: 故宅
    meaning: 江陵和归州 （秭归） 均有宋玉宅，此指秭归之宅
  - word: 空文藻
    meaning: 斯人已去，只有诗赋留传下来
  translation: 落叶飘零是深知宋玉的悲哀，他的风流儒雅堪当我的老师。 怅望千秋往事洒下同情泪水，身世同样凄凉可惜生不同时。 江山依旧故宅犹在空留文藻，云雨荒台难道真是荒唐梦思。 最可叹楚王宫殿早荡然无存，驾船人还指点遗迹让人生疑。
