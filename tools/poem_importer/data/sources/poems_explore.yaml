  layer: explore
  is_required: false
  difficulty: 4
  content: '柳带榆钱，又还过、清明寒食。

    天一笑、浦园罗绮，满城箫笛。

    花树得睛红欲染，远山过雨青如滴。

    问江南池馆有谁来？

    江南客。

    乌衣巷，今犹昔。

    乌衣事，今难觅。

