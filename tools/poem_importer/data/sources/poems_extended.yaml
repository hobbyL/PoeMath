- id: poem_ext_191
  title: 佳人
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '绝代有佳人，幽居在空谷。

    自云良家子，零落依草木。

    关中昔丧乱，兄弟遭杀戮。

    官高何足论，不得收骨肉。

    世情恶衰歇，万事随转烛。

    夫婿轻薄儿，新人美如玉。

    合昏尚知时，鸳鸯不独宿。

    但见新人笑，那闻旧人哭。

    在山泉水清，出山泉水浊。

    侍婢卖珠回，牵萝补茅屋。

    摘花不插发，采柏动盈掬。

    天寒翠袖薄，日暮倚修竹。

    '
  annotations:
  - word: 佳人
    meaning: 美好的女子
  - word: 零落
    meaning: 衰败凋零
  - word: 空谷
    meaning: 空旷的山谷
  - word: 幽居
    meaning: 隐居
  translation: 有位举世无双的美人，隐居在空旷的山谷中。 她说自己是高门府第的女子，飘零沦落到与草木相依。 过去关中一带遭遇战乱，家里的兄弟全被乱军杀戮。 官居高位又有什么用？自己兄弟的尸骨都无法收埋。 世俗人情都厌恶衰败的人家，万事就像随风而转的烛火。 丈夫是个轻薄子弟，抛弃了我又娶了个美丽如玉的新人。 合欢花尚且知道朝开夜合，鸳鸯鸟成双成对从不独宿。 丈夫只看见新人欢笑，哪里听得到旧人哭泣？
    泉水在山里是清澈的，出了山就浑浊了。 让侍女典卖珠宝维持生计，牵把青萝修补茅屋。 摘下来的花不愿插在头上，喜欢采折满把的柏枝。 天气寒冷，衣衫显得分外单薄，黄昏时分，独自倚在修长的竹子上。
