  - 五言古诗
- id: poem_ext_152
  title: 寻西山隐者不遇
  author: 丘为
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '绝顶一茅茨，直上三十里。

    扣关无僮仆，窥室唯案几。

    若非巾柴车，应是钓秋水。

    差池不相见，黾勉空仰止。

    草色新雨中，松声晚窗里。

    及兹契幽绝，自足荡心耳。

    虽无宾主意，颇得清净理。

    兴尽方下山，何必待之子。

    '
  annotations:
  - word: 茅茨
    meaning: 茅屋
  - word: 扣关
    meaning: 敲门
  - word: 僮仆
    meaning: 指书童
  - word: 唯案几
    meaning: 只有桌椅茶几，表明居室简陋
  - word: 巾柴车
    meaning: 指乘小车出游
  translation: "绝顶一座茅茨，直上三十里。敲门无僮仆，窥室只有案几。若不是驾着柴车，应是去秋水边垂钓。参差不相见，徒然仰慕。草色在新雨中，松声在晚窗里。到此契合幽绝，自足荡涤心耳。虽无宾主之意，却颇得清净之理。兴尽便下山，何必等待此人。"
  appreciation: "丘为寻隐者不遇。草色松声已足，结以兴尽下山，得《世说》访戴神理，高逸。"
  background: "丘为《寻西山隐者不遇》。"
  famous_lines:
  - 兴尽方下山，何必待之子。
  tags:
  - 唐诗三百首
  - 友情
  - 五言古诗
- id: poem_ext_153
  title: 晨诣超师院读禅经
  author: 柳宗元
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '汲井漱寒齿，清心拂尘服。

    闲持贝叶书，步出东斋读。

    真源了无取，妄迹世所逐。

    遗言冀可冥，缮性何由熟。

    道人庭宇静，苔色连深竹。

    日出雾露馀，青松如膏沐。

    澹然离言说，悟悦心自足。

    '
  annotations:
  - word: 汲
    meaning: 从井里取水
  - word: 拂
    meaning: 抖动
  - word: 东斋
    meaning: 指净土院的东斋房
  - word: 真源
    meaning: 指佛理“真如”之源，即佛家的真意
  - word: 了
    meaning: 懂得，明白
  translation: "打井水漱洗寒齿，清心拂去尘服。闲持贝叶经书，步出东斋去读。真源本无可取，虚妄事迹却为世人所追逐。遗言希望能默契，修性却如何臻熟？道人庭院清静，苔色连着深竹。日出雾露未散，青松如被膏沐。澹然无可言说，悟悦自足于心。"
  appreciation: "柳宗元贬永州读禅经。前写清心读经，中议论真妄，结以「澹然离言说，悟悦心自足」，贬谪中求安顿，理趣与景趣并存。"
  background: "柳宗元贬永州司马期间，晨至超师院读佛经而作。"
  famous_lines:
