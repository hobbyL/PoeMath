  - word: 移舟
    meaning: 划动小船
  - word: 泊
    meaning: 停船靠岸
  - word: 烟渚
    meaning: 雾气笼罩的江中小洲
  - word: 野旷
    meaning: 原野空旷
  - word: 天低树
    meaning: 天空低垂似乎比树还低
  translation: 把船停靠在烟雾迷蒙的江边小洲，日暮时分旅人的愁思又添几分。原野空旷天幕仿佛比树还低，江水清澈月亮映在水中好像近在身边。
  appreciation: 全诗以"新愁"起、以"月近人"结，把旅人孤寂的心境与旷野清幽的江景融为一体，是山水羁旅诗的名篇。
  background: 唐玄宗开元十八年（730）孟浩然离开家乡漫游吴越，途经建德江时所作。
  famous_lines:
  - 野旷天低树，江清月近人
  tags:
  - 羁旅
  - 山水
  - 五言绝句
  - 名篇
- id: poem_core_059
  title: 六月二十七日望湖楼醉书
  author: 苏轼
  dynasty: 宋
  grade: 6
  semester: 上
  textbook_unit: 语文六年级上·课文3
  is_required: true
  difficulty: 2
  content: '黑云翻墨未遮山，白雨跳珠乱入船。

    卷地风来忽吹散，望湖楼下水如天。

    '
  pinyin: 'hēi yún fān mò wèi zhē shān ， bái yǔ tiào zhū luàn rù chuán 。

    juǎn dì fēng lái hū chuī sàn ， wàng hú lóu xià shuǐ rú tiān 。

    '
  annotations:
  - word: 望湖楼
    meaning: 在杭州西湖边
  - word: 翻墨
    meaning: 打翻的墨汁，形容乌云
  - word: 白雨
    meaning: 白色的雨点
  - word: 跳珠
    meaning: 像跳动的珠子，形容雨点
  - word: 卷地风
    meaning: 从地上刮起的大风
  translation: 乌云像打翻的墨汁还未遮住远山，白亮的雨点像跳动的珠子乱纷纷落进船中。卷地而起的大风忽然把云雨吹散，望湖楼下的湖水又像天空一样澄澈。
  appreciation: 全诗以四个比喻描绘骤雨忽晴的景象："翻墨"、"跳珠"、"卷地风"、"水如天"，气势磅礴，色彩鲜明。
  background: 宋神宗熙宁五年（1072）六月，苏轼任杭州通判时游西湖遇雨所作组诗五首之一。
  famous_lines:
  - 黑云翻墨未遮山，白雨跳珠乱入船
  tags:
