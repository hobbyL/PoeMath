  - id: poem_ext_014
    title: 送别
    author: 王维
    dynasty: 唐
    layer: extended
    is_required: false
    difficulty: 2
    content: |
      山中相送罢，日暮掩柴扉。
      春草明年绿，王孙归不归？
    annotations:
      - {word: "掩", meaning: "关闭"}
      - {word: "柴扉", meaning: "柴门"}
      - {word: "王孙", meaning: "贵族的子孙，这里指送别的友人"}
    translation: >-
      在深山中送走了好友，夕阳落下把柴门半掩。 春草到明年催生新绿，朋友啊你能不能回还？
    appreciation: >-
      这首《山中送别》诗，不写离亭饯别的情景，而是匠心别运，选取了与一般送别诗全然不同的下笔着墨之点。 诗的首句“山中相送罢”，在一开头就告诉读者相送已罢，把送行时的话别场面、惜别情怀，用一个看似毫无感情色彩的“罢”字一笔带过。这里，从相送到送罢，跳越了一段时间。而次句从白昼送走行人一下子写到“日暮掩柴扉”，则又跳越了一段更长的时间。诗人在把生活接入诗篇时，剪去了在这段时间内送行者的所感所想，都当作暗场处理了。
    background: 入选《唐诗三百首》，由 yxcs/poems-db 原始数据整理。
    famous_lines: ["春草明年绿，王孙归不归"]
    tags: ["唐诗三百首", "送别", "友情", "五言绝句"]

  - id: poem_ext_015
    title: 问刘十九
    author: 白居易
    dynasty: 唐
    layer: extended
    is_required: false
    difficulty: 2
    content: |
      绿蚁新醅酒，红泥小火炉。
      晚来天欲雪，能饮一杯无？
    annotations:
      - {word: "绿蚁", meaning: "指浮在新酿的没有过滤的米酒上的绿色泡沫"}
      - {word: "醅", meaning: "酿造"}
      - {word: "绿蚁新醅酒", meaning: "酒是新酿的酒"}
      - {word: "雪", meaning: "下雪，这里作动词用"}
      - {word: "无", meaning: "表示疑问的语气词，相当于“么”或“吗”"}
    translation: >-
      新酿的米酒，色绿香浓；小小红泥炉，烧得殷红。 天快黑了，大雪将要来。能否共饮一杯？朋友！
    appreciation: >-
      刘十九是作者在江州时的朋友，作者另有《刘十九同宿》诗，说他是嵩阳处士。全诗寥寥二十字，没有深远寄托，没有华丽辞藻，字里行间却洋溢着热烈欢快的色调和温馨炽热的情谊，表现了温暖如春的诗情。 诗句的巧妙，首先是意象的精心选择和巧妙安排。全诗表情达意主要靠三个意象（新酒、火炉、暮雪）的组合来完成。“绿蚁新醅酒”，开门见山点出新酒，由于酒是新近酿好的，未经过滤，酒面泛起酒渣泡沫，颜色微绿，细小如蚁，故称“绿蚁”。
    background: 入选《唐诗三百首》，由 yxcs/poems-db 原始数据整理。
    famous_lines: ["晚来天欲雪，能饮一杯无"]
    tags: ["唐诗三百首", "饮酒", "生活", "友情", "五言绝句"]

  - id: poem_ext_016
    title: 哥舒歌
    author: 西鄙人
    dynasty: 唐
    layer: extended
    is_required: false
    difficulty: 2
    content: |
      北斗七星高，哥舒夜带刀。
      至今窥牧马，不敢过临洮。
    annotations:
      - {word: "哥舒", meaning: "指哥舒翰，是唐玄宗的大将，突厥族哥舒部的后裔"}
