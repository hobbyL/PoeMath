- id: poem_exp_086
  title: 芙蓉池作
  author: 曹丕
  dynasty: 魏晋
  layer: explore
  is_required: false
  difficulty: 4
  content: '乘辇夜行游，逍遥步西园。

    双渠相溉灌，嘉木绕通川。

    卑枝拂羽盖，修条摩苍天。

    惊风扶轮毂，飞鸟翔我前。

    丹霞夹明月，华星出云间。

    上天垂光采，五色一何鲜。

