- id: poem_ext_130
  title: 客至
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '舍南舍北皆春水，但见群鸥日日来。

    花径不曾缘客扫，蓬门今始为君开。

    盘飧市远无兼味，樽酒家贫只旧醅。

    肯与邻翁相对饮，隔篱呼取尽馀杯。(馀通：余)

    '
  annotations:
  - word: 舍
    meaning: 指家
  - word: 但见
    meaning: 只见
  - word: 蓬门
    meaning: 用蓬草编成的门户，以示房子的简陋
  - word: 市远
    meaning: 离市集远
  - word: 兼味
    meaning: 多种美味佳肴
  translation: 草堂的南北涨满了春水，只见鸥群日日结队飞来。 老夫不曾为客扫过花径，今天才为您扫，这柴门不曾为客开过，今天为您打开。 离市太远盘中没好菜肴，家底太薄只有陈酒招待。 若肯邀请隔壁的老翁一同对饮，隔着篱笆唤来喝尽余杯！
  appreciation: 这是一首洋溢着浓郁生活气息的纪事诗，表现诗人诚朴的性格和喜客的心情。作者自注：“喜崔明府相过”，简要说明了题意。 首联先从户外的景色着笔，点明客人来访的时间、地点和来访前夕作者的心境。“舍南舍北皆春水”，把绿水缭绕、春意荡漾的环境表现得十分秀丽可爱。这就是临江近水的成都草堂。“皆”字暗示出春江水势涨溢的情景，给人以江波浩渺、茫茫一片之感。群鸥，在古人笔下常常作水边隐士的伴侣，它们“日日”到来，点出环境清幽僻静，为作者的生活增添了隐逸的色彩。“但见”，含弦外之音：群鸥固然可爱，而不见其他的来访者，不是也过于单调么！作者就这样寓情于景，表现了他在闲逸的江村中的寂寞心情。这就为贯串全诗的喜客心情，巧妙地作了铺垫。
    颔联把笔触转向庭院，引出“客至”。作者采用与客谈话的口吻，增强了宾主接谈的生活实感。上句说，长满花草的庭院小路，还没有因为迎客打扫过。下句说，一向紧闭的家门，今天才第一次为你崔明府打开。寂寞之中，佳客临门，一向闲适恬淡的主人不由得喜出望外。这两句，前后映衬，情韵深厚。前句不仅说客不常来，还有主人不轻易延客意，今日“君”来，益见两人交情之深厚，使后面的酣畅欢快有了着落。后句的“今始为”又使前句之意显得更为超脱，补足了首联两。
