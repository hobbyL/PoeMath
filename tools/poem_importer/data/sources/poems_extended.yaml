- id: poem_ext_055
  title: 汉江临泛
  author: 王维
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '楚塞三湘接，荆门九派通。

    江流天地外，山色有无中。

    郡邑浮前浦，波澜动远空。

    襄阳好风日，留醉与山翁。

    '
  annotations:
