  tags:
  - 思乡
  - 诗经
  - 古诗词
- id: poem_exp_293
  title: 椒聊
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '椒聊之实，蕃衍盈升。

    彼其之子，硕大无朋。

    椒聊且，远条且。

    椒聊之实，蕃衍盈匊。

    彼其之子，硕大且笃。

    椒聊且，远条且。

