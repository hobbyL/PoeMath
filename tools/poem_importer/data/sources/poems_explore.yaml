- id: poem_exp_353
  title: 满庭芳·夏日溧水无想山作
  author: 周邦彦
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '风老莺雏，雨肥梅子，午阴嘉树清圆。

    地卑山近，衣润费炉烟。

    人静乌鸢自乐，小桥外、新绿溅溅。

    凭阑久，黄芦苦竹，拟泛九江船。

    年年。

    如社燕，飘流瀚海，来寄修椽。

    且莫思身外，长近尊前。

    憔悴江南倦客，不堪听、急管繁弦。

    歌筵畔，先安簟枕，容我醉时眠。

    '
