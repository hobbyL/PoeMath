name: poemath
description: "PoeMath (韵算) - 面向 6-12 岁儿童的诗词背诵与口算训练助手"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.6.1

  # 路由（Navigator 2.0 语义落地）
  go_router: ^14.6.2

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.5
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.4

  # 文本 / 语音 / 拼音
  lpinyin: ^2.0.3
  flutter_tts: ^4.2.0
  intl: ^0.20.0

  # UI / 渲染
  flutter_math_fork: ^0.7.3
  flutter_svg: ^2.0.16
  flutter_animate: ^4.5.2

  # 音效（Phase 5 使用，Phase 0 声明）
  audioplayers: ^6.1.0

  # 版本信息（运行时读取 tag 写入的版本号）
  package_info_plus: ^8.1.3

  # 网络请求 + 校验（应用内更新）
  http: ^1.2.2
  crypto: ^3.0.6

  cupertino_icons: ^1.0.8
  share_plus: ^12.0.2
  file_picker: ^11.0.2
  fl_chart: ^1.2.0

  # 本地通知（每日学习提醒）
  flutter_local_notifications: ^19.0.0
  flutter_timezone: ^5.1.0
  timezone: ^0.10.0
  sherpa_onnx: ^1.13.4
  record: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Hive 代码生成
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

  # 测试 mock
  mocktail: ^1.0.4

  # App 图标生成
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/icons/
    - assets/sounds/
    - assets/legal/
    - assets/models/sherpa_onnx_zh14m/
