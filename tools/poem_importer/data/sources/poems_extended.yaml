- id: poem_ext_124
  title: 咏怀古迹五首·其四
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '蜀主窥吴幸三峡，崩年亦在永安宫。

    翠华想像空山里，玉殿虚无野寺中。

    古庙杉松巢水鹤，岁时伏腊走村翁。

    武侯祠堂常邻近，一体君臣祭祀同。

    '
  annotations:
  - word: 蜀主
    meaning: 指刘备
  - word: 永安宫
    meaning: 在今四川省奉节县
  - word: 野寺
