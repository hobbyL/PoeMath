  - 名篇
- id: poem_core_066
  title: 竹石
  author: 郑燮
  dynasty: 清
  grade: 6
  semester: 下
  textbook_unit: 语文六年级下·古诗三首
  is_required: true
  difficulty: 3
  content: '咬定青山不放松，立根原在破岩中。

    千磨万击还坚劲，任尔东西南北风。

    '
  pinyin: 'yǎo dìng qīng shān bù fàng sōng ， lì gēn yuán zài pò yán zhōng 。

    qiān mó wàn jī hái jiān jìn ， rèn ěr dōng xī nán běi fēng 。

    '
  annotations:
  - word: 咬定
    meaning: 咬紧、抓住不放
  - word: 立根
    meaning: 扎根
  - word: 破岩
    meaning: 破裂的岩石
  - word: 坚劲
    meaning: 坚定强劲
  - word: 任尔
    meaning: 任凭你
  translation: 竹子紧紧咬定青山绝不放松，把根深深扎在破裂的岩石中。经受千万次的磨难打击依然坚韧挺立，任凭你东西南北的风怎样吹刮。
  appreciation: 借咏竹石以明志。四句以拟人手法赋予竹子刚劲的品格，"任尔东西南北风"表达出诗人不随波逐流、坚守气节的决心。
  background: 郑燮（郑板桥）题于自己所画竹石图上，反映其正直不阿的品格。
  famous_lines:
