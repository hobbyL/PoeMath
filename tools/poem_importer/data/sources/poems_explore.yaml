- id: poem_exp_287
  title: 返照
  author: 杜甫
  dynasty: 唐
  layer: explore
  is_required: false
  difficulty: 3
  content: '楚王宫北正黄昏，白帝城西过雨痕。

    返照入江翻石壁，归云拥树失山村。

    衰年肺病惟高枕，绝塞愁时早闭门。

    不可久留豺虎乱，南方实有未招魂。

    '
