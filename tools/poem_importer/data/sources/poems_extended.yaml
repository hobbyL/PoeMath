- id: poem_ext_121
  title: 咏怀古迹五首·其一
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '支离东北风尘际，漂泊西南天地间。

    三峡楼台淹日月，五溪衣服共云山。

    羯胡事主终无赖，词客哀时且未还。

    庾信平生最萧瑟，暮年诗赋动江关。

    '
  annotations:
  - word: 支离
    meaning: 流离
  - word: 风尘
    meaning: 指安史之乱以来的兵荒马乱
  - word: 楼台
    meaning: 指夔州地区的房屋依山而建，层迭而上，状如楼台
  - word: 淹
    meaning: 滞留
  - word: 日月
    meaning: 岁月，时光
  translation: "战乱中流离于东北，又漂泊在西南天地之间。三峡的楼台淹留日月，五溪的衣着与云山相伴。羯胡事主终究不可靠，词客感时哀伤却尚未还乡。庾信平生最为萧瑟，晚年诗赋震动江关。"
  appreciation: "杜甫咏怀古迹，以庾信自况：支离漂泊、暮年诗赋。前六句写自身乱世流离，结二句借古人寄慨，沉郁顿挫。"
  background: "大历年间杜甫寓居夔州，作《咏怀古迹》五首，此为第一首，咏庾信并自伤。"
  famous_lines:
  - 庾信平生最萧瑟，暮年诗赋动江关。
  tags:
  - 唐诗三百首
  - 怀古
  - 感叹
  - 七言律诗
- id: poem_ext_122
  title: 咏怀古迹五首·其二
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '摇落深知宋玉悲，风流儒雅亦吾师。

    怅望千秋一洒泪，萧条异代不同时。

    江山故宅空文藻，云雨荒台岂梦思。

    最是楚宫俱泯灭，舟人指点到今疑。

    '
  annotations:
  - word: 摇落
    meaning: 凋残，零落
  - word: 风流儒雅
    meaning: 指宋玉文采华丽潇洒，学养深厚渊博
  - word: 萧条”句
    meaning: 意谓自己虽与宋玉隔开几代，萧条之感却是相同
  - word: 故宅
    meaning: 江陵和归州 （秭归） 均有宋玉宅，此指秭归之宅
  - word: 空文藻
    meaning: 斯人已去，只有诗赋留传下来
  translation: "草木摇落，才深知宋玉的悲秋；他的风流儒雅，也是我的老师。怅望千秋，不禁一洒泪；萧条异代，可惜未能同时。江山间故宅空留文采，云雨荒台岂只是梦中之思。最可叹楚宫都已泯灭，船夫指点到如今仍存疑。"
  appreciation: "杜甫咏宋玉。以异代知音自许，结写楚宫泯灭、舟人指点，怀古中含身世萧条，沉郁顿挫。"
  background: "杜甫夔州《咏怀古迹》其二，咏宋玉并自伤不遇。"
  famous_lines:
  - 最是楚宫俱泯灭，舟人指点到今疑。
  tags:
  - 唐诗三百首
  - 怀古
  - 抒怀
  - 七言律诗
- id: poem_ext_123
  title: 咏怀古迹五首·其三
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '群山万壑赴荆门，生长明妃尚有村。

    一去紫台连朔漠，独留青冢向黄昏。

    画图省识春风面，环佩空归夜月魂。

    千载琵琶作胡语，分明怨恨曲中论。

    '
  annotations:
  - word: 群山万壑
    meaning: 许多山峦和峡谷
  - word: 明妃
    meaning: 王昭君
  - word: 紫台
    meaning: 帝王宫殿
  - word: 青冢
    meaning: 王昭君墓
  translation: "群山万壑奔赴荆门，明妃生长的村庄还在。一去紫台便连着北方沙漠，只留下青冢对着黄昏。画图里谁曾识得春风面，环佩空归，魂魄在月夜归来。千年以来琵琶弹着胡语，分明是在曲中诉说怨恨。"
  appreciation: "杜甫咏王昭君。「一去紫台连朔漠，独留青冢向黄昏」对仗工稳；「画图省识」「环佩空归」写尽千古遗恨，是咏昭君的经典。"
  background: "杜甫夔州《咏怀古迹》其三，过昭君村有感，咏王昭君。"
  famous_lines:
