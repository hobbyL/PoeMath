- id: poem_exp_517
  title: 安公子·弱柳丝千缕
  author: 袁去华
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '弱柳丝千缕。

    嫩黄匀遍鸦啼处。

    寒入罗衣春尚浅，过一番风雨。

    问燕子来时，绿水桥边路。

    曾画楼、见个人人否。

    料静掩云窗，尘满哀弦危柱。

    庾信愁如许。

    为谁都著眉端聚。

    独立东风弹泪眼，寄烟波东去。

    念永昼春闲，人倦如何度。

    闲傍枕、百啭黄鹂语。

    唤觉来厌厌，残照依然花坞。

    '
  annotations:
  - word: 安公子
    meaning: 词牌名
  - word: 弱柳
    meaning: 柔弱的柳条
  - word: 千缕
    meaning: 千条丝线
  translation: "弱柳丝千缕。嫩黄匀遍鸦啼之处。寒入罗衣春还浅，又过一番风雨。问燕子来时，绿水桥边路——曾在画楼见过那人吗？料想静掩云窗，尘满哀弦危柱。庾信的愁如此。为谁都聚在眉端。独立东风弹泪眼，寄给烟波东去。念永昼春闲，人倦如何度。闲傍着枕，黄鹂百啭。唤觉来恹恹，残照依然在花坞。"
  appreciation: "袁去华安公子。问燕见人否、残照花坞。"
  background: "宋袁去华《安公子》。"
