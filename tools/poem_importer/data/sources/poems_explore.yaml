  difficulty: 3
  content: '冬夜夜寒冰合井，画堂明月侵帏。

    青缸明灭照悲啼。

    青缸挑欲尽，粉泪裛还垂。

    未尽一尊先掩泪，歌声半带清悲。

    情声两尽莫相违。

    欲知肠断处，梁上暗尘飞。

    '
