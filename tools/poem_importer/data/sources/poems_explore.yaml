  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '匪风发兮，匪车偈兮。

    顾瞻周道，中心怛兮。

    匪风飘兮，匪车嘌兮。

    顾瞻周道，中心吊兮。

    谁能亨鱼？

    溉之釜鬵。

    谁将西归？

    怀之好音。

    '
