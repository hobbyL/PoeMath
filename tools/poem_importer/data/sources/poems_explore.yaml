  difficulty: 3
  content: '结交在相知，骨肉何必亲。

    甘言无忠实，世薄多苏秦。

    从风暂靡草，富贵上升天。

    不见山巅树，摧杌下为薪。

    岂甘井中泥？

    上出作埃尘。

    '
