- id: poem_ext_090
  title: 望洞庭湖赠张丞相
  author: 孟浩然
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '八月湖水平，涵虚混太清。

    气蒸云梦泽，波撼岳阳城。

    欲济无舟楫，端居耻圣明。

    坐观垂钓者，徒有羡鱼情。

    '
