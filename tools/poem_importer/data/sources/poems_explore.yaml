- id: poem_exp_269
  title: 承宫樵薪苦学
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '承宫，琅邪姑幕人。

    少孤，年八岁，为人牧猪。

    乡里徐子盛明《春秋》经，授诸生数百人。

    宫过其庐下，见诸生讲诵，好之，因忘其猪而听经。

    猪主怪其不还，寻之。

    见而欲笞之。

    门下生共禁，乃止，因留宫门下。

    樵薪执苦，数十年间，遂通其经。

