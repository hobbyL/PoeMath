- id: poem_ext_126
  title: 宿府
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '清秋幕府井梧寒，独宿江城蜡炬残。

    永夜角声悲自语，中天月色好谁看。

    风尘荏苒音书绝，关塞萧条行路难。

    已忍伶俜十年事，强移栖息一枝安。

    '
