- id: poem_core_053
  title: 稚子弄冰
  author: 杨万里
  dynasty: 宋
  grade: 5
  semester: 下
  textbook_unit: 语文五年级下·课文1
  is_required: true
  difficulty: 2
  content: '稚子金盆脱晓冰，彩丝穿取当银钲。

    敲成玉磬穿林响，忽作玻璃碎地声。

    '
  pinyin: 'zhì zǐ jīn pén tuō xiǎo bīng ， cǎi sī chuān qǔ dāng yín zhēng 。

    qiāo chéng yù qìng chuān lín xiǎng ， hū zuò bō lí suì dì shēng 。

    '
  annotations:
  - word: 稚子
    meaning: 幼小的孩子
  - word: 金盆
    meaning: 铜盆
  - word: 脱晓冰
    meaning: 早晨从盆里取出结成的冰块
  - word: 钲
    meaning: 一种铜制的乐器
  - word: 玉磬
    meaning: 玉制的打击乐器
  - word: 玻璃
    meaning: 古代指一种玉石
  translation: 清晨小孩把结在铜盆里的冰块脱出来，用彩色的丝线穿起来当作银钲敲打。敲出来的声音像玉磬一样穿过树林，忽然一下又像玉石落地般清脆碎裂。
  appreciation: 全诗以"脱"、"穿"、"敲"、"碎"四个动词层层递进，把孩童玩冰的欢快场景写得声色兼备、意趣盎然。
  background: 杨万里退居故乡时所作，反映他对乡村儿童生活的细致观察。
  famous_lines:
  - 敲成玉磬穿林响，忽作玻璃碎地声
  tags:
