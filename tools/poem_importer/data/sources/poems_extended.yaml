  - 五言律诗
- id: poem_ext_099
  title: 新年作
  author: 刘长卿
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '乡心新岁切，天畔独潸然。

    老至居人下，春归在客先。

    岭猿同旦暮，江柳共风烟。

    已似长沙傅，从今又几年。

    '
