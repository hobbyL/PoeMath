- id: poem_ext_111
  title: 无题·重帏深下莫愁堂
  author: 李商隐
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '重帏深下莫愁堂，卧后清宵细细长。

    神女生涯原是梦，小姑居处本无郎。

    风波不信菱枝弱，月露谁教桂叶香。

    直道相思了无益，未妨惆怅是清狂。

    '
  annotations:
  - word: 帏
    meaning: 帐子、幔幕
  - word: 神女
    meaning: 即宋玉《神女赋》中的巫山神女
  - word: 小姑句
    meaning: 古乐府《青溪小姑曲》：“小姑所居，独处无郎
  - word: 风波句
    meaning: 意谓菱枝虽是弱质，却不相信会任凭风波欺负
  - word: 直道
    meaning: 即使，就说
  translation: "重重帷幕深深垂下莫愁堂，睡下后清夜显得细细漫长。神女的生涯原是一场梦，小姑居住处本没有情郎。风波不信菱枝柔弱，月露谁让桂叶如此芳香。就算相思全无益处，也不妨让惆怅做成一场清狂。"
  appreciation: "李商隐无题。写深宵独处与相思无益，结句「未妨惆怅是清狂」自我开解又更见执着，情思深曲。"
  background: "李商隐无题诗之一，写相思与自解，具体本事难考。"
  famous_lines:
  - 直道相思了无益，未妨惆怅是清狂。
