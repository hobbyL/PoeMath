    meaning: 曲牌名
  - word: 立春
    meaning: 二十四节气之一
  - word: 东风
    meaning: 春风
  translation: "金钗影摇，春燕斜；树梢生春叶。水塘春始起波，火候春初热。土牛儿把春载到了。"
  appreciation: "贯云石立春。土牛载春。"
  background: "元贯云石《清江引·立春》。"
  famous_lines:
