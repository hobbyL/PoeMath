  - word: 襄水曲
    meaning: 在汉水的转弯处
  - word: 楚云端
    meaning: 长江中游一带云的尽头
  - word: 乡泪客中尽
    meaning: 思乡眼泪已流尽，客旅生活无比辛酸
  translation: "树叶落下，大雁南飞，北风使江上生寒。我家在襄水转弯处，远隔在楚云尽头。客中思乡的泪已流尽，只见孤帆消失在天际。想问迷津却无人可问，暮色中江海漫漫无边。"
  appreciation: "孟浩然写早寒思归。「乡泪客中尽，孤帆天际看」情景交融，收束迷津平海，惆怅无际。"
  background: "孟浩然漫游江上、早寒思乡时所作。"
  famous_lines:
