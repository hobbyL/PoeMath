  - word: 锦江
    meaning: 即濯锦江，流经成都的岷江支流
  - word: 来天地
    meaning: 与天地俱来
  - word: 玉垒浮云变古今
    meaning: 是说多变的政局和多难的人生，捉摸不定，有如山上浮云，古往今来一向如此
  - word: 玉垒
    meaning: 山名，在四川灌县西、成都西北
  translation: 登楼望春近看繁花游子越发伤心；万方多难愁思满腹我来此外登临。 锦江的春色从天地边际迎面扑来；从古到今玉垒山的浮云变幻莫测。 大唐的朝廷真像北极星不可动摇；吐蕃夷狄莫再前来骚扰徒劳入侵。 可叹刘后主那么昏庸还立庙祠祀；日暮时分我要学孔明聊作梁父吟。
