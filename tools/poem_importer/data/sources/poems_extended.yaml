- id: poem_ext_189
  title: 望月有感
  author: 白居易
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '自河南经乱，关内阻饥，兄弟离散，各在一处。因望月有感，聊书所怀，寄上浮梁大兄、於潜七兄、乌江十五兄，兼示符离及下邽弟妹。时难年荒世业空，弟兄羁旅各西东。

    田园寥落干戈后，骨肉流离道路中。

    吊影分为千里雁，辞根散作九秋蓬。

    共看明月应垂泪，一夜乡心五处同。

    '
