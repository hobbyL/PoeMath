- id: poem_exp_175
  title: 夜飞鹊·河桥送人处
  author: 周邦彦
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '河桥送人处，凉夜何其。

    斜月远堕余辉。

    铜盘烛泪已流尽，霏霏凉露沾衣。

    相将散离会，探风前津鼓，树杪参旗。

    华骢会意，纵扬鞭、亦自行迟。

    迢递路回清野，人语渐无闻，空带愁归。

    何意重红满地，遗钿不见，斜迳都迷。

    兔葵燕麦，向残阳、欲与人齐。

    但徘徊班草，欷歔酹酒，极望天西。

    '
