- id: poem_exp_295
  title: 秦风·无衣
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '岂曰无衣？

    与子同袍。

    王于兴师，修我戈矛。

    与子同仇！

    岂曰无衣？

    与子同泽。

    王于兴师，修我矛戟。

    与子偕作！

    岂曰无衣？

    与子同裳。

    王于兴师，修我甲兵。

    与子偕行！

    '
