- id: poem_exp_588
  title: 秋日鲁郡尧祠亭上宴别杜补阙范侍御
  author: 李白
  dynasty: 唐
  layer: explore
  is_required: false
  difficulty: 4
  content: '我觉秋兴逸，谁云秋兴悲？

