- id: poem_ext_243
  title: 如梦令·常记溪亭日暮
  author: 李清照
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 3
  content: '常记溪亭日暮，沉醉不知归路。

    兴尽晚回舟，误入藕花深处。

    争渡，争渡，惊起一滩鸥鹭。

    '
  annotations:
  - word: 如梦令
    meaning: 词牌名
  - word: 溪亭
    meaning: 溪边的亭子
  - word: 日暮
    meaning: 傍晚
  - word: 沉醉
    meaning: 沉迷于酒中
  - word: 藕花
    meaning: 荷花
  - word: 鸥鹭
    meaning: 水鸟
  translation: 曾记得一次溪亭饮酒到日暮，喝得大醉回家找不着了道路。 兴尽之后很晚才往回划船，却不小心进入了荷花深处。 怎么渡，怎么渡？（最终）惊起水边满滩鸥鹭。
  appreciation: 现存李清照《如梦令》词有两首，都是记游赏之作，都写了酒醉、花美，清新别致。“常记”两句起笔平淡，自然和谐，把读者自然而然地引到了她所创造的词境 。“常记”明确表示追述，地点在“溪亭 ”，时间是“日暮 ”，作者饮宴以后 ，已经醉得连回去的路径都辨识不出了。“ 沉醉”二字却露了作者心底的欢愉 ，“不知归路”也曲折传出作者流连忘返的情致，看起来，这是一次给作者留下了深刻印象的十分愉快的游赏。果然，接写的“兴尽”两句，就把这种意兴递进了一层，兴尽方才回舟，那么，兴未尽呢？恰恰表明兴致之高，不想回舟。而“误入”一句，行文流畅自然，毫无斧凿痕迹，同前面的“不知归路”相呼应，显示了主人公的忘情心态。盛放的荷花丛中正有一叶扁舟摇荡。舟上是游兴未尽的少年才女，这样的美景，一下子跃然纸上，呼之欲出。
    一连两个“争渡 ”，表达了主人公急于从迷途中找寻出路的焦灼心情。正是由于“ 争渡”，所以又“惊起一滩鸥鹭”，把停栖在洲渚上的水鸟都吓飞了。至此，词戛然而止，言尽而意未尽，耐人寻味。 这首小令用词简练，只选取了几个片断，把移动着的风景和作者怡然的心情融合在一起，写出了作者青春年少时的好心情，让人不由想随她一道荷丛荡舟，沉醉不归。正所谓“少年情怀自是得。
