  - word: 远眺
    meaning: 向远处看
  - word: 夕阳
    meaning: 落日
  translation: "古台草木摇落之后，秋日生出望乡之心。野寺来人少，云峰隔水显得更深。夕阳照着旧垒，寒磬声满空林。惆怅南朝旧事，唯有长江独流到今。"
  appreciation: "刘长卿秋日登台。野寺寒磬、夕阳旧垒写兴亡，结以长江独至今，吊古与望乡合一。"
  background: "刘长卿秋日登扬州一带吴公台远眺而作。"
  famous_lines:
