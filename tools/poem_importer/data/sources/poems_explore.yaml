- id: poem_exp_304
  title: 小雅·鼓钟
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '鼓钟将将，淮水汤汤，忧心且伤。

    淑人君子，怀允不忘。

    鼓钟喈喈，淮水湝湝，忧心且悲。

    淑人君子，其德不回。

    鼓钟伐鼛，淮有三洲，忧心且妯。

    淑人君子，其德不犹。

    鼓钟钦钦，鼓瑟鼓琴，笙磬同音。

    以雅以南，以籥不僭。

    '
