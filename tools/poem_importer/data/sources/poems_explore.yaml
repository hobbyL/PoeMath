- id: poem_exp_301
  title: 鸱鸮
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '鸱鸮鸱鸮，既取我子，无毁我室。

    恩斯勤斯，鬻子之闵斯。

    迨天之未阴雨，彻彼桑土，绸缪牖户。

    今女下民，或敢侮予？

    予手拮据，予所捋荼。

    予所蓄租，予口卒瘏，曰予未有室家。

    予羽谯谯，予尾翛翛，予室翘翘。

    风雨所漂摇，予维音哓哓！

    '
  annotations:
  - word: 鸱鸮
    meaning: 猫头鹰
  - word: 既取
    meaning: 已经夺取
  - word: 子
    meaning: 孩子
  translation: "猫头鹰啊猫头鹰，你已夺走我的孩子，不要再毁我的窝。恩爱勤劳，养育孩子真可怜。趁天还没阴雨，取那桑根皮，缠好门窗。现在你们下民，谁敢欺侮我？……"
  appreciation: "《诗经·豳风·鸱鸮》。禽言诗，写护巢育子，周公东征之喻说。"
  background: "《诗经·豳风·鸱鸮》。"
  famous_lines:
  - 风雨所漂摇，予维音哓哓！
  tags:
