  - word: 井梧
    meaning: 梧桐
  - word: 永夜”句
    meaning: 意谓长夜中唯闻号角声像在自作悲语
  - word: 永夜
    meaning: 整夜
  - word: 自语
    meaning: 自言自语
  translation: 井畔梧桐在秋夜的风中抖动，只有蜡烛残光照着孤单的我。 长夜里号角声悲壮似在自语，天空中的月色虽好谁与我共赏。 光阴荏苒哪里寻觅亲人音信？关塞一片萧条寻找归路艰难。 我已忍受十年的飘零生活，把家安在这里不过勉强栖身。
