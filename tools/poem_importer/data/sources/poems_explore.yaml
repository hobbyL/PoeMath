- id: poem_exp_300
  title: 下泉
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '冽彼下泉，浸彼苞稂。

    忾我寤叹，念彼周京。

    冽彼下泉，浸彼苞萧。

    忾我寤叹，念彼京周。

    冽彼下泉，浸彼苞蓍。

    忾我寤叹，念彼京师。

    芃芃黍苗，阴雨膏之。

    四国有王，郇伯劳之。

    '
  annotations:
