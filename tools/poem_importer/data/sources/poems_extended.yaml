- id: poem_ext_074
  title: 蝉
  author: 李商隐
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '本以高难饱，徒劳恨费声。

    五更疏欲断，一树碧无情。

    薄宦梗犹泛，故园芜已平。

    烦君最相警，我亦举家清。

    '
  annotations:
  - word: 以
    meaning: 因
  - word: 薄宦
    meaning: 指官职卑微
  - word: 高难饱
    meaning: 古人认为蝉栖于高处，餐风饮露，故说“高难饱”
  - word: 恨费声
    meaning: 因恨而连声悲鸣
  - word: 五更
    meaning: 中国古代把夜晚分成五个时段，用鼓打更报时，所以叫“五更”
  translation: 你栖身高枝之上才难以饱腹，悲鸣传恨无人理会白费其声。 五更以后疏落之声几近断绝，满树碧绿依然如故毫不动情。 我官职卑下像桃梗漂流不定，家园长期荒芜杂草早已长平。 烦劳你的鸣叫让我能够警醒，我是一贫如洗全家水一样清。
  appreciation: 本以高难饱，徒劳恨费声 蝉本来就因栖息于高枝，难得一饱；它鸣叫不停，却不受理睬，真是白白辛苦，怨恨无穷啊。“以”，因。古人误以为蝉餐风饮露，所以说“高难饱”。“费声”，指鸣声频频。 就真实情况而言，蝉并非是因身在高处，不肯飞下来乞食而“难饱”；它的鸣叫声中也没有什么恨意，这完全是诗人自己的理解与感受，是其身世之感的寄托。“高”，语义双关，喻指人的品格高洁。 诗人自许清高，不肯屈就，结果只落得生活困顿，这不就是“高难饱”吗？
