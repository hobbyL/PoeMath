- id: poem_ext_113
  title: 无题·相见时难别亦难
  author: 李商隐
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '相见时难别亦难，东风无力百花残。

    春蚕到死丝方尽，蜡炬成灰泪始干。

    晓镜但愁云鬓改，夜吟应觉月光寒。

    蓬山此去无多路，青鸟殷勤为探看。

    '
  annotations:
  - word: 东风无力百花残
    meaning: 这里指百花凋谢的暮春时节
  - word: 丝方尽
    meaning: 丝，与“思”谐音，以“丝”喻“思”，含相思之意
  - word: 蜡炬
    meaning: 蜡烛
  - word: 泪始干
    meaning: 泪，指燃烧时的蜡烛油，这里取双关义，指相思的眼泪
  - word: 晓镜
    meaning: 早晨梳妆照镜子
  translation: "相见本就很难，离别更加难；东风无力，百花凋残。春蚕到死丝才吐尽，蜡烛成灰泪才流干。清晨对镜只愁云鬓改色，夜里吟诗该感到月光清寒。蓬莱仙山离此并不远，愿青鸟殷勤为我去探看。"
