- id: poem_exp_552
  title: 殿前欢·大都西山
  author: 唐毅夫
  dynasty: 元
  layer: explore
  is_required: false
  difficulty: 3
  content: '冷云间，夕阳楼外数峰闲。

    等闲不许俗人看，雨髻烟鬟。

    倚西风十二阑，休长叹。

    不多时暮霭风吹散，西山看我，我看西山。

    '
