  translation: "燕地的春草细如碧丝，秦地的桑树已低垂绿枝。当你正想着归家的日子，正是我肝肠寸断之时。春风啊，你本不认识我，为什么要吹入我的罗帏？"
  appreciation: "李白写思妇。以燕草秦桑写两地春色，结句迁怒春风，娇嗔中见相思之深，五言清丽。"
  background: "李白思妇诗，写春日闺中怀远，一说作于长安时期。"
