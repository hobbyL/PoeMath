- id: poem_ext_247
  title: 南歌子·天上星河转
  author: 李清照
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 3
  content: '天上星河转，人间帘幕垂。凉生枕簟泪痕滋。起解罗衣聊问、夜何其。

    翠贴莲蓬小，金销藕叶稀。旧时天气旧时衣。只有情怀不似、旧家时。

    '
  annotations:
  - word: 星河
    meaning: 银河，到秋天转向东南
  - word: 枕簟
    meaning: 枕头和竹席
  - word: 滋
    meaning: 增益，加多
  - word: 夜何其
    meaning: 《诗经·小雅·庭燎》“夜如何其？夜未央
  - word: 翠贴、金销
    meaning: 即贴翠、销金，均为服饰工艺
  translation: 天空中银河不断转动、星移斗转，人世间的帘幕却一动不动的低低下垂。枕席变凉，泪水更多的流淌，一片湿滋滋。和衣而睡，醒来脱去绸缎外衣，随即问道：“夜已到何时？” 这件穿了多年的罗衣，用青绿色的丝线绣成的莲蓬已经变小；用金线绣制的荷叶颜色减退、变得单薄而稀疏。每逢秋凉，还总是还上这件罗衣。唯独人的心情不像从前舒畅适时。
  appreciation: 这首《南歌子》所作年代不详，但从抒发国破家亡之恨来看，似为流落江南后所作。 “天上星河转，人间帘幕垂”，以对句作景语起，但非寻常景象，而有深情熔铸其中。“星河转”谓银河转动，一“转”字说明时间流动，而且是颇长的一个跨度；人能关心至此，则其中夜无眠可知。“帘幕垂”言闺房中密帘遮护。帘幕“垂”而已，此中人情事如何，尚未可知。“星河转”而冠以“天上”，是寻常言语，“帘幕垂”表说是“人间”的，却显不同寻常。“天上、人间”对举，就有“人天远隔”的含意，分量顿时沉重起来，似乎其中有沉哀欲诉，词一起笔就先声夺人。此词直述夫妻死别之悲怆，字面上虽似平静无波，内中则暗流汹涌。
    前两句蓄势“凉生枕簟泪痕滋”一句。至直泻无余。枕簟生凉，不单是说秋夜天气，而是将孤寂凄苦之情移于物象。“泪痕滋”，所谓“悲从中来，不可断绝”，至此不得不悲哀暂歇，人亦劳瘁。“起解罗衣聊问夜何其”，原本是和衣而卧，到此解衣欲睡。但要睡的时间已经是很晚了，开首的“星河转”已有暗示，这里“聊问夜何其”更明言之。“夜何其”，其（jī），语助辞。“夜何其”出自《诗经·小雅·庭燎》“夜如何其？夜未央（半）；夜如何其？夜绣（向）晨”，意思是夜深沉已近清晨。“聊问”是自己心下估量，此句。
  background: 入选《宋词精选》，由 yxcs/poems-db 原始数据整理。
