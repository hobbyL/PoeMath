- id: poem_ext_350
  title: 饮酒·其五
  author: 陶渊明
  dynasty: 魏晋
  layer: extended
  is_required: false
  difficulty: 3
  content: '结庐在人境，而无车马喧。

    问君何能尔？

    心远地自偏。

    采菊东篱下，悠然见南山。

    山气日夕佳，飞鸟相与还。

    此中有真意，欲辨已忘言。

    '
