  translation: 楚江笼罩在细细微雨里，建业城正敲响暮钟之时。 雨丝繁密船帆显得沉重，天色错暗鸟儿飞得迟缓。 长江流入海门深远不见，江边树木饱含雨滴润滋。 送别老朋友我情深无限，沾襟泪水象江面的雨丝。
  appreciation: 这是一首送别诗。李胄，一作李曹，又作李渭，其人，其事，以及他与韦应物的关系，似已无考；从此诗看，想必两人的交谊颇深。诗中的“楚江”、“建业”，是送别之地。长江自三峡以下至濡须口（在今安徽省境内），古属楚地，所以叫楚江。建业，原名秣陵，三国时吴主孙权迁都于此，改称建业，旧城在今南京市南。 这是一首咏暮雨的送别诗。虽是微雨，却下得密，以致船帆涨饱了，鸟飞缓慢了。首联写送别之地，扣紧“雨”、“暮”主题。二、三两联渲染迷?暗淡景色；
