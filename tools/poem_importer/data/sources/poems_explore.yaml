  - id: poem_exp_399
    title: 沁园春·雪
    author: 毛泽东
    dynasty: 近代
    layer: explore
    is_required: false
    difficulty: 4
    content: |
      北国风光，千里冰封，万里雪飘。
      望长城内外，惟余莽莽；大河上下，顿失滔滔。
      山舞银蛇，原驰蜡象，欲与天公试比高。
      须晴日，看红装素裹，分外妖娆。
      江山如此多娇，引无数英雄竞折腰。
      惜秦皇汉武，略输文采；唐宗宋祖，稍逊风骚。
      一代天骄，成吉思汗，只识弯弓射大雕。
      俱往矣，数风流人物，还看今朝。
    annotations:
      - {word: "北国", meaning: "该词源于中国古代的分裂时期，如宋称辽、金为北国，东晋称十六国等为北国，南北朝时代南方的各朝代称在北方与之对抗的各朝代为北国等"}
      - {word: "雪", meaning: "这首词作于红一方面军一九三六年二月由陕北准备东渡黄河进入山西省西部的时候"}
      - {word: "馀", meaning: "剩下"}
      - {word: "莽莽", meaning: "无边无际"}
      - {word: "大河上下", meaning: "大河，指黄河"}
    translation: >-
      北方的风光，千万里冰封冻，千万里雪花飘。
