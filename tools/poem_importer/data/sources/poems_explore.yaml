- id: poem_exp_374
  title: 水调歌头·冒大风渡沙子
  author: 李处全
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '落日暝云合，客子意如何。

    定知今日，封六巽二弄干戈。

    四望际天空阔，一叶凌涛掀舞，壮志未消磨。

    为向吴儿道，听我扣舷歌。

    我常欲，利剑戟，斩蛟鼍。

    胡尘未扫，指挥壮士挽天河。

    谁料半生忧患，成就如今老态，白发逐年多。

    对此貌无恐，心亦畏风波。

    '
