  - word: 双双燕
    meaning: 词牌名
  - word: 咏燕
    meaning: 歌咏燕子
  translation: "过了春社，穿过帘幕中间，去年的尘已冷。参差想住下，试入旧巢相并。还打量雕梁藻井。又软语商量不定。飘然快拂花梢，翠尾分开红影。芳径。芹泥雨润。爱贴地争飞，竞夸轻俊。红楼归晚，看足柳昏花暝。应自栖香正稳。便忘了天涯芳信。愁损翠黛双蛾，日日画阑独凭。"
  appreciation: "史达祖咏燕名篇。软语商量、翠尾红影写燕态入神；结以忘芳信、画阑独凭，由燕及人，细密浑成。"
  background: "南宋史达祖《双双燕·咏燕》。"
  famous_lines:
  - 愁损翠黛双蛾，日日画阑独凭。
