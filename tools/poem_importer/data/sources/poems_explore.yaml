- id: poem_exp_543
  title: 双双燕·咏燕
  author: 史达祖
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '过春社了，度帘幕中间，去年尘冷。

    差池欲住，试入旧巢相并。

    还相雕梁藻井。

    又软语、商量不定。

    飘然快拂花梢，翠尾分开红影。

    芳径。

    芹泥雨润。

    爱贴地争飞，竞夸轻俊。

    红楼归晚，看足柳昏花暝。

    应自栖香正稳。

    便忘了、天涯芳信。

    愁损翠黛双蛾，日日画阑独凭。

    '
