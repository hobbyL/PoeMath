- id: poem_ext_165
  title: 金陵酒肆留别
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '风吹柳花满店香，吴姬压酒唤客尝。

    金陵子弟来相送，欲行不行各尽觞。

    请君试问东流水，别意与之谁短长。

    '
  annotations:
  - word: 金陵
    meaning: 今南京
  - word: 酒肆
    meaning: 酒店
  - word: 留别
    meaning: 临行前的告别
  - word: 风吹柳花
    meaning: 春天柳絮飘飞
  translation: 春风吹起柳絮，酒店满屋飘香，侍女捧出美酒，劝我细细品尝。 金陵年轻朋友，纷纷赶来相送。欲走还留之间，各自畅饮悲欢。 请你问问东流江水，别情与流水，哪个更为长远？
  appreciation: 柳絮飘飞的时节，江南水村山郭的一家小酒店里，即将离开金陵的诗人，满怀别绪。骀荡的春风，卷起了垂垂欲下的杨花，轻飞乱舞，扑满店中；当垆的姑娘，捧出新压榨出来的美酒，劝客品尝。这里，柳絮濛濛，酒香郁郁，扑鼻而来，也不知是酒香，还是花香。这么一幅令人陶醉的春光春色的画面，该用许多笔墨来表现。此诗只“风吹柳花满店香”七字，就将风光的骀荡，柳絮的精神，以及酒客沉醉东风的情调，生动自然地浮现在纸面之上；而且又极洒脱超逸，不费半分气力，脱口而出，纯任直观，于此，充分显示了李白的才华。
    “风吹柳花满店香，吴姬压酒劝客尝。” 和风吹着柳絮，酒店里溢满芳香；吴姬捧出新压的美酒，劝客品尝。“金陵”，点明地属江南，“柳花”，说明时当暮春。这是柳烟迷蒙、春风沉醉的江南三月，诗人一走进店里，沁人心脾的香气就扑面而来。这一“香”字，把店内店外连成一片。金陵古属吴地，遂称当地女子为“吴姬”，这里指酒家女。她满面春风，一边压酒（即压酒糟取酒汁），一边笑语殷勤地招呼客人。置身其间，真是如沐春风，令人陶醉，让人迷恋。
    这两句写出了浓浓的江南味道，虽然未明写店外，而店外“杂花生树，群莺乱飞”，杨柳含烟的芳菲世界，已依稀可见。此时，无论是诗人还是读者，视觉、嗅觉、听。
