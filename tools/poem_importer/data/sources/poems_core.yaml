  - 喜悦
  - 七言律诗
  - 名篇
- id: poem_core_058
  title: 宿建德江
  author: 孟浩然
  dynasty: 唐
  grade: 6
  semester: 上
  textbook_unit: 语文六年级上·课文3
  is_required: true
  difficulty: 2
  content: '移舟泊烟渚，日暮客愁新。

    野旷天低树，江清月近人。

    '
  pinyin: 'yí zhōu bó yān zhǔ ， rì mù kè chóu xīn 。

