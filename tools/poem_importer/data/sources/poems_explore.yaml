- id: poem_exp_396
  title: 念奴娇·我来牛渚
  author: 吴渊
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '我来牛渚，聊登眺、客里襟怀如豁。

    谁著危亭当此处，占断古今愁绝。

    江势鲸奔，山形虎踞，天险非人设。

    向来舟舰，曾扫百万胡羯。

    追念照水然犀，男儿当似此，英碓豪杰。

    岁月匆匆留不住，鬓已星星堪镊。

    云暗江天，烟昏淮地，是断魂时节。

    栏干捶碎，酒狂忠愤俱发。

    '
