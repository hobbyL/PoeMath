- id: poem_ext_092
  title: 淮上喜会梁川故人
  author: 韦应物
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '江汉曾为客，相逢每醉还。

    浮云一别后，流水十年间。

    欢笑情如旧，萧疏鬓已斑。

    何因不归去？淮上有秋山。

    '
