- id: poem_ext_103
  title: 阙题
  author: 刘昚虚
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '道由白云尽，春与青溪长。

    时有落花至，远随流水香。

    闲门向山路，深柳读书堂。

    幽映每白日，清辉照衣裳。

    '
  annotations:
  - word: 阙题
    meaning: 原题缺失
  - word: 道
    meaning: 山中小路
  - word: 幽期
    meaning: 隐居的约定
  translation: "道路从白云尽处延伸，春色与青溪一样长。时时有落花漂来，远远随着流水生香。闲门对着山路，深柳里是读书堂。幽光每在白日里映照，清辉洒在衣裳上。"
  appreciation: "刘眘虚写山居读书。「时有落花至，远随流水香」清丽；闲门深柳、清辉照衣，是盛唐隐逸写景名篇。"
  background: "刘眘虚《阙题》，写山中书堂春景，原题已失。"
  famous_lines:
