  translation: 中年以后存有较浓的好道之心，直到晚年才安家于终南山边陲。 兴趣浓时常常独来独往去游玩，有快乐的事自我欣赏自我陶醉。 间或走到水的尽头去寻求源流，间或坐看上升的云雾千变万化。 偶然在林间遇见个把乡村父老，偶与他谈笑聊天每每忘了还家。
  appreciation: 开头两句：“中岁颇好道，晚家南山陲。”叙述诗人中年以后即厌尘俗，而信奉佛教。“晚”是晚年；“南山陲”指辋川别墅所在地。此处原为宋之问别墅，王维得到这个地方后，完全被那里秀丽、寂静的田园山水陶醉了。他在《山中与裴秀才迪书》的信中说：“足下方温经，猥不敢相烦。辄便往山中，憩感兴寺，与山僧饭讫而去。北涉玄灞，清月映郭；夜登华子冈，辋水沦涟，与月上下。寒山远火，明灭林外；深巷寒犬，吠声如豹；村墟夜舂，复与疏钟相间。
