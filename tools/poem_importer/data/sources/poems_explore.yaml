- id: poem_exp_411
  title: 水龙吟·次歆林圣予惜春
  author: 晁补之
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '问春何苦匆匆，带风伴雨如驰骤。

    幽葩细萼，小园低槛，壅培未就。

    吹尽繁红，占春长久，不如垂柳。

    算春长不老，人愁春老，愁只是、人间有。

    春恨十常八九，忍轻孤、芳醪经口。

    那知自是，桃花结子，不因春瘦。

    世上功名，老来风味，春归时候。

    纵樽前痛饮，狂歌似旧，情难依旧。

    '
