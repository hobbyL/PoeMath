- id: poem_exp_229
  title: 洛桥寒食日作十韵
  author: 白居易
  dynasty: 唐
  layer: explore
  is_required: false
  difficulty: 4
  content: '上苑风烟好，中桥道路平。

    蹴球尘不起，泼火雨新晴。

    宿醉头仍重，晨游眼乍明。

    老慵虽省事，春诱尚多情。

    遇客踟蹰立，寻花取次行。

    连钱嚼金勒，凿落写银罂。

    府酝伤教送，官娃岂要迎。

    舞腰那及柳，歌舌不如莺。

    乡国真堪恋，光阴可合轻。

    三年遇寒食，尽在洛阳城。

    '
