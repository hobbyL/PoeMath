- id: poem_exp_302
  title: 小雅·四牡
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '四牡騑騑，周道倭迟。

    岂不怀归？

    王事靡盬，我心伤悲。

    四牡騑騑，啴啴骆马。

    岂不怀归？

    王事靡盬，不遑启处。

    翩翩者鵻，载飞载下，集于苞栩。

    王事靡盬，不遑将父。

    翩翩者鵻，载飞载止，集于苞杞。

    王事靡盬，不遑将母。

    驾彼四骆，载骤骎骎。

    岂不怀归？

    是用作歌，将母来谂。

    '
  annotations:
  - word: 四牡
    meaning: 四匹公马
  - word: 周道
    meaning: 大路
  - word: 靡盬
    meaning: 没有止息
  translation: "四牡騑騑，周道倭迟。难道不怀归？。王事靡盬，我心伤悲。四牡騑騑，啴啴骆马。难道不怀归？。王事靡盬，不遑启处。翩翩者鵻，载飞载下，集于苞栩。王事靡盬，不遑将父。翩翩者鵻，载飞载止，集于苞杞。王事靡盬，不遑将母。驾彼四骆，载骤骎骎。难道不怀归？。是用作歌，将母来谂。"
