- id: poem_exp_574
  title: 陈太丘与友期
  author: 刘义庆
  dynasty: 南北朝
  layer: explore
  is_required: false
  difficulty: 4
  content: '陈太丘与友期行，期日中，过中不至，太丘舍去，去后乃至。

    元方时年七岁，门外戏。

    客问元方：“尊君在不？

    ”答曰：“待君久不至，已去。

    ”友人便怒：“非人哉！

    与人期行，相委而去。

    ”元方曰：“君与家君期日中。

    日中不至，则是无信；对子骂父，则是无礼。

    ”友人惭，下车引之，元方入门不顾。

    '
  annotations:
  - word: 陈太丘
    meaning: 陈寔，曾任太丘长
  - word: 期
    meaning: 约定
  - word: 友
    meaning: 朋友
  translation: "陈太丘与友人约定同行，约在正午，过了正午友人不至，太丘便离去，离去后友人才到。元方当时七岁，在门外玩耍。客人问元方：「令尊在吗？」答：「等您很久不来，已经走了。」友人便怒：「真不是人！与人约行，却丢下人家自己走。」元方说：「您与家父约在正午，正午不至，是不守信；对着孩子骂他父亲，是无礼。」友人惭愧，下车拉他，元方头也不回走进门去。"
  appreciation: "《世说新语》陈太丘与友期。元方责友人无信无礼，是蒙学诚信故事。"
