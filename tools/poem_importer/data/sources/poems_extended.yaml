- id: poem_ext_408
  title: 瑞鹤仙·郊原初过雨
  author: 袁去华
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 4
  content: '郊原初过雨。

    见败叶零乱，风定犹舞。

    斜阳挂深树。

    映浓愁浅黛，遥山眉妩。

    来时旧路。

    尚岩花、娇黄半吐。

    到而今，唯有溪边流水，见人如故。

    无语。

    邮亭深静，下马还寻，旧曾题处。

    无聊倦旅。

    伤离恨，最愁苦。

    纵收香藏镜，他年重到，人面桃花在否。

    念沈沈、小阁幽窗，有时梦去。

    '
