  - word: 千里澄江
    meaning: 千里清澈的江水
  translation: "登高远望故都，正是晚秋。千里长江澄澈如白练，苍翠的山峰簇拥在一起。残阳里帆影来去，西风中酒旗斜斜矗立。彩船出没于淡云，白鹭像从星河飞起，美得画也画不尽。想起往昔繁华争逐；可叹亡国悲剧一幕接一幕。千古登高，空自叹息荣辱兴亡。六朝旧事随流水而去，只剩寒烟衰草一片黯绿。至今商女还时时唱着《后庭花》的遗曲。"
