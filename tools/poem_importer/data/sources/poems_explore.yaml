  - id: poem_exp_316
    title: 两小儿辩日
    author: 列御寇
    dynasty: 先秦
    layer: explore
    is_required: false
    difficulty: 4
    content: |
      孔子东游，见两小儿辩日，问其故。
      一儿曰：“我以日始出时去人近，而日中时远也。
      ”
      一儿以日初出远，而日中时近也。
      一儿曰：“日初出大如车盖，及日中则如盘盂，此不为远者小而近者大乎？
      ”
      一儿曰：“日初出沧沧凉凉，及其日中如探汤，此不为近者热而远者凉乎？
      ”
      孔子不能决也。
      两小儿笑曰：“孰为汝多知乎？
      ”
