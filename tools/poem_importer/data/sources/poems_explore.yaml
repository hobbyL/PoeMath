- id: poem_exp_209
  title: 箜篌谣
  author: 李白
  dynasty: 唐
  layer: explore
  is_required: false
  difficulty: 4
  content: '攀天莫登龙，走山莫骑虎。

    贵贱结交心不移，唯有严陵及光武。

    周公称大圣，管蔡宁相容。

    汉谣一斗粟，不与淮南舂。

    兄弟尚路人，吾心安所从。

    他人方寸间，山海几千重。

    轻言托朋友，对面九疑峰。

    开花必早落，桃李不如松。

    管鲍久已死，何人继其踪。

    '
