- id: poem_ext_027
  title: 听弹琴
  author: 刘长卿
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '泠泠七弦上，静听松风寒。

    古调虽自爱，今人多不弹。

    '
  annotations:
  - word: 泠泠
    meaning: 形容清凉、清淡，也形容声音清越
  - word: 松风
    meaning: 以风入松林暗示琴声凄凉
  - word: 古调
    meaning: 古时的曲调
  translation: 七弦琴奏出清凉的曲调悠扬起伏，细细倾听就像那滚滚的松涛声。 我虽然很喜爱这首古时的曲调，但在今天人们大多已不去弹奏了。
  appreciation: 此诗题一作“弹琴”，《刘随州集》与《全唐诗》均为“听弹琴”。从诗中“静听”二字细味，题目以有“听”字为妥。 琴是中国古代传统民族乐器，由七条弦组成，所以首句以“七弦”作琴的代称，意象也更具体。“泠泠”形容琴声的清越，逗起“松风寒”三字。“松风寒”以风入松林暗示琴声的凄清，极为形象，引导读者进入音乐的境界。“静听”二字描摹出听琴者入神的情态，可见琴声的超妙。高雅平和的琴声，常能唤起听者水流石上、风来松下的幽清肃穆之感。
