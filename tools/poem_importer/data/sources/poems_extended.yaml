- id: poem_ext_235
  title: 关山月
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '明月出天山，苍茫云海间。

    长风几万里，吹度玉门关。

    汉下白登道，胡窥青海湾。

    由来征战地，不见有人还。

    戍客望边邑，思归多苦颜。

    高楼当此夜，叹息未应闲。

    '
  annotations:
  - word: 关山月
    meaning: 乐府旧题
  - word: 明月
    meaning: 皎洁的月亮
  - word: 天山
    meaning: 指边塞山脉
  - word: 长风
    meaning: 远方吹来的风
  - word: 玉门关
    meaning: 古代边关要塞
  translation: 一轮明月从祁连山升起，穿行在苍茫云海之间。 浩荡的长风吹越几万里，吹过将士驻守的玉门关。 当年汉兵直指白登山道，吐蕃觊觎青海大片河山。 这里就是历代征战之地，出征将士很少能够生还。 戍守兵士远望边城景象，思归家乡不禁满面愁容。 此时将士的妻子在高楼，哀叹何时能见远方亲人。
  appreciation: 这首诗描绘了边塞的风光，戍卒的遭遇，更深一层转入戍卒与思妇两地相思的痛苦。开头的描绘都是为后面作渲染和铺垫，而侧重写望月引起的情思。 开头四句，可以说是一幅包含着关、山、月三种因素在内的辽阔的边塞图景。在一般文学作品里，常见“月出东海”或“月出东山”一类描写，而天山在中国西部，似乎应该是月落的地方，何以说“明月出天山”呢？原来这是就征人角度说的。征人戍守在天山之西，回首东望，所看到的是明月从天山升起的景象。天山虽然不靠海，但横亘在山上的云海则是有的。诗人把似乎是在人们印象中只有大海上空才更常见的云月苍茫的景象，与雄浑磅礴的天山组合到一起，显得新鲜而壮观。这样的境界，在一般才力薄弱的诗人面前，也许难乎为继，但李白有的是笔力。接下去“长风几万里，吹度玉门关”，范围比前两句更为广阔。宋代的杨齐贤，好像唯恐“几万里”出问题，说是：“天山至玉门关不为太远，而曰几万里者，以月如出于天山耳，非以天山为度也。”用想象中的明月与玉门关的距离来解释“几万里”，看起来似乎稳妥了，但李白是讲“长风”之长，并未说到明月与地球的距离。其实，这两句仍然是从征戍者角度而言的，士卒们身在西北边疆，月光下伫立遥望故园时，但觉长风浩浩，似掠过几万里中原国土，横度。
  background: 入选《唐诗三百首》，由 yxcs/poems-db 原始数据整理。
