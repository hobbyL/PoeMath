  translation: 你说来相会是空话，别后不见踪影；醒来楼上斜月空照，听得晓钟初鸣。 梦里为伤远别啼泣，双双难以呼唤；醒后研墨未浓，奋笔疾书写成一信。 残烛半照金翡翠的被褥，朦朦胧胧；麝香熏透芙蓉似的纱帐，软软轻轻。 当年的刘郎，早已怨恨那蓬山遥远；你去的所在，要比蓬山更隔万重岭！
