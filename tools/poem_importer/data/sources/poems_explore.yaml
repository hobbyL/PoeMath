- id: poem_exp_489
  title: 留春令·咏梅花
  author: 史达祖
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 3
  content: '故人溪上，挂愁无奈，烟梢月树。

    一涓春水点黄昏，便没顿、相思处。

    曾把芳心深相许。

    故梦劳诗苦。

    闻说东风亦多情，被竹外、香留住。

    '
