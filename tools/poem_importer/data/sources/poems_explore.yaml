  - 思乡
  - 古诗词
- id: poem_exp_035
  title: 山中四咏
  author: 元鹏
  dynasty: 明
  layer: explore
  is_required: false
  difficulty: 4
  content: '我爱山中春，苍崖鸟一声。

    桃花源里住，罕见问津人。

    我爱山中夏，空冥花雨下。

    行吟屐齿肥，树色丽四野。

    我爱山中秋，黄云稻正稠。

    铎声连振起，镰子刈禾头。

    我爱山中冬，冰澌叠乱封。

    地炉无品字，一榻冷千峰。

    '
  annotations:
  - word: 山中
    meaning: 山里
  - word: 四咏
    meaning: 四首咏物诗
  - word: 幽
    meaning: 幽静
  translation: "元鹏写写景，在《山中四咏》里落到「地炉无品字，一榻冷千峰。」一句，适合作为拓展背诵。"
  appreciation: "《山中四咏》写景寄情。元鹏笔调清淡，在山水或日常里安放情思。"
  background: "明山水/写景篇《山中四咏》，作者元鹏。"
  famous_lines:
  - 地炉无品字，一榻冷千峰。
  tags:
  - 写景
  - 禅隐
  - 生活
  - 古诗词
- id: poem_exp_036
  title: 黄山道中
  author: 赵沨
  dynasty: 金
  layer: explore
  is_required: false
  difficulty: 3
  content: '小榖城荒路屈盘，石根寒碧涨秋湾。

    千章秀木黄公庙，一点飞雪白塔山。

    好景落谁诗句里，蹇驴驮我画图间。

    膏肓泉石真吾事，莫厌乘兴数往还。

    '
