  translation: 凉风飕飕地从天边刮起，你的心境怎样呢？令我惦念不已。 我的书信不知何时你能收到？只恐江湖险恶，秋水多风浪。 创作诗文最忌讳坦荡的命途，奸佞小人最希望好人犯错误。 你与沉冤的屈子同命运，应投诗于汨罗江诉说冤屈与不平。
