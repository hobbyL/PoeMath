- id: poem_exp_588
  title: 秋日鲁郡尧祠亭上宴别杜补阙范侍御
  author: 李白
  dynasty: 唐
  layer: explore
  is_required: false
  difficulty: 4
  content: '我觉秋兴逸，谁云秋兴悲？

    山将落日去，水与晴空宜。

    鲁酒白玉壶，送行驻金羁。

    歇鞍憩古木，解带挂横枝。

    歌鼓川上亭，曲度神飙吹。

