  author: 李清照
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 3
  content: '淡荡春光寒食天，玉炉沉水袅残烟。梦回山枕隐花钿。

    海燕未来人斗草，江梅已过柳生绵。黄昏疏雨湿秋千。

    '
  annotations:
  - word: 浣溪沙
    meaning: 词牌名
  - word: 淡荡
    meaning: 和煦轻柔
  - word: 寒食
    meaning: 寒食节
  - word: 春光
    meaning: 春天的景色
  translation: "春光淡荡，正是寒食时节。梦回后山枕斜倚，花光与人面交杂入眼。任凭风吹，帘儿故意拦着，只为不放春情溜走。"
  appreciation: "写寒食春光与闺中慵懒闲愁，用语精美，情思细腻。"
  background: "李清照作于寒食节前后。"
  famous_lines:
  - 海燕未来人斗草，江梅已过柳生绵。黄昏疏雨湿秋千。
