  - word: 三分割据
    meaning: 三国鼎立
  translation: 诸葛亮的大名永远留在天地间，他的遗像清高让人肃然起敬。 为了三分天下周密地筹划策略，万代好像鸾凤高翔，独步青云。 伊尹、吕尚难分伯仲，不相上下，指挥军队作战镇定从容，让萧何曹参都为之失色。 汉朝帝位转移是因为运气，诸葛亮也难以复兴，但他意志坚决，因军务繁忙而鞠躬尽瘁。
