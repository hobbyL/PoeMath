    meaning: 楚国边境地带，这里指汉水流域，此地古为楚国辖区
  - word: 三湘
    meaning: 湖南有湘潭、湘阴、湘乡，合称三湘
  - word: 荆门
    meaning: 山名，荆门山，在今湖北宜都县西北的长江南岸，战国时为楚之西塞
  - word: 九派
    meaning: 九条支流，长江至浔阳分为九支
  - word: 郡邑
    meaning: 指汉水两岸的城镇
  translation: "汉江连接三湘，直通荆门九派。江水仿佛流到天地之外，山色在若有若无之中。城邑像浮在水面前浦，波澜摇动着远空。襄阳风光这样好，真想留下与山翁共醉。"
  appreciation: "「江流天地外，山色有无中」写汉江浩渺，虚实相生，是王维山水名联。"
  background: "王维临汉江而作，写襄阳一带江山之美与闲适之情。"
