  translation: "海上生出明月，天涯共在此时。有情人怨着长夜，整夜起相思。灭烛爱这满室光辉，披衣觉得露水渐滋。不能捧满手去赠，还是睡去梦佳期。"
  appreciation: "张九龄望月怀人。「海上生明月，天涯共此时」起笔高华；灭烛披衣写对月痴态，结以梦佳期，温厚深情。"
  background: "张九龄《望月怀远》，写秋夜望月思远人。"
  famous_lines:
