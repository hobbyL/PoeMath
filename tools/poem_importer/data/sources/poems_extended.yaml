- id: poem_ext_148
  title: 梦李白二首·其二
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '浮云终日行，游子久不至。

    三夜频梦君，情亲见君意。

    告归常局促，苦道来不易。

    江湖多风波，舟楫恐失坠。

    出门搔白首，若负平生志。

    冠盖满京华，斯人独憔悴。

    孰云网恢恢，将老身反累。

    千秋万岁名，寂寞身后事。

    '
  annotations:
  - word: 冠盖
    meaning: 官员的帽子和车盖
  - word: 才杰
    meaning: 杰出的人才
  - word: 千秋万岁名
    meaning: 千古流传的名声
  - word: 寂寞身后事
    meaning: 死后的冷清
  translation: "浮云整天飘行，游子久久不至。一连三夜频频梦见你，见你情意亲厚。告辞时总是局促，苦说这一路来得不易。江湖多风波，只怕舟楫失坠。出门搔着白发，像有负平生之志。冠盖满京城，唯独你憔悴。谁说天网恢恢？将老之身反受牵累。千秋万岁的名声，不过是寂寞身后的事。"
  appreciation: "杜甫梦李白其二。由频梦、江湖风波写到冠盖满京华而斯人憔悴，结以「千秋万岁名，寂寞身后事」，友情与不遇之痛交叠，沉痛至极。"
  background: "乾元二年杜甫在秦州，连夜梦李白，作《梦李白》二首，此为第二首。"
  famous_lines:
  - 千秋万岁名，寂寞身后事。
  tags:
  - 唐诗三百首
  - 记梦
  - 同情
  - 友人
  - 五言古诗
- id: poem_ext_150
  title: 夏日南亭怀辛大
  author: 孟浩然
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '山光忽西落，池月渐东上。

    散发乘夕凉，开轩卧闲敞。

    荷风送香气，竹露滴清响。

    欲取鸣琴弹，恨无知音赏。

    感此怀故人，中宵劳梦想。

    '
  annotations:
  - word: 南亭
    meaning: 南面的亭子
  - word: 辛大
    meaning: 孟浩然的朋友
  - word: 散发
    meaning: 披散头发
  - word: 荷风
    meaning: 荷花送来的清风
  translation: "山光忽然西落，池上的月渐渐东升。披发散发乘着夕凉，开窗躺在闲敞之处。荷风送来香气，竹露滴出清响。想取鸣琴来弹，却恨没有知音欣赏。因此怀念故人，半夜里在梦中劳想。"
  appreciation: "孟浩然写夏夜南亭怀友。荷风竹露写尽清凉，结以「中宵劳梦想」，闲适中见友情，是盛唐山水田园的细腻之作。"
  background: "孟浩然在襄阳闲居时，夏日南亭怀念友人辛大而作。"
  famous_lines:
  - 感此怀故人，中宵劳梦想。
  tags:
