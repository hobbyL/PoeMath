- id: poem_ext_414
  title: 州桥
  author: 范成大
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 3
  content: '南望朱雀门，北望宣德楼，皆旧御路也。

    州桥南北是天街，父老年年等驾回。

    忍泪失声询使者，"几时真有六军来？

    "

    '
