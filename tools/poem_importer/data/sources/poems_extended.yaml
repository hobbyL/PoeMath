  content: '白日登山望烽火，黄昏饮马傍交河。

    行人刁斗风沙暗，公主琵琶幽怨多。

    野云万里无城郭，雨雪纷纷连大漠。

    胡雁哀鸣夜夜飞，胡儿眼泪双双落。

