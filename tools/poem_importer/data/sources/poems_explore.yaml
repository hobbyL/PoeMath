- id: poem_exp_515
  title: 瑞鹤仙·郊原初过雨
  author: 袁去华
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '郊原初过雨。

    见败叶零乱，风定犹舞。

    斜阳挂深树。

    映浓愁浅黛，遥山眉妩。

    来时旧路。

    尚岩花、娇黄半吐。

    到而今，唯有溪边流水，见人如故。

    无语。

