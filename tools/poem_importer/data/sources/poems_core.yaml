  semester: 上
  textbook_unit: 语文六年级上·课文3
  is_required: true
  difficulty: 3
  content: '明月别枝惊鹊，清风半夜鸣蝉。

    稻花香里说丰年，听取蛙声一片。

    七八个星天外，两三点雨山前。

    旧时茅店社林边，路转溪桥忽见。

    '
  pinyin: 'míng yuè bié zhī jīng què ， qīng fēng bàn yè míng chán 。

    dào huā xiāng lǐ shuō fēng nián ， tīng qǔ wā shēng yī piàn 。

    qī bā gè xīng tiān wài ， liǎng sān diǎn yǔ shān qián 。

    jiù shí máo diàn shè lín biān ， lù zhuǎn xī qiáo hū xiàn 。

    '
  annotations:
  - word: 黄沙
    meaning: 黄沙岭，在今江西上饶西
  - word: 别枝
    meaning: 斜枝
  - word: 社林
    meaning: 土地庙附近的树林
  - word: 见
    meaning: 同"现"，出现
  translation: 明月惊起了栖息在树枝上的鹊儿，半夜里清风送来阵阵蝉鸣。稻花飘香似乎在诉说丰收的年景，听着一片蛙鸣此起彼伏。远远天边有七八颗星星，山前落下两三点雨。往日社林边熟悉的茅店，如今在路转过溪桥时忽然出现在眼前。
  appreciation: 全词从视觉、听觉、嗅觉多角度写夏夜乡村，"稻花香里说丰年，听取蛙声一片"化听觉为丰收的联想，末句写忽逢旧茅店的惊喜，情趣盎然。
  background: 辛弃疾罢官闲居江西上饶带湖时期所作，反映他对田园生活的热爱。
  famous_lines:
  - 稻花香里说丰年，听取蛙声一片
  tags:
  - 田园
  - 夏夜
  - 词
  - 名篇
- id: poem_core_061
  title: 书湖阴先生壁
  author: 王安石
  dynasty: 宋
  grade: 6
  semester: 上
  textbook_unit: 语文六年级上·课文17
  is_required: true
  difficulty: 3
  content: '茅檐长扫净无苔，花木成畦手自栽。

    一水护田将绿绕，两山排闼送青来。

    '
  pinyin: 'máo yán cháng sǎo jìng wú tái ， huā mù chéng qí shǒu zì zāi 。

    yī shuǐ hù tián jiāng lǜ rào ， liǎng shān pái tà sòng qīng lái 。

    '
  annotations:
  - word: 湖阴先生
    meaning: 王安石晚年隐居钟山时的邻居杨德逢
  - word: 茅檐
    meaning: 茅屋的屋檐
  - word: 畦
    meaning: 田园中划分成小块的田地
  - word: 护田
    meaning: 保护农田
  - word: 排闼
    meaning: 推开门。闼，门
  translation: 茅屋的屋檐经常打扫得干净没有青苔，花草树木整整齐齐都是主人亲手栽种。一泓溪水像卫士般护着农田把绿意环绕，两座青山推开门送来一片青翠。
  appreciation: 全诗以"护田"、"排闼"两个拟人化的动词，让山水皆有情，将主人高洁的品格与雅致的居所写得生动传神。
  background: 王安石晚年退居江宁（今南京）钟山时，题写在邻居杨德逢家墙壁上的诗。
  famous_lines:
  - 一水护田将绿绕，两山排闼送青来
  tags:
  - 田园
  - 隐逸
  - 七言绝句
- id: poem_core_062
  title: 浪淘沙（其一）
  author: 刘禹锡
  dynasty: 唐
  grade: 6
  semester: 上
  textbook_unit: 语文六年级上·课文17
  is_required: true
  difficulty: 2
  content: '九曲黄河万里沙，浪淘风簸自天涯。

    如今直上银河去，同到牵牛织女家。

    '
  pinyin: 'jiǔ qū huáng hé wàn lǐ shā ， làng táo fēng bǒ zì tiān yá 。

    rú jīn zhí shàng yín hé qù ， tóng dào qiān niú zhī nǚ jiā 。

    '
  annotations:
  - word: 九曲
    meaning: 形容黄河河道曲折
  - word: 浪淘
    meaning: 波浪冲刷
  - word: 风簸
    meaning: 大风颠簸
  - word: 银河
    meaning: 天上的银河
  - word: 牵牛织女
    meaning: 牛郎星和织女星，传说中的神话人物
  translation: 弯弯曲曲的黄河带着万里泥沙滚滚而来，经受着惊涛骇浪和狂风颠簸从天边流来。如今我要沿着黄河直上到银河去，一同拜访牛郎织女的家。
  appreciation: 全诗前两句以雄浑的笔力写黄河气势，后两句借"直上银河"的奇思展开想象，把现实与神话浑然一体，气魄宏大。
  background: 刘禹锡《浪淘沙》组诗九首之一，此为第一首。
  famous_lines:
  - 九曲黄河万里沙，浪淘风簸自天涯
  tags:
