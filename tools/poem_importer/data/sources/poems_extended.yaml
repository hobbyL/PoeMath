- id: poem_ext_108
  title: 遣悲怀三首·其三
  author: 元稹
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '闲坐悲君亦自悲，百年都是几多时。

    邓攸无子寻知命，潘岳悼亡犹费词。

    同穴窅冥何所望，他生缘会更难期。

    惟将终夜常开眼，报答平生未展眉。

    '
  annotations:
  - word: 遣悲怀
