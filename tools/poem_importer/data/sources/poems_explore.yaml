- id: poem_exp_183
  title: 郢门秋怀
  author: 李白
  dynasty: 唐
  layer: explore
  is_required: false
  difficulty: 4
  content: '郢门一为客，巴月三成弦。

    朔风正摇落，行子愁归旋。

    杳杳山外日，茫茫江上天。

    人迷洞庭水，雁度潇湘烟。

    清旷谐宿好，缁磷及此年。

    百龄何荡漾，万化相推迁。

    空谒苍梧帝，徒寻溟海仙。

    已闻蓬海浅，岂见三桃圆。

    倚剑增浩叹，扪襟还自怜。

    终当游五湖，濯足沧浪泉。

    '
