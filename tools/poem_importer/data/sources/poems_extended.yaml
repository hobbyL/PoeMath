- id: poem_ext_110
  title: 登金陵凤凰台
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '凤凰台上凤凰游，凤去台空江自流。

    吴宫花草埋幽径，晋代衣冠成古丘。

    三山半落青天外，二水中分白鹭洲。

    总为浮云能蔽日，长安不见使人愁。

    '
