- id: poem_ext_062
  title: 云阳馆与韩绅宿别
  author: 司空曙
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '故人江海别，几度隔山川。

    乍见翻疑梦，相悲各问年。

    孤灯寒照雨，深竹暗浮烟。

    更有明朝恨，离杯惜共传。

    '
