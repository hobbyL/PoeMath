  - word: 西施
    meaning: 吴越春秋：越得苎萝山鬻薪之女，曰西施，郑旦，饰以罗谷，教以容步，三年学成而献于吴
  - word: 傅香粉
    meaning: 即搽脂敷粉
  - word: 浣纱
    meaning: 环宇记：会稽县东有西施浣纱石
  - word: 水经注
    meaning: 浣纱溪在荆州，为夷陵州西北，秋冬之月，水色净丽
  - word: 持谢
    meaning: 奉告
  translation: "美色为天下所重，西施岂能长久微贱。早晨还是越溪浣纱女，傍晚便成了吴宫妃。微贱时与众人无异，尊贵后才悟到稀有。邀人敷粉，自己不必亲手穿罗衣。君王越宠越娇，君王怜爱便不分是非。当年浣纱同伴，再不能同车而归。告诉邻家女子：效颦哪里学得来呢？"
  appreciation: "王维咏西施，讽世情势利与效颦之愚。由微贱到尊贵的对照，收束于「效颦安可希」，议论清醒，是盛唐咏史的理性一面。"
