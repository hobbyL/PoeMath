- id: poem_exp_046
  title: 泛南湖至石帆诗
  author: 谢惠连
  dynasty: 南北朝
  layer: explore
  is_required: false
  difficulty: 3
  content: '轨息陆途初，枻鼓川路始。

    涟漪繁波漾，参差层峰峙。

    萧疏野趣生，逶迤白云起。

    登陟苦跋涉，䁹盼乐心耳。

    即玩玩有竭，在兴兴无已。

    '
