    有客借一观，爱之不敢求。

    湛然玉匣中，秋水澄不流。

    至宝有本性，精刚无与俦。

    可使寸寸折，不能绕指柔。

    愿快直士心，将断佞臣头。

    不愿报小怨，夜半刺私仇。

    劝君慎所用，无作神兵羞。

