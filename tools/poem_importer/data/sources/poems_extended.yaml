  - word: 万壑松
    meaning: 形容琴声如万壑松涛
  translation: 蜀僧怀抱着绿绮琴，来自遥远的峨眉山。 为我随意挥手一弹，如同听到万壑松声。 余音袅袅，汇入霜天钟声，我心清静，如经流水洗过。 不知不觉，暮色笼罩青山，秋云黯淡，布满黄昏天空。
  appreciation: 这首五律写的是听琴，听蜀地一位法名叫濬的和尚弹琴。开头两句：“蜀僧抱绿绮，西下峨眉峰。”说明这位琴师是从四川峨眉山下来的。李白是在四川长大的，四川绮丽的山水培育了他的壮阔胸怀，激发了他的艺术想象。峨眉山月不止一次地出现在他的诗里。他对故乡一直很怀恋，对于来自故乡的琴师当然也格外感到亲切。所以诗一开头就说明弹琴的人是自己的同乡。“绿绮”本是琴名，汉代司马相如有一张琴，名叫绿绮，这里用来泛指名贵的琴。
