- id: poem_exp_636
  title: 京兆府栽莲
  author: 白居易
  dynasty: 唐
  layer: explore
  is_required: false
  difficulty: 4
  content: '污沟贮浊水，水上叶田田。

    我来一长叹，知是东溪莲。

    下有青污泥，馨香无复全。

    上有红尘扑，颜色不得鲜。

    物性犹如此，人事亦宜然。

    托根非其所，不如遭弃捐。

    昔在溪中日，花叶媚清涟。

    今年不得地，憔悴府门前。

    '
