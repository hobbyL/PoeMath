  - word: 非吾土
    meaning: 不是我的故乡
  - word: 维扬
    meaning: 即扬州
  translation: "山色昏暗，听到猿啼含愁；沧江夜里急急奔流。风吹响两岸树叶，月光照着一叶孤舟。建德不是我的故乡，我怀念维扬的旧游。还是把两行泪，远远寄向海西头。"
  appreciation: "孟浩然夜宿桐庐江寄友。前写猿愁急流、风叶孤舟，后写非吾土与泪寄广陵，羁旅怀人之情真切。"
  background: "孟浩然旅途宿桐庐江，寄广陵（扬州）旧友而作。"
