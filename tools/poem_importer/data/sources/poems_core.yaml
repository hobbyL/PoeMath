    '
  annotations:
  - word: 云母屏风
    meaning: 用云母石做的屏风
  - word: 长河
    meaning: 银河
  - word: 灵药
    meaning: 仙药，传说嫦娥偷吃后飞升月宫
  translation: 云母屏风上烛影暗淡幽深，银河渐渐西沉晨星也隐没。嫦娥应该后悔偷吃了仙药，面对碧海青天夜夜孤独寂寞。
  appreciation: 以嫦娥的孤寂写人间的怅惘，"碧海青天夜夜心"写尽了寂寞的永恒感。
  background: 李商隐此诗寄托身世之感，以嫦娥的处境自喻。
