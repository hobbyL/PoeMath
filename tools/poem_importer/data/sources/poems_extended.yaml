  is_required: false
  difficulty: 4
  content: '一春长费买花钱，日日醉湖边。

    玉骢惯识西湖路，骄嘶过、沽酒楼前。

    红杏香中箫鼓，绿杨影里秋千。

    暖风十里丽人天，花压鬓云偏。

    画船载取春归去，馀情付、湖水湖烟。

    明日重扶残醉，来寻陌上花钿。

