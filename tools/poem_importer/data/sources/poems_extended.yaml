- id: poem_ext_416
  title: 菩萨蛮·平林漠漠烟如织
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '平林漠漠烟如织，寒山一带伤心碧。

    暝色入高楼，有人楼上愁。

    玉阶空伫立，宿鸟归飞急。

    何处是归程？

    长亭连短亭。

    '
  annotations:
  - word: 平林
    meaning: 平原上的林木
  - word: 漠漠
    meaning: 迷蒙貌
  - word: 烟如织
    meaning: 暮烟浓密
  - word: 伤心
    meaning: 极甚之辞
  - word: 暝色
    meaning: 夜色
  translation: "平展的树林如烟如织，寒山连成一带伤心的碧色。暮色爬进高楼，有人在楼上忧愁。在玉石台阶上徒然久立，归巢的鸟急急飞回。哪里才是回家的路？长亭接着短亭，望不到尽头。"
  appreciation: "传为李白所作。从平林寒山写到高楼望远，结以归程漫漫，景象阔大而愁思绵长，开文人词境。"
  background: "一作李白词，也有争议。写游子思归，境界高远。"
  famous_lines:
  - 长亭连短亭。
  tags:
