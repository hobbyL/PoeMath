  content: '空江浪阔。

    清尘凝、层层刻碎冰叶。

    水边照影，华裾曳翠，露搔泪湿。

    湘烟暮合。

    □尘袜、凌波半涉。

    怕临风、□欺瘦骨，护冷素衣叠。

    樊姊玉奴恨，小钿疏唇，洗妆轻怯。

    汜人最苦，纷痕深、几重愁靥。

