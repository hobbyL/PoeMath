    白露沾野草，时节忽复易。

    秋蝉鸣树间，玄鸟逝安适。

    昔我同门友，高举振六翮。

    不念携手好，弃我如遗迹。

    南箕北有斗，牵牛不负轭。

    良无盘石固，虚名复何益？

