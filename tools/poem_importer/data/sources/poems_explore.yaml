  content: '霜风渐紧寒侵被。

    听孤雁、声嘹唳。

    一声声送一声悲，云淡碧天如水。

    披衣告语：雁儿略住，听我些儿事。

    塔儿南畔城儿里，第三个、桥儿外，濒河西岸小红楼，门外梧桐雕砌。

    请教且与，低声飞过，那里有、人人无寐。

