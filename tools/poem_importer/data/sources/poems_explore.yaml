- id: poem_exp_560
  title: 疏影·咏荷叶
  author: 张炎
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '碧圆自洁。

    向浅洲远渚，亭亭清绝。

    犹有遗簪，不展秋心，能卷几多炎热。

    鸳鸯密语同倾盖，且莫与、浣纱人说。

    恐怨歌、忽断花风，碎却翠云千叠。

    回首当年汉舞，怕飞去、谩皱留仙裙折。

    恋恋青衫，犹染枯香，还叹鬓丝飘雪。

    盘心清露如铅水，又一夜、西风吹折。

    喜静看、匹练秋光，倒泻半湖明月。

    '
