- id: poem_exp_146
  title: 癸卯岁十二月中作与从弟敬远
  author: 陶渊明
  dynasty: 魏晋
  layer: explore
  is_required: false
  difficulty: 4
  content: '寝迹衡门下，邈与世相绝。

