- id: poem_ext_217
  title: 高阳台·落梅
  author: 吴文英
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 4
  content: '宫粉雕痕，仙云堕影，无人野水荒湾。古石埋香，金沙锁骨连环。南楼不恨吹横笛，恨晓风、千里关山。半飘零，庭上黄昏，月冷阑干。

    寿阳空理愁鸾。问谁调玉髓，暗补香瘢。细雨归鸿，孤山无限春寒。离魂难倩招清此，梦缟衣、解佩溪边。最愁人，啼鸟清明，叶底青圆。

    '
  annotations:
  - word: 高阳台
    meaning: 词牌名
  - word: 落梅
    meaning: 凋落的梅花
  - word: 东风
    meaning: 春风
  translation: 宛如宫女脂粉残留的秀痕，仿佛云间仙子飘坠下的倩影。一树新梅，南放在野水荒湾。古石下埋藏你芳香的遗骨，金沙滩葬着她的连环锁骨。不恨南楼的横笛吹奏起《梅花落》的笛曲，声声幽怨哀伤。但我更恨的是早晨的和风吹遍万水掠过千山，梅花被吹得飘零片片。香气在黄昏的庭院中扩散，幽冷的月光下梅花的疏影摇曳翩翩。 寿阳公主空对着宝镜弥补脸上痕瘢，悄悄地妆饰姣好的容颜。试问有谁调匀玉髓，来悄悄修补香艳的痕斑？潇潇细雨中归鸿不断，翩翩飞远，无边无际的春寒，还笼罩着那种满梅花的孤山。远去的幽魂请谁才能招还，只能在梦境中与你在溪边想见。你穿着洁白的衣裙，解下玉佩赠给我作为留念。最令人忧愁的是，当梅雨过去而变成晴天，小鸟在梅树间啼叫连连，浓密的叶片下，点点梅子已又清又圆。
