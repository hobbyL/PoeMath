- id: poem_ext_157
  title: 东郊
  author: 韦应物
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '吏舍跼终年，出郊旷清曙。

    杨柳散和风，青山澹吾虑。

    依丛适自憩，缘涧还复去。

    微雨霭芳原，春鸠鸣何处。

    乐幽心屡止，遵事迹犹遽。

    终罢斯结庐，慕陶直可庶。

    '
  annotations:
  - word: 东郊
    meaning: 城东的郊外
  - word: 春事
    meaning: 春天的景象
  - word: 微雨
    meaning: 细雨
  translation: "官署里拘束了整年，出郊才见清旷的曙色。杨柳散着和风，青山淡化我的忧虑。靠着树丛正好歇息，沿着山涧还再前去。微雨笼着芳原，春鸠在何处鸣叫。爱幽静的心屡次被打断，遵从公事行迹仍匆匆。终有一天罢官在此结庐，仰慕陶渊明差不多就能做到。"
  appreciation: "韦应物出郊写吏隐之思。杨柳青山、微雨春鸠清新可喜，结以慕陶结庐，见其归田之愿。"
  background: "韦应物任官期间出东郊散心，慕陶潜而作。"
  famous_lines:
