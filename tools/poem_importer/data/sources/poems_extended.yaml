- id: poem_ext_154
  title: 溪居
  author: 柳宗元
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '久为簪组累，幸此南夷谪。

    闲依农圃邻，偶似山林客。

    晓耕翻露草，夜榜响溪石。

    来往不逢人，长歌楚天碧。

    '
