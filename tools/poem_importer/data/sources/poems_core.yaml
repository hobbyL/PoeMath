  pinyin: 'jīng kǒu guā zhōu yī shuǐ jiān ， zhōng shān zhǐ gé shù chóng shān 。

    chūn fēng yòu lǜ jiāng nán àn ， míng yuè hé shí zhào wǒ huán 。

