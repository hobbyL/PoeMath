  - word: 吴宫
    meaning: 三国时孙吴曾于金陵建都筑宫
  - word: 晋代
    meaning: 指东晋，南渡后也建都于金陵
  - word: 衣冠
    meaning: 指的是东晋文学家郭璞的衣冠冢
