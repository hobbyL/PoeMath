- id: poem_ext_190
  title: 赠卫八处士
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '人生不相见，动如参与商。

    今夕复何夕，共此灯烛光。

    少壮能几时，鬓发各已苍。

    访旧半为鬼，惊呼热中肠。

    焉知二十载，重上君子堂。

    昔别君未婚，儿女忽成行。

    怡然敬父执，问我来何方。

    问答未及已，儿女罗酒浆。

    夜雨剪春韭，新炊间黄粱。

    主称会面难，一举累十觞。

    十觞亦不醉，感子故意长。

    明日隔山岳，世事两茫茫。

    '
  annotations:
  - word: 卫八
    meaning: 排行第八的卫姓友人
  - word: 处士
    meaning: 隐居不仕之人
  - word: 少壮
    meaning: 年轻时
  - word: 昔别
    meaning: 当年分别
  translation: "人生难以相见，往往像参星与商星。今夜又是什么夜，能共对着这灯烛光。少壮能有几时，鬓发各自已经苍白。寻访旧友，一半已成鬼，惊呼得心里滚烫。哪知二十年后，又重上你的厅堂。当年分别时你还未婚，如今儿女忽然成行。他们恭敬地对待父亲的挚友，问我从哪里来。问答还没完，孩子们已摆酒又剪韭。夜雨剪来的春韭，新炊的黄粱饭。主称见面难，一举累十觞。十觞也不醉，是感你情意长。明天又要隔山岳，世事两边都茫茫。"
  appreciation: "杜甫访卫八处士。从久别重逢写到儿女成行、夜雨剪韭，结以「明日隔山岳，世事两茫茫」，乱世友情真挚动人，是五古名篇。"
  background: "乾元二年杜甫自洛阳回华州途中，访友人卫八处士而作。"
  famous_lines:
  - 明日隔山岳，世事两茫茫。
