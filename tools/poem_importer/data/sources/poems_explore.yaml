- id: poem_exp_402
  title: 点绛唇·一夜东风
  author: 曾允元
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 3
  content: '一夜东风，枕边吹散愁多少。

    数声啼鸟。

    梦转纱窗晓。

    来是春初，去是春将老。

    长亭道。

    一般芳草。

    只有归时好。

    '
