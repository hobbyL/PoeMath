- id: poem_ext_116
  title: 无题·昨夜星辰昨夜风
  author: 李商隐
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '昨夜星辰昨夜风，画楼西畔桂堂东。

    身无彩凤双飞翼，心有灵犀一点通。

    隔座送钩春酒暖，分曹射覆蜡灯红。

    嗟余听鼓应官去，走马兰台类转蓬。

    '
  annotations:
  - word: 画楼
    meaning: 装饰华丽的楼阁
  - word: 桂堂
    meaning: 桂木建造的厅堂
  - word: 身无彩凤
    meaning: 自身没有彩凤的双翼
  - word: 心有灵犀
    meaning: 心灵相通
  translation: 昨夜星光灿烂，夜半却有习习凉风；我们酒筵设在画楼西畔、桂堂之东。 身上无彩凤的双翼，不能比翼齐飞；内心却象灵犀一样，感情息息相通。 互相猜钩嬉戏，隔座对饮春酒暖心；分组来行酒令，决一胜负烛光泛红。 可叹呵，听到五更鼓应该上朝点卯；策马赶到兰台，像随风飘转的蓬蒿。
  appreciation: 首联以曲折的笔墨写昨夜的欢聚。“昨夜星辰昨夜风”是时间：夜幕低垂，星光闪烁，凉风习习。一个春风沉醉的夜晚，萦绕着宁静浪漫的温馨气息。句中两个“昨夜”自对，回环往复，语气舒缓，有回肠荡气之概。“画楼西畔桂堂东”是地点：精美画楼的西畔，桂木厅堂的东边。诗人甚至没有写出明确的地点，仅以周围的环境来烘托。在这样美妙的时刻、旖旎的环境中发生了什么故事，诗人只是独自在心中回味，我们则不由自主为诗中展示的风情打动了。
    颔联写今日的相思。诗人已与意中人分处两拨儿，“身无彩凤双飞翼”写怀想之切、相思之苦：恨自己身上没有五彩凤凰一样的双翅，可以飞到爱人身边。“心有灵犀一点通”写相知之深：彼此的心意却像灵异的犀牛角一样，息息相通。“身无”与“心有”，一外一内，一悲一喜，矛盾而奇妙地统一在一体，痛苦中有甜蜜，寂寞中有期待，相思的苦恼与心心相印的欣慰融合在一起，将那种深深相爱而又不能长相厮守的恋人的复杂微妙的心态刻画得细致入微、惟妙惟肖。此联两句成为千古名句。
    颈联“隔座送钩春酒暖，分营射覆蜡灯红”是写宴会上的热闹。这应该是诗人与佳人都参加过的一个聚会。宴席上，人们玩着隔座送钩、分组射覆的游戏，觥筹交错，灯红酒暖，其乐融融。昨日的欢声笑语还在耳畔回响。
