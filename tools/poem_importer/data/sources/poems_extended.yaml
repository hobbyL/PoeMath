- id: poem_ext_007
  title: 秋夕
  author: 杜牧
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '银烛秋光冷画屏,轻罗小扇扑流萤。

    天阶夜色凉如水,坐看牵牛织女星。

    '
  pinyin: 'yín zhú qiū guāng lěng huà píng ， qīng luó xiǎo shàn pū liú yíng 。

    tiān jiē yè sè liáng rú shuǐ ， zuò kàn qiān niú zhī nǚ xīng 。

    '
  annotations:
  - word: 银烛
    meaning: 白色的蜡烛
  - word: 画屏
    meaning: 有彩绘的屏风
  - word: 轻罗
    meaning: 轻薄的丝织品
  - word: 天阶
    meaning: 皇宫的台阶
  translation: 秋夜银烛映着画屏的清冷，宫女手持轻罗小扇扑打飞舞的流萤。夜色如凉水一般，宫女坐着凝望牛郎织女星。
  appreciation: 以宫女扑萤、坐望双星，含蓄写出宫廷生活的寂寞与对爱情自由的向往。
  background: 杜牧任京官时所作宫怨诗。
  famous_lines:
  - 天阶夜色凉如水，坐看牵牛织女星
  tags:
  - 宫怨
  - 秋天
  - 七言绝句
- id: poem_ext_011
  title: 行宫
  author: 元稹
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '寥落古行宫，宫花寂寞红。

    白头宫女在，闲坐说玄宗。

    '
  annotations:
  - word: 寥落
    meaning: 寂寞冷落
  - word: 行宫
    meaning: 皇帝在京城之外的宫殿
  - word: 宫花
    meaning: 行宫里的花
  - word: 白头宫女
    meaning: 据白居易《上阳白发人》，一些宫女天宝末年被“潜配”到上阳宫，在这冷宫里一闭四十多年，成了白发宫人
  - word: 说
    meaning: 谈论
  translation: 空旷冷落的古旧行宫，只有宫花寂寞地艳红。 几个满头白发的宫女，闲坐无事谈论唐玄宗。
  appreciation: 元稹的这首《行宫》是一首抒发盛衰之感的诗，这首短小精悍的五绝具有深邃的意境，富有隽永的诗味，倾诉了宫女无穷的哀怨之情，寄托了诗人深沉的盛衰之感。 从诗的内容上看，理解这首诗的关键在末尾一句“闲坐说玄宗”。说者前句已经点明是“白头宫女”，时间地点则是在荒凉冷寞的古行宫，红花盛开，正是一年春好处之时。
  background: 入选《唐诗三百首》，由 yxcs/poems-db 原始数据整理。
  famous_lines:
  - 白头宫女在，闲坐说玄宗
  tags:
  - 唐诗三百首
  - 怀古
  - 宫怨
  - 五言绝句
