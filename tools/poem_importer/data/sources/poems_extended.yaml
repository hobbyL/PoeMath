  - word: 喧
    meaning: 吵闹
  - word: 余
    meaning: 我
  - word: 开烟树
    meaning: 指月光下，原先烟雾缭绕下的树木渐渐显现出来
  translation: "山寺钟鸣，天色已黄昏；渔梁渡头一片争渡的喧嚷。人们沿着沙岸走向江村，我也乘船归向鹿门。鹿门月照，烟树敞开，忽然来到庞公栖隐之处。岩扉松径长久寂寥，只有幽人自己来去。"
  appreciation: "孟浩然写夜归鹿门。渡头喧与岩扉寂对照，结以「惟有幽人自来去」，隐逸自适，是山水隐逸代表作。"
