  appreciation: 意境赏析 在古典诗歌中，思亲怀友是常见的题材，这类作品要力避平庸，不落俗套，单凭作者生活体验是不够的，还必须在表现手法上匠心独运。杜甫正是在对这类常见题材的处理中，显出了他的大家本色。 诗一起即突兀不平。题目是“月夜”，作者却不从月夜写起，而是首先描绘了一幅边塞秋天的图景：“戍鼓断人行，边秋一雁声。”路断行人，写出所见；戍鼓雁声，写出所闻。耳目所及皆是一片凄凉景象。
