- id: poem_exp_469
  title: 行香子·与泗守过南山晚归作
  author: 苏轼
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '北望平川。

    野水荒湾。

    共寻春、飞步孱颜。

    和风弄袖，香雾萦鬟。

    正酒酣时，人语笑，白云间。

    飞鸿落照，相将归去，淡娟娟、玉宇清闲。

    何人无事，宴坐空山。

    望长桥上，灯火乱，使君还。

    '
