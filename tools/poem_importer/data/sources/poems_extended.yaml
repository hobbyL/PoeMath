- id: poem_ext_077
  title: 登岳阳楼
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '昔闻洞庭水，今上岳阳楼。

    吴楚东南坼，乾坤日夜浮。

    亲朋无一字，老病有孤舟。

    戎马关山北，凭轩涕泗流。

    '
