- id: poem_exp_253
  title: 父善游
  author: 吕不韦 撰
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '有过于江上者，见人方引婴儿而欲投之江中，婴儿啼。

    人问其故。

    曰：“此其父善游。

    ”其父虽善游，其子岂遽善游哉？

    以此任物，亦必悖矣。

    '
