- id: poem_ext_101
  title: 饯别王十一南游
  author: 刘长卿
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '望君烟水阔，挥手泪沾巾。

    飞鸟没何处，青山空向人。

    长江一帆远，落日五湖春。

    谁见汀洲上，相思愁白蘋。

    '
  annotations:
