    meaning: 分裂
  - word: 乾坤
    meaning: 指日、月
  translation: 很早听过闻名遐迩的洞庭湖，今日有幸登上湖边的岳阳楼。 大湖浩瀚像把吴楚东南隔开，天地像在湖面日夜荡漾漂浮。 漂泊江湖亲朋故旧不寄一字，年老体弱生活在这一叶孤舟。 关山以北战争烽火仍未止息，凭窗遥望胸怀家国涕泪交流。
  appreciation: 此诗是杜甫诗中的五律名篇，前人称为盛唐五律第一。从总体上看，江山的壮阔，在诗中互为表里。虽然悲伤，却不消沉；虽然沉郁，却不压抑。反映了其关心民生疾苦的风格。 首联虚实交错，今昔对照，从而扩大了时空领域。写早闻洞庭盛名，然而到暮年才实现目睹名湖的愿望，表面看有初登岳阳楼之喜悦，其实意在抒发早年抱负至今未能实现之情。用“昔闻”为“今上”蓄势，归根结底是为描写洞庭湖酝酿气氛。
