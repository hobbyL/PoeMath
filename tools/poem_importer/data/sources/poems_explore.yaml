- id: poem_exp_305
  title: 鱼藻
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '鱼在在藻，有颁其首。

    王在在镐，岂乐饮酒。

    鱼在在藻，有莘其尾。

    王在在镐，饮酒乐岂。

    鱼在在藻，依于其蒲。

    王在在镐，有那其居。

