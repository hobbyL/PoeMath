  - word: 蜡炬
    meaning: 蜡烛
  - word: 泪始干
    meaning: 泪，指燃烧时的蜡烛油，这里取双关义，指相思的眼泪
  - word: 晓镜
    meaning: 早晨梳妆照镜子
  translation: 见面的机会真是难得，分别时更是难舍难分，况且又兼东风将收的暮春天气，百花残谢，更加使人伤感。 春蚕结茧到死时丝才吐完，蜡烛要燃尽成灰时像泪一样的蜡油才能滴干。 女子早晨妆扮照镜，只担忧丰盛如云的鬓发改变颜色，青春的容颜消失。男子晚上长吟不寐，必然感到冷月侵人。 对方的住处就在不远的蓬莱山，却无路可通，可望而不可及。希望有青鸟一样的使者殷勤地为我去探看情人。
  appreciation: 这首诗，以女性的口吻抒写爱情心理，在悲伤、痛苦之中，寓有灼热的渴望和坚忍的执着精神，感情境界深微绵邈，极为丰富。 开头两句，写爱情的不幸遭遇和抒情主人公的心境：由于受到某种力量的阻隔，一对情人已经难以相会，分离的痛苦使她不堪忍受。首句的“别”字，不是说当下正在话别，而是指既成的被迫分离。两个“难”字，第一个指相会困难，第二个是痛苦难堪的意思。前人诗中曾有“别日何易会日难”（曹丕《燕歌行》）“别易会难得”（宋武帝《丁都护歌》）等句，都是以强调重聚之难而感叹离别之苦。李商隐从这里推进一步，表明因为“相见时难”所以“别亦难”——难以割舍、痛苦得难以禁受。诗人在一句之中两次使用“难”字，第二个“难”字的出现，因重复而给人以轻微的突兀感，造成了诗句的绵联纤曲之势，使相见无期的离别之痛因表达方式的低回婉转而显得分外的深沉和缠绵；这样的缠绵情态，在“别易会难得”等平直叙述中是不易体会的。这位抒情主人公既已伤怀如此，恰又面对着暮春景物，当然更使她悲怀难遣。暮春时节，东风无力，百花纷谢，美好的春光即将逝去，人力对此是无可奈何的，而自己的境遇之不幸，和心灵的创痛，也同眼前这随着春天的流逝而凋残的花朵一样，因为美的事物受到摧残，岂不令人兴起无穷的。
