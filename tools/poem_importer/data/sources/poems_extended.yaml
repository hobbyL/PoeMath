  - word: 襄州
    meaning: 今湖北襄阳
  - word: 流落
    meaning: 漂泊
  translation: "流落在边征的老将，如今要去襄州。三军放下哭泣，万里送行舟。旗影动，边草秋；笳声咽，汉家愁。（意译：刘长卿写老将去职远行的苍凉送别。）"
  appreciation: "刘长卿送李中丞，写老将流落与军中伤别，沉郁有力，是中唐送别名篇。"
  background: "刘长卿送友人李中丞赴襄州。"
  famous_lines:
