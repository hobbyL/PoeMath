  is_required: false
  difficulty: 4
  content: '记归程过半，家住天南，吴烟越岫飘渺，转眼秋冬，几回新月，偏向离人燎皎。

    急管宵残，疏钟梦断，客衣寒悄。

    忆临岐，泪染湘罗，怕助风霜易老。

    是尔翠黛慵描，正恹恹憔悴，向予低道：念此去谁怜，冷暖关山路杳？

    才携手教、款语丁宁，眼底征云缭绕。

    悔不剪、春雨蘼芜，牵惹愁怀多少！

    '
