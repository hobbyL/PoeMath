- id: poem_exp_194
  title: 酹江月·驿中言别
  author: 邓剡
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '水天空阔，恨东风不惜世间英物。

    蜀鸟吴花残照里，忍见荒城颓壁。

    铜雀春情，金人秋泪，此恨凭谁雪？

    堂堂剑气，斗牛空认奇杰。

    那信江海余生，南行万里，属扁舟齐发。

    正为鸥盟留醉眼，细看涛生云灭。

    睨柱吞嬴，回旗走懿，千古冲冠发。

    伴人无寐，秦淮应是孤月。

    '
