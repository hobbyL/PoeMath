- id: poem_ext_344
  title: 孙权劝学
  author: 司马光 撰
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 4
  content: '初，权谓吕蒙曰：“卿今当涂掌事，不可不学！

    ”蒙辞以军中多务。

    权曰：“孤岂欲卿治经为博士邪?

    但当涉猎，见往事耳。

    卿言多务，孰若孤？

    孤常读书，自以为大有所益。

    ”蒙乃始就学。

    及鲁肃过寻阳，与蒙论议，大惊曰：“卿今者才略，非复吴下阿蒙！

    ”蒙曰：“士别三日，即更刮目相待，大兄何见事之晚乎！

    ”肃遂拜蒙母，结友而别。

    '
  annotations:
  - word: 孙权
    meaning: 三国时吴国君主
  - word: 劝学
    meaning: 劝人学习
  - word: 吕蒙
    meaning: 东吴大将
  - word: 刮目相看
    meaning: 用新眼光看待
  translation: "起初孙权对吕蒙说：「你现在当权管事，不可不学习！」吕蒙以军中事务多为由推辞。孙权说：「我难道要你当治经博士吗？只是应当涉猎，了解往事。你说事多，谁比得上我？我经常读书，自以为大有益处。」吕蒙于是开始学习。到鲁肃经过寻阳，与吕蒙议论，大惊说：「你如今的才略，不再是吴下阿蒙了！」吕蒙说：「士别三日，就当刮目相待，大哥看事何太晚呢！」鲁肃于是拜见吕蒙的母亲，结为朋友而别。"
  appreciation: "司马光记孙权劝学。刮目相待、吴下阿蒙，成语出典，劝学与交谊并传。"
  background: "《资治通鉴》所载孙权劝吕蒙读书事。"
  famous_lines:
