    meaning: 词牌名
  - word: 寒草
    meaning: 冬天枯草
  - word: 烟光
    meaning: 烟雾般的光
  translation: "寒草烟光开阔，渭水波声呜咽。春潮雨霁，轻尘也歇。征鞍已发。指着青青杨柳，又是一次轻轻攀折。心中黯然，知后会在何时节？再进一杯酒，唱一曲。叹人生最难欢聚、最易离别。且莫推辞沉醉，听把《阳关》唱彻。念故人，千里至此共明月。"
  appreciation: "寇准写渭水送别。攀柳、进酒、阳关，结以千里共明月，情真语畅，是其词中佳作。"
