- id: poem_ext_180
  title: 子夜吴歌·夏歌
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '镜湖三百里，菡萏发荷花。

    五月西施采，人看隘若耶。

    回舟不待月，归去越王家。

    '
  annotations:
  - word: 子夜吴歌
    meaning: 六朝乐府旧题
  - word: 镜湖
    meaning: 在今浙江绍兴
  - word: 西施
    meaning: 春秋时越国美女
  - word: 耶溪
    meaning: 若耶溪
  translation: 镜湖之大有三百余里，到处都开满了欲放的苛花。 西施五月曾在此采莲，引得来观看的人挤满了若耶溪。 西施回家不到一个月，便被选进了宫中。
  appreciation: 这首诗以写景起端：“镜湖三百里，菡萏发荷花。”广阔三百里的镜湖，在含着花苞的荷花吐发的时候，西施泛舟出现了，成为采莲人，但是她的艳丽和美名引起了轰动，“人看隘若耶”，人人争餐秀色，使宽阔的若耶溪变得狭隘了，这一“隘”字传神，那种人潮汹涌、人舟填溪满岸的热闹场面，犹如呈现在读者眼前，将王维的“艳色天下重”的虚写，变成了轰动当地的如实描绘。这里又戛然而止，不再在西施身上着墨，而留下了很大的想象空间，让读者以合理的想象来补足：勾践早已确定使用美人计来对付吴国，而西施的美艳倾倒众生，轰动当地，那么越国的君臣也不用去费力探访了，有了这位不二的美女人选之后，才“回舟不待月，归去越王家”。较之王维的“朝为越溪女，暮作吴宫妃”，语异而意同，王维的诗多了一重曲折，略去了勾践君臣实施美人计的过程；李白的诗实施了“截割”，割去了选作吴宫妃子的结果，同样地表现了“艳色天下重”的意义。这种截割，多了一些含蓄和暗示：既然是“归向越王家”，勾践同样也能留下这个美人，但他在“报吴”、“复仇”的目标下克制住了；而西施的入吴，却成为亡吴的原因之一。这等于是提醒读者：“到底是因为吴王夫差好色之过，还是由于西施成了亡吴的关键？如果西施是灭亡吴国的关键，那么越国在后。
