- id: poem_exp_257
  title: 邴原泣学
  author: 礼赞
  dynasty: 明
  layer: explore
  is_required: false
  difficulty: 4
  content: '邴原少孤，数岁时，过书舍而泣。

    师曰：“童子何泣？

    ”原曰：“孤者易伤，贫者易感。

    夫书者，凡得学者，有亲也。

    一则愿其不孤，二则羡其得学，中心伤感，故泣耳。

    ”师恻然曰：“欲书可耳!

    ”原曰：“无钱资。

    ”师曰：“童子苟有志,吾徒相教,不求资也。

    ”于是遂就书。

    一冬之间，诵《孝经》《论语》。

    '
  annotations:
  - word: 邴原
    meaning: 东汉人名
  - word: 泣学
    meaning: 因不能上学而哭泣
  translation: "邴原幼年丧父，几岁时走过书舍而哭。老师问：「童子为何哭？」原说：「孤者易伤，贫者易感。这些读书的，凡能学习的，都有双亲。一则愿己不孤，二则羡慕他们能学，心中伤感，故哭。」老师恻然道：「想读书可以啊！」于是原开始读书。"
  appreciation: "邴原泣学。因孤贫羡学而泣，师恻然许之，劝学故事感人。"
  background: "《初学记》等所载邴原幼时泣学事。"
