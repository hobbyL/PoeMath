- id: poem_exp_039
  title: 行台闲咏
  author: 石玠
  dynasty: 明
  layer: explore
  is_required: false
  difficulty: 3
  content: '清于池水净于苔，会府潭潭暂作台。

    夜月半庭人未宿，春云满眼杏将开。

    榆关道路犹堪走，麟阁功勋岂易陪。

    莫信蓬莱相离远，塞鸿多自日边来。

    '
