    meaning: 聆听秋后的蝉儿的鸣叫
  - word: 暮蝉
    meaning: 秋后的蝉，这里是指蝉的叫声
  translation: "寒山转为苍翠，秋水日日潺湲。倚杖立在柴门外，临风听暮蝉。渡口还留着落日，村落升起孤烟。又正逢接舆似的友人醉了，在五柳先生门前狂歌。"
  appreciation: "「渡头馀落日，墟里上孤烟」写秋日田园闲居，静中有动，是王维赠裴迪的名篇。"
  background: "王维隐居辋川，赠友人裴迪，写闲居之乐。"
  famous_lines:
  - 复值接舆醉，狂歌五柳前
