- id: poem_ext_272
  title: 秋日登扬州西灵塔
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '宝塔凌苍苍，登攀览四荒。

    顶高元气合，标出海云长。

    万象分空界，三天接画梁。

    水摇金刹影，日动火珠光。

    鸟拂琼帘度，霞连绣栱张。

    目随征路断，心逐去帆扬。

    露浴梧楸白，霜催橘柚黄。

    玉毫如可见，于此照迷方。

    '
