- id: poem_ext_141
  title: 西塞山怀古
  author: 刘禹锡
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '王濬楼船下益州，金陵王气黯然收。

    千寻铁锁沉江底，一片降幡出石头。

    人世几回伤往事，山形依旧枕寒流。

    今逢四海为家日，故垒萧萧芦荻秋。

    '
  annotations:
  - word: 西塞山
    meaning: 在今湖北黄石
  - word: 王濬
    meaning: 西晋灭吴将领
  - word: 楼船
    meaning: 战船
  - word: 金陵
    meaning: 南京
  translation: 王濬的战船从益州出发，东吴的王气便黯然消逝。 千丈长的铁链沉入江底，一片降旗挂在石头城头。 人生中多少次伤怀往事，山形依然不变靠着寒流。 从今以后天下归为一同，芦荻在旧垒上萧萧飘摇。
  appreciation: 西塞山，在今湖北省黄石市东面的长江边上。岚横秋塞，山锁洪流，形势险峻。是六朝有名的军事要塞。公元280年（西晋太康元年），晋武帝司马炎命王濬率领以高大的战船“楼船”组成的西晋水军，顺江而下，讨伐东吴。诗人便以这件史事为题，开头写“楼船下益州”，“金陵王气”便黯然消失。益州金陵，相距遥遥，一“下”即“收”，表明速度之快。两字对举就渲染出一方是势如破竹，一方则是闻风丧胆，强弱悬殊，高下立判。第二联便顺势而下，直写战事及其结果。东吴的亡国之君孙皓，凭借长江天险，并在江中暗置铁锥，再加以千寻铁链横锁江面，自以为是万全之计，谁知王濬用大筏数十，冲走铁锥，以火炬烧毁铁链，结果顺流鼓棹，径造三山，直取金陵。“皓乃备亡国之礼，……造于垒门”（《晋书·王濬传》）。第二联就是形象地概括了这一段历史。
    诗的前四句，洗炼、紧凑，在对比之中写出了双方的强弱，进攻的路线，攻守的方式，战争的结局。它只用第一句诗写西晋水军出发，下面就单写东吴：在战争开始的反映，苦心经营的工事被毁，直到举旗投降，步步紧逼，一气直下。人们不仅看到了失败者的形象，也看到了胜利者的那种摧枯拉朽的气势。可谓虚实相间，胜败相形，巧于安排。 诗人在剪裁上颇具功力。他从众多的史事中单选西。
