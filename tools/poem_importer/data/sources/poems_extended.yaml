- id: poem_ext_160
  title: 感遇十二首·其四
  author: 张九龄
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '孤鸿海上来，池潢不敢顾。

    侧见双翠鸟，巢在三珠树。

    矫矫珍木巅，得无金丸惧？

    美服患人指，高明逼神恶。

    今我游冥冥，弋者何所慕！

    '
  annotations:
  - word: 鸿
    meaning: 雁类的泛称
  - word: 池潢
    meaning: 池塘，积水池，护城河，代指朝廷
  - word: 双翠鸟
    meaning: 即翡翠鸟，雄为翡，雌为翠，毛色华丽多彩
  - word: 三珠树
    meaning: 神话传说中的宝树
  - word: 得无”句
    meaning: 岂不惧怕有子弹打来？得无，表反问语气、岂不、能不
  translation: "孤鸿从海上飞来，池塘水洼也不敢看。侧眼见双翠鸟，巢在三珠树上。矫矫立于珍木之巅，难道不怕金丸？美服怕人指点，高明逼得神也憎恶。如今我游于冥冥高空，射鸟的人还能贪慕什么！"
  appreciation: "张九龄以孤鸿自喻。翠鸟高栖有金丸之惧，自己宁游冥冥远害，「弋者何所慕」写退避与自持。"
