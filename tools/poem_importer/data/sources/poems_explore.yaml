- id: poem_exp_666
  title: "明日歌"
  author: "钱福"
  dynasty: "明"
  content: "明日复明日，明日何其多。\n我生待明日，万事成蹉跎。\n世人若被明日累，春去秋来老将至。\n朝看水东流，暮看日西坠。\n百年明日能几何，请君听我明日歌。"
  translation: "明日又明日，明日何其多。我一生等待明日，万事成蹉跎。世人若被明日拖累，春去秋来老将至。朝看水东流，暮看日西坠。百年能有多少明日，请听我这《明日歌》。"
  appreciation: "钱福明日歌。劝惜今日，勿待明日。"
  background: "明钱福（一作文嘉）《明日歌》。"
  famous_lines:
    - "我生待明日，万事成蹉跎"
  tags:
    - "哲理"
    - "明诗"
  layer: explore
- id: poem_exp_667
  title: "雪梅·其一"
  author: "卢梅坡"
  dynasty: "宋"
  content: "梅雪争春未肯降，骚人搁笔费评章。\n梅须逊雪三分白，雪却输梅一段香。"
  translation: "梅雪争春互不相让，诗人搁笔难评章。梅须逊雪三分白，雪却输梅一段香。"
  appreciation: "卢梅坡雪梅。各有千秋，理趣巧妙。"
  background: "宋卢梅坡《雪梅》。"
  famous_lines:
    - "梅须逊雪三分白，雪却输梅一段香"
  tags:
    - "咏物"
    - "宋诗"
  layer: explore
- id: poem_exp_668
  title: "过华清宫绝句"
  author: "杜牧"
  dynasty: "唐"
  content: "长安回望绣成堆，山顶千门次第开。\n一骑红尘妃子笑，无人知是荔枝来。"
  translation: "长安回望如绣成堆，山顶千门依次打开。一骑红尘妃子笑，无人知道是荔枝来。"
  appreciation: "杜牧过华清宫。荔枝与妃子笑，讽奢。"
  background: "唐杜牧《过华清宫》。"
  famous_lines:
    - "一骑红尘妃子笑，无人知是荔枝来"
  tags:
    - "怀古"
    - "唐诗"
  layer: explore
- id: poem_exp_669
  title: "山亭夏日"
  author: "高骈"
  dynasty: "唐"
  content: "绿树阴浓夏日长，楼台倒影入池塘。\n水晶帘动微风起，满架蔷薇一院香。"
  translation: "绿树阴浓夏日长，楼台倒影入池塘。到了水晶帘动微风起，满架蔷薇一院香。——满架蔷薇一院香」所写的那一层意思。"
  appreciation: "《山亭夏日》中「满架蔷薇一院香」最动人。高骈写夏天，有画面，也有余味。"
  background: "唐高骈《山亭夏日》。"
  famous_lines:
    - "满架蔷薇一院香"
  tags:
    - "夏天"
    - "唐诗"
  layer: explore
- id: poem_exp_670
  title: "晓窗"
  author: "魏源"
  dynasty: "清"
  content: "少闻鸡声眠，老听鸡声起。\n千古万代人，消磨数声里。"
  translation: "年少闻鸡声才睡，年老听鸡声就起。千古万代人，都消磨在这几声里。"
  appreciation: "魏源晓窗。鸡声里见人生，简劲。"
  background: "清魏源《晓窗》。"
  famous_lines:
    - "千古万代人，消磨数声里"
  tags:
    - "哲理"
    - "清诗"
  layer: explore
- id: poem_exp_671
  title: "乡村四月"
  author: "翁卷"
  dynasty: "宋"
  content: "绿遍山原白满川，子规声里雨如烟。\n乡村四月闲人少，才了蚕桑又插田。"
  translation: "绿遍山原，白水满川；子规声里，雨细如烟。乡村四月闲人少，刚了蚕桑又插田。"
  appreciation: "翁卷乡村四月。蚕桑插田，忙中有诗。"
  background: "宋翁卷《乡村四月》。"
  famous_lines:
    - "乡村四月闲人少，才了蚕桑又插田"
  tags:
    - "田园"
    - "宋诗"
  layer: explore
- id: poem_exp_672
  title: "冬夜读书示子聿"
  author: "陆游"
  dynasty: "宋"
  content: "古人学问无遗力，少壮工夫老始成。\n纸上得来终觉浅，绝知此事要躬行。"
  translation: "古人做学问不遗余力，少壮工夫到老才成。纸上得来终究觉得浅，要真正知道必须亲自实行。"
  appreciation: "陆游示子聿。纸上得来终觉浅，劝实践。"
  background: "宋陆游《冬夜读书示子聿》。"
  famous_lines:
    - "纸上得来终觉浅，绝知此事要躬行"
  tags:
    - "哲理"
    - "宋诗"
  layer: explore
- id: poem_exp_673
  title: "观书有感·其一"
  author: "朱熹"
  dynasty: "宋"
  content: "半亩方塘一鉴开，天光云影共徘徊。\n问渠那得清如许，为有源头活水来。"
  translation: "半亩方塘像一面镜子打开，天光云影在其中徘徊。问它怎能如此清澈，因为有源头活水来。"
  appreciation: "朱熹观书有感。源头活水，喻学须出新。"
  background: "宋朱熹《观书有感》。"
  famous_lines:
    - "问渠那得清如许，为有源头活水来"
  tags:
    - "哲理"
    - "宋诗"
  layer: explore
- id: poem_exp_674
  title: "观书有感·其二"
  author: "朱熹"
  dynasty: "宋"
  content: "昨夜江边春水生，蒙冲巨舰一毛轻。\n向来枉费推移力，此日中流自在行。"
  translation: "昨夜江边春水涨起，艨艟巨舰轻得像一根毛。从前白费推移的力气，今日在中流自在航行。"
  appreciation: "朱熹观书。水涨船轻，喻学有积累。"
  background: "宋朱熹《观书有感》其二。"
  famous_lines:
    - "向来枉费推移力，此日中流自在行"
  tags:
    - "哲理"
    - "宋诗"
  layer: explore
