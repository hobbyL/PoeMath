  - id: poem_exp_245
    title: 寒食野望吟
    author: 白居易
    dynasty: 唐
    layer: explore
    is_required: false
    difficulty: 3
    content: |
      乌啼鹊噪昏乔木，清明寒食谁家哭。
      风吹旷野纸钱飞，古墓垒垒春草绿。
      棠梨花映白杨树，尽是死生别离处。
      冥冥重泉哭不闻，萧萧暮雨人归去。
