- id: poem_ext_133
  title: 春思
  author: 皇甫冉
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '莺啼燕语报新年，马邑龙堆路几千。

    家住层城临汉苑，心随明月到胡天。

