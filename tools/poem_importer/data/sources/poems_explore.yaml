- id: poem_exp_052
  title: 渡江云·揭浩斋送春和韵
  author: 吴澄
  dynasty: 元
  layer: explore
  is_required: false
  difficulty: 4
  content: '名园花正好，娇红白，百态竞春妆。

    笑痕添酒晕。

    丰脸凝脂，谁为试铝霜。

    诗朋酒伴，趁此日流转风光。

    尽夜游不妨秉烛，未觉是疏狂。

    茫茫。

    一年一度，烂漫离披，似长江去浪。

    但要教啼莺语燕，不怨卢郎。

    问春春道何曾去，任蜂蝶飞过东墙。

    君看取，年年潘令河阳。

    '
  annotations:
  - word: 渡江云
    meaning: 词牌名
  - word: 送春
    meaning: 送别春天
  - word: 和韵
    meaning: 依韵唱和
  translation: "名园花正好，娇红与白，百态争着春妆。笑痕添着酒晕，丰脸像凝脂，谁为试铅霜？诗朋酒伴，趁此日流转风光。尽可夜游秉烛，不觉得疏狂。茫茫一年一度，花落如长江去浪。但要教啼莺语燕不怨。问春春说何曾去，任蜂蝶飞过东墙。君看取，年年潘令河阳——花总还在。"
  appreciation: "吴澄送春。问春何曾去，惜春而旷达。"
  background: "元吴澄《渡江云》。"
  famous_lines:
  - 君看取，年年潘令河阳。
  tags:
  - 写景
  - 婉约
  - 春天
  - 送春
  - 古诗词
- id: poem_exp_054
  title: 咏孤石
  author: 惠标
  dynasty: 南北朝
  layer: explore
  is_required: false
  difficulty: 3
  content: '中原一孤石，地理不知年。

    根含彭泽浪，顶入香炉烟。

    崖成二鸟翼，峰作一芙莲。

    何时发东武，今来镇蠡川。

    '
  annotations:
  - word: 孤石
    meaning: 独立的石头
  - word: 中流
    meaning: 水流中央
  - word: 峥嵘
    meaning: 高峻突出
  translation: "中原有一块孤石，生成的年代无人知。根含着彭泽浪，顶伸进香炉烟。崖像两只鸟翼，峰像一朵芙蓉。何时从东武出发，如今来坐镇蠡川。"
  appreciation: "惠标咏孤石。"
  background: "南北朝惠标《咏孤石》。"
  famous_lines:
  - 何时发东武，今来镇蠡川。
  tags:
  - 咏物
  - 写山
  - 古诗词
