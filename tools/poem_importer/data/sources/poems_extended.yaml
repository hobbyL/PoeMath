- id: poem_ext_258
  title: 送人东游
  author: 温庭筠
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '荒戍落黄叶，浩然离故关。

    高风汉阳渡，初日郢门山。

    江上几人在，天涯孤棹还。

    何当重相见，樽酒慰离颜。

    '
  annotations:
