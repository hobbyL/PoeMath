- id: poem_exp_391
  title: 临江仙·大风雨过马当山
  author: 薛时雨
  dynasty: 清
  layer: explore
  is_required: false
  difficulty: 3
  content: '雨骤风驰帆似舞，一舟轻度溪湾。

    人家临水有无间。

    江豚吹浪立，沙鸟得鱼闲。

    绝代才人天亦喜，借他只手回澜。

    而今无复旧词坛。

    马当山下路，空见野云还。

