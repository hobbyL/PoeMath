- id: poem_ext_193
  title: 行路难·其二
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '大道如青天，我独不得出。

    羞逐长安社中儿，赤鸡白雉赌梨栗。

    弹剑作歌奏苦声，曳裾王门不称情。

    淮阴市井笑韩信，汉朝公卿忌贾生。

    君不见昔时燕家重郭隗，拥篲折节无嫌猜。

    剧辛乐毅感恩分，输肝剖胆效英才。

    昭王白骨萦蔓草，谁人更扫黄金台？

    行路难，归去来！

    '
  annotations:
  - word: 弹剑作歌奏苦声
    meaning: 战国时代，冯谖投齐国贵族孟尝君门下为门客，但不受孟尝君的重视，便三番弹剑作歌，抱怨自己得到的待遇太低
  - word: 曳裾王门
    meaning: 语出《汉书·邹阳传》中的“饰固陋
  translation: 人生道路如此宽广，唯独我没有出路。 我不愿意追随长安城中的富家子弟，去搞斗鸡走狗一类的赌博游戏。 像冯谖那样弹剑作歌发牢骚，在权贵之门卑躬屈节是不合我心意的。 当年淮阴市人讥笑韩信怯懦无能，汉朝公卿大臣嫉妒贾谊才能超群。 你看，古时燕昭王重用郭隗，拥篲折节、谦恭下士，毫不嫌疑猜忌。 剧辛和乐毅感激知遇的恩情，竭忠尽智，以自己的才能来报效君主。 然而燕昭王早就死了，还有谁能像他那样重用贤士呢？
    世路艰难，我只得归去啦！
