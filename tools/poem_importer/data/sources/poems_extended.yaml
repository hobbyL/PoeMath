- id: poem_ext_152
  title: 寻西山隐者不遇
  author: 丘为
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '绝顶一茅茨，直上三十里。

    扣关无僮仆，窥室唯案几。

    若非巾柴车，应是钓秋水。

    差池不相见，黾勉空仰止。

    草色新雨中，松声晚窗里。

    及兹契幽绝，自足荡心耳。

    虽无宾主意，颇得清净理。

    兴尽方下山，何必待之子。

    '
