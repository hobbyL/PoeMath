  - 悼亡
  - 七言律诗
- id: poem_ext_107
  title: 遣悲怀三首·其二
  author: 元稹
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '昔日戏言身后意，今朝都到眼前来。

    衣裳已施行看尽，针线犹存未忍开。

    尚想旧情怜婢仆，也曾因梦送钱财。

    诚知此恨人人有，贫贱夫妻百事哀。

    '
