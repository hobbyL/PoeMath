    临当上马时，我独与君言。

    风吹芳兰折，日没鸟雀喧。

    举手指飞鸿，此情难具论。

    同归无早晚，颍水有清源。

    君思颍水绿，忽复归嵩岑。

    归时莫洗耳，为我洗其心。

