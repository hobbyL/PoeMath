  translation: 数声杜鹃的鸣啼，又报告烂漫春光将要凋谢。惜春人更想将那残花折。怎奈何雨虽轻柔风却猛烈，正赶上这梅子发青的暮春时节。看那永丰坊的柳树，在无人的园中整日撒飞絮如飘雪。 切莫把琵琶的细弦拨动，我深深的哀怨细弦也难倾泻。天如有情不会老，真情永不会灭绝。多情的心就像那双丝网，中间有千千万万个结。中夜已经过去了，东方未白，尚留一弯残月。
