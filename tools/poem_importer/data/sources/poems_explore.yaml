  - word: 言别
    meaning: 话别
  translation: "江天一派空阔，恨那东风不肯爱惜世间英杰。蜀鸟吴花映在残照里，怎忍再看荒城颓壁。铜雀台的春情，金铜仙人的秋泪，这恨凭谁洗雪？堂堂剑气冲斗牛，却空认了奇杰。哪知江海余生，南行万里，只靠扁舟齐发。正为鸥盟留着醉眼，细看涛生云灭。睨柱气吞嬴政，回旗吓走司马懿，千古冲冠发。伴人无眠，秦淮应是一轮孤月。"
