- id: poem_ext_391
  title: 谒金门·风乍起
  author: 冯延巳
  dynasty: 五代
  layer: extended
  is_required: false
  difficulty: 3
  content: '风乍起，吹皱一池春水。

    闲引鸳鸯香径里，手挼红杏蕊。

    斗鸭阑干独倚，碧玉搔头斜坠。

    终日望君君不至，举头闻鹊喜。

    '
