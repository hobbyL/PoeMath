- id: poem_exp_297
  title: 衡门
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '衡门之下，可以栖迟。

    泌之洋洋，可以乐饥。

    岂其食鱼，必河之鲂？

    岂其取妻，必齐之姜？

    岂其食鱼，必河之鲤？

    岂其取妻，必宋之子？

    '
