      乌鹊啼叫发出聒噪的声音，在昏暗的高大树木下，是哪家在清明寒食的节日里哭泣？ 风吹动空旷野外中的纸钱，纸钱飞舞，陈旧的坟墓重重叠叠，上面已经长满了绿草。 海棠花与梨花掩映着白杨树，这都是生死离别的地方啊。 亡者在昏晦的黄泉中听不到我们的哭声，来祭奠的人在傍晚萧萧的雨声里回去了。
