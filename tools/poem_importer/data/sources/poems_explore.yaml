- id: poem_exp_385
  title: 鹧鸪天·鹅湖归病起作
  author: 辛弃疾
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 3
  content: '著意寻春懒便回。

    何如信步两三杯。

    山才好处行还倦，诗未成时雨早催。

    携竹杖，更芒鞋。

    朱朱粉粉野蒿开。

    谁家寒食归宁女，笑语柔桑陌上来。

