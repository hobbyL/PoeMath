- id: poem_ext_212
  title: 鹊桥仙·纤云弄巧
  author: 秦观
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 3
  content: '纤云弄巧，飞星传恨，银汉迢迢暗度。金风玉露一相逢，便胜却人间无数。(度通：渡)

    柔情似水，佳期如梦，忍顾鹊桥归路。两情若是久长时，又岂在朝朝暮暮。

    '
  annotations:
  - word: 弄巧
    meaning: 指云彩在空中幻化成各种巧妙的花样
  - word: 飞星
    meaning: 流星
  - word: 银汉
    meaning: 银河
  - word: 迢迢
    meaning: 遥远的样子
  - word: 暗度
    meaning: 悄悄渡过
  translation: 纤薄的云彩在天空中变幻多端，天上的流星传递着相思的愁怨，遥远无垠的银河今夜我悄悄渡过。在秋风白露的七夕相会，就胜过尘世间那些长相厮守却貌合神离的夫妻。 共诉相思，柔情似水，短暂的相会如梦如幻，分别之时不忍去看那鹊桥路。只要两情至死不渝，又何必贪求卿卿我我的朝欢暮乐呢。
  appreciation: 借牛郎织女的故事，以超人间的方式表现人间的悲欢离合，古已有之，如《古诗十九首·迢迢牵牛星》，曹丕的《燕歌行》，李商隐的《辛未七夕》等等。宋代的欧阳修、张先、柳永、苏轼等人也曾吟咏这一题材，虽然遣辞造句各异，却都因袭了“欢娱苦短”的传统主题，格调哀婉、凄楚。相形之下，秦观此词堪称独出机杼，立意高远。 这是一首咏七夕的节序词，起句展示七夕独有的抒情氛围，“巧”与“恨”，则将七夕人间“乞巧”的主题及“牛郎、织女”故事的悲剧性特征点明，练达而凄美。借牛郎织女悲欢离合的故事，歌颂坚贞诚挚的爱情。结句“两情若是久长时，又岂在朝朝暮暮”最有境界，这两句既指牛郎、织女的爱情模式的特点，又表述了作者的爱情观，是高度凝练的名言佳句。这首词因而也就具有了跨时代、跨国度的审美价值和艺术品位。
    此词熔写景、抒情与议论于一炉，叙写牵牛、织女二星相爱的神话故事，赋予这对仙侣浓郁的人情味，讴歌了真挚、细腻、纯洁、坚贞的爱情。词中明写天上双星，暗写人间情侣；其抒情，以乐景写哀，以哀景写乐，倍增其哀乐，读来荡气回肠，感人肺腑。 词一开始即写“纤云弄巧”，轻柔多姿的云彩，变化出许多优美巧妙的图案，显示出织女的手艺何其精巧绝伦。可是，这样美好的人儿，却不能与自己心。
