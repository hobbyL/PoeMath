- id: poem_ext_163
  title: 春泛若耶溪
  author: 綦毋潜
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '幽意无断绝，此去随所偶。

    晚风吹行舟，花路入溪口。

    际夜转西壑，隔山望南斗。

    潭烟飞溶溶，林月低向后。

    生事且弥漫，愿为持竿叟。

    '
  annotations:
  - word: 若耶溪
    meaning: 在今浙江绍兴
  - word: 泛
    meaning: 泛舟
  - word: 幽意
    meaning: 幽静的心境
  translation: "幽意没有断绝，这一去随所遇而定。晚风吹着行舟，花路引入溪口。入夜转入西壑，隔山望见南斗。潭上烟飞溶溶，林中月低向后移。生事且还弥漫不清，愿做个持竿的渔叟。"
  appreciation: "綦毋潜春泛若耶。花路溪口、潭烟林月清幽，结以愿为持竿叟，是盛唐山水隐逸名篇。"
  background: "綦毋潜春日泛舟若耶溪（今浙江绍兴）所作。"
  famous_lines:
  - 生事且弥漫，愿为持竿叟。
  tags:
