  - word: 来天地
    meaning: 与天地俱来
  - word: 玉垒浮云变古今
    meaning: 是说多变的政局和多难的人生，捉摸不定，有如山上浮云，古往今来一向如此
  - word: 玉垒
    meaning: 山名，在四川灌县西、成都西北
  translation: "花近高楼反而伤客心，万方多难时登临此地。锦江春色铺天盖地而来，玉垒浮云变幻古今。北极朝廷终究不改，西山寇盗休要来侵。可怜后主仍有祠庙，日暮时我姑且吟起《梁甫吟》。"
  appreciation: "杜甫成都登楼，写景壮阔而忧时。颔联「锦江」「玉垒」气象雄浑；结以《梁甫吟》自况，忠君忧国之情含蓄深厚。"
  background: "广德二年前后杜甫在成都登楼有感而作，时吐蕃侵扰、国事艰难。"
