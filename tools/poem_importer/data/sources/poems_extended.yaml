  - id: poem_ext_013
    title: 杂诗三首·其二
    author: 王维
    dynasty: 唐
    layer: extended
    is_required: false
    difficulty: 2
    content: |
      君自故乡来，应知故乡事。
      来日绮窗前，寒梅著花未？
    annotations:
      - {word: "来日", meaning: "来的时候"}
      - {word: "绮窗", meaning: "雕画花纹的窗户"}
      - {word: "著花未", meaning: "开花没有"}
    translation: >-
      您是刚从我们家乡来的，一定了解家乡的人情世态。 请问您来的时候我家雕画花纹的窗户前，那一株腊梅花开了没有？
    appreciation: >-
