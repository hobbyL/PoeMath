- id: poem_ext_128
  title: 登楼
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '花近高楼伤客心，万方多难此登临。

    锦江春色来天地，玉垒浮云变古今。

    北极朝廷终不改，西山寇盗莫相侵。

    可怜后主还祠庙，日暮聊为《梁甫吟》。

    '
