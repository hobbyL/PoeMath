- id: poem_exp_159
  title: 喜迁莺·霜天秋晓
  author: 蔡挺
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '霜天秋晓，正紫塞故垒，黄云衰草。

    汉马嘶风，边鸿叫月，陇上铁衣寒早。

    剑歌骑曲悲壮，尽道君恩须报。

    塞垣乐，尽櫜鞬锦领，山西年少。

    谈笑。

    刁斗静，烽火一把，时送平安耗。

    圣主忧边，威怀遐远，骄虏尚宽天讨。

    岁华向晚愁思，谁念玉关人老？

    太平也，且欢娱，莫惜金樽频倒。

    '
