- id: poem_ext_188
  title: 和张仆射塞下曲·其二
  author: 卢纶
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '林暗草惊风，将军夜引弓。

    平明寻白羽，没在石棱中。

    '
  annotations:
  - word: 仆射
    meaning: 唐代高级官职
  - word: 塞下曲
    meaning: 边塞题材的乐府
  - word: 林暗
    meaning: 树林昏暗
  - word: 草惊风
    meaning: 风吹草动
  - word: 白羽
    meaning: 白色羽毛箭
  - word: 没石棱
    meaning: 射入石头棱角中
  translation: 昏暗的树林中，草突然被风吹得摇摆不定，飒飒作响，将军以为野兽来了，连忙开弓射箭。 天亮去寻找那只箭，已经深深地陷入石棱中。
  appreciation: 卢纶《塞下曲》共六首一组，分别写发号施令、射猎破敌、奏凯庆功等等军营生活。语多赞美之意。此为第二首，描写将军夜里巡逻时景况。 首句写将军夜猎场所是幽暗的深林；当时天色已晚，一阵阵疾风刮来，草木为之纷披。这不但交代了具体的时间、地点，而且制造了一种气氛。右北平是多虎地区，深山密林是百兽之王的猛虎藏身之所，而虎又多在黄昏夜分出山，“林暗草惊风”，着一“惊”字，就不仅令人自然联想到其中有虎，呼之欲出，渲染出一片紧张异常的气氛，而且也暗示将军是何等警惕，为下文“引弓”作了铺垫。
    次句即续写射。但不言“射”而言“引弓”，这不仅是因为诗要押韵的缘故，而且因为“引”是“发”的准备动作，这样写能启示读者从中想象、体味将军临险是何等镇定自若，从容不迫。在一“惊”之后，将军随即搭箭开弓，动作敏捷有力而不仓皇，既具气势，而形象也益鲜明。 后二句写“没石饮羽”的奇迹，把时间推迟到翌日清晨，将军搜寻猎物，发现中箭者并非猛虎，而是蹲石，令人读之，始而惊异，既而嗟叹，原来箭杆尾部装置着白色羽毛的箭，竟“没在石棱中”，入石三分。这样写不仅更为曲折，有时间、场景变化，而且富于戏剧性。“石棱”为石的突起部分，箭头要钻入殊不可想象。神话般的夸张，为诗歌形象涂上一。
