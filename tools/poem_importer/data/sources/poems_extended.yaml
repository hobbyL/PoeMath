  author: 刘长卿
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '一路经行处，莓苔见履痕。

    白云依静渚，春草闭闲门。

    过雨看松色，随山到水源。

    溪花与禅意，相对亦忘言。

    '
  annotations:
