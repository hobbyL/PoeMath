- id: poem_ext_166
  title: 古意
  author: 李颀
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '男儿事长征，少小幽燕客。

    赌胜马蹄下，由来轻七尺。

    杀人莫敢前，须如猬毛磔。

    黄云陇底白云飞，未得报恩不能归。

    辽东小妇年十五，惯弹琵琶解歌舞。

    今为羌笛出塞声，使我三军泪如雨。

    '
