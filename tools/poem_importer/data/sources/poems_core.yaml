- id: poem_core_057
  title: 闻官军收河南河北
  author: 杜甫
  dynasty: 唐
  grade: 5
  semester: 下
  textbook_unit: 语文五年级下·课文9
  is_required: true
  difficulty: 3
  content: '剑外忽传收蓟北，初闻涕泪满衣裳。

    却看妻子愁何在，漫卷诗书喜欲狂。

    白日放歌须纵酒，青春作伴好还乡。

    即从巴峡穿巫峡，便下襄阳向洛阳。

    '
  pinyin: 'jiàn wài hū chuán shōu jì běi ， chū wén tì lèi mǎn yī shang 。

    què kàn qī zǐ chóu hé zài ， màn juǎn shī shū xǐ yù kuáng 。

    bái rì fàng gē xū zòng jiǔ ， qīng chūn zuò bàn hǎo huán xiāng 。

    jí cóng bā xiá chuān wū xiá ， biàn xià xiāng yáng xiàng luò yáng 。

    '
  annotations:
  - word: 剑外
    meaning: 剑门关以南，指四川
  - word: 蓟北
    meaning: 今河北北部一带，安史叛军的老巢
  - word: 涕泪
    meaning: 眼泪
  - word: 却看
    meaning: 回头看
  - word: 妻子
    meaning: 妻子和儿女
  - word: 漫卷
    meaning: 随意地卷起
  - word: 青春
    meaning: 春天的美好景色
  - word: 巴峡
    meaning: 长江三峡之一
  - word: 巫峡
    meaning: 长江三峡之一
  translation: 剑门以南忽然传来收复蓟北的消息，初闻这消息我泪水沾湿了衣裳。回头看妻儿的愁云早已不知消散到哪去，随意地卷起诗书高兴得几乎发狂。青天白日放声高歌痛饮美酒，明媚春光正好陪我一同还乡。立刻从巴峡穿过巫峡，顺流而下经过襄阳再回到洛阳。
  appreciation: 被誉为杜甫"生平第一快诗"。以"忽传"、"初闻"、"却看"、"漫卷"等急促的动词，将狂喜之情推向高潮，末联连用四个地名极写归心似箭。
  background: 唐代宗广德元年（763）春，杜甫在梓州（今四川三台）听到官军收复河南河北、平定安史之乱的消息后所作。
  famous_lines:
  - 白日放歌须纵酒，青春作伴好还乡
  tags:
