- id: poem_core_089
  title: 长歌行
  author: 汉乐府
  dynasty: 汉
  grade: 3
  semester: 上
  textbook_unit: 新课标推荐
  is_required: false
  difficulty: 2
  content: '青青园中葵，朝露待日晞。

    阳春布德泽，万物生光辉。

    常恐秋节至，焜黄华叶衰。

    百川东到海，何时复西归？

    少壮不努力，老大徒伤悲。

    '
  pinyin: 'qīng qīng yuán zhōng kuí ， zhāo lù dài rì xī 。

    yáng chūn bù dé zé ， wàn wù shēng guāng huī 。

    cháng kǒng qiū jié zhì ， kūn huáng huā yè shuāi 。

    bǎi chuān dōng dào hǎi ， hé shí fù xī guī ？

    shào zhuàng bù nǔ lì ， lǎo dà tú shāng bēi 。

    '
  annotations:
