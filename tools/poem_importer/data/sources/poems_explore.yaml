- id: poem_exp_574
  title: 陈太丘与友期
  author: 刘义庆
  dynasty: 南北朝
  layer: explore
  is_required: false
  difficulty: 4
  content: '陈太丘与友期行，期日中，过中不至，太丘舍去，去后乃至。

    元方时年七岁，门外戏。

    客问元方：“尊君在不？

    ”答曰：“待君久不至，已去。

    ”友人便怒：“非人哉！

    与人期行，相委而去。

    ”元方曰：“君与家君期日中。

    日中不至，则是无信；对子骂父，则是无礼。

    ”友人惭，下车引之，元方入门不顾。

    '
