  - id: poem_exp_018
    title: 与高适薛据同登慈恩寺浮图
    author: 岑参
    dynasty: 唐
    layer: explore
    is_required: false
    difficulty: 4
    content: |
      塔势如涌出，孤高耸天宫。
      登临出世界，磴道盘虚空。
      突兀压神州，峥嵘如鬼工。
      四角碍白日，七层摩苍穹。
      下窥指高鸟，俯听闻惊风。
      连山若波涛，奔凑似朝东。
      青槐夹驰道，宫馆何玲珑。
      秋色从西来，苍然满关中。
      五陵北原上，万古青濛濛。
      净理了可悟，胜因夙所宗。
      誓将挂冠去，觉道资无穷。
    annotations: []
    translation: >-
      暂无译文，后续可继续补充。
    appreciation: >-
      此诗开头两句：“塔势如涌出，孤高耸天宫。”自下而上仰望，只见巍然高耸的宝塔拔地而起，仿佛从地下涌出，傲然耸立，直达天宫。用一“涌”字，增强了诗的动势，既勾勒出了宝塔孤高危耸之貌，又给宝塔注入了生机，将塔势表现得极其壮观生动。
    background: 入选拓展层主题精选，由 yxcs/poems-db 原始数据整理。
