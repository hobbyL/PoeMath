- id: poem_core_108
  title: 乐游原
  author: 李商隐
  dynasty: 唐
  is_required: true
  difficulty: 2
  content: '向晚意不适，驱车登古原。

    夕阳无限好，只是近黄昏。

    '
  annotations:
  - word: 向晚
    meaning: 傍晚
  - word: 不适
    meaning: 不悦， 不快
  - word: 古原
    meaning: 指乐游原
  - word: 近
    meaning: 快要
  translation: 傍晚时心情不快，驾着车登上古原。 夕阳啊无限美好，只不过接近黄昏。
  appreciation: 这是一首久享盛名的佳作。 李商隐所处的时代是国运将尽的晚唐，尽管他有抱负，但是无法施展，很不得志。这首诗就反映了他的伤感情绪。 前两句“向晚意不适，驱车登古原”是说：傍晚时分我心情悒郁，驾着车登上古老的郊原。“向晚”指天色快黑了，“不适”指不悦。诗人心情忧郁，为了解闷，就驾着车子外出眺望风景。“古原”就是乐游原，在长安城南，地势较高，是唐代的游览胜地。这两句，点明登古原的时间和原因。
  background: "李商隐登长安乐游原所作。乐游原为唐人登高胜地，诗以夕阳寄托迟暮与家国之感。"
  famous_lines:
  - 夕阳无限好，只是近黄昏
