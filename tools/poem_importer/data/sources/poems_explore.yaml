- id: poem_exp_248
  title: 愚人食盐
  author: 僧伽斯那
  dynasty: 南北朝
  layer: explore
  is_required: false
  difficulty: 3
  content: '昔有愚人，至于他家。

    主人与食，嫌淡无味。

    主人闻已，更为益盐。

    既得盐美，便自念言：“所以美者，缘有盐故。

    少有尚尔，况复多也？

    ”愚人无智，便空食盐。

    食已口爽，反为其患。

    '
  annotations:
  - word: 愚人
    meaning: 愚蠢的人
  - word: 食盐
    meaning: 吃盐
  translation: "从前有个愚人到别人家。主人给他饭，他嫌淡无味。主人听了，再加盐。得了盐的美味，便自念：「所以美，是因为有盐。少许尚且如此，何况多呢？」愚人无知，便空口吃盐。吃完口伤，反成了祸患。"
  appreciation: "佛经寓言。讽过犹不及：盐少则美、空食则患，喻凡事有度。"
  background: "《百喻经·愚人食盐喻》。"
  famous_lines:
  - 食已口爽，反为其患。
  tags:
  - 哲理
  - 小学文言文
  - 写人
  - 故事
  - 古诗词
- id: poem_exp_249
  title: 刻舟求剑
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '楚人有涉江者，其剑自舟中坠于水。

    遽契其舟，曰：“是吾剑之所从坠。

    ”舟止，从其所契者入水求之。

    舟已行矣，而剑不行，求剑若此，不亦惑乎！

    '
  annotations:
