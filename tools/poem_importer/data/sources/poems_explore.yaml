- id: poem_exp_472
  title: 桂枝香·金陵怀古
  author: 王安石
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '登临送目，正故国晚秋，天气初肃。

    千里澄江似练，翠峰如簇。

    归帆去棹残阳里，背西风，酒旗斜矗。

    彩舟云淡，星河鹭起，画图难足。

    念往昔，繁华竞逐，叹门外楼头，悲恨相续。

    千古凭高对此，谩嗟荣辱。

    六朝旧事随流水，但寒烟衰草凝绿。

    至今商女，时时犹唱，后庭遗曲。

    '
