- id: poem_exp_040
  title: 夜泉
  author: 袁中道
  dynasty: 明
  layer: explore
  is_required: false
  difficulty: 2
  content: '山白鸟忽鸣，石冷霜欲结。

    流泉得月光，化为一溪雪。

    '
