  translation: "郁孤台下清江水向东流去，江中流淌着多少行人的眼泪。向西北遥望长安，只见无数青山遮断视线。青山终究遮不住，江水毕竟向东奔流而去。江上已是黄昏，我正满怀愁绪，深山里又传来鹧鸪的啼声。"
  appreciation: "辛弃疾过造口，借江山写家国之痛。「青山遮不住，毕竟东流去」一转，气势开张；结以鹧鸪声，余韵苍凉。"
