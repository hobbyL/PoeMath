- id: poem_exp_395
  title: 蝶恋花
  author: 欧阳修
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 3
  content: '翠苑红芳晴满目。

    绮席流莺，上下长相逐。

    紫陌闲随金坜辘。

    马蹄踏遍春郊绿。

    一觉年华春梦促。

    往事悠悠，百种寻思足。

    烟雨满楼山断续。

    人闲倚遍阑干曲。

    '
