- id: poem_exp_608
  title: 把酒问月·故人贾淳令予问之
  author: 李白
  dynasty: 唐
  layer: explore
  is_required: false
  difficulty: 4
  content: '青天有月来几时？

    我今停杯一问之。

    人攀明月不可得，月行却与人相随。

    皎如飞镜临丹阙，绿烟灭尽清辉发。

    但见宵从海上来，宁知晓向云间没。

    白兔捣药秋复春，嫦娥孤栖与谁邻？

    今人不见古时月，今月曾经照古人。

    古人今人若流水，共看明月皆如此。

    唯愿当歌对酒时，月光长照金樽里。

    '
  annotations:
  - word: 阙
    meaning: 朱红色的宫殿
  - word: 绿烟
    meaning: 指遮蔽月光的浓重的云雾
  - word: 但见
    meaning: 只看到
  - word: 宁知
    meaning: 怎知
  - word: 没
    meaning: 隐没
  translation: "青天有月，是从何时来的？我现在停杯问一问。人攀不上明月，月却与人一路相随。皎洁如飞镜临着丹阙，绿烟灭尽，清辉发亮。只见它夜里从海上来，哪知清晨向云间没去。白兔捣药，秋了又春；嫦娥孤栖，与谁为邻？今人看不见古时的月，今月却曾经照过古人。古人今人像流水，共看明月都如此。只愿当歌对酒时，月光长照在金樽里。"
  appreciation: "李白把酒问月。今人不见古时月、月光长照金樽，哲理与豪情并出，是咏月名篇。"
  background: "唐李白《把酒问月》，故人贾淳令其问月而作。"
  famous_lines:
  - 唯愿当歌对酒时，月光长照金樽里。
