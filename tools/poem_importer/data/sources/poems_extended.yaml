- id: poem_ext_021
  title: 八阵图
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '功盖三分国，名成八阵图。

    江流石不转，遗恨失吞吴。

    '
  annotations:
  - word: 盖
    meaning: 超过
  - word: 三分国
    meaning: 指三国时魏、蜀、吴三国
  - word: 八阵图
    meaning: 由八种阵势组成的图形，用来操练军队或作战
  - word: 石不转
    meaning: 指涨水时，八阵图的石块仍然不动
  - word: 失吞吴
    meaning: 是吞吴失策的意思
  translation: 三国鼎立你建立了盖世功绩，创八阵图你成就了永久声名。 江水东流推不转你布阵石头，千古遗恨你灭吴失策功未就。
  appreciation: “功盖三分国，名成八阵图“两句赞颂诸葛亮的丰功伟绩。第一句是从总的方面写，说诸葛亮在确立魏蜀吴三分天下、鼎足而立局势的过程中，功绩最为卓绝。三国并存局面的形成，固然有许多因素，而诸葛亮辅助刘备从无到有地创建蜀国基业，应该说就是重要原因之一。杜甫这一高度概括的赞语，客观地反映了三国时代的历史真实。第二句是从具体的方面来写，说诸葛亮创制八阵图使他声名更加卓著。
