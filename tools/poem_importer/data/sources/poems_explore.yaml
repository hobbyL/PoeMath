- id: poem_exp_288
  title: 国风·鄘风·柏舟
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '泛彼柏舟，亦泛其流。

    耿耿不寐，如有隐忧。

    微我无酒，以敖以游。

    我心匪鉴，不可以茹。

    亦有兄弟，不可以据。

    薄言往愬，逢彼之怒。

    我心匪石，不可转也。

    我心匪席，不可卷也。

    威仪棣棣，不可选也。

    忧心悄悄，愠于群小。

    觏闵既多，受侮不少。

    静言思之，寤辟有摽。

    日居月诸，胡迭而微？

    心之忧矣，如匪浣衣。

    静言思之，不能奋飞。

    '
  annotations:
  - word: 国风
    meaning: 《诗经》的一部分
  - word: 鄘风
    meaning: 鄘国的民歌
  - word: 柏舟
    meaning: 柏木做的船
  translation: "漂着那柏舟，也漂在中流。耿耿不能寐，好像有深忧。不是我没有酒，来遨游。我心不是镜子，不能什么都容……我心不是石头，不可转；我心不是席，不可卷。威仪棣棣，不可选。"
  appreciation: "《诗经·邶风·柏舟》。我心匪石不可转，写坚贞与忧愤。"
  background: "《诗经·邶风·柏舟》。"
  famous_lines:
  - 静言思之，不能奋飞。
  tags:
  - 爱国
  - 诗经
  - 古诗词
- id: poem_exp_289
  title: 国风·邶风·燕燕
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '燕燕于飞，差池其羽。

    之子于归，远送于野。

    瞻望弗及，泣涕如雨。

    燕燕于飞，颉之颃之。

    之子于归，远于将之。

    瞻望弗及，伫立以泣。

    燕燕于飞，下上其音。

    之子于归，远送于南。

    瞻望弗及，实劳我心。

    仲氏任只，其心塞渊。

    终温且惠，淑慎其身。

    先君之思，以勖寡人。

    '
  annotations:
  - word: 燕燕
    meaning: 飞翔的燕子
  - word: 邶风
    meaning: 邶国的民歌
  - word: 于飞
    meaning: 飞翔
  translation: "燕子飞着，羽毛差池不齐。那人出嫁，远送到郊野。望而不及，泣涕如雨。燕子飞着，上上下下。那人出嫁，远远送她。望而不及，伫立而泣。燕子飞着，上下鸣叫。那人出嫁，远送到南方。望而不及，实在劳我心。仲氏可靠，心充实深沉。始终温和聪慧，谨慎自身。念着先君，用以勉励我。"
  appreciation: "《邶风·燕燕》送嫁。瞻望弗及、伫立以泣，是《诗经》送别名篇。"
  background: "《诗经·邶风·燕燕》，一说庄姜送归妾。"
  famous_lines:
