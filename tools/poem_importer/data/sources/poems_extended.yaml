- id: poem_ext_100
  title: 秋日登吴公台上寺远眺
  author: 刘长卿
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '古台摇落后，秋日望乡心。

    野寺来人少，云峰隔水深。

    夕阳依旧垒，寒磬满空林。

    惆怅南朝事，长江独至今。

    '
  annotations:
