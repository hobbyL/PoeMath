- id: poem_ext_392
  title: 踏莎行·寒草烟光阔
  author: 寇准
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 4
  content: '寒草烟光阔，渭水波声咽。

    春潮雨霁轻尘歇。

    征鞍发。

    指青青杨柳，又是轻攀折。

    动黯然，知有后会甚时节？

    更进一杯酒，歌一阕。

    叹人生，最难欢聚易离别。

    且莫辞沉醉，听取阳关彻。

    念故人，千里至此共明月。

    '
