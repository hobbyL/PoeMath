  - 五言律诗
- id: poem_ext_097
  title: 望月怀远
  author: 张九龄
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '海上生明月，天涯共此时。

    情人怨遥夜，竟夕起相思。

    灭烛怜光满，披衣觉露滋。

    不堪盈手赠，还寝梦佳期。

    '
  annotations:
