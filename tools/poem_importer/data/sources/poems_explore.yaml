- id: poem_exp_237
  title: 水调歌头·定王台
  author: 袁去华
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '雄跨洞庭野，楚望古湘州。

    何王台殿，危基百尺自西刘。

    尚想霓旌千骑，依约入云歌吹，屈指几经秋。

    叹息繁华地，兴废两悠悠。

    登临处，乔木老，大江流。

    书生报国无地，空白九分头。

    一夜寒生关塞，万里云埋陵阙，耿耿恨难休。

    徙倚霜风里，落日伴人愁。

    '
