- id: poem_ext_105
  title: 客夜与故人偶集
  author: 戴叔伦
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '天秋月又满，城阙夜千重。

    还作江南会，翻疑梦里逢。

    风枝惊暗鹊，露草覆寒蛩。

    羁旅长堪醉，相留畏晓钟。

    '
