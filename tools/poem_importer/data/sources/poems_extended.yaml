- id: poem_ext_159
  title: 寄全椒山中道士
  author: 韦应物
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '今朝郡斋冷，忽念山中客。

    涧底束荆薪，归来煮白石。

    欲持一瓢酒，远慰风雨夕。

    落叶满空山，何处寻行迹。

    '
  annotations:
  - word: 全椒
    meaning: 地名，在今安徽
  - word: 道士
    meaning: 修道之人
  - word: 涧底
    meaning: 山涧底部
  - word: 松上
    meaning: 松树上面
  translation: 今天郡斋里很冷，忽然想起山中隐居的人。 你一定在涧底打柴，回来以后煮些清苦的饭菜。 想带着一瓢酒去看你，让你在风雨夜里得到些安慰。 可是秋叶落满空山，什么地方能找到你的行迹？
  appreciation: 此诗题目叫“寄全椒山中道士”。既然是“寄”，自然会吐露对山中道士的忆念之情。但忆念只是一层，还有更深的一层，需要读者细心领略。 诗的关键在于那个“冷”字。全诗所透露的也正是在这个“冷”字上。首句既是写出郡斋气候的冷，更是写出诗人心头的冷。然后，诗人由于这两种冷而忽然想起山中的道士。山中的道士在这寒冷气候中到涧底去打柴，打柴回来却是“煮白石”。葛洪《神仙传》说有个白石先生，“尝煮白石为粮，因就白石山居。”还有道家修炼，要服食“石英”。那么“山中客”是谁就很清楚了。
    道士在山中艰苦修炼，诗人怀念老友，想送一瓢酒去，好让他在这秋风冷雨之夜，得到一点友情的安慰。然而诗人进一层想，他们都是逢山住山、见水止水的人，今天也许在这块石岩边安顿，明天恐怕又迁到别一处什么洞穴安身了。何况秋天来了，满山落叶，连路也不容易找，走过的脚迹自然也给落叶掩没了，因而也不知去何处找对方。 诗虽淡淡写来，却使读者能感到诗人情感上的种种跳荡与反复。开头，是由于郡斋的冷而想到山中的道士，再想到送酒去安慰他，终于又觉得找不着他而无可奈何；而诗人自己心中的寂寞之情，也终于无从消解。
    诗人在风雨之夜想起友人，想带着酒去拜访，可见两人的深厚友情。而满山落叶，恐不能相遇。
  background: 入选《唐诗三百首》，由 yxcs/poems-db 原始数据整理。
