- id: poem_ext_109
  title: 积雨辋川庄作
  author: 王维
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '积雨空林烟火迟，蒸藜炊黍饷东菑。

    漠漠水田飞白鹭，阴阴夏木啭黄鹂。

    山中习静观朝槿，松下清斋折露葵。

    野老与人争席罢，海鸥何事更相疑。

    '
  annotations:
  - word: 辋川
    meaning: 王维隐居之地
  - word: 积雨
    meaning: 连日阴雨
  - word: 蒸藜
    meaning: 煮野菜
  - word: 漠漠
    meaning: 广阔迷蒙的样子
  translation: "连日阴雨，空林里炊烟升起得晚；蒸藜炊黍，送给东边田间劳作的人。漠漠水田上白鹭飞起，阴阴夏木中黄鹂啼转。山中习静，观看朝开暮落的木槿；松下清斋，采摘带露的葵菜。野老已与人无争，海鸥又何必再相疑呢？"
  appreciation: "「漠漠水田飞白鹭，阴阴夏木啭黄鹂」写积雨后田园生机，对仗工稳，是王维田园诗名联。"
  background: "王维隐居辋川庄、积雨之后即景抒怀。"
  famous_lines:
  - 野老与人争席罢，海鸥何事更相疑
  tags:
