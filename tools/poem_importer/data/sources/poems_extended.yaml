- id: poem_ext_399
  title: 夜游宫·竹窗听雨
  author: 吴文英
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 4
  content: '竹窗听雨，坐久隐几就睡，既觉，见水仙娟娟于灯影中窗外捎溪雨响。

    映窗里、嚼花灯冷。

    浑似萧湘系孤艇。

    见幽仙，步凌波，月边影。

    香苦欺寒劲。

    牵梦绕、沧涛千顷。

    梦觉新愁旧风景。

    绀云欹，玉搔斜，酒初醒。

    '
