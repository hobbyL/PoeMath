  - word: 市远
    meaning: 离市集远
  - word: 兼味
    meaning: 多种美味佳肴
  translation: "屋南屋北都是春水，只见群鸥天天飞来。花径不曾为客人清扫，蓬门今天才为你打开。集市远，盘中菜没有两样；家贫，酒也只是旧醅。你可肯与邻家老翁对饮？隔着篱笆招呼他来喝尽余杯。"
  appreciation: "杜甫写客至之喜。前写幽居鸥鸟，中写蓬门为君开，结以呼邻对饮，质朴亲切，是其田园交游名篇。"
