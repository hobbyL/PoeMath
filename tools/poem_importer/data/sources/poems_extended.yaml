- id: poem_ext_264
  title: 送綦毋潜落第还乡
  author: 王维
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '圣代无隐者，英灵尽来归。

    遂令东山客，不得顾采薇。

    既至金门远，孰云吾道非。

    江淮度寒食，京洛缝春衣。

    置酒长安道，同心与我违。

    行当浮桂棹，未几拂荆扉。

    远树带行客，孤城当落晖。

    吾谋适不用，勿谓知音稀。

    '
