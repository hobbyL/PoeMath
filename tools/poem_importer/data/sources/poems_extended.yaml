- id: poem_ext_072
  title: 凉思
  author: 李商隐
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '客去波平槛，蝉休露满枝。永怀当此节，倚立自移时。

    北斗兼春远，南陵寓使迟。天涯占梦数，疑误有新知。

    '
  annotations:
  - word: 槛
    meaning: 栏杆
  - word: 蝉休
    meaning: 蝉声停止，指夜深
  - word: 永怀
    meaning: 即长想，长久思念
  - word: 此节
    meaning: 此刻
  - word: 倚立
    meaning: 意谓今日重立槛前，时节已由春而秋
  translation: "客人走后，水波平到栏杆；蝉声停了，露水沾满枝条。在这样的时节深深怀念，倚着栏杆站到时光推移。北斗与春天一样遥远，南陵的信使迟迟不来。在天涯多次占梦，怀疑是否误以为有了新知己。"
  appreciation: "李商隐写客去后的凉夜怀人。景清而思曲，「天涯占梦数」写猜疑与相思，细腻深微。"
  background: "李商隐客中怀人之作，一说寄内或寄友，作年难考。"
  famous_lines:
  - 北斗兼春远，南陵寓使迟。天涯占梦数，疑误有新知
  tags:
  - 唐诗三百首
  - 愁思
  - 五言律诗
- id: poem_ext_073
  title: 北青萝
  author: 李商隐
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '残阳西入崦，茅屋访孤僧。落叶人何在，寒云路几层。

    独敲初夜磬，闲倚一枝藤。世界微尘里，吾宁爱与憎。

    '
  annotations:
  - word: 崦
    meaning: 即“崦嵫（zī）”， 山名，在甘肃
  - word: 《山海经》载
    meaning: 鸟鼠同穴山西南有山名崦嵫，日所入处
  - word: 初夜
    meaning: 黄昏
  - word: 磬
    meaning: 古代打击乐器，形状像曲尺，用玉、石制成，可悬挂
  - word: 宁
    meaning: 为什么
  translation: "残阳西沉入山崦，去茅屋拜访孤僧。落叶中人在哪里？寒云里山路几层。初夜独自敲着磬，闲倚着一枝藤。世界不过在微尘里，我何必执着爱与憎。"
  appreciation: "李商隐访僧。前写山路寻访，后以「世界微尘里，吾宁爱与憎」收束，由景入理，见其晚年心境。"
  background: "李商隐访北青萝一带僧人而作，寄托佛理与自解。"
  famous_lines:
  - 独敲初夜磬，闲倚一枝藤。世界微尘里，吾宁爱与憎
  tags:
  - 唐诗三百首
  - 寻访
  - 五言律诗
- id: poem_ext_074
  title: 蝉
  author: 李商隐
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '本以高难饱，徒劳恨费声。

    五更疏欲断，一树碧无情。

    薄宦梗犹泛，故园芜已平。

    烦君最相警，我亦举家清。

    '
  annotations:
  - word: 以
    meaning: 因
  - word: 薄宦
    meaning: 指官职卑微
  - word: 高难饱
    meaning: 古人认为蝉栖于高处，餐风饮露，故说“高难饱”
  - word: 恨费声
    meaning: 因恨而连声悲鸣
  - word: 五更
    meaning: 中国古代把夜晚分成五个时段，用鼓打更报时，所以叫“五更”
  translation: "本因栖高而难以吃饱，徒然费声鸣恨。五更时叫声稀疏欲断，整树碧绿却无情。我官职卑微，仍像断梗漂泊，故园荒芜已平。多谢你最能警醒我，我家也一样清贫。"
  appreciation: "李商隐咏蝉自况。以蝉之高洁难饱写薄宦清贫，「一树碧无情」尤警策，是咏物诗中的寄托名篇。"
  background: "李商隐咏蝉，以蝉自比清高与困顿，作于仕途失意时。"
  famous_lines:
  - 烦君最相警，我亦举家清
  tags:
  - 唐诗三百首
  - 咏物
  - 五言律诗
- id: poem_ext_075
  title: 风雨
  author: 李商隐
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '凄凉宝剑篇，羁泊欲穷年。

    黄叶仍风雨，青楼自管弦。

    新知遭薄俗，旧好隔良缘。

    心断新丰酒，销愁斗几千。

    '
  annotations:
  - word: 宝剑篇
    meaning: 为唐初郭震（字元振）所作诗篇名
  - word: 羁泊
    meaning: 即羁旅飘泊
  - word: 穷年
    meaning: 终生
  - word: 黄叶
    meaning: 用以自喻
  - word: 仍
    meaning: 仍旧，依然
  translation: "读《宝剑篇》只觉凄凉，羁旅飘泊仿佛要穷尽余年。黄叶仍在风雨中飘摇，青楼里自有管弦作乐。新交遭遇薄俗，旧好又隔着良缘。断绝了新丰美酒的销愁，要销愁得喝上几千斗。"
  appreciation: "李商隐写羁泊失意。黄叶风雨与青楼管弦对照，见世态凉薄与内心凄苦。"
  background: "李商隐晚年羁旅漂泊时抒怀，用郭震《宝剑篇》典故起兴。"
  famous_lines:
  - 心断新丰酒，销愁斗几千
  tags:
  - 唐诗三百首
  - 怀才不遇
  - 风雨
  - 五言律诗
- id: poem_ext_076
  title: 落花
  author: 李商隐
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '高阁客竟去，小园花乱飞。参差连曲陌，迢递送斜晖。

    肠断未忍扫，眼穿仍欲归。芳心向春尽，所得是沾衣。

    '
  annotations:
  - word: 参差
    meaning: 指花影的迷离，承上句乱飞意
  - word: 芳心
    meaning: 指花，也指自己看花的心意
  - word: 沾衣
    meaning: 指流泪
  translation: "高阁上的客人终于都走了，小园里落花乱飞。参差连着弯弯小路，迢迢送走斜晖。肠断却不忍清扫，望眼欲穿仍盼它归来。芳心已随春尽，所得只是泪湿衣襟。"
  appreciation: "李商隐咏落花。由客去花飞写到肠断未扫，结以「芳心向春尽，所得是沾衣」，物我双关，感伤深细。"
  background: "李商隐咏落花寄身世之感，一说作于幕府漂泊期间。"
  famous_lines:
  - 肠断未忍扫，眼穿仍欲归。芳心向春尽，所得是沾衣
  tags:
  - 唐诗三百首
  - 咏物
  - 写花
  - 抒怀
  - 五言律诗
- id: poem_ext_077
  title: 登岳阳楼
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '昔闻洞庭水，今上岳阳楼。

    吴楚东南坼，乾坤日夜浮。

    亲朋无一字，老病有孤舟。

    戎马关山北，凭轩涕泗流。

    '
  annotations:
  - word: 洞庭水
    meaning: 即洞庭湖，在今湖南北部，长江南岸，是中国第二淡水湖
  - word: 岳阳楼
    meaning: 即岳阳城西门楼，在湖南省岳阳市，下临洞庭湖，为游览胜地
  - word: 吴楚句
    meaning: 吴楚两地在我国东南
  - word: 坼
    meaning: 分裂
  - word: 乾坤
    meaning: 指日、月
  translation: "从前只听说洞庭湖，今天才登上岳阳楼。吴楚被它从东南分开，天地仿佛日夜漂浮在水上。亲朋没有一字来信，老病之身只有一叶孤舟。北方关山仍有战事，靠着栏杆我不禁涕泪横流。"
  appreciation: "杜甫登岳阳楼。颔联「吴楚东南坼，乾坤日夜浮」气象雄阔；后半写亲朋断绝、戎马未息，个人忧患与家国之痛合一，是五律绝唱。"
  background: "大历三年杜甫出峡至岳阳，登岳阳楼所作。"
  famous_lines:
  - 戎马关山北，凭轩涕泗流
  tags:
  - 唐诗三百首
  - 山水
  - 抱负
  - 五言律诗
- id: poem_ext_078
  title: 奉济驿重送严公四韵
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '远送从此别，青山空复情。几时杯重把，昨夜月同行。

    列郡讴歌惜，三朝出入荣。江村独归处，寂寞养残生。

    '
  annotations:
  - word: 列郡
    meaning: 指东西两川属邑
  - word: 三朝
    meaning: 指唐玄宗、唐肃宗、唐代宗三朝
  - word: 江村
    meaning: 指成都浣花溪边的草堂
  translation: "远送至此便要分别，青山空自有情。何时再能共把酒杯，昨夜还与月色同行。各郡歌颂惋惜你的离去，三朝出入何等尊荣。我独自回到江村，寂寞地打发残生。"
  appreciation: "杜甫再送严武。前写惜别，中颂其功业，结写自己寂寞，情深而沉郁。"
  background: "杜甫在奉济驿再次送别严武入朝时所作。"
  famous_lines:
  - 列郡讴歌惜，三朝出入荣。江村独归处，寂寞养残生
  tags:
  - 唐诗三百首
  - 送别
  - 惜别
  - 五言律诗
- id: poem_ext_079
  title: 旅夜书怀
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '细草微风岸，危樯独夜舟。

    星垂平野阔，月涌大江流。

    名岂文章著，官应老病休。

    飘飘何所似，天地一沙鸥。

    '
  annotations:
  - word: 岸
    meaning: 指江岸边
  - word: 危樯
    meaning: 高竖的桅杆
  - word: 独夜舟
    meaning: 是说自己孤零零的一个人夜泊江边
  - word: 星垂平野阔
    meaning: 星空低垂，原野显得格外广阔
  - word: 月涌
    meaning: 月亮倒映，随水流涌
  translation: "细草在微风中拂岸，高桅孤舟夜泊。星辰低垂，平野开阔；月影涌动，大江奔流。名声哪会因文章而显著，官职该因老病而休退。飘飘然像什么？天地间一只沙鸥。"
  appreciation: "「星垂平野阔，月涌大江流」写旅夜壮阔；结以「天地一沙鸥」自喻漂泊，景大而人孤。"
  background: "杜甫晚年漂泊长江、夜泊舟中抒怀。"
  famous_lines:
  - 飘飘何所似，天地一沙鸥
  tags:
  - 唐诗三百首
  - 写景
  - 抒怀
  - 孤独
  - 最美
  - 五言律诗
- id: poem_ext_080
  title: 月夜忆舍弟
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '戍鼓断人行，边秋一雁声。

    露从今夜白，月是故乡明。

    有弟皆分散，无家问死生。

    寄书长不达，况乃未休兵。

    '
  annotations:
  - word: 戍鼓
    meaning: 戍楼上的更鼓
  - word: 断人行
    meaning: 指鼓声响起后，就开始宵禁
  - word: 露从今夜白
    meaning: 指在气节“白露”的一个夜晚
  - word: 无家问死生
    meaning: 弟兄分散，家园无存，互相间都无从得知死生的消息
  - word: 长
    meaning: 一直，老是
  translation: "戍楼鼓响，路上断了行人，边秋传来一声雁叫。从今夜起白露降临，月亮还是故乡的最明。兄弟都已离散，没有家可以问死生。寄信常常到不了，何况战事还未停。"
  appreciation: "「露从今夜白，月是故乡明」写思乡；「有弟皆分散，无家问死生」写乱离之痛，沉郁真挚。"
  background: "安史乱中杜甫忆诸弟而作，时在边地。"
  famous_lines:
  - 寄书长不达，况乃未休兵
  tags:
  - 唐诗三百首
  - 边塞
  - 秋天
  - 月夜
  - 思乡
  - 怀人
- id: poem_ext_081
  title: 天末怀李白
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '凉风起天末，君子意如何。

    鸿雁几时到，江湖秋水多。

    文章憎命达，魑魅喜人过。

    应共冤魂语，投诗赠汨罗。

    '
  annotations:
  - word: 天末
    meaning: 天边
  - word: 凉风
    meaning: 秋风
  - word: 文章
    meaning: 指李白的诗文
  - word: 应共冤魂语
    meaning: 应该和屈原的冤魂对话
  translation: "凉风从天边吹起，你现在心意如何？鸿雁的音信何时能到？江湖上秋水正多。文章往往憎恶命运通达，魑魅却喜欢人经过（而加害）。你该与冤魂共语，把诗投赠给汨罗江。"
  appreciation: "杜甫天末怀李白。时李白因永王事流放，杜甫忧其安危。「文章憎命达」沉痛；结以汨罗，以屈原相比，友情深挚。"
  background: "乾元二年杜甫在秦州，闻李白流放夜郎，天末怀之而作。"
  famous_lines:
  - 应共冤魂语，投诗赠汨罗
  tags:
  - 唐诗三百首
  - 写风
  - 怀人
  - 五言律诗
- id: poem_ext_082
  title: 月夜
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '今夜鄜州月，闺中只独看。遥怜小儿女，未解忆长安。

    香雾云鬟湿，清辉玉臂寒。何时倚虚幌，双照泪痕干。

    '
  annotations:
  - word: 鄜州
    meaning: 今陕西富县
  - word: 闺中
    meaning: 内室
  - word: 遥怜
    meaning: 在远方怜爱
  - word: 双照
    meaning: 月光同时照着两人
  translation: "今夜鄜州的月亮，闺中只有她独自看。遥想小儿女还不懂思念长安的父亲。香雾沾湿了她的云鬟，清辉使玉臂生寒。什么时候才能一起倚着薄帷，让月光照干两人的泪痕。"
  appreciation: "杜甫身陷长安，却从妻子侧写望月。「双照泪痕干」写团聚之愿，深情而不直露。"
  background: "至德元载秋，杜甫陷长安，妻子在鄜州，望月思家而作。"
  famous_lines:
  - 香雾云鬟湿，清辉玉臂寒。何时倚虚幌，双照泪痕干
  tags:
  - 唐诗三百首
  - 高中古诗
  - 月亮
  - 思念
  - 女子
  - 五言律诗
- id: poem_ext_083
  title: 春宿左省
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '花隐掖垣暮，啾啾栖鸟过。

    星临万户动，月傍九霄多。

    不寝听金钥，因风想玉珂。

    明朝有封事，数问夜如何。

    '
  annotations:
  - word: 掖垣
    meaning: 门下省和中书省位于宫墙的两边，像人的两腋，故名
  - word: 金钥
    meaning: 即金锁
  - word: 珂
    meaning: 马铃
  - word: 封事
    meaning: 臣下上书奏事，为防泄漏，用黑色袋子密封，因此得名
  translation: "花影隐在掖垣的暮色里，啾啾栖鸟飞过。星光照得万户似动，月亮靠近九霄显得更多。不能入睡，听着金钥声；因风吹想起上朝的玉珂。明天早上有封事要呈，几次询问夜已到什么时辰。"
  appreciation: "杜甫写春夜宿门下省。前写夜景清美，后写不寝待朝、「数问夜如何」，见其勤慎尽职，是左省生活的纪实名篇。"
  background: "至德二载杜甫任左拾遗时，春夜值宿门下省所作。"
  famous_lines:
  - 明朝有封事，数问夜如何
  tags:
  - 唐诗三百首
  - 写景
  - 爱国
  - 五言律诗
- id: poem_ext_084
  title: 旅宿
  author: 杜牧
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '旅馆无良伴，凝情自悄然。

    寒灯思旧事，断雁警愁眠。

    远梦归侵晓，家书到隔年。

    沧江好烟月，门系钓鱼船。

    '
  annotations:
  - word: 良伴
    meaning: 好朋友
  - word: 凝情
    meaning: 凝神沉思
  - word: 悄然
    meaning: 忧伤的样子
  - word: 寒灯
    meaning: 昏冷的灯火
  - word: 思旧事
    meaning: 思念往事
