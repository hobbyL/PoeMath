- id: poem_exp_023
  title: 临高台
  author: 佚名
  dynasty: 两汉
  layer: explore
  is_required: false
  difficulty: 3
  content: '临高台以轩，下有清水清且寒。

    江有香草目以兰，黄鹄高飞离哉翻。

    关弓射鹄，令我主寿万年。

    '
  annotations:
  - word: 临高台
    meaning: 登上高台
  - word: 远望
    meaning: 向远处眺望
  translation: "白话理解：两汉佚名作《临高台》，借写景抒怀；「关弓射鹄，令我主寿万年。」值得一读。"
  appreciation: "佚名此篇不以铺张取胜，而以「关弓射鹄，令我主寿万年。」立住全诗，拓展阅读足够。"
  background: "《临高台》为佚名作品，可作两汉诗词的拓展样本。"
  famous_lines:
  - 关弓射鹄，令我主寿万年。
  tags:
  - 写景
  - 乐府
  - 豪迈
  - 登高
  - 抒怀
  - 古诗词
- id: poem_exp_024
  title: 橘柚垂华实
  author: 佚名
  dynasty: 两汉
  layer: explore
  is_required: false
  difficulty: 3
  content: '橘柚垂华实，乃在深山侧。

    闻君好我甘，窃独自雕饰。

    委身玉盘中，历年冀见食。

    芳菲不相投，青黄忽改色。

    人倘欲我知，因君为羽翼。

    '
  annotations:
  - word: 橘柚
    meaning: 橘子和柚子
  - word: 华实
    meaning: 美好的果实
  - word: 嘉树
    meaning: 美好的树木
  translation: "佚名《橘柚垂华实》中，「人倘欲我知，因君为羽翼。」较有味道。读拓展层时，不妨先记住这一句再串全篇。"
  appreciation: "名句「人倘欲我知，因君为羽翼。」之外，可留意景物与心情如何对应，这是读懂佚名的细处。"
  background: "作者佚名，两汉人。《橘柚垂华实》以咏物见长。"
  famous_lines:
  - 人倘欲我知，因君为羽翼。
  tags:
  - 咏物
  - 古诗词
- id: poem_exp_034
  title: 醉高歌带摊破喜春来·旅中
  author: 顾德润
  dynasty: 元
  layer: explore
  is_required: false
  difficulty: 4
  content: '长江远映青山，回首难穷望眼。

    扁舟来往蒹葭岸，烟锁云林又晚。

    篱边黄菊经霜暗，囊底青蚨逐日悭。

    破情思晚砧鸣，断愁肠檐马韵，惊客梦晓钟寒。

    归去难，修一缄回两字报平安。

    '
  annotations:
  - word: 醉高歌
    meaning: 曲牌名
  - word: 旅中
    meaning: 旅途中
  - word: 客愁
    meaning: 旅人的愁思
  translation: "顾德润《醉高歌带摊破喜春来·旅中》中，「归去难，修一缄回两字报平安。」较有味道。读拓展层时，不妨先记住这一句再串全篇。"
  appreciation: "名句「归去难，修一缄回两字报平安。」之外，可留意景物与心情如何对应，这是读懂顾德润的细处。"
  background: "作者顾德润，元人。《醉高歌带摊破喜春来·旅中》以写景见长。"
  famous_lines:
