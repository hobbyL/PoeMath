  translation: 烟雾笼罩着寒冷的江水、月光笼罩着沙滩，夜晚把船停靠在秦淮河旁边的酒家附近。歌女不知道亡国的悲恨，隔着江水仍在唱着《后庭花》。
  appreciation: 表面写歌女，实则借古讽今，讽刺晚唐统治者沉迷声色不理朝政，"商女不知亡国恨"成为警世名句。
