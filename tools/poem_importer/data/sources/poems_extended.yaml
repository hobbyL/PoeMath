- id: poem_ext_067
  title: 听蜀僧濬弹琴
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '蜀僧抱绿绮，西下峨眉峰。

    为我一挥手，如听万壑松。

    客心洗流水，余响入霜钟。

    不觉碧山暮，秋云暗几重。

    '
