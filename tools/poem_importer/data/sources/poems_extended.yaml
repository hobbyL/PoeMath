- id: poem_ext_136
  title: 送李少府贬峡中王少府贬长沙
  author: 高适
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '嗟君此别意何如，驻马衔杯问谪居。

    巫峡啼猿数行泪，衡阳归雁几封书。

    青枫江上秋帆远，白帝城边古木疏。

    圣代即今多雨露，暂时分手莫踌躇。

    '
  annotations:
  - word: 谪居
    meaning: 贬官的地方
  - word: 巫峡
    meaning: 地名，在今重庆市巫山县东
  - word: 衡阳
    meaning: 地名，今属湖南
  - word: 青枫江
    meaning: 地名，在花溪
  - word: 秋帆
    meaning: 指秋风吹着小舟，送友人远去
  translation: 此次离别不知你们心绪何如，停住马饮酒询问被贬的去处。 巫峡猿猴悲啼令人伤心流泪，衡阳的归雁会为我捎来回书。 秋日青枫江上孤帆远远飘去，白帝城边黄叶飘零古木稀疏。 圣明朝代如今定会多施雨露，暂时分手希望你们不要踌躇。
  appreciation: 这是一首送别诗，同时也是一首边塞诗，同时送别两人，且两人均为遭贬而迁。 首联“嗟君此别意何如，驻马衔杯问谪居。”诗人首先抓住二人都是遭贬，都有满腹愁怨，而眼下又即将分别这一共同点，以深表关切的问句开始，表达了对李、王二少府遭受贬谪的同情，以及对分别的惋惜。“嗟”是叹息之声，置于句首，贬谪分别时的痛苦已不言而喻。“此别”、“谪居”四字，又将题中的“送”和“贬”点出，轻灵自然，不着痕迹。作者在送别之地停下马来，与李、王二少府饮酒饯别，“意何如”、“问谪居”，反复致意，其殷切珍重之情，显而易见，一开篇就以强烈的感情，给读者以深刻的印象。无怪乎方东树在《昭昧詹言》中说：“常侍（即高适）每工于发端。”中间两联针对李、王二少府的现实处境，从二人不同的贬谪之地分别着笔，进一步表达对他们的关心和安慰。
    “巫峡啼猿数行泪，衡阳归雁几封书？”上句写李少府贬峡中。当时，这里路途遥远，四野荒凉，《巴东三峡歌》曰：“巴东三峡巫峡长，猿鸣三声泪沾裳。”诗人设想李少府来到峡中，在这荒远之地听到凄厉的猿啼，不禁流下感伤的眼泪。下句写王少府贬长沙。衡阳在长沙南面，衡山有回雁峰，传说北雁南飞至此不过，遇春而回。归雁传书是借用苏武雁足系书故事，但长沙路途遥远，归。
