- id: poem_ext_206
  title: 诉衷情·当年万里觅封侯
  author: 陆游
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 3
  content: '当年万里觅封侯，匹马戍梁州。关河梦断何处？尘暗旧貂裘。

    胡未灭，鬓先秋，泪空流。此生谁料，心在天山，身老沧洲。

    '
  annotations:
  - word: 诉衷情
    meaning: 词牌名
  - word: 万里觅封侯
    meaning: 远赴边疆建功立业
  - word: 关河
    meaning: 关塞河流
  - word: 鬓先秋
    meaning: 鬓发先已斑白
  - word: 胡未灭
    meaning: 金兵尚未消灭
  translation: 回忆当年鹏程万里为了寻找建功立业的机会，单枪匹马奔赴边境保卫梁州。如今防守边疆要塞的从军生活只能在梦中出现，梦一醒不知身在何处？灰尘已经盖满了旧时出征的貂裘。 金人还未消灭，鬓边已呈秋霜，感伤的眼泪白白地淌流。这一生谁能预料，原想一心一意抗敌在天山，如今却一辈子老死于沧洲！
  appreciation: 这首词是陆游晚年的作品。下面是资深教育家、澳大利亚新南威尔士州孔子学院澳方院长、澳洲国立等大学博导史双元先生对此词的赏析。 积贫积弱，日见窘迫的南宋是一个需要英雄的时代，但这又是一个英雄“过剩”的时代。陆游的一生以抗金复国为己任，无奈请缨无路，屡遭贬黜，晚年退居山阴，有志难申。“壮士凄凉闲处老，名花零落雨中看。”历史的秋意，时代的风雨，英雄的本色，艰难的现实，共同酿成了这一首悲壮沉郁的《诉衷情》。
    作这首词时，词人已年近七十，身处故地，未忘国忧，烈士暮年，雄心不已，这种高亢的政治热情，永不衰竭的爱国精神形成了词作风骨凛然的崇高美。但壮志不得实现，雄心无人理解，虽然“男儿到死心如铁”，无奈“报国欲死无战场”，这种深沉的压抑感又形成了词作中百折千回的悲剧情调。词作说尽忠愤，回肠荡气。 “当年万里觅封侯，匹马戍梁州”，开头两句，词人再现了往日壮志凌云，奔赴抗敌前线的勃勃英姿。“当年”，指1172年（乾道八年），在那时陆游来到南郑（今陕西汉中），投身到四川宣抚使王炎幕下。在前线，他曾亲自参加过对金兵的遭遇战。“觅封候”用班超投笔从戎、立功异域“以取封侯”的典故，写自己报效祖国，收拾旧河山的壮志。“自许封侯在万里”（《夜游宫·记梦寄师。
