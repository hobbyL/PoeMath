  - 抒情
  - 思乡
  - 古诗词
- id: poem_exp_035
  title: 山中四咏
  author: 元鹏
  dynasty: 明
  layer: explore
  is_required: false
  difficulty: 4
  content: '我爱山中春，苍崖鸟一声。

    桃花源里住，罕见问津人。

    我爱山中夏，空冥花雨下。

    行吟屐齿肥，树色丽四野。

    我爱山中秋，黄云稻正稠。

    铎声连振起，镰子刈禾头。

    我爱山中冬，冰澌叠乱封。

    地炉无品字，一榻冷千峰。

    '
  annotations:
  - word: 山中
    meaning: 山里
  - word: 四咏
    meaning: 四首咏物诗
  - word: 幽
    meaning: 幽静
  translation: "我爱的山中春，苍崖的鸟一声。桃花的源里住，罕见的问津人。我爱的山中夏，空冥的花雨下。行吟的屐齿肥，树色的丽四野。我爱的山中秋，黄云的稻正稠。铎声的连振起，镰子的刈禾头。我爱的山中冬，冰澌的叠乱封。地炉的无品字，一榻的冷千峰。"
  appreciation: "《山中四咏》中「地炉无品字，一榻冷千峰。」最见精神。元鹏写景，画面清楚。"
  background: "明元鹏《山中四咏》。"
  famous_lines:
  - 地炉无品字，一榻冷千峰。
  tags:
  - 写景
  - 禅隐
  - 生活
  - 古诗词
- id: poem_exp_036
  title: 黄山道中
  author: 赵沨
  dynasty: 金
  layer: explore
  is_required: false
  difficulty: 3
  content: '小榖城荒路屈盘，石根寒碧涨秋湾。

    千章秀木黄公庙，一点飞雪白塔山。

    好景落谁诗句里，蹇驴驮我画图间。

    膏肓泉石真吾事，莫厌乘兴数往还。

    '
  annotations:
  - word: 黄山
    meaning: 安徽黄山
  - word: 道中
    meaning: 路途中
  - word: 云海
    meaning: 黄山云雾
  translation: "小榖的城荒路在屈盘，石根的寒碧涨在秋湾。千章的秀木黄在公庙，一点的飞雪白在塔山。好景的落谁诗在句里，蹇驴的驮我画在图间。膏肓的泉石真在吾事，莫厌的乘兴数在往还。"
  appreciation: "《黄山道中》中「膏肓泉石真吾事，莫厌乘兴数往还。」最见精神。赵沨写景，画面清楚。"
  background: "金赵沨《黄山道中》。"
  famous_lines:
