- id: poem_ext_082
  title: 月夜
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '今夜鄜州月，闺中只独看。遥怜小儿女，未解忆长安。

    香雾云鬟湿，清辉玉臂寒。何时倚虚幌，双照泪痕干。

    '
  annotations:
  - word: 鄜州
    meaning: 今陕西富县
  - word: 闺中
    meaning: 内室
  - word: 遥怜
    meaning: 在远方怜爱
  - word: 双照
    meaning: 月光同时照着两人
  translation: 今夜鄜州月亮，一定同样清圆，遥想闺中妻子，只能独自观赏。可怜幼小的儿女，怎懂思念的心酸？ 蒙蒙雾气，或许沾湿了妻子的鬓发；冷冷月光，该是映寒了妻子的玉臂。何时才能团圆相见，倚靠薄帷共赏明月。那时一定月色依旧，就让月光默默照干我们的泪痕。
  appreciation: 这首诗借看月而抒离情，但抒发的不是一般情况下的夫妇离别之情。字里行间，表现出时代的特征，离乱之痛和内心之忧熔于一炉，对月惆怅，忧叹愁思，而希望则寄托于不知“何时”的未来。 在一二两联中，“怜”字，“忆”字，都不宜轻易滑过。而这又应该和“今夜”、“独看”联系起来加以吟味。明月当空，月月都能看到。特指“今夜”的“独看”，则心目中自然有往日的“同看”和未来的“同看”。未来的“同看”，留待结句点明。往日的“同看”，则暗含于一二两联之中。
