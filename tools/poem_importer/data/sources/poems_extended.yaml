- id: poem_ext_192
  title: 郡斋雨中与诸文士燕集
  author: 韦应物
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '兵卫森画戟，宴寝凝清香。

    海上风雨至，逍遥池阁凉。

    烦疴近消散，嘉宾复满堂。

    自惭居处崇，未睹斯民康。

    理会是非遣，性达形迹忘。

    鲜肥属时禁，蔬果幸见尝。

    俯饮一杯酒，仰聆金玉章。

    神欢体自轻，意欲凌风翔。

    吴中盛文史，群彦今汪洋。

    方知大藩地，岂曰财赋强。

    '
  annotations:
  - word: 郡斋
    meaning: 郡守的居所
  - word: 燕集
    meaning: 宴会聚集
  - word: 文士
    meaning: 文人
  - word: 兵卫
    meaning: 卫兵
  translation: 官邸门前画戟林立兵卫森严，休息室内凝聚着焚檀的清香。 东南近海层层风雨吹进住所，逍遥自在池阁之间阵阵风凉。 心里头的烦躁苦闷将要消散，嘉宾贵客重新聚集济济一堂。 自己惭愧所处地位太过高贵，未能顾及平民百姓有无安康。 如能领悟事理是非自然消释，性情达观世俗礼节就可淡忘。 鲜鱼肥肉是夏令禁食的荤腥，蔬菜水果希望大家尽管品尝。 大家躬身饮下一杯醇清美酒，抬头聆听各人吟诵金玉诗章。
    精神愉快身体自然轻松舒畅，心里真想临风飘举奋力翱翔。 吴中不愧为文史鼎盛的所在，文人学士简直多如大海汪洋。 现在才知道大州大郡的地方，哪里是仅以财物丰阜而称强？
