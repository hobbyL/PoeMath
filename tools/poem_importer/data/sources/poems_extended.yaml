    meaning: 中岳嵩山，在今河南
  - word: 双鲤
    meaning: 指书信
  - word: 梁园
    meaning: 梁孝王在梁地大兴土木，以睢阳为中心，根据自然景色，修建了一个很大的花园，称东苑，也叫菟园，后人称为梁园
  - word: 茂陵
    meaning: 今陕西兴平县东北，以汉武帝陵墓而得名
  translation: "李商隐写写景，在《寄令狐郎中》里落到「休问梁园旧宾客，茂陵秋雨病相如。」一句，含蓄而有余味。"
  appreciation: "后人爱引「休问梁园旧宾客，茂陵秋雨病相如。」，说明李商隐把个人感受写得既具体又开阔。"
  background: "关于《寄令狐郎中》作年或有异说，不妨把它读作李商隐写写景的代表作。"
