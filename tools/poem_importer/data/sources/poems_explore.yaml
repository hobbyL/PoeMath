- id: poem_exp_126
  title: 宛转歌
  author: 刘妙容
  dynasty: 魏晋
  layer: explore
  is_required: false
  difficulty: 4
  content: '月既明，西轩琴复清。

    寸心斗酒争芳夜，千秋万岁同一情。

    歌宛转，宛转凄以哀。

    愿为星与汉，光影共徘徊。

    悲且伤，参差泪成行。

    低红掩翠方无色，金徽玉轸为谁锵。

    歌宛转，宛转情复悲。

    愿为烟与雾，氛氲对容姿。

    '
