  content: '墨痕香，红蜡泪。

    点点愁人离思。

    桐叶落，蓼花残。

    雁声天外寒。

    五云岭，九溪坞。

    待到秋来更苦。

    风淅淅，水淙淙。

    不教蓬径通。

