- id: poem_ext_338
  title: 南乡子·重九涵辉楼呈徐君猷
  author: 苏轼
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 3
  content: '霜降水痕收。

    浅碧鳞鳞露远洲。

    酒力渐消风力软，飕飕。

    破帽多情却恋头。

    佳节若为酬。

    但把清尊断送秋。

    万事到头都是梦，休休。

    明日黄花蝶也愁。

    '
