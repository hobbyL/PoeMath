  translation: 青苍的竹林寺，近晚时传来深远的钟声。 背着斗笠披着斜阳，独回青山渐行渐远。
  appreciation: 这首小诗记叙诗人在傍晚送灵澈返竹林寺时的心情，它即景抒情，构思精致，语言精炼，素朴秀美，是唐代山水诗的名篇。 前二句想望苍苍山林中的灵澈归宿处，远远传来寺院报时的钟响，点明时已黄昏，仿佛催促灵澈归山。诗人出以想象之笔，创造了一个清远幽渺的境界。此二句重在写景，景中也寓之以情。后二句即写灵澈辞别归去情景。灵澈戴着斗笠，披带夕阳余晖，独自向青山走去，越来越远。“青山”即应首句“苍苍竹林寺”，点出寺在山林。
