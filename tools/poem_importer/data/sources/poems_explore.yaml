- id: poem_exp_486
  title: 河满子·秋怨
  author: 孙洙
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '怅望浮生急景，凄凉宝瑟馀音。

    楚客多情偏怨别，碧山远水登临。

    目送连天衰草，夜阑几处疏砧。

    黄叶无风自落，秋云不雨长阴。

    天若有情天亦老，摇摇幽恨难禁。

    惆怅旧欢如梦，觉来无处追寻。

    '
