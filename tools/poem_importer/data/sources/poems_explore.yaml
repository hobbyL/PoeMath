- id: poem_exp_308
  title: 周颂·臣工
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '嗟嗟臣工，敬尔在公。

    王厘尔成，来咨来茹。

    嗟嗟保介，维莫之春，亦又何求？

    如何新畲？

    於皇来牟，将受厥明。

    明昭上帝，迄用康年。

    命我众人：庤乃钱镈，奄观铚艾。

