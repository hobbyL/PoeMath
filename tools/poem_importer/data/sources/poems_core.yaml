  - 神话
  - 七言绝句
- id: poem_core_063
  title: 江南春
  author: 杜牧
  dynasty: 唐
  grade: 6
  semester: 上
  textbook_unit: 语文六年级上·课文17
  is_required: true
  difficulty: 2
  content: '千里莺啼绿映红，水村山郭酒旗风。

    南朝四百八十寺，多少楼台烟雨中。

    '
  pinyin: 'qiān lǐ yīng tí lǜ yìng hóng ， shuǐ cūn shān guō jiǔ qí fēng 。

    nán cháo sì bǎi bā shí sì ， duō shǎo lóu tái yān yǔ zhōng 。

    '
  annotations:
  - word: 山郭
    meaning: 依山傍水的城郭
  - word: 酒旗
    meaning: 酒店门前的招牌旗子
  - word: 南朝
    meaning: 指宋、齐、梁、陈四朝，都建都建康（今南京）
  - word: 四百八十寺
    meaning: 极言南朝寺庙之多
  - word: 楼台
    meaning: 指寺院建筑
  translation: 千里江南到处莺歌燕舞、绿叶映衬红花，水边的村庄山旁的城郭酒旗在春风中飘扬。南朝留下的四百八十座寺庙，如今有多少楼阁隐现在朦胧的烟雨之中。
  appreciation: 全诗前两句写江南春景的明丽，后两句以历史的沧桑感收束，"烟雨中"三字把画面推向朦胧悠远的意境，历史与现实交融。
  background: 杜牧游历江南时所作，具体年代不详。
  famous_lines:
  - 南朝四百八十寺，多少楼台烟雨中
  tags:
  - 江南
  - 春天
  - 七言绝句
  - 名篇
- id: poem_core_064
  title: 马诗
  author: 李贺
  dynasty: 唐
  grade: 6
  semester: 下
  textbook_unit: 语文六年级下·古诗三首
  is_required: true
  difficulty: 3
  content: '大漠沙如雪，燕山月似钩。

    何当金络脑，快走踏清秋。

    '
  pinyin: 'dà mò shā rú xuě ， yān shān yuè sì gōu 。

    hé dāng jīn luò nǎo ， kuài zǒu tà qīng qiū 。

    '
  annotations:
  - word: 大漠
    meaning: 广阔的沙漠
  - word: 燕山
    meaning: 山名，在今河北北部
  - word: 钩
    meaning: 一种弯刀，此处形容弯月
  - word: 何当
    meaning: 何时才能够
  - word: 金络脑
    meaning: 用黄金装饰的马笼头
  - word: 踏清秋
    meaning: 在清爽的秋天奔驰
  translation: 广阔的沙漠里沙子白得像雪，燕山上一弯明月像弯刀。什么时候才能戴上金饰的马笼头，在清爽的秋天疾驰奔跑。
  appreciation: 全诗借咏马寄托诗人立功报国的抱负。"金络脑"象征受重用，"踏清秋"暗示壮志得酬，托物言志、含蓄深沉。
  background: 李贺《马诗》组诗二十三首之一，此为第五首。李贺一生怀才不遇，借马自况。
  famous_lines:
  - 大漠沙如雪，燕山月似钩
  tags:
  - 咏物
  - 明志
  - 五言绝句
- id: poem_core_065
  title: 石灰吟
  author: 于谦
  dynasty: 明
  grade: 6
  semester: 下
  textbook_unit: 语文六年级下·古诗三首
  is_required: true
  difficulty: 3
  content: '千锤万凿出深山，烈火焚烧若等闲。

    粉骨碎身浑不怕，要留清白在人间。

    '
  pinyin: 'qiān chuí wàn záo chū shēn shān ， liè huǒ fén shāo ruò děng xián 。

    fěn gǔ suì shēn hún bù pà ， yào liú qīng bái zài rén jiān 。

    '
  annotations:
  - word: 千锤万凿
    meaning: 无数次的锤打开凿
  - word: 若等闲
    meaning: 好像很平常的事一样
  - word: 浑
    meaning: 全、都
  - word: 清白
    meaning: 双关，既指石灰的洁白，又指高洁的品格
  translation: 经过千锤万凿才从深山里开采出来，烈火焚烧仿佛平常事一般。粉身碎骨也全然不害怕，只要在人间留下清白的品格。
  appreciation: 借咏石灰以明志，四句诗从开采、焚烧、破碎到留白，层层递进；末句"要留清白在人间"是于谦一生的写照，气节铮铮。
  background: 相传为于谦十二岁时所作，后来他官至兵部尚书、少保，因抗击瓦剌保卫北京有功，却被昏君冤杀，一生践行了"清白"二字。
  famous_lines:
  - 粉骨碎身浑不怕，要留清白在人间
  tags:
