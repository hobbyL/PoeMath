  author: 程颢
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 3
  content: '闲来无事不从容，睡觉东窗日已红。

    万物静观皆自得，四时佳兴与人同。

    道通天地有形外，思入风云变态中。

    富贵不淫贫贱乐，男儿到此是豪雄。

    '
