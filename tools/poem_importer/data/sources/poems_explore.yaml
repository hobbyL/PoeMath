- id: poem_exp_199
  title: 日出入
  author: 佚名
  dynasty: 两汉
  layer: explore
  is_required: false
  difficulty: 3
  content: '日出入安穷？

    时世不与人同。

    故春非我春，夏非我夏，

    秋非我秋，冬非我冬。

    泊如四海之池，遍观是邪谓何？

    吾知所乐，独乐六龙，

    六龙之调，使我心若。

    訾黄其何不徕下。

    '
  annotations:
  - word: 日出入
    meaning: 太阳升起和落下
  - word: 汉乐府
    meaning: 汉代乐府诗
  translation: "日的出入哪里有穷尽？时世不与人相同。所以春非我春，夏非我夏，秋非我秋，冬非我冬。泊如四海之池，遍观这是什么意思？我知所乐，独乐六龙；六龙调和，使我心安。訾黄之马为何不下来？"
  appreciation: "汉郊祀歌《日出入》。春非我春写时命，六龙独乐，求仙意味。"
