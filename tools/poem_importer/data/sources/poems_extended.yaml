poems:
- id: poem_ext_007
  title: 秋夕
  author: 杜牧
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '银烛秋光冷画屏,轻罗小扇扑流萤。

    天阶夜色凉如水,坐看牵牛织女星。

    '
  pinyin: 'yín zhú qiū guāng lěng huà píng ， qīng luó xiǎo shàn pū liú yíng 。

    tiān jiē yè sè liáng rú shuǐ ， zuò kàn qiān niú zhī nǚ xīng 。

    '
  annotations:
  - word: 银烛
    meaning: 白色的蜡烛
  - word: 画屏
    meaning: 有彩绘的屏风
  - word: 轻罗
    meaning: 轻薄的丝织品
  - word: 天阶
    meaning: 皇宫的台阶
  translation: "秋夜里银烛照着清冷的画屏，宫女拿着轻罗小扇扑打流萤。天阶上的夜色凉得像水，她坐着仰望牵牛织女星。"
  appreciation: "杜牧写宫怨，不直说寂寞，只写扑萤与望星。凉夜、小扇、双星，含蓄而有画面，是七绝精品。"
  background: "杜牧宫怨名篇，一作王建诗，以秋夕宫中琐事见深宫孤寂。"
  famous_lines:
  - 天阶夜色凉如水，坐看牵牛织女星
  tags:
  - 宫怨
  - 秋天
  - 七言绝句
- id: poem_ext_011
  title: 行宫
  author: 元稹
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '寥落古行宫，宫花寂寞红。

    白头宫女在，闲坐说玄宗。

    '
  annotations:
  - word: 寥落
    meaning: 寂寞冷落
  - word: 行宫
    meaning: 皇帝在京城之外的宫殿
  - word: 宫花
    meaning: 行宫里的花
  - word: 白头宫女
    meaning: 据白居易《上阳白发人》，一些宫女天宝末年被“潜配”到上阳宫，在这冷宫里一闭四十多年，成了白发宫人
  - word: 说
    meaning: 谈论
  translation: "古行宫一片寥落，宫花仍寂寞地开着红。白头宫女还在，闲坐着谈论玄宗从前的事。"
  appreciation: "元稹二十字写尽盛衰。白头宫女「说玄宗」一句，历史沧桑全在平常闲话里。"
  background: "元稹过连昌宫一类故宫有感而作，入选《唐诗三百首》。"
  famous_lines:
  - 白头宫女在，闲坐说玄宗
  tags:
  - 唐诗三百首
  - 怀古
  - 宫怨
  - 五言绝句
- id: poem_ext_012
  title: 新嫁娘词
  author: 王建
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '三日入厨下，洗手作羹汤。

    未谙姑食性，先遣小姑尝。

    '
  annotations:
  - word: 三日
    meaning: 古代新娘婚后第三天下厨
  - word: 姑
    meaning: 婆婆
  - word: 小姑
    meaning: 丈夫的妹妹
  translation: "第三天便下厨房，洗手亲自做羹汤。还没熟知婆婆的口味，先让小姑尝一尝。"
  appreciation: "王建写新嫁娘的细心与谨慎，生活气息浓，细节真实可爱。"
  background: "王建《新嫁娘词》，写新婚生活片段。"
  famous_lines:
  - 未谙姑食性，先遣小姑尝
  tags:
  - 唐诗三百首
  - 女子
  - 新婚
  - 生活
  - 五言绝句
- id: poem_ext_013
  title: 杂诗三首·其二
  author: 王维
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '君自故乡来，应知故乡事。

    来日绮窗前，寒梅著花未？

    '
  annotations:
  - word: 来日
    meaning: 来的时候
  - word: 绮窗
    meaning: 雕画花纹的窗户
  - word: 著花未
    meaning: 开花没有
  translation: "你从故乡来，应该知道故乡的事。来的那天，窗前的寒梅开了没有？"
  appreciation: "王维写思乡，不问人事只问梅花，淡语深情，是五绝中的极品。"
  background: "王维《杂诗》其二，写游子问乡。"
  famous_lines:
  - 来日绮窗前，寒梅著花未
  tags:
  - 唐诗三百首
  - 思乡
  - 思亲
  - 写景
  - 梅花
  - 五言绝句
- id: poem_ext_014
  title: 送别
  author: 王维
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '山中相送罢，日暮掩柴扉。

    春草明年绿，王孙归不归？

    '
  annotations:
  - word: 掩
    meaning: 关闭
  - word: 柴扉
    meaning: 柴门
  - word: 王孙
    meaning: 贵族的子孙，这里指送别的友人
  translation: "山中送你离去之后，夕阳西下，我才关上柴门。明年春天草又绿的时候，你还会不会回来？"
  appreciation: "王维送别不写宴席，只写送罢掩扉与春草明年，淡而有情，余味不尽。"
  background: "王维隐居山中送友之作。"
  famous_lines:
  - 春草明年绿，王孙归不归
  tags:
  - 唐诗三百首
  - 送别
  - 友情
  - 五言绝句
- id: poem_ext_015
  title: 问刘十九
  author: 白居易
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '绿蚁新醅酒，红泥小火炉。

    晚来天欲雪，能饮一杯无？

    '
  annotations:
  - word: 绿蚁
    meaning: 指浮在新酿的没有过滤的米酒上的绿色泡沫
  - word: 醅
    meaning: 酿造
  - word: 绿蚁新醅酒
    meaning: 酒是新酿的酒
  - word: 雪
    meaning: 下雪，这里作动词用
  - word: 无
    meaning: 表示疑问的语气词，相当于“么”或“吗”
  translation: "新酿的酒面上泛着绿色泡沫，小火炉上红泥烧得正旺。天色傍晚，眼看要下雪了，能不能过来喝一杯？"
  appreciation: "白居易邀友小饮，三样物象（新酒、火炉、暮雪）温暖亲切，是日常友情的绝唱。"
  background: "白居易江州时期邀刘十九小酌而作。"
  famous_lines:
  - 晚来天欲雪，能饮一杯无
  tags:
  - 唐诗三百首
  - 饮酒
  - 生活
  - 友情
  - 五言绝句
- id: poem_ext_016
  title: 哥舒歌
  author: 西鄙人
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '北斗七星高，哥舒夜带刀。

    至今窥牧马，不敢过临洮。

    '
  annotations:
  - word: 哥舒
    meaning: 指哥舒翰，是唐玄宗的大将，突厥族哥舒部的后裔
  - word: 北斗七星
    meaning: 大熊座的一部分
  - word: 窥
    meaning: 窃伺
  - word: 牧马
    meaning: 指吐蕃越境放牧，指侵扰活动
  - word: 临洮
    meaning: 今甘肃省洮河边的岷县
  translation: "北斗七星高高挂起，哥舒翰夜里带刀巡逻。至今人还在传说：曾让牧马的胡人不敢越过临洮。"
  appreciation: "边地民歌体颂哥舒翰，语言质朴，气势豪迈，名将形象鲜明。"
  background: "唐代西北民歌，颂陇右节度使哥舒翰。"
  famous_lines:
  - 至今窥牧马，不敢过临洮
  tags:
  - 唐诗三百首
  - 赞颂
  - 民歌
  - 五言绝句
- id: poem_ext_017
  title: 怨情
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '美人卷珠帘，深坐颦蛾眉。

    但见泪痕湿，不知心恨谁。

    '
  annotations:
  - word: 卷珠帘
    meaning: 意指其卷帘相望
  - word: 珠帘
    meaning: 珠串的帷帘
  - word: 深坐
    meaning: 长久的坐
  - word: 颦
    meaning: 皱眉
  - word: 蛾眉
    meaning: 蚕蛾触须弯而细长，故以称女子之眉
  translation: "美人卷起珠帘，深深坐着蹙眉。只看见泪痕湿面，却不知道心里恨谁。"
  appreciation: "李白写闺怨，前写神态，后写泪痕，恨意不明说，更见含蓄。"
  background: "李白五绝，写女子幽怨。"
  famous_lines:
  - 但见泪痕湿，不知心恨谁
  tags:
  - 唐诗三百首
  - 女子
  - 五言绝句
- id: poem_ext_019
  title: 听筝
  author: 李端
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '鸣筝金粟柱，素手玉房前。

    欲得周郎顾，时时误拂弦。

    '
  annotations:
  - word: 鸣筝
    meaning: 弹奏筝曲
  - word: 金粟
    meaning: 古也称桂为金粟，这里当是指弦轴之细而精美
  - word: 柱
    meaning: 定弦调音的短轴
  - word: 素手
    meaning: 指弹筝女子纤细洁白的手
  - word: 玉房
    meaning: 指玉制的筝枕
  translation: "鸣筝的金粟柱上，纤纤素手在玉房前拨弦。只因为一曲一柱都满是相思，才把这二十五弦都拨遍。"
  appreciation: "李端写听筝，以手与弦写情，结句「二十五弦」把相思写满全器。"
  background: "李端《听筝》，写听曲生情。"
  famous_lines:
  - 欲得周郎顾，时时误拂弦
  tags:
  - 唐诗三百首
  - 音乐
  - 五言绝句
- id: poem_ext_020
  title: 渡汉江
  author: 宋之问
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '岭外音书断，经冬复历春。

    近乡情更怯，不敢问来人。

    '
  annotations:
  - word: 岭外
    meaning: 五岭以南的广东省广大地区，通常称岭南
  - word: 书
    meaning: 信
  - word: 来人
    meaning: 渡汉江时遇到的从家乡来的人
  translation: "岭外音书断绝，经冬又历春。近乡情更怯，不敢向来人打听消息。"
  appreciation: "宋之问写贬谪归来近乡的心理：「情更怯」「不敢问」把复杂心情写到极致。"
  background: "宋之问从贬所北归、接近家乡时所作。"
  famous_lines:
  - 近乡情更怯，不敢问来人
  tags:
  - 唐诗三百首
  - 渡江
  - 思乡
  - 五言绝句
- id: poem_ext_021
  title: 八阵图
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '功盖三分国，名成八阵图。

    江流石不转，遗恨失吞吴。

    '
  annotations:
  - word: 盖
    meaning: 超过
  - word: 三分国
    meaning: 指三国时魏、蜀、吴三国
  - word: 八阵图
    meaning: 由八种阵势组成的图形，用来操练军队或作战
  - word: 石不转
    meaning: 指涨水时，八阵图的石块仍然不动
  - word: 失吞吴
    meaning: 是吞吴失策的意思
  translation: "功业覆盖了三分天下的局面，声名成就于八阵图。江流石不转，遗恨在于未能统一，吞灭吴国。"
  appreciation: "杜甫咏诸葛亮。前两句颂功，后两句以江石不动写千古遗恨，苍劲简括。"
  background: "杜甫入蜀后凭吊武侯遗迹而作。"
  famous_lines:
  - 江流石不转，遗恨失吞吴
  tags:
  - 唐诗三百首
  - 怀古
  - 写人
  - 哲理
  - 五言绝句
- id: poem_ext_022
  title: 春怨
  author: 金昌绪
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '打起黄莺儿，莫教枝上啼。

    啼时惊妾梦，不得到辽西。

    '
  annotations:
  - word: 莫
    meaning: 不
  - word: 妾
    meaning: 女子的自称
  translation: "打起黄莺儿，别让它在枝上啼。啼的时候惊扰了我的梦，害我梦不到辽西。"
  appreciation: "金昌绪写思妇，迁怒黄莺，娇嗔中见相思之深，口语天然。"
  background: "唐人闺怨小诗，流传极广。"
  famous_lines:
  - 啼时惊妾梦，不得到辽西
  tags:
  - 唐诗三百首
  - 闺怨
  - 怀人
  - 五言绝句
- id: poem_ext_023
  title: 秋夜寄邱员外
  author: 韦应物
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '怀君属秋夜，散步咏凉天。

    空山松子落，幽人应未眠。

    '
  annotations:
  - word: 属
    meaning: 正值，适逢，恰好
  - word: 幽人
    meaning: 幽居隐逸的人，悠闲的人，此处指丘员外
  translation: "怀着你同我一样的情怀，我端着酒，却望着秋天下雨。想必池塘中的树木，也落下了许多叶子。"
  appreciation: "韦应物寄友，不写自己寂寞，却推想对方池上落叶，淡而厚。"
  background: "韦应物寄赠丘丹（邱员外）的秋夜之作。"
  famous_lines:
  - 空山松子落，幽人应未眠
  tags:
  - 唐诗三百首
  - 秋天
  - 怀人
  - 五言绝句
- id: poem_ext_024
  title: 终南望余雪
  author: 祖咏
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '终南阴岭秀，积雪浮云端。

    林表明霁色，城中增暮寒。

    '
  annotations:
  - word: 终南
    meaning: 山名，在唐京城长安（今陕西西安）南面六十里处
  - word: 余雪
    meaning: 指未融化之雪
  - word: 阴岭
    meaning: 北面的山岭，背向太阳，故曰阴
  - word: 林表
    meaning: 林外，林梢
  - word: 霁
    meaning: 雨、雪后天气转晴
  translation: "终南阴岭的余雪，晴色中显得格外好看。林梢的明亮颜色格外鲜艳，暮色里城中更添寒意。"
  appreciation: "祖咏应试只写四句即交卷。以余雪、林表、城中写冬晴，精炼传神。"
  background: "祖咏应试《终南望余雪》时所作，传以意尽而止。"
  famous_lines:
  - 林表明霁色，城中增暮寒
  tags:
  - 唐诗三百首
  - 冬天
  - 写景
  - 写雪
  - 五言绝句
- id: poem_ext_025
  title: 宫词·故国三千里
  author: 张祜
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '故国三千里，深宫二十年。

    一声何满子，双泪落君前。

    '
  annotations:
  - word: 故国
    meaning: 故乡
  - word: 何满子
    meaning: 唐玄宗时著名歌手，据说她因故得罪了皇帝，被推出就刑
  translation: "故乡远在三千里外，深宫里我已待了十二年。一声声《何满子》，令我双泪落在君王面前。"
  appreciation: "张祜写宫人悲苦，数字对照强烈，结句泪落君前，震撼人心。"
  background: "张祜《宫词》，写远嫁入宫的女子。"
  famous_lines:
  - 一声何满子，双泪落君前
  tags:
  - 唐诗三百首
  - 宫怨
  - 五言绝句
- id: poem_ext_026
  title: 送灵澈上人
  author: 刘长卿
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '苍苍竹林寺，杳杳钟声晚。

    荷笠带斜阳，青山独归远。

    '
  annotations:
  - word: 苍苍
    meaning: 深青色
  - word: 竹林寺
    meaning: 在现在江苏丹徒南
  - word: 杳杳
    meaning: 深远的样子
  - word: 荷笠
    meaning: 背着斗笠
  translation: "苍苍的竹林寺，远远传来晚钟。他戴着斗笠，披着斜阳，独自向青山深处走远。"
  appreciation: "刘长卿送僧人。前写寺与钟，后写荷笠斜阳、青山独归，画面清空，余味悠远，是送别五绝精品。"
  background: "刘长卿送灵澈上人归山时所作。"
  famous_lines:
  - 荷笠带斜阳，青山独归远
  tags:
  - 唐诗三百首
  - 初中古诗
  - 送别
  - 即景抒情
  - 山水
  - 五言绝句
- id: poem_ext_027
  title: 听弹琴
  author: 刘长卿
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '泠泠七弦上，静听松风寒。

    古调虽自爱，今人多不弹。

    '
  annotations:
  - word: 泠泠
    meaning: 形容清凉、清淡，也形容声音清越
  - word: 松风
    meaning: 以风入松林暗示琴声凄凉
  - word: 古调
    meaning: 古时的曲调
  translation: "七弦琴上清冷作响，静听如松风生寒。古调我虽自爱，今人却多不弹。"
  appreciation: "刘长卿听琴寄慨。以古调自爱、今人不弹，写知音稀少与怀才不遇，简淡有骨。"
  background: "刘长卿听人弹琴有感而作，一说自况。"
