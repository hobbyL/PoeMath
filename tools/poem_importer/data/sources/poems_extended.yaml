- id: poem_ext_076
  title: 落花
  author: 李商隐
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '高阁客竟去，小园花乱飞。参差连曲陌，迢递送斜晖。

    肠断未忍扫，眼穿仍欲归。芳心向春尽，所得是沾衣。

    '
  annotations:
  - word: 参差
    meaning: 指花影的迷离，承上句乱飞意
  - word: 芳心
    meaning: 指花，也指自己看花的心意
  - word: 沾衣
    meaning: 指流泪
  translation: 高阁上的游客们已经竞相离去；小园的春花随风凋零纷纷乱飞。花影参差迷离接连着弯弯小径；远望落花回舞映着斜阳的余晖。 我的肝肠欲断不忍把落红扫去；望眼欲穿盼来春天却匆匆回归。爱花惜花自然要怨春去得太早；春尽花谢所得的只是落泪沾衣。
  appreciation: 这首诗写于会昌六年（公元846年），作者正闲居永业。当时，李商隐陷入牛李党争之中，境况不佳，心情郁闷，故本诗流露出幽恨怨愤之情。 首联直接写落花。上句叙事，下句写景。落花虽早有，客在却浑然不觉，待到人去楼空，客散园寂，诗人孤寂惆怅之情顿上心头，诗人这才注意到满园缤纷的落花，而且心生同病相怜的情思，用语巧妙。 颔联从不同角度写落花的具体情状。上句从空间着眼，写落花飘拂纷飞，连接曲陌；下句从时间着笔，写落花连绵不断，无尽无休。
