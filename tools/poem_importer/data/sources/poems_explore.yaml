- id: poem_exp_610
  title: 江上寄元六林宗
  author: 李白
  dynasty: 唐
  layer: explore
  is_required: false
  difficulty: 4
  content: '霜落江始寒，枫叶绿未脱。

    客行悲清秋，永路苦不达。

    沧波眇川汜，白日隐天末。

    停棹依林峦，惊猿相叫聒。

    夜分河汉转，起视溟涨阔。

    凉风何萧萧，流水鸣活活。

    浦沙净如洗，海月明可掇。

    兰交空怀思，琼树讵解渴。

    勖哉沧洲心，岁晚庶不夺。

    幽赏颇自得，兴远与谁豁。

    '
  annotations:
  - word: 元六
    meaning: 排行第六的元姓友人
  - word: 江上
    meaning: 江水之上
  translation: "霜落江开始寒，枫叶绿还未脱。客行悲清秋，长路苦不到。沧波渺远川汜，白日隐在天末。停桨依着林峦，惊猿相叫聒。夜半河汉转，起看海潮涨阔。凉风何等萧萧，流水鸣得活活。浦沙净如洗，海月明可摘。兰交空怀思，琼树怎解渴。勉励沧洲之心，岁晚庶几不夺。幽赏颇自得，远兴与谁同豁？"
  appreciation: "李白江上寄元六。霜枫惊猿、兴远与谁豁，羁旅清秋。"
  background: "唐李白《江上寄元六林宗》。"
  famous_lines:
