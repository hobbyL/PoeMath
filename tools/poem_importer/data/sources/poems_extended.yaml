- id: poem_ext_058
  title: 过香积寺
  author: 王维
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '不知香积寺，数里入云峰。

    古木无人径，深山何处钟。

    泉声咽危石，日色冷青松。

    薄暮空潭曲，安禅制毒龙。

    '
