- id: poem_exp_488
  title: 花犯·小石梅花
  author: 周邦彦
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '粉墙低，梅花照眼，依然旧风味。

    露痕轻缀。

    疑净洗铅华，无限佳丽。

    去年胜赏曾孤倚。

    冰盘同宴喜。

    更可惜，雪中高树，香篝熏素被。

    今年对花最匆匆，相逢似有恨，依依愁悴。

    吟望久，青苔上、旋看飞坠。

    相将见、脆丸荐酒，人正在、空江烟浪里。

    但梦想、一枝潇洒，黄昏斜照水。

    '
