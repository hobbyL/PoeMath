- id: poem_exp_023
  title: 临高台
  author: 佚名
  dynasty: 两汉
  layer: explore
  is_required: false
  difficulty: 3
  content: '临高台以轩，下有清水清且寒。

    江有香草目以兰，黄鹄高飞离哉翻。

    关弓射鹄，令我主寿万年。

    '
  annotations:
  - word: 临高台
    meaning: 登上高台
  - word: 远望
    meaning: 向远处眺望
  translation: "登临高台凭轩，下有清水清且寒。江有香草名曰兰，黄鹄高飞离哉翻。弯弓射鹄，令我主寿万年。"
  appreciation: "汉铙歌《临高台》。高台清江、黄鹄祝寿，是早期乐府。"
  background: "汉《铙歌》十八曲之《临高台》。"
  famous_lines:
  - 关弓射鹄，令我主寿万年。
  tags:
  - 写景
  - 乐府
  - 豪迈
  - 登高
  - 抒怀
  - 古诗词
- id: poem_exp_024
  title: 橘柚垂华实
  author: 佚名
  dynasty: 两汉
  layer: explore
  is_required: false
  difficulty: 3
  content: '橘柚垂华实，乃在深山侧。

    闻君好我甘，窃独自雕饰。

    委身玉盘中，历年冀见食。

    芳菲不相投，青黄忽改色。

    人倘欲我知，因君为羽翼。

    '
  annotations:
  - word: 橘柚
    meaning: 橘子和柚子
  - word: 华实
    meaning: 美好的果实
  - word: 嘉树
    meaning: 美好的树木
  translation: "《橘柚垂华实》可分两层读：先景后情。景的一端是「橘柚垂华实，乃在深山侧。 闻君好我甘，窃独自雕饰。…」，情的一端是「人倘欲我知，因君为羽翼。」。作者佚名。"
  appreciation: "《橘柚垂华实》咏物见志。佚名写物而不粘滞。"
  background: "两汉咏物之作《橘柚垂华实》，佚名。"
  famous_lines:
  - 人倘欲我知，因君为羽翼。
  tags:
  - 咏物
  - 古诗词
- id: poem_exp_034
  title: 醉高歌带摊破喜春来·旅中
  author: 顾德润
  dynasty: 元
  layer: explore
  is_required: false
  difficulty: 4
  content: '长江远映青山，回首难穷望眼。

    扁舟来往蒹葭岸，烟锁云林又晚。

    篱边黄菊经霜暗，囊底青蚨逐日悭。

    破情思晚砧鸣，断愁肠檐马韵，惊客梦晓钟寒。

    归去难，修一缄回两字报平安。

    '
  annotations:
  - word: 醉高歌
    meaning: 曲牌名
  - word: 旅中
    meaning: 旅途中
  - word: 客愁
    meaning: 旅人的愁思
  translation: "《醉高歌带摊破喜春来·旅中》可分两层读：先景后情。景的一端是「长江远映青山，回首难穷望眼。 扁舟来往蒹葭岸，烟锁云林又晚。…」，情的一端是「归去难，修一缄回两字报平安。」。作者顾德润。"
  appreciation: "《醉高歌带摊破喜春来·旅中》值得背一两句。「归去难，修一缄回两字报平安。」最好记。"
  background: "顾德润篇什之一，主题与写景相关。"
  famous_lines:
  - 归去难，修一缄回两字报平安。
  tags:
  - 写景
  - 抒情
  - 思乡
  - 古诗词
- id: poem_exp_035
  title: 山中四咏
  author: 元鹏
  dynasty: 明
  layer: explore
  is_required: false
  difficulty: 4
  content: '我爱山中春，苍崖鸟一声。

    桃花源里住，罕见问津人。

    我爱山中夏，空冥花雨下。

    行吟屐齿肥，树色丽四野。

    我爱山中秋，黄云稻正稠。

    铎声连振起，镰子刈禾头。

    我爱山中冬，冰澌叠乱封。

    地炉无品字，一榻冷千峰。

    '
  annotations:
  - word: 山中
    meaning: 山里
  - word: 四咏
    meaning: 四首咏物诗
  - word: 幽
    meaning: 幽静
  translation: "我爱山中春，苍崖鸟一声。桃花源里住，罕见问津人。我爱山中夏，空冥花雨下。行吟屐齿肥，树色丽四野。我爱山中秋，黄云稻正稠……我爱山中冬……"
  appreciation: "元鹏山中四咏。四季分咏山居，清淡自适。"
  background: "元鹏《山中四咏》。"
  famous_lines:
  - 地炉无品字，一榻冷千峰。
  tags:
  - 写景
  - 禅隐
  - 生活
  - 古诗词
- id: poem_exp_036
  title: 黄山道中
  author: 赵沨
  dynasty: 金
  layer: explore
  is_required: false
  difficulty: 3
  content: '小榖城荒路屈盘，石根寒碧涨秋湾。

    千章秀木黄公庙，一点飞雪白塔山。

    好景落谁诗句里，蹇驴驮我画图间。

    膏肓泉石真吾事，莫厌乘兴数往还。

    '
  annotations:
  - word: 黄山
    meaning: 安徽黄山
  - word: 道中
    meaning: 路途中
  - word: 云海
    meaning: 黄山云雾
  translation: "读《黄山道中》，先盯住题目与名句「膏肓泉石真吾事，莫厌乘兴数往还。」，再回看「小榖城荒路屈盘，石根寒碧涨秋湾。 千章秀木黄公庙，一点飞雪白塔山。…」如何铺垫。"
  appreciation: "《黄山道中》值得背一两句。「膏肓泉石真吾事，莫厌乘兴数往还。」最好记。"
  background: "赵沨篇什之一，主题与写景相关。"
  famous_lines:
  - 膏肓泉石真吾事，莫厌乘兴数往还。
  tags:
  - 写景
  - 自然
  - 古诗词
- id: poem_exp_037
  title: 清江引·立春
  author: 贯云石
  dynasty: 元
  layer: explore
  is_required: false
  difficulty: 3
  content: '金钗影摇春燕斜，木杪生春叶。

    水塘春始波，火候春初热。

    土牛儿载将春到也。

    '
  annotations:
  - word: 清江引
    meaning: 曲牌名
  - word: 立春
    meaning: 二十四节气之一
  - word: 东风
    meaning: 春风
  translation: "金钗影摇，春燕斜；树梢生春叶。水塘春始波，火候春初热。土牛儿把春载到了。"
  appreciation: "贯云石立春。金钗春燕、土牛载春，节令欢快，是元散曲清新一路。"
  background: "元贯云石《清江引·立春》。"
  famous_lines:
  - 土牛儿载将春到也。
  tags:
  - 写景
  - 春天
  - 古诗词
- id: poem_exp_039
  title: 行台闲咏
  author: 石玠
  dynasty: 明
  layer: explore
  is_required: false
  difficulty: 3
  content: '清于池水净于苔，会府潭潭暂作台。

    夜月半庭人未宿，春云满眼杏将开。

    榆关道路犹堪走，麟阁功勋岂易陪。

    莫信蓬莱相离远，塞鸿多自日边来。

    '
  annotations:
  - word: 行台
    meaning: 临时官署
  - word: 闲咏
    meaning: 闲暇吟咏
  - word: 野色
    meaning: 郊野的景色
  translation: "《行台闲咏》（石玠）篇幅适中。以景物为主线，「莫信蓬莱相离远，塞鸿多自日边来。」是诗眼。"
  appreciation: "读完不妨停在最有力的一句——往往是「莫信蓬莱相离远，塞鸿多自日边来。」。石玠的力度在收束。"
  background: "石玠篇什之一，主题与写景相关。"
  famous_lines:
  - 莫信蓬莱相离远，塞鸿多自日边来。
  tags:
  - 写景
  - 怀古
  - 古诗词
- id: poem_exp_040
  title: 夜泉
  author: 袁中道
  dynasty: 明
  layer: explore
  is_required: false
  difficulty: 2
  content: '山白鸟忽鸣，石冷霜欲结。

    流泉得月光，化为一溪雪。

    '
  annotations:
  - word: 夜泉
    meaning: 夜间的泉水
  - word: 泠泠
    meaning: 清脆的流水声
  - word: 月色
    meaning: 月光
  translation: "山色发白，鸟忽然鸣叫；石头冰冷，霜要凝结。流泉得到月光，化作一溪白雪。"
  appreciation: "袁中道写夜泉。泉得月化雪，想象清奇，是晚明写景小品。"
  background: "明袁中道《夜泉》。"
  famous_lines:
  - 流泉得月光，化为一溪雪。
  tags:
  - 写景
  - 夜晚
  - 古诗词
- id: poem_exp_044
  title: 鹦鹉曲·野渡新晴
  author: 冯子振
  dynasty: 元
  layer: explore
  is_required: false
  difficulty: 3
  content: '孤村三两人家住，终日对野叟田父。

    说今朝绿水平桥，昨日溪南新雨。

    碧天边岩穴云归，白鹭一行飞去。

    便芒鞋竹杖行春，问底是青帘舞处？

    '
  annotations:
  - word: 鹦鹉曲
    meaning: 曲牌名
  - word: 野渡
    meaning: 荒野渡口
  - word: 新晴
    meaning: 雨后初晴
  translation: "元冯子振《鹦鹉曲·野渡新晴》写景。起如「孤村三两人家住，终日对野叟田父。 说今朝绿水平桥，昨日溪南新雨。…」，结以「便芒鞋竹杖行春，问底是青帘舞处？」，脉络分明。"
  appreciation: "《鹦鹉曲·野渡新晴》的好处是明白：冯子振把写景落到实处，又以「便芒鞋竹杖行春，问底是青帘舞处？」收住。"
  background: "关于《鹦鹉曲·野渡新晴》作年或有异说，可读作冯子振写景的一篇。"
  famous_lines:
  - 便芒鞋竹杖行春，问底是青帘舞处？
  tags:
  - 写景
  - 自然
  - 旷达
  - 古诗词
- id: poem_exp_046
  title: 泛南湖至石帆诗
  author: 谢惠连
  dynasty: 南北朝
  layer: explore
  is_required: false
  difficulty: 3
  content: '轨息陆途初，枻鼓川路始。

    涟漪繁波漾，参差层峰峙。

    萧疏野趣生，逶迤白云起。

    登陟苦跋涉，䁹盼乐心耳。

    即玩玩有竭，在兴兴无已。

    '
  annotations:
  - word: 泛
    meaning: 泛舟
  - word: 南湖
    meaning: 湖名
  - word: 石帆
    meaning: 地名
  translation: "《泛南湖至石帆诗》（谢惠连）篇幅适中。以景物为主线，「即玩玩有竭，在兴兴无已。」是诗眼。"
  appreciation: "《泛南湖至石帆诗》值得背一两句。「即玩玩有竭，在兴兴无已。」最好记。"
  background: "关于《泛南湖至石帆诗》作年或有异说，可读作谢惠连写景的一篇。"
  famous_lines:
  - 即玩玩有竭，在兴兴无已。
  tags:
  - 写景
  - 自然
  - 山水
  - 古诗词
- id: poem_exp_049
  title: 阳山道中
  author: 释善住
  dynasty: 元
  layer: explore
  is_required: false
  difficulty: 2
  content: '雨余春涧水争分，野雉双飞过古坟。

    眼见人家住深坞，梅花绕屋不开门。

    '
