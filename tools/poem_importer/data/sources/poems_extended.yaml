    '
  annotations:
  - word: 卷珠帘
    meaning: 意指其卷帘相望
  - word: 珠帘
    meaning: 珠串的帷帘
  - word: 深坐
    meaning: 长久的坐
  - word: 颦
    meaning: 皱眉
  - word: 蛾眉
    meaning: 蚕蛾触须弯而细长，故以称女子之眉
  translation: 美人卷起珠帘，深闺独坐还皱着蛾眉。 只见玉颜上泪痕斑斑，不知她心里究竟恨的是谁。
  appreciation: 五言绝句：语言平浅简易，情态缠绵凄凉，含蓄蕴藉，言短意长。“含蓄有古意”、“直接国风之遗”，在理解李白诗歌的时候应该注意这些。古代的“美人”就不是一个普通的词，与现代口头时髦的“美女”很不一样。《离骚》里的“香草美人”指贤臣明君；《诗经》中的美人指容德俱美的年轻女子，“有美一人，清扬婉兮”。“美人卷珠帘”是指品性容貌都美好的闺中女子，李白诗歌的“含蓄蕴藉”是指诗歌中主人公情韵的婉转，而非指寄托兴寓，所以说它“直接国风之遗”。
  background: 入选《唐诗三百首》，由 yxcs/poems-db 原始数据整理。
