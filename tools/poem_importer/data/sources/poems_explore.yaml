- id: poem_exp_616
  title: 春日归山寄孟浩然
  author: 李白
  dynasty: 唐
  layer: explore
  is_required: false
  difficulty: 4
  content: '朱绂遗尘境，青山谒梵筵。

    金绳开觉路，宝筏度迷川。

    岭树攒飞栱，岩花覆谷泉。

    塔形标海月，楼势出江烟。

    香气三天下，钟声万壑连。

    荷秋珠已满，松密盖初圆。

    鸟聚疑闻法，龙参若护禅。

    愧非流水韵，叨入伯牙弦。

    '
  annotations:
  - word: 春日
    meaning: 春天
  - word: 归山
    meaning: 回到山中
  - word: 孟浩然
    meaning: 唐代诗人
  translation: 朝服绶带遗弃在尘世之境，赶赴青山拜谒佛教道场。 黄金为绳显示觉悟之路，乘上宝筏渡过惑人迷川。 岭上高树拢聚构成飞栱一般，岩上红花盛开掩盖山谷的泉水。 佛塔高耸是海上日出的标志，佛楼雄伟依傍大江烟云缭绕。 佛烟香气传遍欲界色界无色界，佛钟敲响声连万壑千川。 手中念珠如秋日莲子成熟满把满串，繁茂的松树团团圆圆如月。 鸟儿相聚疑是为听法而来，龙王亦来参加原为护法而来。 惭愧我无洋洋兮若江河般的流水声韵，可以混为伯牙的琴上之声。
