  difficulty: 3
  content: '群山万壑赴荆门，生长明妃尚有村。

    一去紫台连朔漠，独留青冢向黄昏。

    画图省识春风面，环佩空归夜月魂。

    千载琵琶作胡语，分明怨恨曲中论。

    '
  annotations:
  - word: 群山万壑
    meaning: 许多山峦和峡谷
  - word: 明妃
    meaning: 王昭君
  - word: 紫台
    meaning: 帝王宫殿
  - word: 青冢
    meaning: 王昭君墓
  translation: 千山万岭好像波涛奔赴荆门，王昭君生长的乡村至今留存。 从紫台一去直通向塞外沙漠，荒郊上独留的青坟对着黄昏。 只依凭画图识别昭君的容颜，月夜里环佩叮当是昭君归魂。 千载琵琶一直弹奏胡地音调，曲中抒发的分明的昭君怨恨。
  appreciation: 这是组诗《咏怀古迹五首》其中的第三首，诗人借咏昭君村、怀念王昭君来抒写自己的怀抱。诗人有感于王昭君的遭遇。寄予了自己深切的同情，同时表现了昭君对故国的思念与怨恨，并赞美了昭君虽死，魂魄还要归来的精神，从中寄托了诗人自己身世及爱国之情。全诗叙事明确，形象突出，寓意深刻。 “群山万壑赴荆门，生长明妃尚有村”。诗的发端两句，首先点出昭君村所在的地方。据《一统志》说：“昭君村，在荆州府归州东北四十里。”其地址，即在今湖北秭归县的香溪。杜甫写这首诗的时候，正住在夔州白帝城。这是三峡西头，地势较高。他站在白帝城高处，东望三峡东口外的荆门山及其附近的昭君村。远隔数百里，本来是望不到的，但他发挥想象力，由近及远，构想出群山万壑随着险急的江流，奔赴荆门山的雄奇壮丽的图景。他就以这个图景作为这首诗的首句，起势很不平凡。杜甫写三峡江流有“众水会涪万，瞿塘争一门”（《长江二首》）的警句，用一个“争”字，突出了三峡水势之惊险。这里则用一个“赴”字突出了三峡山势的雄奇生动。这是一个有趣的对照。但是，诗的下一句，却落到一个小小的昭君村上，颇有点出人意外，因而引起评论家一些不同的议论。明人胡震亨评注的《杜诗通》就说：“群山万壑赴荆门，当似生长英雄起句，此未。
