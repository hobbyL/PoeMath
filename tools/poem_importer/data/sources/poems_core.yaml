- id: poem_core_067
  title: 寒食
  author: 韩翃
  dynasty: 唐
  grade: 6
  semester: 下
  textbook_unit: 语文六年级下·古诗三首
  is_required: true
  difficulty: 3
  content: '春城无处不飞花，寒食东风御柳斜。

    日暮汉宫传蜡烛，轻烟散入五侯家。

    '
  pinyin: 'chūn chéng wú chù bù fēi huā ， hán shí dōng fēng yù liǔ xié 。

    rì mù hàn gōng chuán là zhú ， qīng yān sàn rù wǔ hóu jiā 。

    '
  annotations:
  - word: 寒食
    meaning: 清明前一日的传统节日，禁烟火只吃冷食
  - word: 春城
    meaning: 春天的长安城
  - word: 御柳
    meaning: 皇宫御苑里的柳树
  - word: 传蜡烛
    meaning: 寒食禁火，但皇帝赐给权贵蜡烛以点火
  - word: 五侯
    meaning: 泛指权贵之家
  translation: 春天的长安城里处处飘飞着落花，寒食节东风吹得皇宫柳条斜斜低垂。日暮时分皇宫里传出赐给权贵们的蜡烛，轻轻的烟雾飘散进入五侯家中。
  appreciation: 全诗以富丽的春城景色和皇宫赐烛的场面，含蓄地讽刺了唐代宦官贵戚的特权，末句"轻烟散入五侯家"意在言外。
  background: 韩翃因此诗受到唐德宗赏识，被任命为驾部郎中、知制诰。诗表面写节日风俗，实则暗含讽喻。
  famous_lines:
  - 春城无处不飞花，寒食东风御柳斜
  tags:
  - 节日
  - 讽喻
  - 七言绝句
- id: poem_core_068
  title: 迢迢牵牛星
  author: 佚名
  dynasty: 汉
  grade: 6
  semester: 下
  textbook_unit: 语文六年级下·古诗三首
  is_required: true
  difficulty: 3
  content: '迢迢牵牛星，皎皎河汉女。

    纤纤擢素手，札札弄机杼。

    终日不成章，泣涕零如雨。

    河汉清且浅，相去复几许？

    盈盈一水间，脉脉不得语。

    '
  pinyin: 'tiáo tiáo qiān niú xīng ， jiǎo jiǎo hé hàn nǚ 。

    xiān xiān zhuó sù shǒu ， zhá zhá nòng jī zhù 。

    zhōng rì bù chéng zhāng ， qì tì líng rú yǔ 。

    hé hàn qīng qiě qiǎn ， xiāng qù fù jǐ xǔ ？

    yíng yíng yī shuǐ jiān ， mò mò bù dé yǔ 。

    '
  annotations:
  - word: 迢迢
    meaning: 遥远的样子
  - word: 河汉女
    meaning: 织女星，河汉即银河
  - word: 擢
    meaning: 伸出
  - word: 素手
    meaning: 白皙的手
  - word: 札札
    meaning: 织机声
  - word: 机杼
    meaning: 织布机上的梭子
  - word: 章
    meaning: 布帛上的经纬纹理，泛指布匹
  - word: 零
    meaning: 落
  - word: 盈盈
    meaning: 水清浅的样子
  - word: 脉脉
    meaning: 含情凝视的样子
  translation: 遥远的牵牛星啊，明亮的织女星。纤纤白皙的手伸出来，札札地摆弄着织布机的梭子。织了一整天也织不成布，泪水落下来像雨一样。天上的银河又清又浅，两颗星相隔又能有多远？只隔着一条清清浅浅的银河，含情凝视却不能相互说话。
  appreciation: 借牛郎织女神话抒写离别相思之苦。以"迢迢"、"皎皎"、"纤纤"、"札札"、"盈盈"、"脉脉"六个叠词层层铺陈，情韵悠长。
  background: 《古诗十九首》之一，为东汉末年文人五言诗代表作。
  famous_lines:
  - 盈盈一水间，脉脉不得语
  tags:
  - 神话
  - 相思
  - 五言古诗
  - 名篇
- id: poem_core_069
  title: 十五夜望月
  author: 王建
  dynasty: 唐
  grade: 6
  semester: 下
  textbook_unit: 语文六年级下·古诗三首
  is_required: true
  difficulty: 3
  content: '中庭地白树栖鸦，冷露无声湿桂花。

    今夜月明人尽望，不知秋思落谁家。

    '
  pinyin: 'zhōng tíng dì bái shù qī yā ， lěng lù wú shēng shī guì huā 。

    jīn yè yuè míng rén jìn wàng ， bù zhī qiū sī luò shuí jiā 。

    '
  annotations:
  - word: 十五夜
    meaning: 八月十五中秋之夜
  - word: 中庭
    meaning: 庭院中
  - word: 地白
    meaning: 月光洒在地上一片白
  - word: 栖
    meaning: 停歇
  - word: 冷露
    meaning: 秋夜的寒露
  - word: 秋思
    meaning: 秋日思念亲人的情感
  translation: 庭院中月光洒得地面一片洁白，树上的乌鸦已经栖息，寒冷的秋露无声地打湿了桂花。今夜明月当空人们都在仰望，不知那秋日的思念会落到谁家。
  appreciation: 全诗以"地白"、"树栖鸦"、"冷露"、"桂花"营造出中秋夜的清冷意境，末句"不知秋思落谁家"以问代答，含蓄无尽。
  background: 唐代诗人王建中秋夜望月怀人所作，具体年代不详。
  famous_lines:
  - 今夜月明人尽望，不知秋思落谁家
  tags:
  - 中秋
  - 思乡
  - 七言绝句
  - 名篇
- id: poem_core_070
  title: 风
  author: 李峤
  dynasty: 唐
  grade: 1
  semester: 上
  textbook_unit: 新课标必背
  is_required: true
  difficulty: 1
  content: '解落三秋叶，能开二月花。

    过江千尺浪，入竹万竿斜。

    '
  pinyin: 'jiě luò sān qiū yè ， néng kāi èr yuè huā 。

    guò jiāng qiān chǐ làng ， rù zhú wàn gān xié 。

    '
  annotations:
  - word: 解落
    meaning: 吹落
  - word: 三秋
    meaning: 秋天
  - word: 二月
    meaning: 春天
  - word: 竿
    meaning: 竹竿
  translation: 风能吹落秋天的树叶，能催开二月的春花。经过江面掀起千尺巨浪，吹进竹林万根竹竿倾斜。
