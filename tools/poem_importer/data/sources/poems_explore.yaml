- id: poem_exp_583
  title: 燕归梁·凤莲
  author: 蒋捷
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 3
  content: '我梦唐宫春昼迟。

    正舞到、曳裾时。

    翠云队仗绛霞衣。

    慢腾腾、手双垂。

    忽然急鼓催将起，似彩凤、乱惊飞。

    梦回不见万琼妃。

    见荷花、被风吹。

