- id: poem_ext_397
  title: 桂枝香·金陵怀古
  author: 王安石
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 4
  content: '登临送目，正故国晚秋，天气初肃。

    千里澄江似练，翠峰如簇。

    归帆去棹残阳里，背西风，酒旗斜矗。

    彩舟云淡，星河鹭起，画图难足。

    念往昔，繁华竞逐，叹门外楼头，悲恨相续。

    千古凭高对此，谩嗟荣辱。

    六朝旧事随流水，但寒烟衰草凝绿。

    至今商女，时时犹唱，后庭遗曲。

    '
  annotations:
  - word: 桂枝香
    meaning: 词牌名
  - word: 金陵
    meaning: 今南京
  - word: 怀古
    meaning: 怀念古事
  - word: 千里澄江
    meaning: 千里清澈的江水
  translation: "登高远望故都，正是晚秋。千里长江澄澈如白练，苍翠的山峰簇拥在一起。残阳里帆影来去，西风中酒旗斜斜矗立。彩船出没于淡云，白鹭像从星河飞起，美得画也画不尽。想起往昔繁华争逐；可叹亡国悲剧一幕接一幕。千古登高，空自叹息荣辱兴亡。六朝旧事随流水而去，只剩寒烟衰草一片黯绿。至今商女还时时唱着《后庭花》的遗曲。"
