- id: poem_exp_466
  title: 江神子·十日荷塘小隐赏桂呈朔翁
  author: 吴文英
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '西风来晚桂开迟。

    月宫移。

    到东篱。

    簌簌惊尘，吹下半冰规。

    拟唤阿娇来小隐，金屋底，乱香飞。

    重阳还是隔年期。

    蝶相思。

    客情知。

    吴水吴烟，愁里更多诗。

    一夜看承应未别，秋好处，雁来时。

