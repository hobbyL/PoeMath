- id: poem_core_112
  title: 锦瑟
  author: 李商隐
  dynasty: 唐
  is_required: true
  difficulty: 3
  content: '锦瑟无端五十弦，一弦一柱思华年。

    庄生晓梦迷蝴蝶，望帝春心托杜鹃。

    沧海月明珠有泪，蓝田日暖玉生烟。

    此情可待成追忆，只是当时已惘然。

    '
  annotations:
  - word: 锦瑟
    meaning: 装饰华美的瑟
  - word: 瑟
    meaning: 拨弦乐器，通常二十五弦
  - word: 无端
    meaning: 犹何故
  - word: 五十弦
    meaning: 这里是托古之词
  - word: 庄生晓梦迷蝴蝶
    meaning: 商隐此引庄周梦蝶故事，以言人生如梦，往事如烟之意
  translation: 锦瑟呀，你为何竟有五十条弦？每弦每节，都令人怀思黄金华年。 我心如庄子，为蝴蝶晓梦而迷惘；又如望帝化杜鹃，寄托春心哀怨。 沧海明月高照，鲛人泣泪皆成珠。蓝田红日和暖，可看到良玉生烟。 悲欢离合之情，岂待今日来追忆，只是当年却漫不经心，早已惘然。读者尽管难以明了《锦瑟》诗的思想内容，但那可供神游的诗境，却很容易在脑子里浮现。
  appreciation: 《锦瑟》，是李商隐的代表作，爱诗的无不乐道喜吟，堪称最享盛名；然而它又是最不易讲解的一篇难诗。有人说是写给令狐楚家一个叫“锦瑟”的侍女的爱情诗；有人说是睹物思人，写给故去的妻子王氏的悼亡诗；也有人认为中间四句诗可与瑟的适、怨、清、和四种声情相合，从而推断为描写音乐的咏物诗；此外还有影射政治、自叙诗歌创作等许多种说法。千百年来众说纷纭，莫衷一是，大体而言，以“悼亡”和“自伤”说者为多。
    诗人大量借用庄生梦蝶，杜鹃啼血，沧海珠泪、良田生烟等典故，采用比兴手法，运用联想与想象，把听觉的感受，转化为视觉形象，以片段意象的组合，创造朦胧的境界，从而借助可视可感的诗歌形象来传达其真挚浓烈而又幽约深曲的深思。 诗题“锦瑟”，是用了起句的头二个字。旧说中，原有认为这是咏物诗的，但注解家似乎都主张：这首诗与瑟事无关，实是一篇借瑟以隐题的“无题”之作。 首联“锦瑟无端五十弦，一弦一柱思华年。”无端，无缘无故，生来就如此。乐器，琴有三弦、五弦；筝有13弦；而“瑟”却有五十弦。用这么多弦，来抒发繁复之情感，该是多么哀伤。古有泰帝与素女之典故，已是哀伤至极了。诗人以这个典故作为喻象，暗示自喻诗人与众不同，别人只三弦、五弦，而诗人之瑟却有五十弦之多。真。
  background: "李商隐晚年代表作。以锦瑟起兴，融合典故与象征，写华年往事与惘然之情，历来解说纷纭。"
  famous_lines:
  - 此情可待成追忆，只是当时已惘然。
  tags:
