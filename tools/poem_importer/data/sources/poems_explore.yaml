- id: poem_exp_296
  title: 渭阳
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '我送舅氏，曰至渭阳。

    何以赠之？

    路车乘黄。

    我送舅氏，悠悠我思。

    何以赠之？

    琼瑰玉佩。

