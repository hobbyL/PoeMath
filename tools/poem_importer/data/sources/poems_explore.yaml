- id: poem_exp_371
  title: 水调歌头·平生太湖上
  author: 佚名
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '平生太湖上，短棹几经过。

    如今重到何事？

    愁比水云多。

    拟把匣中长剑，换取扁舟一叶，归去老渔蓑。

    银艾非吾事，丘壑已蹉跎。

    脍新鲈，斟美酒，起悲歌。

    太平生长，岂谓今日识兵戈？

    欲泻三江雪浪，净洗胡尘千里，不用挽天河！

    回首望霄汉，双泪堕清波。

