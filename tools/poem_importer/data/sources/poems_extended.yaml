- id: poem_ext_246
  title: 念奴娇·春情
  author: 李清照
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 4
  content: '萧条庭院，又斜风细雨，重门须闭。宠柳娇花寒食近，种种恼人天气。险韵诗成，扶头酒醒，别是闲滋味。征鸿过尽，万千心事难寄。

    楼上几日春寒，帘垂四面，玉阑干慵倚。被冷香消新梦觉，不许愁人不起。清露晨流，新桐初引，多少游春意。日高烟敛，更看今日晴未。

    '
  annotations:
  - word: 念奴娇
    meaning: 词牌名
  - word: 春情
    meaning: 春天的情思
  - word: 萧条
    meaning: 冷落凄凉
  - word: 清露
    meaning: 清澈的露水
  translation: "白话理解：宋李清照作《念奴娇·春情》，借婉约抒怀；「楼上几日春寒，帘垂四面，玉阑干慵倚。被冷香消新梦觉，不许愁人不起。清露晨」尤为后人传诵。"
  appreciation: "李清照此篇不以铺张取胜，而以「楼上几日春寒，帘垂四面，玉阑干慵倚。被冷香消新梦觉，不许愁人不起。清露晨」这样准确的一句立住全诗。"
  background: "《念奴娇·春情》为李清照作品，读者多从此感受其婉约书写。"
  famous_lines:
  - 楼上几日春寒，帘垂四面，玉阑干慵倚。被冷香消新梦觉，不许愁人不起。清露晨流，新桐初引，多少游春意。日高烟敛，更看今日晴未。
  tags:
