- id: poem_exp_271
  title: 苛政猛于虎
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '孔子过泰山侧，有妇人哭于墓者而哀，夫子式而听之，使子路问之，曰：“子之哭也，壹似重有忧者。

    ”而曰：“然。

    昔者吾舅死于虎，吾夫又死焉，今吾子又死焉。

    ”夫子曰：“何为不去也？

    ”曰：“无苛政。

    ”夫子曰：“小子识之：苛政猛于虎也。

