  translation: "清清河水映带长长的草木，车马缓缓前行。流水像有情意，暮禽也结伴而还。荒城临着古渡，落日洒满秋山。迢迢来到嵩山下，归来且闭门谢客。"
  appreciation: "写归隐途中所见，景中有情。「流水如有意，暮禽相与还」拟人自然，收束于闭关，见归隐决心。"
