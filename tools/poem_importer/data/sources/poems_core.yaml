- id: poem_core_110
  title: 送杜少府之任蜀州
  author: 王勃
  dynasty: 唐
  is_required: true
  difficulty: 3
  content: '城阙辅三秦，风烟望五津。

    与君离别意，同是宦游人。

    海内存知己，天涯若比邻。

    无为在歧路，儿女共沾巾。

    '
  annotations:
  - word: 五津
    meaning: 指岷江的五个渡口白华津、万里津、江首津、涉头津、江南津
  - word: 风烟望五津
    meaning: “风烟”两字名词用作状语，表示行为的处所
  - word: 君
    meaning: 对人的尊称，相当于“您”
  - word: 宦游
    meaning: 出外做官
  - word: 海内
    meaning: 四海之内，即全国各地
  translation: 巍巍长安，雄踞三秦之地；渺渺四川，却在迢迢远方。 你我命运何等相仿，奔波仕途，远离家乡。 只要有知心朋友，四海之内不觉遥远。即便在天涯海角，感觉就像近邻一样。 岔道分手，实在不用儿女情长，泪洒衣裳。
  appreciation: 此诗是送别诗的名作，诗意慰勉勿在离别之时悲哀。起句严整对仗，三、四句以散调相承，以实转虚，文情跌宕。第三联“海内存知己，天涯若比邻”，奇峰突起，高度地概括了“友情深厚，江山难阻”的情景，尾联点出“送”的主题。全诗开合顿挫，气脉流通，意境旷达。送别诗中的悲凉凄怆之气，音调明快爽朗，语言清新高远，内容独树碑石。此诗一洗往昔送别诗中悲苦缠绵之态，体现出诗人高远的志向、豁达的情趣和旷达的胸怀。
    “城阙辅三秦，风烟望五津”。
  background: "王勃送友人杜少府赴蜀地任职时所作。一扫送别诗的儿女之态，境界开阔，为初唐送别名篇。"
  famous_lines:
  - 无为在歧路，儿女共沾巾
  tags:
