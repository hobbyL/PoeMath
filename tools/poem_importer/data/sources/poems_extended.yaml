- id: poem_ext_155
  title: 长安遇冯著
  author: 韦应物
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '客从东方来，衣上灞陵雨。问客何为来，采山因买斧。

    冥冥花正开，飏飏燕新乳。昨别今已春，鬓丝生几缕。

    '
  annotations:
  - word: 冯著
    meaning: 韦应物的朋友
  - word: 客从
    meaning: 旅人从远方来
  - word: 昨日
    meaning: 过去的日子
  translation: 客人从东方过来，衣服上还带着灞陵的雨。 问客人为什么来，客人说为了上山砍伐树木来买斧头。 百花正在悄悄地盛开，轻盈的燕子正在哺乳新雏。 去年一别如今又是春天，两鬓的头发不知又生出多少。
  appreciation: 诗人与朋友别后重逢，对朋友的遭遇深表同情，同时予以慰勉。全诗叙事中抒情写景，以问答方式渲染气氛。既情意深长，又生动活泼，清新明快，回味无穷。它的感人，首先在于诗人心胸坦荡，思想开朗，对生活充满信心，对前途有展望，对朋友充满热情。因此他能对一位不期而遇的失意朋友充分理解，深表同情，体贴入微而又积极勉励。 本诗首二句主要是说冯著刚从长安以东的地方来，还是一派名士兼隐士的风度。接着，诗人自为问答，料想冯著来长安的目的和境遇。“采山”句是俏皮话，打趣语，大意是说冯著来长安是为采铜铸钱以谋发财的，但只得到一片荆棘，还得买斧斫除。其寓意即谓谋仕不遇，心中不快。诗人自为问答，诙谐打趣，显然是为了以轻快的情绪冲淡友人的不快，所以下文便转入慰勉，劝导冯著对前途要有信心。但是这层意思是巧妙地通过描写眼前的春景来表现的。
    “冥冥花正开，飏飏燕新乳”。这两句大意是说，造化无语而繁花正在开放，燕子飞得那么欢快，因为它们刚哺育了雏燕。不难理解，诗人选择这样的形象，正是为了意味深长地劝导冯著不要为暂时失意而不快不平，勉励他相信大自然造化万物是公正不欺的，前辈关切爱护后代的感情是天然存在的，要相信自己正如春花般焕发才华，会有人来并切爱护的。 所以末二句，诗。
