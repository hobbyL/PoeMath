  translation: 东风飒飒，阵阵细雨随风飘散纷飞，荷花塘外的那边，传来了声声轻雷。 有锁纽的金蟾香炉，香烟缭绕飘逸，状似玉虎的辘轳，牵引绳索汲井水。 贾女隔帘窥韩寿，是爱他年轻貌美，魏王梦见甄氏留枕，赋诗比作宓妃。 呵，我这颗心不再与春花一同萌发；免得使我寸寸相思，都化成了烟灰。
