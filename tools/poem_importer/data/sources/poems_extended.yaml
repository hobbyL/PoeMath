- id: poem_ext_194
  title: 行路难·其三
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '有耳莫洗颍川水，有口莫食首阳蕨。

    含光混世贵无名，何用孤高比云月？

    吾观自古贤达人，功成不退皆殒身。

    子胥既弃吴江上，屈原终投湘水滨。

    陆机雄才岂自保？李斯税驾苦不早。

    华亭鹤唳讵可闻？上蔡苍鹰何足道？

    君不见吴中张翰称达生，秋风忽忆江东行。

    且乐生前一杯酒，何须身后千载名？

