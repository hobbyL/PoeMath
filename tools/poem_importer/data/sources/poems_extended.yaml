- id: poem_ext_376
  title: 浣溪沙·五两竿头风欲平
  author: 佚名
  dynasty: 五代
  layer: extended
  is_required: false
  difficulty: 3
  content: '五两竿头风欲平，长风举棹觉船轻。

    柔橹不施停却棹，是船行。

    满眼风波多闪烁，看山恰似走来迎。

    仔细看山山不动，是船行。

    '
