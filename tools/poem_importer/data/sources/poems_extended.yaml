  - 慰勉
  - 友情
  - 五言古诗
- id: poem_ext_265
  title: 与高适薛据同登慈恩寺浮图
  author: 岑参
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '塔势如涌出，孤高耸天宫。

    登临出世界，磴道盘虚空。

    突兀压神州，峥嵘如鬼工。

    四角碍白日，七层摩苍穹。

    下窥指高鸟，俯听闻惊风。

    连山若波涛，奔凑似朝东。

    青槐夹驰道，宫馆何玲珑。

    秋色从西来，苍然满关中。

    五陵北原上，万古青濛濛。

    净理了可悟，胜因夙所宗。

    誓将挂冠去，觉道资无穷。

    '
  annotations:
  - word: 慈恩寺
    meaning: 唐代长安寺庙
  - word: 浮图
    meaning: 佛塔
  - word: 塔势
    meaning: 塔的形态
  translation: "塔势像从地底涌出，孤高耸入天宫。登临仿佛超出人间，石级盘旋在虚空。突兀压着神州，峥嵘如鬼斧神工。四角挡住白日，七层摩着苍穹。下看指点高鸟，俯听惊风。连山如波涛，奔凑似朝向东方。青槐夹着驰道，宫馆何等玲珑。秋色从西来，苍然满关中。五陵北原上，万古青蒙蒙。净理了然于心，胜因夙所宗。誓将挂冠而去，觉悟道资无穷。"
  appreciation: "岑参登慈恩寺塔。前半写塔势登临之险峻，中幅关中秋色，结以挂冠求道，气势与理趣并存，是盛唐登高名作。"
  background: "天宝十一载岑参与高适、薛据、杜甫等同登长安慈恩寺塔唱和。"
  famous_lines:
  - 誓将挂冠去，觉道资无穷。
  tags:
