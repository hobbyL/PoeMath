- id: poem_ext_227
  title: 石州慢·寒水依痕
  author: 张元干
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 4
  content: '寒水依痕，春意渐回，沙际烟阔。溪梅晴照生香，冷蕊数枝争发。天涯旧恨，试看几许消魂，长亭门外山重叠。不尽眼中青，是愁来时节。

    情切。画楼深闭，想见东风，暗销肌雪。辜负枕前云雨，尊前花月。心期切处，更有多少凄凉，殷勤留与归时说。到得却相逢，恰经年离别。

    '
