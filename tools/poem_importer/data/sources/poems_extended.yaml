    meaning: 包含天空，指天空倒映在水中
  - word: 涵
    meaning: 包容
  - word: 虚
    meaning: 虚空，空间
  - word: 混太清
    meaning: 与天混为一体
  - word: 太清
    meaning: 指天空
  translation: "八月洞庭湖水涨平，涵容天空与太清浑然一体。水汽蒸腾着云梦大泽，波涛撼动岳阳城。想渡湖却没有舟楫，闲居又愧对圣明之世。坐看别人垂钓，空有一份羡鱼之情。"
  appreciation: "前半写洞庭壮阔，「气蒸」「波撼」雄健；后半以欲济无舟、羡鱼自喻求仕无门，是干谒诗中的上品。"
  background: "孟浩然赠张九龄（张丞相），以洞庭起兴，暗寓希望引荐之意。"
