- id: poem_ext_381
  title: 鹧鸪天·桂花
  author: 李清照
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 3
  content: '暗淡轻黄体性柔，情疏迹远只香留。

    何须浅碧深红色，自是花中第一流。

    梅定妒，菊应羞，画阑开处冠中秋。

    骚人可煞无情思，何事当年不见收。

    '
