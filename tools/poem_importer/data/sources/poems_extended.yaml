  - word: 兵卫
    meaning: 卫兵
  translation: "兵卫森列着画戟，宴寝凝着清香。海上风雨到来，逍遥的池阁生凉。烦病近于消散，嘉宾又满堂。自惭居处崇高，还未见到百姓安康。理明便能遣是非，性达便忘形迹。鲜肥正属时禁，蔬果幸而可尝。俯饮一杯酒，仰听金玉般的篇章。神欢体自轻，意欲凌风翔。吴中有许多隐逸，华发满垂杨。方知大藩之地，岂只财赋强。"
