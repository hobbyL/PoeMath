- id: poem_exp_191
  title: 金明池·咏寒柳
  author: 柳如是
  dynasty: 明
  layer: explore
  is_required: false
  difficulty: 4
  content: '有怅寒潮，无情残照，正是萧萧南浦。

    更吹起，霜条孤影，还记得，旧时飞絮。

    况晚来，烟浪斜阳，见行客，特地瘦腰如舞。

    总一种凄凉，十分憔悴，尚有燕台佳句。

    春日酿成秋日雨。

    念畴昔风流，暗伤如许。

    纵饶有，绕堤画舸，冷落尽，水云犹故。

    忆从前，一点东风，几隔着重帘，眉儿愁苦。

    待约个梅魂，黄昏月淡，与伊深怜低语。

    '
