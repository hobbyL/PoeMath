  - 五言古诗
- id: poem_ext_267
  title: 夜归鹿门山歌
  author: 孟浩然
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '山寺钟鸣昼已昏，渔梁渡头争渡喧。

    人随沙岸向江村，余亦乘舟归鹿门。

    鹿门月照开烟树，忽到庞公栖隐处。

    岩扉松径长寂寥，惟有幽人自来去。

    '
