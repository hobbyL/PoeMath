- id: poem_exp_400
  title: 沁园春·丁酉岁感事
  author: 陈人杰
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '谁使神州，百年陆沉，青毡未还？

    怅晨星残月，北州豪杰；西风斜日，东帝江山。

    刘表坐谈，深源轻进，机会失之弹指间？

    伤心事，是年年冰合，在在风寒。

    说和说战都难，算未必江沱堪宴安。

    叹封侯心在，鳣鲸失水；平戎策就，虎豹当关。

    渠自无谋，事犹可做，更剔残灯抽剑看。

    麒麟阁，岂中兴人物，不画儒冠。

    '
