  translation: 三万里长的黄河向东奔流入海，五千仞高的华山耸入云天。北方沦陷区的百姓在胡人统治下泪水已经流尽，向南盼望王师收复失地又是一年。
  appreciation: 全诗以夸张的笔法写出祖国山河壮丽，与遗民的悲惨遭遇形成强烈反差，末句"南望王师又一年"沉痛激愤，令人扼腕。
  background: 宋光宗绍熙三年（1192）秋，陆游退居山阴故里时所作，时年六十八岁。
  famous_lines:
