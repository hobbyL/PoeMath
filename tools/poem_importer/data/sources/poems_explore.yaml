- id: poem_exp_307
  title: 大雅·灵台
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '经始灵台，经之营之。

    庶民攻之，不日成之。

    经始勿亟，庶民子来。

    王在灵囿，麀鹿攸伏。

    麀鹿濯濯，白鸟翯翯。

    王在灵沼，於牣鱼跃。

    虡业维枞，贲鼓维镛。

    於论鼓钟，於乐辟廱。

    於论鼓钟，於乐辟廱。

    鼍鼓逢逢。

    蒙瞍奏公。

    '
