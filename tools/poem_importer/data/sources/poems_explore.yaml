- id: poem_exp_052
  title: 渡江云·揭浩斋送春和韵
  author: 吴澄
  dynasty: 元
  layer: explore
  is_required: false
  difficulty: 4
  content: '名园花正好，娇红白，百态竞春妆。

    笑痕添酒晕。

    丰脸凝脂，谁为试铝霜。

    诗朋酒伴，趁此日流转风光。

    尽夜游不妨秉烛，未觉是疏狂。

    茫茫。

    一年一度，烂漫离披，似长江去浪。

    但要教啼莺语燕，不怨卢郎。

    问春春道何曾去，任蜂蝶飞过东墙。

    君看取，年年潘令河阳。

    '
