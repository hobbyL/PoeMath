- id: poem_exp_593
  title: 同友人舟行游台越作
  author: 李白
  dynasty: 唐
  layer: explore
  is_required: false
  difficulty: 4
  content: '楚臣伤江枫，谢客拾海月。

    怀沙去潇湘，挂席泛溟渤。

    蹇予访前迹，独往造穷发。

    古人不可攀，去若浮云没。

    愿言弄倒景，从此炼真骨。

    华顶窥绝溟，蓬壶望超忽。

    不知青春度，但怪绿芳歇。

    空持钓鳌心，从此谢魏阙。

