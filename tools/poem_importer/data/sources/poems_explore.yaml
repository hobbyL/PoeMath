- id: poem_exp_467
  title: 更漏子·秋
  author: 张淑芳
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 3
  content: '墨痕香，红蜡泪。

    点点愁人离思。

    桐叶落，蓼花残。

    雁声天外寒。

    五云岭，九溪坞。

    待到秋来更苦。

    风淅淅，水淙淙。

    不教蓬径通。

