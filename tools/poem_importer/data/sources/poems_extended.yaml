  - word: 曳裾王门
    meaning: 语出《汉书·邹阳传》中的“饰固陋
  translation: "大道像青天一样宽，唯独我走不出去。羞与长安里巷小儿为伍，拿鸡雉赌梨栗。弹剑作歌奏出苦声，曳裾奔走于王门也不称心。淮阴市井曾嘲笑韩信，汉朝公卿忌妒贾谊。你不见从前燕国看重郭隗，拥帚折节全无猜疑。剧辛、乐毅感恩戴德，输肝剖胆报效英才。昭王白骨已蔓草，谁人更铸黄金台？行路难，归去来！"
  appreciation: "李白《行路难》其二。以青天大道反衬不得出，历数韩信、贾谊与燕昭故事，结以「归去来」，愤懑与决绝并存。"
