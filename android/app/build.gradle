plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '0.1.0'

// ============ 签名配置 ============
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def releaseSigningPropertyNames = [
    'storeFile',
    'storePassword',
    'keyAlias',
    'keyPassword',
]
def missingReleaseSigningProperties = releaseSigningPropertyNames.findAll { name ->
    !keystoreProperties.getProperty(name)?.trim()
}
def releaseKeystoreFile = missingReleaseSigningProperties.isEmpty()
    ? file(keystoreProperties.getProperty('storeFile'))
    : null
def hasReleaseSigningConfig = keystorePropertiesFile.exists()
    && missingReleaseSigningProperties.isEmpty()
    && releaseKeystoreFile.exists()

def validateReleaseSigning = {
    if (!keystorePropertiesFile.exists()) {
        throw new GradleException(
            "Release signing config is missing: ${keystorePropertiesFile}",
        )
    }
    if (!missingReleaseSigningProperties.isEmpty()) {
        throw new GradleException(
            "Release signing config is incomplete. Missing: "
                + missingReleaseSigningProperties.join(', '),
        )
    }
    if (!releaseKeystoreFile.exists()) {
        throw new GradleException(
            "Release keystore does not exist: ${releaseKeystoreFile}",
        )
    }
}

def isRequestedReleaseBuild = gradle.startParameter.taskNames.any { taskName ->
    taskName.toLowerCase().contains('release')
}
if (isRequestedReleaseBuild) {
    validateReleaseSigning()
}

android {
    namespace = "com.poemath.app"
    compileSdk = 36
    ndkVersion = flutter.ndkVersion

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_21.toString()
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId = "com.poemath.app"
        minSdk = 21
        targetSdk = 35
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    signingConfigs {
        if (hasReleaseSigningConfig) {
            release {
                keyAlias = keystoreProperties['keyAlias']
                keyPassword = keystoreProperties['keyPassword']
                storeFile = releaseKeystoreFile
                storePassword = keystoreProperties['storePassword']
            }
        }
    }

    buildTypes {
        release {
            if (hasReleaseSigningConfig) {
                signingConfig = signingConfigs.release
            }
        }
    }
}

// Also guard aggregate tasks such as `build` whose requested name does not
// itself contain "release" but which execute release variant tasks.
tasks.configureEach { task ->
    if (task.name.toLowerCase().contains('release')) {
        task.doFirst {
            validateReleaseSigning()
        }
    }
}

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
    implementation "androidx.core:core-ktx:1.15.0"
}

flutter {
    source = "../.."
}
