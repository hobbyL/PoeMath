- id: poem_exp_501
  title: 登岳阳楼二首
  author: 陈与义
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '洞庭之东江水西，帘旌不动夕阳迟。

    登临吴蜀横分地，徙倚湖山欲暮时。

    万里来游还望远，三年多难更凭危。

    白头吊古风霜里，老木沧波无限悲。

    天入平湖晴不风，夕帆和雁正浮空。

    楼头客子杪秋后，日落君山元气中。

    北望可堪回白首，南游聊得看丹枫。

    翰林物色分留少，诗到巴陵还未工。

    '
