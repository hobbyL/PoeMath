- id: poem_ext_153
  title: 晨诣超师院读禅经
  author: 柳宗元
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '汲井漱寒齿，清心拂尘服。

    闲持贝叶书，步出东斋读。

    真源了无取，妄迹世所逐。

    遗言冀可冥，缮性何由熟。

    道人庭宇静，苔色连深竹。

    日出雾露馀，青松如膏沐。

    澹然离言说，悟悦心自足。

    '
  annotations:
  - word: 汲
    meaning: 从井里取水
  - word: 拂
    meaning: 抖动
  - word: 东斋
    meaning: 指净土院的东斋房
  - word: 真源
    meaning: 指佛理“真如”之源，即佛家的真意
  - word: 了
    meaning: 懂得，明白
  translation: 汲来清凉井水漱口刷牙，心清了再拂去衣上尘土。 悠闲地捧起佛门贝叶经，信步走出东斋吟咏朗读。 佛经真谛世人并无领悟，荒诞之事却为人们追逐。 佛儒精义原也可望暗合，但修养本性我何以精熟。 道人禅院多么幽雅清静，绿色鲜苔连接竹林深处。 太阳出来照着晨雾余露，苍翠松树宛若沐后涂脂。 清静使我恬淡难以言说，悟出佛理内心畅快满足。
  appreciation: 这首诗写的是诗人到超师院读佛经的感受，其主要内容是：清晨早起，他到住地附近一个名叫超的僧人（师）的寺院里去读佛经，有所感而写下这首五古抒情诗，既表达了他壮志未已而身遭贬谪，欲于佛经中寻求治世之道的心境，又流露出寻求一种超越尘世，流连于冲淡宁静的闲适佳境的复杂心情。 头四句总说“晨诣超师院读禅经”。诗人把研读佛典安排在一天中最宝贵的时刻。“汲井漱寒齿，清心拂尘服。”清晨早起，空气清新，以井水漱牙可以清心，又弹冠振衣拂去灰尘，身心内外俱为清净方可读经。可见用心之虔诚，充分表现了诗人对佛教的倾心和崇信，其沉溺之深溢于言表，不啻教徒沐浴更衣以拜佛祖。“闲持贝叶书，步出东斋读。”贝叶书简称贝书，佛经之泛称。古印度人多用贝多罗树叶经水沤后代纸，用以写佛经，故名。一个“读”字，是全诗内容的纲领；一个“闲”字，是全诗抒情的主调。诗人贬居永州，官职虽名曰“永州司马员外置同正员”，但只是个“闲官”而已。闲人闲官闲地，无政事之烦扰，亦无名利得失之拘牵，正是难得清闲，正好信步读经。就读经来说，闲而不闲；就处境而言，不闲而闲，其复杂心情曲曲传出。
    中间四句承上文“读”字而来，正面写读“经”的感想。这里有两层意思：前二句“真源了无取，妄迹世所逐”，是说。
