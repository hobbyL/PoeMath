  - 自然
  - 旷达
  - 古诗词
- id: poem_exp_046
  title: 泛南湖至石帆诗
  author: 谢惠连
  dynasty: 南北朝
  layer: explore
  is_required: false
  difficulty: 3
  content: '轨息陆途初，枻鼓川路始。

    涟漪繁波漾，参差层峰峙。

    萧疏野趣生，逶迤白云起。

    登陟苦跋涉，䁹盼乐心耳。

    即玩玩有竭，在兴兴无已。

    '
  annotations:
  - word: 泛
    meaning: 泛舟
  - word: 南湖
    meaning: 湖名
  - word: 石帆
    meaning: 地名
  translation: "轨息的陆途初，枻鼓的川路始。涟漪的繁波漾，参差的层峰峙。萧疏的野趣生，逶迤的白云起。登陟的苦跋涉，䁹盼的乐心耳。即玩的玩有竭，在兴的兴无已。"
  appreciation: "《泛南湖至石帆诗》中「即玩玩有竭，在兴兴无已。」最见精神。谢惠连写景，画面清楚。"
  background: "南北朝谢惠连《泛南湖至石帆诗》。"
  famous_lines:
  - 即玩玩有竭，在兴兴无已。
  tags:
  - 写景
  - 自然
  - 山水
  - 古诗词
