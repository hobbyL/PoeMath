- id: poem_ext_260
  title: 送僧归日本
  author: 钱起
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '上国随缘住，来途若梦行。

    浮天沧海远，去世法舟轻。

    水月通禅寂，鱼龙听梵声。

    惟怜一灯影，万里眼中明。

    '
  annotations:
  - word: 归日本
    meaning: 返回日本
  - word: 浮天
    meaning: 海天相接
  - word: 禅寂
    meaning: 禅定的寂静
  translation: "在上国随缘而住，来途像在梦中行走。浮天沧海那么远，离开尘世，法舟却很轻。水月与禅寂相通，鱼龙也来听梵声。只怜那一盏灯影，万里之遥仍在眼中明亮。"
  appreciation: "钱起送日本僧归国。浮天沧海、法舟轻写远渡；结以一灯影万里明，祝愿与禅意并存，是中日交流诗名篇。"
  background: "钱起送日本僧人归国时所作。"
  famous_lines:
  - 惟怜一灯影，万里眼中明。
  tags:
