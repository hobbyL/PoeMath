- id: poem_exp_386
  title: 满江红·翠幕深庭
  author: 吴文英
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '翠幕深庭，露红晚、闲花自发。

    春不断、亭台成趣，翠阴蒙密。

    紫燕雏飞帘额静，金鳞影转池心阔。

    有花香、竹色赋闲情，供吟笔。

    闲问字，评风月。

    时载酒，调冰雪。

    似初秋入夜，浅凉欺葛。

    人境不教车马近，醉乡莫放笙歌歇。

    倩双成、一曲紫云回，红莲折。

    '
