- id: poem_ext_215
  title: 霜叶飞·重九
  author: 吴文英
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 4
  content: '断烟离绪。关心事，斜阳红隐霜树。半壶秋水荐黄花，香噀西风雨。纵玉勒、轻飞迅羽，凄凉谁吊荒台古？记醉踏南屏，彩扇咽寒蝉，倦梦不知蛮素。

    聊对旧节传杯，尘笺蠹管，断阕经岁慵赋。小蟾斜影转东篱，夜冷残蛩语。早白发、缘愁万缕。惊飙从卷乌纱去。谩细将、茱萸看，但约明年，翠微高处。

    '
  annotations:
  - word: 霜叶飞
    meaning: 词牌名
  - word: 重九
    meaning: 重阳节
  - word: 断烟
    meaning: 残余的烟雾
  - word: 霜叶
    meaning: 经霜的红叶
  translation: 看着断断续续的云烟，离愁别绪之情油然而生，更令我情怀关切的，令人伤心的，是那一轮斜阳映射出来的一片残红，渐渐隐没于绛红的霜叶树林里。我提来了半壶秋水，插上一束黄色的菊花以便将她奠祭。在秋风秋雨之中，菊花依然旧香气喷溢，散发着阵阵幽香。在这种时候，谁又能策马扬鞭，像空中飞翔的小鸟一样轻飞迅疾，又有谁有心去凭吊凄凉、荒败的古台遗迹？记得我们曾经醉态朦胧，一起踏着歌声，去游览南屏。当时我昏醉沉迷，将身边的小蛮和樊素忘记。如今只有寒蝉呜咽，她的彩扇又在哪里？我的爱妾又去了何地？
    如今又是重阳节，虽然应景传杯但是却毫无意绪，任凭尘埃落满素笺，随便让蠹虫蛀坏毛笔，未完成的词章经过许多年也懒得再将它续写上。半轮素月的斜辉洒满东篱。泠泠清清的寒夜，蟋蟀仿佛也在唉声叹气，悄声低语。我已经是白发苍苍的老人了，只是因为愁绪万千，而任。
