- id: poem_exp_319
  title: 今日良宴会
  author: 佚名
  dynasty: 两汉
  layer: explore
  is_required: false
  difficulty: 4
  content: '今日良宴会，欢乐难具陈。

    弹筝奋逸响，新声妙入神。

    令德唱高言，识曲听其真。

    齐心同所愿，含意俱未申。

    人生寄一世，奄忽若飙尘。

    何不策高足，先据要路津。

    无为守穷贱，坎坷长苦辛。

    '
