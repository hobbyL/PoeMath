  - word: 姑苏
    meaning: 苏州的别称
  - word: 寒山寺
    meaning: 在苏州枫桥附近的寺庙
  translation: 月亮落下乌鸦啼叫寒霜漫天，江边的枫树和渔船上的灯火伴我这个愁人难以入眠。姑苏城外那座寒山寺，半夜的钟声传到了客船上。
  appreciation: 全诗以"月落"、"乌啼"、"霜满天"、"江枫"、"渔火"、"钟声"六个意象层层渲染羁旅愁思，末句"夜半钟声"以听觉收束，余韵悠长。
  background: 天宝十四年（755）安史之乱后，张继避乱南下，客船夜泊枫桥时所作。
