- id: poem_exp_289
  title: 国风·邶风·燕燕
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '燕燕于飞，差池其羽。

    之子于归，远送于野。

    瞻望弗及，泣涕如雨。

    燕燕于飞，颉之颃之。

    之子于归，远于将之。

    瞻望弗及，伫立以泣。

    燕燕于飞，下上其音。

    之子于归，远送于南。

    瞻望弗及，实劳我心。

    仲氏任只，其心塞渊。

    终温且惠，淑慎其身。

    先君之思，以勖寡人。

    '
  annotations:
  - word: 燕燕
    meaning: 飞翔的燕子
  - word: 邶风
    meaning: 邶国的民歌
  - word: 于飞
    meaning: 飞翔
  translation: "燕子飞着，羽毛差池不齐。那人出嫁，远送到郊野。望而不及，泣涕如雨。燕子飞着，上上下下。那人出嫁，远远送她。望而不及，伫立而泣。燕子飞着，上下鸣叫。那人出嫁，远送到南方。望而不及，实在劳我心。仲氏可靠，心充实深沉。始终温和聪慧，谨慎自身。念着先君，用以勉励我。"
  appreciation: "《邶风·燕燕》送嫁。瞻望弗及、伫立以泣，是《诗经》送别名篇。"
