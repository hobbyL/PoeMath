- id: poem_ext_124
  title: 咏怀古迹五首·其四
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '蜀主窥吴幸三峡，崩年亦在永安宫。

    翠华想像空山里，玉殿虚无野寺中。

    古庙杉松巢水鹤，岁时伏腊走村翁。

    武侯祠堂常邻近，一体君臣祭祀同。

    '
  annotations:
  - word: 蜀主
    meaning: 指刘备
  - word: 永安宫
    meaning: 在今四川省奉节县
  - word: 野寺
    meaning: 原注今为卧龙寺，庙在宫东
  - word: 伏腊
    meaning: 伏天腊月
  translation: 刘备出兵伐吴就驻扎在三峡，无奈战败归来去世在永安宫。 昔日翠旗飘扬空山浩浩荡荡，永安宫湮灭在这荒郊野庙中。 古庙里杉松树上水鹤做了巢，每逢节令仍举行隆重的祭祀。 丞相的祠庙就在先王庙临近，君臣共同享受着礼仪和祭礼。
  appreciation: 第四首咏怀的是刘备在白帝城的行宫永安宫。诗人称颂了三国时刘备和诸葛亮君臣一体的亲密关系，抒发了自己不受重用抱负难展的悲怨之情。 作者借村翁野老对刘备诸葛亮君臣的祭祀，烘托其遗迹之流泽。诗歌先叙刘备进袭东吴失败而卒于永安宫，继叹刘备的复汉大业一蹶不振，当年的翠旗行帐只能在空山想象中觅得踪迹，玉殿虚无缥缈，松杉栖息水鹤。歌颂了刘备的生前事业，叹惋大业未成身先去，空留祠宇在人间的荒凉景象。最后赞刘备诸葛亮君臣一体，千百年受人祭祀，表达了无限敬意，发抒了无限感慨。
    此诗通过先主庙和武侯祠邻近的描写，进而赞颂刘备、诸葛亮君臣际遇、同心一体，含有作者自己论事被斥，政治理想不能实现，抱负不能施展的感慨。在艺术描写上和前几首又有所不同。全诗平淡自然，写景状物形象明朗，以咏古迹为主而隐含咏怀。
