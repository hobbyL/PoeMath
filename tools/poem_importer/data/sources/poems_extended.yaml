- id: poem_ext_144
  title: 西施咏
  author: 王维
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '艳色天下重，西施宁久微。

    朝为越溪女，暮作吴宫妃。

    贱日岂殊众，贵来方悟稀。

    邀人傅香粉，不自著罗衣。

    君宠益娇态，君怜无是非。

    当时浣纱伴，莫得同车归。

    持谢邻家子，效颦安可希。

    '
