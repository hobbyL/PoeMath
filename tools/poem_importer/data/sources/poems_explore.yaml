- id: poem_exp_470
  title: 烛影摇红·题安陆浮云楼
  author: 廖世美
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '霭霭春空，画楼森耸凌云渚。

    紫薇登览最关情，绝妙夸能赋。

    惆怅相思迟暮。

    记当日、朱阑共语。

    塞鸿难问，岸柳何穷，别愁纷絮。

