  - word: 岂伊
    meaning: 难道是
  - word: 地气暖
    meaning: 南方气候温暖
  - word: 可以荐嘉客
    meaning: 可以拿来招待贵客
  translation: "江南有朱红的橘子，经冬仍是绿林。难道只因地气暖？自有耐岁寒的心。本可以献给嘉客，无奈被重重阻隔。命运只在所遇，循环不可推寻。空说多种桃李，这丹橘难道没有树阴？"
  appreciation: "张九龄咏丹橘。「岂伊地气暖？自有岁寒心」写坚贞；结以桃李与丹橘对照，讽世人重华轻实，是其名篇。"
  background: "张九龄《感遇·江南有丹橘》，以橘自喻忠贞不遇。"
