- id: poem_ext_166
  title: 古意
  author: 李颀
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '男儿事长征，少小幽燕客。

    赌胜马蹄下，由来轻七尺。

    杀人莫敢前，须如猬毛磔。

    黄云陇底白云飞，未得报恩不能归。

    辽东小妇年十五，惯弹琵琶解歌舞。

    今为羌笛出塞声，使我三军泪如雨。

    '
  annotations:
  - word: 古意
    meaning: 以古事寄怀
  - word: 辽东
    meaning: 辽河以东，边塞地区
  - word: 白日
    meaning: 日光
  translation: "男儿从事长征，少小是幽燕客。赌胜在马蹄下，从来轻视七尺之躯。杀人莫敢上前，胡须如刺猬张开。黄云陇底白云飞，未得报恩不能归。辽东小妇年十五，惯弹琵琶解歌舞。如今吹羌笛出塞声，使我三军泪如雨。"
  appreciation: "李颀写边将。前半豪健，结以羌笛出塞、三军泪雨，刚转为柔，震撼人心。"
  background: "李颀《古意》，写幽燕健儿与边声。"
  famous_lines:
