- id: poem_ext_064
  title: 草
  author: 白居易
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '离离原上草，一岁一枯荣。

    野火烧不尽，春风吹又生。

    远芳侵古道，晴翠接荒城。

    又送王孙去，萋萋满别情。

    '
  annotations:
  - word: 离离
    meaning: 青草茂盛的样子
  - word: 一岁一枯荣
    meaning: 枯，枯萎
  - word: 远芳侵古道
    meaning: 芳，指野草那浓郁的香气
  - word: 远芳
    meaning: 草香远播
  - word: 晴翠
    meaning: 草原明丽翠绿
  translation: 长长的原上草是多么茂盛，每年秋冬枯黄春来草色浓。 无情的野火只能烧掉干叶，春风吹来大地又是绿茸茸。 野草野花蔓延着淹没古道，艳阳下草地尽头是你征程。 我又一次送走知心的好友，茂密的青草代表我的深情。
  appreciation: 首句即破题面“古原草”三字。多么茂盛（“离离”）的原上草，抓住“春草”生命力旺盛的特征，可说是从“春草生兮萋萋”脱化而不着迹，为后文开出很好的思路。就“古原草”而言，何尝不可开作“秋来深径里”（僧古怀《原是秋草》），那通篇也就将是另一种气象了。野草是一年生植物，春荣秋枯，岁岁循环不已。“一岁一枯荣”意思似不过如此。然而写作“枯──荣”，与作“荣──枯”就大不一样。如作后者，便是秋草，便不能生发出三、四的好句来。
