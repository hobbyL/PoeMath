- id: poem_exp_555
  title: 眼儿媚·萧萧江上荻花秋
  author: 贺铸
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 3
  content: '萧萧江上荻花秋，做弄许多愁。

    半竿落日，两行新雁，一叶扁舟。

    惜分长怕君先去，直待醉时休。

    今宵眼底，明朝心上，后日眉头。

    '
