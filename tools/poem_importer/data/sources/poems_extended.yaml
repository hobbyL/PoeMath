    translation: >-
      人到晚年特别喜好安静，对人间万事都漠不关心。自思没有高策可以报国，只要求归隐家乡的山林。 宽解衣带对着松风乘凉，山月高照正好弄弦弹琴。君若问穷困通达的道理，请听水浦深处渔歌声音。
