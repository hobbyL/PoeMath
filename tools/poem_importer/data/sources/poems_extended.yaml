  appreciation: 这是一首赠友诗。全诗写情多于写景。三、四句隐含不满朝政之牢骚。 诗开头就说“晚年唯好静，万事不关心”，描述了晚年唯好清静、万事皆不关心的心态，看似达观，实则表露出诗人远大抱负无法实现的无奈情绪。说自己人到晚年，惟好清静，对什么事情都漠不关心了，乍一看，生活态度消极之至，但这是表面现象。仔细推求起来，这“唯好静”的“唯”字大有文章。一是确实“只”好静。二是“动”不了才“只得”好静。三是显示出极端消极的生活态度。
