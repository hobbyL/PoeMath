- id: poem_ext_115
  title: 无题·飒飒东风细雨来
  author: 李商隐
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '飒飒东风细雨来，芙蓉塘外有轻雷。

    金蟾啮锁烧香入，玉虎牵丝汲井回。

    贾氏窥帘韩掾少，宓妃留枕魏王才。

    春心莫共花争发，一寸相思一寸灰！

    '
