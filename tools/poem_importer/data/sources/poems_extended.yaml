    annotations: []
    translation: >-
      汉文帝求贤，宣示召见被贬臣子。贾谊才能，确实高明无人能及。 只是空谈半夜，令人扼腕叹息。文帝尽问鬼神之事，只字不提国事民生。
    appreciation: >-
      这是一首托古讽时诗，意在借贾谊的遭遇，抒写诗人怀才不遇的感慨。诗选取汉文帝宣室召见贾谊，夜半倾谈的情节，写文帝不能识贤，任贤；“不问苍生问鬼神”却揭露了晚唐皇帝服药求仙，荒于政事，不能任贤，不顾民生的昏庸特性。诗寓慨于讽，讽刺效果颇好。 此诗是首咏叹贾生故事的短诗，其着眼点，不在个人的穷通得失，而在于指出封建统治者不能真正重视人才，使其在政治上发挥作用。 贾谊贬长沙，久已成为诗人们抒写不遇之感的熟滥题材。
