- id: poem_exp_212
  title: 锦缠道·燕子呢喃
  author: 宋祁
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '燕子呢喃，景色乍长春昼。

    睹园林、万花如绣。

    海棠经雨胭脂透。

    柳展宫眉，翠拂行人首。

    向郊原踏青，恣歌携手。

    醉醺醺、尚寻芳酒。

