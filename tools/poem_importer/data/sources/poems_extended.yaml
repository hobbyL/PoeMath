- id: poem_ext_247
  title: 南歌子·天上星河转
  author: 李清照
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 3
  content: '天上星河转，人间帘幕垂。凉生枕簟泪痕滋。起解罗衣聊问、夜何其。

    翠贴莲蓬小，金销藕叶稀。旧时天气旧时衣。只有情怀不似、旧家时。

    '
  annotations:
  - word: 星河
    meaning: 银河，到秋天转向东南
  - word: 枕簟
    meaning: 枕头和竹席
  - word: 滋
    meaning: 增益，加多
  - word: 夜何其
    meaning: 《诗经·小雅·庭燎》“夜如何其？夜未央
  - word: 翠贴、金销
    meaning: 即贴翠、销金，均为服饰工艺
  translation: "天上的星河在转动，人间帘幕一层又一层。旧日秋光里的云物，如今怕看见梧桐。酒虽美、春虽浓，好梦却留不住。试问卷帘的人，却说海棠依旧；知不知道，该是叶儿更绿、花儿更少了。"
  appreciation: "李清照写春残花事（一作《如梦令》系名句「绿肥红瘦」）。问得痴、答得淡，炼字精妙。"
  background: "李清照前期闺情词，写暮春惜花。"
  famous_lines:
  - 翠贴莲蓬小，金销藕叶稀。旧时天气旧时衣。只有情怀不似、旧家时。
  tags:
  - 宋词精选
  - 宋词三百首
  - 抒情
  - 古诗词
- id: poem_ext_248
  title: 寄令狐郎中
  author: 李商隐
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '嵩云秦树久离居，双鲤迢迢一纸书。

