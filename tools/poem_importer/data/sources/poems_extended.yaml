- id: poem_ext_162
  title: 感遇·江南有丹橘
  author: 张九龄
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '江南有丹橘，经冬犹绿林。

    岂伊地气暖？自有岁寒心。

    可以荐嘉客，奈何阻重深。

    运命惟所遇，循环不可寻。

    徒言树桃李，此木岂无阴？

    '
