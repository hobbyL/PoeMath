- id: poem_exp_577
  title: 贺新郎·秋晓
  author: 蒋捷
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '渺渺啼鸦了。

    亘鱼天，寒生峭屿，五湖秋晓。

    竹几一灯人做梦，嘶马谁行古道。

    起搔首、窥星多少。

    月有微黄篱无影，挂牵牛数朵青花小。

    秋太淡，添红枣。

    愁痕倚赖西风扫。

