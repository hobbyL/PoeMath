  translation: "秋天景色异于江南，衡阳雁去而无留意。四面边声连着角声响起，千嶂里，长烟落日，孤城紧闭。浊酒一杯，故乡万里；燕然未勒，归计难成。羌管悠悠，霜满地。人不寐，将军白发，征夫落泪。"
