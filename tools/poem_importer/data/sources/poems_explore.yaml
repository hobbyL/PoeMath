  - id: poem_exp_199
    title: 日出入
    author: 佚名
    dynasty: 两汉
    layer: explore
    is_required: false
    difficulty: 3
    content: |
      日出入安穷？
      时世不与人同。
      故春非我春，夏非我夏，
      秋非我秋，冬非我冬。
      泊如四海之池，遍观是邪谓何？
      吾知所乐，独乐六龙，
      六龙之调，使我心若。
      訾黄其何不徕下。
