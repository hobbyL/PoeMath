  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '摇落深知宋玉悲，风流儒雅亦吾师。

    怅望千秋一洒泪，萧条异代不同时。

    江山故宅空文藻，云雨荒台岂梦思。

    最是楚宫俱泯灭，舟人指点到今疑。

    '
  annotations:
