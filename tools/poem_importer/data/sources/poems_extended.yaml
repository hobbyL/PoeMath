- id: poem_ext_208
  title: 御街行·秋日怀旧
  author: 范仲淹
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 4
  content: '纷纷坠叶飘香砌。夜寂静，寒声碎。真珠帘卷玉楼空，天淡银河垂地。年年今夜，月华如练，长是人千里。

    愁肠已断无由醉，酒未到，先成泪。残灯明灭枕头欹，谙尽孤眠滋味。都来此事，眉间心上，无计相回避。

    '
