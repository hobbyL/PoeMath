- id: poem_ext_147
  title: 春思
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '燕草如碧丝，秦桑低绿枝。

    当君怀归日，是妾断肠时。

    春风不相识，何事入罗帏。

    '
  annotations:
  - word: 燕草
    meaning: 指燕地的草
  - word: 秦桑
    meaning: 秦地的桑树
  - word: 君
    meaning: 指征夫
  - word: 怀归
    meaning: 想家
  - word: 妾
    meaning: 古代妇女自称
  translation: 燕地小草像碧丝般青绿，秦地的桑树已叶翠枝绿。 当你怀念家园盼归之日，早就思念你而愁肠百结。 春风啊你与我素不相识，为何吹进罗帐激我愁思？
  appreciation: 李白有很多描写思妇心理的诗篇，《春思》是其中之一。中国古典诗歌中的“春”字通常语意双关：既指春天，又可以用来比喻男女之爱。此诗《春思》中的“春”就包含有这两方面的意思。此诗以相隔遥远的燕秦两地春天景物起兴，别具一格。思妇触景生情，想起了远方的丈夫，颇为伤怀。她申斥春风，正是明志自警，恰到好处。 开头两句：“燕草如碧丝，秦桑低绿枝”，可以视作“兴”。诗中的兴句一般是就眼前所见，信手拈起，这两句却以相隔遥远的燕、秦两地的春天景物起兴，颇为别致。“燕草如碧丝”，当是出于思妇的悬想；“秦桑低绿枝”，才是思妇所目睹。把目力达不到的远景和眼前近景配置在一幅画面上，并且都从思妇一边写出，从逻辑上说，似乎有点乖碍，但从“写情”的角度来看，却是可通的。试想：仲春时节，桑叶繁茂，独处秦地的思妇触景生情，终日盼望在燕地行役屯戍的丈夫早日归来；她根据自己平素与丈夫的恩爱相处和对丈夫的深切了解，料想远在燕地的丈夫此刻见到碧丝般的春草，也必然会萌生思归的念头。见春草而思归，语出《楚辞·招隐士》：“王孙游兮不归，春草生兮萋萋！”首句化用《楚辞》语，浑成自然，不着痕迹。诗人巧妙地把握了思妇复杂的感情活动，用两处春光，兴两地相思，把想象与怀忆同眼前真景融合起。
