- id: poem_ext_168
  title: 渔翁
  author: 柳宗元
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '渔翁夜傍西岩宿，晓汲清湘燃楚竹。

    烟销日出不见人，欸乃一声山水绿。

    回看天际下中流，岩上无心云相逐。

    '
  annotations:
  - word: 渔翁
    meaning: 打鱼的老人
  - word: 湘水
    meaning: 湘江
  - word: 欸乃
    meaning: 摇橹声
  - word: 烟销日出
    meaning: 晨雾散去太阳升起
  translation: 渔翁晚上靠着西山歇宿，早上汲取清澈的湘水，以楚竹为柴做饭。 太阳出来云雾散尽不见人影，摇橹的声音从碧绿的山水中传出。 回头望去渔舟已在天边向下漂流，山上的白云正在随意飘浮，相互追逐。
  appreciation: 这首小诗情趣盎然，诗人以淡逸清和的笔墨构画出一幅令人迷醉的山水晨景，并从中透露了他深沉热烈的内心世界。 这首诗取题渔翁，渔翁是贯串全诗首尾的核心形象。但是，诗人并非孤立地为渔翁画像，作品的意趣也不唯落在渔翁的形象之上。完整地看，构成诗篇全境的，除了辛劳不息的渔翁以外，还有渔翁置身于其中的山水天地，这两者在诗中留下了按各自的规律特点而发展变幻的形迹。但同时，诗人又把两者浑然融化，渔翁和自然景象结成不可分割的一体，共同显示着生活的节奏和内在的机趣。由夜而晨，是人类活动最丰富的时刻，是万物复苏、生机勃勃的时刻，本诗即以此为景色发展的线索。因此，渔翁不断变换的举止行动和自然景色的无穷变幻便有了共同的时间依据，取得极为和谐的统一。
    全诗共六句，按时间顺序，分三个层次。“渔翁夜傍西岩宿，晓汲清湘燃楚竹。”这是从夜到拂晓的景象。渔翁是这两句中最引人注目的形象，他夜宿山边，晨起汲水燃竹，以忙碌的身影形象地显示着时间的流转。伴随着渔翁的活动，诗人的笔触又自然而然地延及西岩、清湘、楚竹，西岩即永州西山，柳宗元在《始得西山宴游记》一文中曾极言探得西山的欢悦，并描述了西山的高峻：居于西山之巅，“则凡数州之土壤，皆在衽席之下”；而流经山下的湘水“至清。
