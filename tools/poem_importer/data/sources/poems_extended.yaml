- id: poem_ext_060
  title: 归嵩山作
  author: 王维
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '清川带长薄，车马去闲闲。

    流水如有意，暮禽相与还。

    荒城临古渡，落日满秋山。

    迢递嵩高下，归来且闭关。

    '
  annotations:
  - word: 清川
    meaning: 清清的流水，当指伊水及其支流
  - word: 川
    meaning: 河川
  - word: 带
    meaning: 围绕，映带
  - word: 薄
    meaning: 草木丛生之地，草木交错曰薄
  - word: 去
    meaning: 行走
  translation: "清清河水映带长长的草木，车马缓缓前行。流水像有情意，暮禽也结伴而还。荒城临着古渡，落日洒满秋山。迢迢来到嵩山下，归来且闭门谢客。"
  appreciation: "写归隐途中所见，景中有情。「流水如有意，暮禽相与还」拟人自然，收束于闭关，见归隐决心。"
  background: "王维归隐嵩山时途中所作。"
  famous_lines:
  - 迢递嵩高下，归来且闭关
  tags:
