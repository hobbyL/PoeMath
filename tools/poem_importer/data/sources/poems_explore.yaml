- id: poem_exp_056
  title: 花马池咏
  author: 崔允
  dynasty: 明
  layer: explore
  is_required: false
  difficulty: 3
  content: '秋风揽辔下边城，万里河流绕骑清。

    樽俎试看酬壮节，壶觞到处迓行旌。

    寒骄强弩云传箭，飚转轻车火作营。

    慷慨十年长剑在，登楼一笑暮山横。

    '
  annotations:
  - word: 花马池
    meaning: 地名，在今宁夏
  - word: 边塞
    meaning: 边疆要塞
  translation: "秋风中揽着缰绳下边城，万里河流绕着马蹄清亮。宴席上试看酬答壮节，壶觞到处迎接行旌。寒气骄着强弩，云中传箭；飙风转着轻车，火光成营。慷慨十年长剑还在，登楼一笑，暮山横陈。"
  appreciation: "崔允花马池。长剑在、暮山横，边城豪壮。"
  background: "明崔允《花马池咏》。"
  famous_lines:
  - 慷慨十年长剑在，登楼一笑暮山横。
  tags:
  - 咏物
  - 古诗词
- id: poem_exp_057
  title: 咏新竹
  author: 际智
  dynasty: 清
  layer: explore
  is_required: false
  difficulty: 2
  content: '此君志欲擎天碧，耸出云头高百尺。

    只恐年深化作龙，一朝飞去不留迹。

    '
  annotations:
  - word: 新竹
    meaning: 新长出的竹子
  - word: 凌云
    meaning: 高入云端
  - word: 虚心
    meaning: 竹子中空，喻谦虚
  translation: "此君志要擎天碧，耸出云头高百尺。只怕年深化为龙，一朝飞去不留痕迹。"
  appreciation: "际智咏新竹。化龙飞去，想象奇，咏竹有寄托。"
  background: "清际智《咏新竹》。"
  famous_lines:
  - 只恐年深化作龙，一朝飞去不留迹。
  tags:
  - 咏物
  - 竹子
  - 古诗词
- id: poem_exp_059
  title: 咏萍
  author: 刘绘
  dynasty: 南北朝
  layer: explore
  is_required: false
  difficulty: 3
  content: '可怜池内萍，葐蒀紫复青。

