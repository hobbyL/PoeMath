- id: poem_ext_394
  title: 摸鱼儿·东皋寓居
  author: 晁补之
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 4
  content: '买陂塘、旋栽杨柳，依稀淮岸江浦。

    东皋嘉雨新痕涨，沙觜鹭来鸥聚。

    堪爱处最好是、一川夜月光流渚。

    无人独舞。

    任翠幄张天，柔茵藉地，酒尽未能去。

    青绫被，莫忆金闺故步。

    儒冠曾把身误。

    弓刀千骑成何事，荒了邵平瓜圃。

    君试觑。

    满青镜、星星鬓影今如许。

    功名浪语。

    便似得班超，封侯万里，归计恐迟暮。

    '
