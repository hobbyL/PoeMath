- id: poem_ext_191
  title: 佳人
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '绝代有佳人，幽居在空谷。

    自云良家子，零落依草木。

    关中昔丧乱，兄弟遭杀戮。

    官高何足论，不得收骨肉。

    世情恶衰歇，万事随转烛。

    夫婿轻薄儿，新人美如玉。

    合昏尚知时，鸳鸯不独宿。

    但见新人笑，那闻旧人哭。

    在山泉水清，出山泉水浊。

    侍婢卖珠回，牵萝补茅屋。

    摘花不插发，采柏动盈掬。

    天寒翠袖薄，日暮倚修竹。

    '
  annotations:
  - word: 佳人
    meaning: 美好的女子
  - word: 零落
    meaning: 衰败凋零
  - word: 空谷
    meaning: 空旷的山谷
  - word: 幽居
    meaning: 隐居
  translation: "有一位绝代佳人，幽居在空谷之中。她自言本是良家女子，如今零落，依附草木为生。关中从前战乱，兄弟遭到杀戮。官位再高又有何用，连骨肉都收不回。世情厌恶衰落，万事像转动的烛火。夫婿是轻薄儿，新欢美如玉。合欢花尚知按时开合，鸳鸯也不独宿；可他只看见新人笑，听不见旧人哭。在山泉边清澈见底，在险滩处出入艰难。侍婢卖珍珠后，牵萝补茅屋。摘花不插发，采柏满满捧着。天寒翠袖单薄，日暮时倚着修竹。"
  appreciation: "杜甫写乱世弃妇。前叙身世与弃离，后写山居坚贞，「天寒翠袖薄，日暮倚修竹」以景写人，清高而不自怜，是五古名篇。"
  background: "安史乱后杜甫流寓西南时所作，借佳人自况乱世高洁之士，一说实有其人。"
  famous_lines:
