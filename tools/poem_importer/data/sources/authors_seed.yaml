# 作者全覆盖（唯一 id）
# expand_extended_authors follow-up

authors:
  - id: author_libai
    name: 李白
    dynasty: 唐
    life_years: "701-762"
    title: "诗仙"
    brief: "唐代伟大浪漫主义诗人，字太白，号青莲居士。诗风飘逸奔放，想象奇特，被誉为\"诗仙\"。代表作有《静夜思》《望庐山瀑布》《早发白帝城》等。"
    representative_works: [poem_core_005, poem_core_007, poem_core_013, poem_core_020, poem_core_028, poem_core_031]
    avatar: default_avatar.png

  - id: author_yiming
    name: 佚名
    dynasty: 先秦
    life_years: ""
    title: ""
    brief: "作者已佚名，多见于乐府民歌、民间歌谣与部分古诗辑录。语言质朴，情感真挚，是了解古代民间文学的重要窗口。"
    representative_works: [poem_core_068, poem_core_109, poem_ext_184, poem_ext_297, poem_ext_337, poem_ext_341]
    avatar: default_avatar.png

  - id: author_bailuyi
    name: 白居易
    dynasty: 唐
    life_years: "772-846"
    title: "香山居士"
    brief: "唐代现实主义诗人，字乐天，号香山居士。诗歌语言通俗易懂，主张\"文章合为时而著，歌诗合为事而作\"。代表作有《赋得古原草送别》《忆江南》《暮江吟》等。"
    representative_works: [poem_core_009, poem_core_016, poem_core_025, poem_core_030, poem_core_082, poem_core_116]
    avatar: default_avatar.png

  - id: author_dufu
    name: 杜甫
    dynasty: 唐
    life_years: "712-770"
    title: "诗圣"
    brief: "唐代伟大现实主义诗人，字子美。诗歌反映社会现实，风格沉郁顿挫，被誉为\"诗圣\"，其诗被称为\"诗史\"。代表作有《春夜喜雨》《绝句》《望岳》等。"
    representative_works: [poem_core_033, poem_core_035, poem_core_057, poem_core_079, poem_core_106, poem_core_107]
    avatar: default_avatar.png

  - id: author_wangwei
    name: 王维
    dynasty: 唐
    life_years: "701-761"
    title: "诗佛"
    brief: "唐代著名诗人、画家，字摩诘。诗以山水田园为主，追求\"诗中有画，画中有诗\"的意境。代表作有《鹿柴》《山居秋暝》《九月九日忆山东兄弟》等。"
    representative_works: [poem_core_003, poem_core_022, poem_core_049, poem_core_077, poem_core_087, poem_core_088]
    avatar: default_avatar.png

