  translation: "白话理解：先秦佚名作《苛政猛于虎》，借哲理抒怀；「”出自《十三经注疏》本《礼记·檀弓下》。」值得一读。"
  appreciation: "佚名此篇不以铺张取胜，而以「”出自《十三经注疏》本《礼记·檀弓下》。」立住全诗，拓展阅读足够。"
