  translation: "丞相祠堂到哪里去找？锦官城外柏树森森。映阶的碧草空自春色，隔叶的黄鹂空有好音。三顾茅庐烦劳他定天下大计，两朝开济见老臣的忠心。出师未捷身先死去，常使后代英雄泪满衣襟。"
  appreciation: "杜甫谒武侯祠。「映阶碧草」「隔叶黄鹂」以乐景写哀；「出师未捷身先死」一结，千古同悲，是咏诸葛亮的绝唱。"
