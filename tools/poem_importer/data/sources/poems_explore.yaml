- id: poem_exp_291
  title: 载驰
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '载驰载驱，归唁卫侯。

    驱马悠悠，言至于漕。

    大夫跋涉，我心则忧。

    既不我嘉，不能旋反。

    视尔不臧，我思不远。

    既不我嘉，不能旋济？

    视尔不臧，我思不閟。

    陟彼阿丘，言采其蝱。

    女子善怀，亦各有行。

    许人尤之，众稚且狂。

    我行其野，芃芃其麦。

    控于大邦，谁因谁极？

    大夫君子，无我有尤。

    百尔所思，不如我所之。

    '
  annotations:
  - word: 载驰
    meaning: 驱车疾行
  - word: 归唁
    meaning: 回去吊唁
  translation: "载驰显得载驱，归唁的卫侯。驱马显得悠悠，言至的于漕。大夫显得跋涉，我心的则忧。既不显得我嘉，不能的旋反。视尔显得不臧，我思的不远。既不显得我嘉，不能的旋济？。视尔显得不臧，我思的不閟。陟彼显得阿丘，言采的其蝱。女子显得善怀，亦各的有行。许人显得尤之，众稚的且狂。我行显得其野，芃芃的其麦。控于显得大邦，谁因的谁极？。大夫显得君子，无我的有尤。百尔显得所思，不如的我所之。"
  appreciation: "《载驰》中「百尔所思，不如我所之。」最见精神。佚名写爱国，画面清楚。"
  background: "先秦佚名《载驰》。"
  famous_lines:
