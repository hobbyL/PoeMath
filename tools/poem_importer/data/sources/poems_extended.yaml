  translation: 望着你的小船驶向茫茫云水，频频挥手惜别泪水沾湿佩巾。 你像一只飞鸟不知归宿何处，留下这一片青山空对着行人。 江水浩浩一叶孤帆远远消失，落日下你将欣赏着五湖之美。 谁能见我伫立汀洲上怀念你，望着白蘋心中充满无限愁情。
  appreciation: 这是首送别诗，写与友人离别时的情景。友人已乘舟向烟水迷蒙的远方驶去，但诗人还在向他洒泪挥手送别。渐渐地，看不见友人的旅舟了，江面上鸟在飞着，不知它们要飞往何处；远处只有青山默默地对着诗人。朋友乘坐的船儿沿长江向远处去了，诗人在斜阳里伫立，想象着友人即将游五湖的情景。就这样离别了，不知有谁知道诗人对朋友的悠悠相思。诗人借助眼前景物，通过遥望和凝思，来表达离愁别恨，手法新颖，不落俗套。
