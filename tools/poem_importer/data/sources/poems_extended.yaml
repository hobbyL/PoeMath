    夜深人物不相管，我独形影相嬉娱。

    暗潮生渚吊寒蚓，落月挂柳看悬蛛。

    此生忽忽忧患里，清境过眼能须臾。

    鸡鸣钟动百鸟散，船头击鼓还相呼。

    '
