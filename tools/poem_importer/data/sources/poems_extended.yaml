  - word: 玉盘
    meaning: 精美的食具
  - word: 珍羞
    meaning: 珍贵的菜肴
  translation: "金杯里清酒一斗价值十千，玉盘中珍馐值万钱。停杯放下筷子吃不下，拔剑四顾心里茫然。想渡黄河，冰塞住了河道；要登太行，雪铺满了山。闲时在碧溪上垂钓，忽然又梦见乘舟到日边。行路难！行路难！岔路这么多，如今我在哪里？总会有长风破浪的时候，那时直挂云帆，横渡沧海。"
  appreciation: "李白《行路难》其一。由盛宴难食写到冰塞雪满，再以「长风破浪会有时」奋起，苦闷与自信并出，是乐府名篇。"
