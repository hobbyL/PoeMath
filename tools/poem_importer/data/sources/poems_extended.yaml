- id: poem_ext_089
  title: 秦中感秋寄远上人
  author: 孟浩然
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '一丘常欲卧，三径苦无资。

    北土非吾愿，东林怀我师。

    黄金燃桂尽，壮志逐年衰。

    日夕凉风至，闻蝉但益悲。

    '
  annotations:
  - word: 秦中
    meaning: 关中地区，今陕西一带
  - word: 远上人
    meaning: 名叫远的僧人
  - word: 黄叶
    meaning: 秋天枯黄的树叶
  translation: "我常想卧于一丘，却苦于三径无资。北方不是我的心愿，东林才是我怀念的师父。钱财如燃桂般耗尽，壮志一年年衰减。傍晚凉风吹来，听见蝉声只更增悲。"
  appreciation: "孟浩然长安感秋寄僧。写求仕无成、归隐无资，「闻蝉但益悲」收束，是其干谒失意时期的心声。"
  background: "孟浩然在长安求仕不利，秋日寄远上人而作。"
  famous_lines:
  - 日夕凉风至，闻蝉但益悲
  tags:
  - 唐诗三百首
  - 抒情
  - 归隐
  - 五言律诗
- id: poem_ext_090
  title: 望洞庭湖赠张丞相
  author: 孟浩然
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '八月湖水平，涵虚混太清。

    气蒸云梦泽，波撼岳阳城。

    欲济无舟楫，端居耻圣明。

    坐观垂钓者，徒有羡鱼情。

    '
  annotations:
  - word: 涵虚
    meaning: 包含天空，指天空倒映在水中
  - word: 涵
    meaning: 包容
  - word: 虚
    meaning: 虚空，空间
  - word: 混太清
    meaning: 与天混为一体
  - word: 太清
    meaning: 指天空
  translation: "八月洞庭湖水涨平，涵容天空与太清浑然一体。水汽蒸腾着云梦大泽，波涛撼动岳阳城。想渡湖却没有舟楫，闲居又愧对圣明之世。坐看别人垂钓，空有一份羡鱼之情。"
  appreciation: "前半写洞庭壮阔，「气蒸」「波撼」雄健；后半以欲济无舟、羡鱼自喻求仕无门，是干谒诗中的上品。"
  background: "孟浩然赠张九龄（张丞相），以洞庭起兴，暗寓希望引荐之意。"
  famous_lines:
  - 坐观垂钓者，徒有羡鱼情
