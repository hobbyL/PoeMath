  - id: poem_exp_445
    title: 九日
    author: 文森
    dynasty: 明
    layer: explore
    is_required: false
    difficulty: 3
    content: |
      三载重阳菊，开时不在家。
      何期今日酒，忽对故园花。
      野旷云连树，天寒雁聚沙。
      登临无限意，何处望京华。
