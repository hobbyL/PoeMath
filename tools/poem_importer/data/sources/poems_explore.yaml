- id: poem_exp_052
  title: 渡江云·揭浩斋送春和韵
  author: 吴澄
  dynasty: 元
  layer: explore
  is_required: false
  difficulty: 4
  content: '名园花正好，娇红白，百态竞春妆。

    笑痕添酒晕。

    丰脸凝脂，谁为试铝霜。

    诗朋酒伴，趁此日流转风光。

    尽夜游不妨秉烛，未觉是疏狂。

    茫茫。

    一年一度，烂漫离披，似长江去浪。

    但要教啼莺语燕，不怨卢郎。

    问春春道何曾去，任蜂蝶飞过东墙。

    君看取，年年潘令河阳。

    '
  annotations:
  - word: 渡江云
    meaning: 词牌名
  - word: 送春
    meaning: 送别春天
  - word: 和韵
    meaning: 依韵唱和
  translation: "吴澄此篇层次多。读时按场景推进，记住「君看取，年年潘令河阳。」便不散。"
  appreciation: "吴澄此篇不炫技。「君看取，年年潘令河阳。」之外，看选景。"
  background: "《渡江云·揭浩斋送春和韵》为吴澄所作，读者多从此感受其写景。"
  famous_lines:
  - 君看取，年年潘令河阳。
  tags:
  - 写景
  - 婉约
  - 春天
  - 送春
  - 古诗词
- id: poem_exp_054
  title: 咏孤石
  author: 惠标
  dynasty: 南北朝
  layer: explore
  is_required: false
  difficulty: 3
  content: '中原一孤石，地理不知年。

    根含彭泽浪，顶入香炉烟。

    崖成二鸟翼，峰作一芙莲。

    何时发东武，今来镇蠡川。

    '
