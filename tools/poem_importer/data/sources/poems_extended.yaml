- id: poem_ext_360
  title: 春日
  author: 汪藻
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 3
  content: '一春略无十日晴，处处浮云将雨行。

    野田春水碧于镜，人影渡傍鸥不惊。

