- id: poem_exp_554
  title: 次韵伯氏长芦寺下
  author: 黄庭坚
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '风从落帆休，天与大江平。

    僧坊昼亦静，钟磬寒逾清。

    淹留属暇日，植杖数连甍。

    颇与幽子逢，煮茗当酒倾。

    携手霜木末，朱栏见潮生。

    樯移永正县，鸟度建康城。

    薪者得树鸡，羹盂味南烹。

    香秔炊白玉，饱饭愧闲行。

    业祠思归乐，吟弄夕阳明。

    思归诚独乐，薇蕨渐春荣。

