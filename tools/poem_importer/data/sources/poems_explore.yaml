- id: poem_exp_198
  title: 宰予昼寝
  author: 佚名
  dynasty: 唐
  layer: explore
  is_required: false
  difficulty: 3
  content: '宰予昼寝，子曰：“朽木不可雕也，粪土之墙不可圬也！

    于予与何诛？

