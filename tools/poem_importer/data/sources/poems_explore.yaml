- id: poem_exp_277
  title: 谢池春·壮岁从戎
  author: 陆游
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '壮岁从戎，曾是气吞残虏。

    阵云高、狼烽夜举。

    朱颜青鬓，拥雕戈西戍。

    笑儒冠、自来多误。

    功名梦断，却泛扁舟吴楚。

    漫悲歌、伤怀吊古。

    烟波无际，望秦关何处。

    叹流年、又成虚度。

