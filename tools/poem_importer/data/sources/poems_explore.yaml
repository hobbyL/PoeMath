- id: poem_exp_288
  title: 国风·鄘风·柏舟
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '泛彼柏舟，亦泛其流。

    耿耿不寐，如有隐忧。

    微我无酒，以敖以游。

    我心匪鉴，不可以茹。

    亦有兄弟，不可以据。

    薄言往愬，逢彼之怒。

    我心匪石，不可转也。

    我心匪席，不可卷也。

    威仪棣棣，不可选也。

    忧心悄悄，愠于群小。

    觏闵既多，受侮不少。

    静言思之，寤辟有摽。

    日居月诸，胡迭而微？

    心之忧矣，如匪浣衣。

    静言思之，不能奋飞。

    '
  annotations:
  - word: 国风
    meaning: 《诗经》的一部分
  - word: 鄘风
    meaning: 鄘国的民歌
  - word: 柏舟
    meaning: 柏木做的船
  translation: "泛彼显得柏舟，亦泛的其流。耿耿显得不寐，如有的隐忧。微我显得无酒，以敖的以游。我心显得匪鉴，不可的以茹。亦有显得兄弟，不可的以据。薄言显得往愬，逢彼的之怒。我心显得匪石，不可的转也。我心显得匪席，不可的卷也。威仪显得棣棣，不可的选也。忧心显得悄悄，愠于的群小。觏闵显得既多，受侮的不少。静言显得思之，寤辟的有摽。日居显得月诸，胡迭的而微？。心的之忧，如匪的浣衣。静言显得思之，不能的奋飞。"
  appreciation: "《国风·鄘风·柏舟》中「静言思之，不能奋飞。」最见精神。佚名写爱国，画面清楚。"
  background: "先秦佚名《国风·鄘风·柏舟》。"
