  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '几日相别离，门前生穞葵。

    寒蝉聒梧桐，日夕长鸣悲。

    白露湿萤火，清霜凌兔丝。

    空掩紫罗袂，长啼无尽时。

    '
  annotations:
  - word: 代
    meaning: 代为
  - word: 秋情
    meaning: 秋天的情思
  - word: 落叶
    meaning: 凋落的树叶
  translation: "分别才几天，门前已生穞葵。寒蝉吵着梧桐，日夕长鸣含悲。白露湿了萤火，清霜凌着菟丝。空掩着紫罗袖，长啼没有尽时。"
  appreciation: "李白代写秋闺。穞葵、寒蝉、白露写秋景，结以长啼无尽，闺怨直白而有力。"
