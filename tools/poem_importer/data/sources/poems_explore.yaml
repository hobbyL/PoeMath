- id: poem_exp_602
  title: 送裴十八图南归嵩山二首
  author: 李白
  dynasty: 唐
  layer: explore
  is_required: false
  difficulty: 4
  content: '何处可为别，长安青绮门。

    胡姬招素手，延客醉金樽。

    临当上马时，我独与君言。

    风吹芳兰折，日没鸟雀喧。

    举手指飞鸿，此情难具论。

    同归无早晚，颍水有清源。

    君思颍水绿，忽复归嵩岑。

    归时莫洗耳，为我洗其心。

    洗心得真情，洗耳徒买名。

    谢公终一起，相与济苍生。

    '
