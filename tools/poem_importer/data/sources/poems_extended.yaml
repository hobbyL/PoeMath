  - word: 居人下
    meaning: 指官人，处于人家下面
  - word: 客
    meaning: 诗人自指
  - word: “春归”句
    meaning: 春已归而自己尚未回去
  translation: "新岁乡心更切，天涯独自潸然。人老了居人之下，春归却比客归得早。岭猿与我同旦暮，江柳与风烟共处。已像长沙贾谊，从今还要几年？"
  appreciation: "刘长卿贬谪新年感怀。「春归在客先」一句精警；结以长沙傅自比，迁客之悲沉郁。"
