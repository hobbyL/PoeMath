- id: poem_ext_294
  title: 李都尉古剑
  author: 白居易
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '古剑寒黯黯，铸来几千秋。

    白光纳日月，紫气排斗牛。

    有客借一观，爱之不敢求。

    湛然玉匣中，秋水澄不流。

    至宝有本性，精刚无与俦。

    可使寸寸折，不能绕指柔。

    愿快直士心，将断佞臣头。

    不愿报小怨，夜半刺私仇。

    劝君慎所用，无作神兵羞。

    '
