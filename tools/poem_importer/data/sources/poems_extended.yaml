- id: poem_ext_337
  title: 宰予昼寝
  author: 佚名
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '宰予昼寝，子曰：“朽木不可雕也，粪土之墙不可圬也！

    于予与何诛？

    ”子曰：“始吾于人也，听其言而信其行；今吾于人也，听其言而观其行。

    于予与改是。

    ”——《论语·公冶长第五》

    '
  annotations:
  - word: 宰予
    meaning: 孔子的学生
  - word: 昼寝
    meaning: 白天睡觉
  - word: 朽木
    meaning: 腐烂的木头
  translation: "宰予白天睡觉。孔子说：「朽木不可雕，粪土之墙不可粉刷！对宰予，还责备什么？」孔子又说：「起初我对人，听其言就信其行；如今我对人，听其言还要观其行。从宰予这件事起，我改变了态度。」"
  appreciation: "《论语》名段。由昼寝引出听言观行，是儒家论人与教育的经典表述。"
  background: "《论语·公冶长》宰予昼寝章。"
