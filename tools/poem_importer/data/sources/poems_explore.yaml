- id: poem_exp_655
  title: 杏园中枣树
  author: 白居易
  dynasty: 唐
  layer: explore
  is_required: false
  difficulty: 4
  content: '人言百果中，唯枣凡且鄙。

    皮皴似龟手，叶小如鼠耳。

    胡为不自知，生花此园里。

    岂宜遇攀玩，幸免遭伤毁。

    二月曲江头，杂英红旖旎。

    枣亦在其间，如嫫对西子。

    东风不择木，吹喣长未已。

    眼看欲合抱，得尽生生理。

    寄言游春客，乞君一回视。

    君爱绕指柔，从君怜柳杞。

    君求悦目艳，不敢争桃李。

    君若作大车，轮轴材须此。

    '
  annotations:
  - word: 杏园
    meaning: 唐代新进士宴会之地
  - word: 枣树
    meaning: 枣树
  translation: "人说百果中，只有枣又凡又鄙。皮皴像龟手，叶小如鼠耳。为何不自知，却在此园开花……你若做大车，轮轴材料必须用它。"
  appreciation: "白居易杏园枣。貌陋材可作轮轴。"
  background: "唐白居易《杏园中枣树》。"
  famous_lines:
  - 君若作大车，轮轴材须此。
  tags:
