    凄凄岁暮风，翳翳经日雪。

    倾耳无希声，在目皓已洁。

    劲气侵襟袖，箪瓢谢屡设。

    萧索空宇中，了无一可悦！

    历览千载书，时时见遗烈。

    高操非所攀，谬得固穷节。

