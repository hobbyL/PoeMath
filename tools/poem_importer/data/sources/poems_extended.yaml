  - 冬天
  - 七言律诗
- id: poem_ext_264
  title: 送綦毋潜落第还乡
  author: 王维
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '圣代无隐者，英灵尽来归。

    遂令东山客，不得顾采薇。

    既至金门远，孰云吾道非。

    江淮度寒食，京洛缝春衣。

    置酒长安道，同心与我违。

    行当浮桂棹，未几拂荆扉。

    远树带行客，孤城当落晖。

    吾谋适不用，勿谓知音稀。

    '
  annotations:
  - word: 圣代
    meaning: 政治开明、社会安定的时代
  - word: 英灵
    meaning: 有德行、有才干的人
  - word: 东山客
    meaning: 东晋谢安曾隐居会稽东山，借指綦毋潜
  - word: 采薇
    meaning: 商末周初，伯夷、叔齐兄弟隐于首阳山，采薇而食，后世遂以采薇指隐居生活
  - word: 金门
    meaning: 金马门，汉代宫门名
  translation: "圣明时代没有隐者，英才都来归附。于是东山隐士，也不能只顾采薇。你已到金门却仍远，谁说我们的道不对？江淮度过寒食，京洛缝制春衣。在长安道上置酒，同心的人却要与我分别。你将浮桂棹而去，不久就能拂到自家荆扉。远树带着行客，孤城对着落晖。我的谋划恰不被用，不要说知音稀少。"
  appreciation: "王维送綦毋潜落第还乡。前半宽慰「圣代」「吾道非」，后半写行程与「勿谓知音稀」，劝慰真挚，是送别名篇。"
  background: "王维送友人綦毋潜科举落第还乡时所作。"
  famous_lines:
  - 吾谋适不用，勿谓知音稀。
  tags:
