- id: poem_ext_106
  title: 遣悲怀三首·其一
  author: 元稹
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '谢公最小偏怜女，自嫁黔娄百事乖。

    顾我无衣搜荩箧，泥他沽酒拔金钗。

    野蔬充膳甘长藿，落叶添薪仰古槐。

    今日俸钱过十万，与君营奠复营斋。

    '
  annotations:
  - word: 黔娄
    meaning: 战国时齐国的贫士
  - word: 百事乖
    meaning: 什么事都不顺遂
  - word: 荩箧
    meaning: 竹或草编的箱子
  - word: 泥
    meaning: 软缠，央求
  - word: 藿
    meaning: 豆叶，嫩时可食
  translation: "她是谢公最疼爱的小女儿，嫁给我这贫士后百事不顺。看我没有衣服，就翻箱搜找；我软磨硬缠要买酒，她拔下金钗去换。野菜当饭，甘心吃豆叶；落叶添柴，仰仗古槐。如今俸钱超过十万，却只能为你办祭奠、设道场。"
  appreciation: "元稹悼亡名篇其一。前写贫贱相守细节真切，结以「今日俸钱过十万，与君营奠复营斋」，富贵来时人已不在，沉痛至极。"
  background: "元稹悼亡妻韦丛，《遣悲怀》三首之一。"
  famous_lines:
  - 今日俸钱过十万，与君营奠复营斋
  tags:
