- id: poem_exp_304
  title: 小雅·鼓钟
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '鼓钟将将，淮水汤汤，忧心且伤。

    淑人君子，怀允不忘。

    鼓钟喈喈，淮水湝湝，忧心且悲。

    淑人君子，其德不回。

    鼓钟伐鼛，淮有三洲，忧心且妯。

    淑人君子，其德不犹。

    鼓钟钦钦，鼓瑟鼓琴，笙磬同音。

    以雅以南，以籥不僭。

    '
  annotations:
  - word: 鼓钟
    meaning: 敲钟
  - word: 将将
    meaning: 铿锵作响
  - word: 淮水
    meaning: 淮河
  translation: "鼓钟将将响，淮水汤汤流，忧心且伤。善人君子，怀思不能忘。鼓钟喈喈响，淮水湝湝流，忧心且悲。善人君子，其德不邪。鼓钟伐鼛响，淮有三洲，忧心且忧。善人君子，其德不差。鼓钟钦钦，鼓瑟鼓琴，笙磬同音。以雅以南，以籥不僭。"
  appreciation: "《小雅·鼓钟》。淮水鼓钟中怀君子，忧思深长。"
  background: "《诗经·小雅·鼓钟》。"
