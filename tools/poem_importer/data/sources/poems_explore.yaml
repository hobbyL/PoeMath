- id: poem_exp_454
  title: 小重山·几点疏雅誊柳条
  author: 张景祁
  dynasty: 清
  layer: explore
  is_required: false
  difficulty: 3
  content: '几点疏雅誊柳条。

    江南烟草绿，梦迢迢。

    十年旧约断琼箫。

    西楼下，何处玉骢骄？

    酒醒又今宵。

    画屏残月上，篆香销。

    凭将心事记回潮。

    青溪水，流得到红桥。

    '
