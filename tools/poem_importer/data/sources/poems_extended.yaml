- id: poem_ext_210
  title: 浣溪沙·一曲新词酒一杯
  author: 晏殊
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 3
  content: '一曲新词酒一杯，去年天气旧亭台。夕阳西下几时回？

    无可奈何花落去，似曾相识燕归来。小园香径独徘徊。

    '
  annotations:
  - word: 夕阳西下几时回？一曲
    meaning: 一首
  - word: 去年天气旧亭台
    meaning: 是说天气、亭台都和去年一样
  - word: 旧亭台
    meaning: 曾经到过的或熟悉的亭台楼阁
  - word: 夕阳
    meaning: 落日
  - word: 西下
    meaning: 向西方地平线落下
  translation: 听一支新曲喝一杯美酒，还是去年的天气旧日的亭台，西落的夕阳何时再回来？ 那花儿落去我也无可奈何，那归来的燕子似曾相识，在小园的花径上独自徘徊。
  appreciation: 这是晏殊词中最为脍炙人口的篇章。此词虽含伤春惜时之意，却实为感慨抒怀之情。词之上片绾合今昔，叠印时空，重在思昔；下片则巧借眼前景物，重在伤今。全词语言圆转流利，通俗晓畅，清丽自然，意蕴深沉，启人神智，耐人寻味。词中对宇宙人生的深思，给人以哲理性的启迪和美的艺术享受。 起句“一曲新词酒一杯，去年天气旧亭台。”写对酒听歌的现境。从复叠错综的句式、轻快流利的语调中可以体味出，词人面对现境时，开始是怀着轻松喜悦的感情，带着潇洒安闲的意态的，似乎主人公十分醉心于宴饮涵咏之乐。的确，作为安享尊荣而又崇文尚雅的“太平宰相”，以歌侑酒，是作者习于问津、也乐于问津的娱情遣兴方式之一。但边听边饮，这现境却又不期然而然地触发对“去年”所历类似境界的追忆：也是和“今年”一样的暮春天气，面对的也是和眼前一样的楼台亭阁，一样的清歌美酒。然而，似乎一切依旧的表象下又分明感觉到有的东西已经起了难以逆转的变化，这便是悠悠流逝的岁月和与此相关的一系列人事。此句中正包蕴着一种景物依旧而人事全非的怀旧之感。在这种怀旧之感中又糅合着深婉的伤今之情。这样，作者纵然襟怀冲澹，又怎能没有些微的伤感呢？于是词人不由得从心底涌出这样的喟叹：“夕阳西下几时回？”夕阳西下，是眼前。
