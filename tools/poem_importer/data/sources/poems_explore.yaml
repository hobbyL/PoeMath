- id: poem_exp_226
  title: 祝英台近·春日客龟溪游废园
  author: 吴文英
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '采幽香，巡古苑，竹冷翠微路。

    斗草溪根，沙印小莲步。

    自怜两鬓清霜，一年寒食，又身在、云山深处。

