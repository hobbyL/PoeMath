  difficulty: 3
  content: '人去西楼雁杳。叙别梦、扬州一觉。云澹星疏楚山晓。听啼乌，立河桥，话未了。

    雨外蛩声早。细织就、霜丝多少。说与萧娘未知道。向长安，对秋灯，几人老。

