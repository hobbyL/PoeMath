    霜禽欲下先偷眼，粉蝶如知合断魂。

    幸有微吟可相狎，不须檀板共金樽。

    剪绡零碎点酥乾，向背稀稠画亦难。

    日薄从甘春至晚，霜深应怯夜来寒。

    澄鲜只共邻僧惜，冷落犹嫌俗客看。

    忆着江南旧行路，酒旗斜拂堕吟鞍。

    '
