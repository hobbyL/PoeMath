- id: poem_exp_294
  title: 采苓
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '采苓采苓，首阳之巅。

    人之为言，苟亦无信。

    舍旃舍旃，苟亦无然。

    人之为言，胡得焉？

    采苦采苦，首阳之下。

    人之为言，苟亦无与。

    舍旃舍旃，苟亦无然。

    人之为言，胡得焉？

    采葑采葑，首阳之东。

    人之为言，苟亦无从。

    舍旃舍旃，苟亦无然。

    人之为言，胡得焉？

    '
  annotations:
  - word: 苓
    meaning: 甘草
  - word: 采
    meaning: 采摘
  - word: 首阳
    meaning: 山名
  translation: "采苓显得采苓，首阳的之巅。人之显得为言，苟亦的无信。舍旃显得舍旃，苟亦的无然。人之显得为言，胡得显得焉？。采苦显得采苦，首阳的之下。人之显得为言，苟亦的无与。舍旃显得舍旃，苟亦的无然。人之显得为言，胡得显得焉？。采葑显得采葑，首阳的之东。人之显得为言，苟亦的无从。舍旃显得舍旃，苟亦的无然。人之显得为言，胡得显得焉？。"
  appreciation: "《采苓》中「人之为言，胡得焉？」最见精神。佚名写咏物，画面清楚。"
