  - word: 司空原
    meaning: 地名
  - word: 言怀
    meaning: 抒发怀抱
  translation: "南风昔日不竞，豪圣思经纶。刘琨与祖逖，鸡鸣起舞。虽有匡济心，终成乐祸人。我则不同，潜光在皖水滨。卜筑司空原，北与天柱为邻。雪霁万里月，云开九江春。等太阶平了，然后托此微身。倾家事金鼎，年貌可长新。所愿得此道，终然保清真。弄景奔日驭，攀星戏河津。一随王乔去，长年作玉天宾。"
