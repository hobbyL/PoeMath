- id: poem_ext_350
  title: 饮酒·其五
  author: 陶渊明
  dynasty: 魏晋
  layer: extended
  is_required: false
  difficulty: 3
  content: '结庐在人境，而无车马喧。

    问君何能尔？

    心远地自偏。

    采菊东篱下，悠然见南山。

    山气日夕佳，飞鸟相与还。

    此中有真意，欲辨已忘言。

    '
  annotations:
  - word: 结庐
    meaning: 建造房屋
  - word: 人境
    meaning: 人间
  - word: 东篱
    meaning: 东边的篱笆
  - word: 南山
    meaning: 庐山
  - word: 悠然
    meaning: 闲适的样子
  translation: "在东篱下采菊，悠然看见南山。山气一天里最好是日落时分，飞鸟结伴而还。这里面有真正的意趣，想辨别清楚，却已忘了要说的话。"
  appreciation: "陶渊明写归隐后的宁静。『采菊东篱下，悠然见南山』自然无雕琢，『欲辨已忘言』更得言外之意。"
  background: "《饮酒》组诗之一，约作于诗人归田之后。"
  famous_lines:
  - 此中有真意，欲辨已忘言。
