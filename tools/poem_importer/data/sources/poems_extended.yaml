  appreciation: 这首诗是代宫人所作的怨词。前人曾批评此诗过于浅露，这是不公正的。诗以自然浑成之语，传层层深入之情，语言明快而感情深沉，一气贯通而绝不平直。 诗的主人公是一位不幸的宫女。她一心盼望君王的临幸而终未盼得，时已深夜，只好上床，已是一层怨怅。宠幸不可得，退而求之好梦；辗转反侧，竟连梦也难成，见出两层怨怅。梦既不成，索性揽衣推枕，挣扎坐起。正当她愁苦难忍，泪湿罗巾之时，前殿又传来阵阵笙歌，原来君王正在那边寻欢作乐，这就有了三层怨怅。
