  - word: 剪烛
    meaning: 剪去烛花，使灯更亮
  - word: 却话
    meaning: 回过头来说起
  translation: 你问我什么时候回去，我还没有确定的日期。巴山夜里下着大雨，秋雨涨满了池塘。什么时候才能和你在西窗下一起剪烛夜话，说说这巴山夜雨时的思念呢。
  appreciation: 全诗两次写"巴山夜雨"，前写当下的孤寂，后写未来重逢的期盼，时空交错的写法独创一格。
  background: 李商隐在巴蜀任职时写给妻子的书信诗。
