  - 抒情
  - 古诗词
- id: poem_exp_290
  title: 国风·邶风·泉水
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '毖彼泉水，亦流于淇。

    有怀于卫，靡日不思。

    娈彼诸姬，聊与之谋。

    出宿于泲，饮饯于祢，女子有行，远父母兄弟。

    问我诸姑，遂及伯姊。

    出宿于干，饮饯于言。

    载脂载舝，还车言迈。

    遄臻于卫，不瑕有害？

    我思肥泉，兹之永叹。

    思须与漕，我心悠悠。

    驾言出游，以写我忧。

    '
  annotations:
  - word: 泉水
    meaning: 泉水流淌
  - word: 邶风
    meaning: 邶国的民歌
  - word: 淇水
    meaning: 河名
  translation: "先秦佚名《国风·邶风·泉水》铺得开。前半场面密，后半情志显，「驾言出游，以写我忧。」附近最吃紧。"
  appreciation: "佚名此篇不炫技。「驾言出游，以写我忧。」之外，看选景。"
  background: "佚名篇什之一，主题与思乡相关。"
  famous_lines:
  - 驾言出游，以写我忧。
  tags:
  - 思乡
  - 诗经
  - 古诗词
- id: poem_exp_291
  title: 载驰
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '载驰载驱，归唁卫侯。

    驱马悠悠，言至于漕。

    大夫跋涉，我心则忧。

    既不我嘉，不能旋反。

    视尔不臧，我思不远。

    既不我嘉，不能旋济？

    视尔不臧，我思不閟。

    陟彼阿丘，言采其蝱。

    女子善怀，亦各有行。

    许人尤之，众稚且狂。

    我行其野，芃芃其麦。

    控于大邦，谁因谁极？

    大夫君子，无我有尤。

    百尔所思，不如我所之。

    '
  annotations:
  - word: 载驰
    meaning: 驱车疾行
  - word: 归唁
    meaning: 回去吊唁
  translation: "赶着车马奔驰，回去吊唁卫侯。驱马悠悠，到了漕邑。大夫跋涉而来，我心忧愁。你们不赞成我，我也不能返回……我的心不是石头，不能转动；我的心不是席子，不能卷起。"
  appreciation: "许穆夫人《载驰》。爱国救卫，是《诗经》中女诗人名篇。"
  background: "《诗经·鄘风·载驰》，许穆夫人作。"
  famous_lines:
  - 百尔所思，不如我所之。
  tags:
  - 爱国
  - 诗经
  - 古诗词
- id: poem_exp_292
  title: 竹竿
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '籊籊竹竿，以钓于淇。

    岂不尔思？

    远莫致之。

    泉源在左，淇水在右。

    女子有行，远兄弟父母。

    淇水在右，泉源在左。

    巧笑之瑳，佩玉之傩。

    淇水滺滺，桧楫松舟。

    驾言出游，以写我忧。

    '
