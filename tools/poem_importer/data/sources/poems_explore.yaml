  - 写鸟
  - 寓理
  - 古诗词
- id: poem_exp_302
  title: 小雅·四牡
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '四牡騑騑，周道倭迟。

    岂不怀归？

    王事靡盬，我心伤悲。

    四牡騑騑，啴啴骆马。

    岂不怀归？

    王事靡盬，不遑启处。

    翩翩者鵻，载飞载下，集于苞栩。

    王事靡盬，不遑将父。

    翩翩者鵻，载飞载止，集于苞杞。

    王事靡盬，不遑将母。

    驾彼四骆，载骤骎骎。

    岂不怀归？

    是用作歌，将母来谂。

    '
  annotations:
  - word: 四牡
    meaning: 四匹公马
  - word: 周道
    meaning: 大路
  - word: 靡盬
    meaning: 没有止息
  translation: "四匹公马跑不停，大路迂回又漫长。难道不想归？王事没有完，我心伤悲……翩翩的鵻鸟，飞上又飞下，落在柞树上。王事没完，不能奉养父亲。"
  appreciation: "《诗经·小雅·四牡》。使臣思归不得，王事靡盬。"
  background: "《诗经·小雅·四牡》。"
  famous_lines:
  - 是用作歌，将母来谂。
  tags:
  - 思乡
  - 诗经
  - 怀人
  - 古诗词
- id: poem_exp_303
  title: 菁菁者莪
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '菁菁者莪，在彼中阿。

    既见君子，乐且有仪。

    菁菁者莪，在彼中沚。

    既见君子，我心则喜。

    菁菁者莪，在彼中陵。

    既见君子，锡我百朋。

    泛泛杨舟，载沉载浮。

    既见君子，我心则休。

    '
  annotations:
  - word: 菁菁
    meaning: 茂盛的样子
  - word: 莪
    meaning: 一种植物
  translation: "菁菁的萝蒿，在那山阿。既见君子，乐且有仪……泛泛杨舟，载沉载浮。既见君子，我心则休。"
  appreciation: "《诗经·小雅·菁菁者莪》。见君子而乐，是乐育人材之诗。"
  background: "《诗经·小雅·菁菁者莪》。"
  famous_lines:
  - 既见君子，我心则休。
  tags:
  - 写景
  - 诗经
  - 爱情
  - 古诗词
- id: poem_exp_304
  title: 小雅·鼓钟
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '鼓钟将将，淮水汤汤，忧心且伤。

    淑人君子，怀允不忘。

    鼓钟喈喈，淮水湝湝，忧心且悲。

    淑人君子，其德不回。

    鼓钟伐鼛，淮有三洲，忧心且妯。

    淑人君子，其德不犹。

    鼓钟钦钦，鼓瑟鼓琴，笙磬同音。

    以雅以南，以籥不僭。

    '
  annotations:
  - word: 鼓钟
    meaning: 敲钟
  - word: 将将
    meaning: 铿锵作响
  - word: 淮水
    meaning: 淮河
  translation: "鼓钟将将，淮水汤汤，忧心且伤。善人君子，怀思不能忘……鼓钟伐鼛，淮有三洲，忧心且妯……"
  appreciation: "《诗经·小雅·鼓钟》。淮水鼓钟中怀君子，忧思。"
  background: "《诗经·小雅·鼓钟》。"
  famous_lines:
  - 以雅以南，以籥不僭。
  tags:
  - 咏物
