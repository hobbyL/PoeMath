- id: poem_exp_146
  title: 癸卯岁十二月中作与从弟敬远
  author: 陶渊明
  dynasty: 魏晋
  layer: explore
  is_required: false
  difficulty: 4
  content: '寝迹衡门下，邈与世相绝。

    顾盼莫谁知，荆扉昼常闭。

    凄凄岁暮风，翳翳经日雪。

    倾耳无希声，在目皓已洁。

    劲气侵襟袖，箪瓢谢屡设。

    萧索空宇中，了无一可悦！

    历览千载书，时时见遗烈。

    高操非所攀，谬得固穷节。

