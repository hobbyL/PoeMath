    meaning: 开玩笑的话
  - word: 身后意
    meaning: 关于死后的设想
  - word: 行看尽
    meaning: 眼看快要完了
  - word: 怜
    meaning: 怜爱，痛惜
  - word: 诚知
    meaning: 确实知道
  translation: "从前玩笑说身后的事，今朝都来到眼前。衣裳已施舍得快完了，针线还留着不忍打开。仍因旧情怜惜婢仆，也曾因梦送钱财。深知这种恨人人都有，贫贱夫妻事事更悲哀。"
  appreciation: "其二写身后琐事与「贫贱夫妻百事哀」。针线未忍开、因梦送钱，细节催泪，是悼亡诗中的至情语。"
  background: "元稹《遣悲怀》其二，续写丧妻后的日常与悲恨。"
  famous_lines:
