    meaning: 葫芦叶
  - word: 幡幡
    meaning: 翻转的样子
  translation: "《小雅·瓠叶》（佚名）篇幅适中。以咏物为主线，「君子有酒，酌言酬之。」是诗眼。"
  appreciation: "《小雅·瓠叶》咏物见志。佚名写物而不粘滞。"
  background: "先秦咏物之作《小雅·瓠叶》，佚名。"
