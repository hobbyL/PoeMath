- id: poem_ext_127
  title: 登高
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '风急天高猿啸哀，渚清沙白鸟飞回。

    无边落木萧萧下，不尽长江滚滚来。

    万里悲秋常作客，百年多病独登台。

    艰难苦恨繁霜鬓，潦倒新停浊酒杯。

    '
  annotations:
  - word: 渚
    meaning: 水中的小洲
  - word: 鸟飞回
    meaning: 鸟在急风中飞舞盘旋
  - word: 回
    meaning: 回旋
  - word: 落木
    meaning: 指秋天飘落的树叶
  - word: 萧萧
    meaning: 模拟草木飘落的声音
  translation: 风急天高猿猴啼叫显得十分悲哀，水清沙白的河洲上有鸟儿在盘旋。 无边无际的树木萧萧地飘下落叶，望不到头的长江水滚滚奔腾而来。 悲对秋景感慨万里漂泊常年为客，一生当中疾病缠身今日独上高台。 历尽了艰难苦恨白发长满了双鬓，衰颓满心偏又暂停了浇愁的酒杯。
  appreciation: 此诗载于《杜工部集》，全诗通过登高所见秋江景色，倾诉了诗人长年漂泊、老病孤愁的复杂感情，慷慨激越、动人心弦。 此诗前四句写登高见闻。首联对起。诗人围绕夔州的特定环境，用“风急”二字带动全联，一开头就写成了千古流传的佳句。夔州向以猿多著称，峡口更以风大闻名。秋日天高气爽，这里却猎猎多风。诗人登上高处，峡中不断传来“高猿长啸”之声，大有“空谷传响，哀转久绝”（《水经注·江水》）的意味。诗人移动视线，由高处转向江水洲渚，在水清沙白的背景上，点缀着迎风飞翔、不住回旋的鸟群，真是一幅精美的画图。其中天、风，沙、渚，猿啸、鸟飞，天造地设，自然成对。不仅上下两句对，而且还有句中自对，如上句“天”对“风”，“高”对“急”；下句“沙”对“渚”，“白”对“清”，读来富有节奏感。经过诗人的艺术提炼，十四个字，字字精当，无一虚设，用字遣辞，“尽谢斧凿”，达到了奇妙难名的境界。更值得注意的是：对起的首句，末字常用仄声，此诗却用平声入韵。沈德潜因有“起二句对举之中仍复用韵，格奇而变”（《唐诗别裁》）的赞语。
    颔联集中表现了夔州秋天的典型特征。诗人仰望茫无边际、萧萧而下的木叶，俯视奔流不息、滚滚而来的江水，在写景的同时，便深沉地抒发了自己的情怀。“无边”。
