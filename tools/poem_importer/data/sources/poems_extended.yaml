  translation: 天上浮云日日飘来飘去，远游的故人却久去不归。 夜晚我屡屡梦中见到你，可知你对我的深情厚意。 分别是你总是神色匆匆，总说能来相见多么不易。 江湖上航行多险风恶浪，担心你的船被掀翻沉没。 出门时搔着满头的白发，悔恨辜负自己平生之志。 高车丽服显贵塞满京城，才华盖世你却容颜憔悴。 谁能说天理公道无欺人，迟暮之年却无辜受牵累。 即使有流芳千秋的美名，难以补偿遭受的冷落悲戚。
