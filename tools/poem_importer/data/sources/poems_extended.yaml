    meaning: 建造房屋
  - word: 人境
    meaning: 人间
  - word: 东篱
    meaning: 东边的篱笆
  - word: 南山
    meaning: 庐山
  - word: 悠然
    meaning: 闲适的样子
  translation: "把房子建在人境，却没有车马的喧闹。问你怎么能这样？心远了，地方自然就偏静。在东篱下采菊，悠然看见南山。山气在日夕时最好，飞鸟结伴归来。这里面有真正的意趣，想要辨别，却已忘了要说的话。"
  appreciation: "陶渊明《饮酒》其五。「心远地自偏」见精神境界；「采菊东篱下，悠然见南山」自然无斧凿，是田园诗的巅峰。"
  background: "陶渊明归隐后所作《饮酒》二十首之五，写心远与真意。"
  famous_lines:
  - 此中有真意，欲辨已忘言。
