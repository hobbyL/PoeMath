- id: poem_exp_394
  title: 蝶恋花·两岸月桥花半吐
  author: 真德秀
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 3
  content: '两岸月桥花半吐。

    红透肌香，暗把游人误。

    尽道武陵溪上路。

    不知迷入江南去。

    先自冰霜真态度。

    何事枝头，点点胭脂污。

    莫是东君嫌淡素。

    问花花又娇无语。

    '
