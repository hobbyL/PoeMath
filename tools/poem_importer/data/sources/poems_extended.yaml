- id: poem_ext_096
  title: 除夜
  author: 崔涂
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '迢递三巴路，羁危万里身。

    乱山残雪夜，孤烛异乡人。

    渐与骨肉远，转于僮仆亲。

    那堪正飘泊，明日岁华新。

