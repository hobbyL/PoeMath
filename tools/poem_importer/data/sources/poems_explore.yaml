- id: poem_exp_056
  title: 花马池咏
  author: 崔允
  dynasty: 明
  layer: explore
  is_required: false
  difficulty: 3
  content: '秋风揽辔下边城，万里河流绕骑清。

    樽俎试看酬壮节，壶觞到处迓行旌。

    寒骄强弩云传箭，飚转轻车火作营。

    慷慨十年长剑在，登楼一笑暮山横。

    '
