- id: poem_core_114
  title: 登幽州台歌
  author: 陈子昂
  dynasty: 唐
  is_required: true
  difficulty: 2
  content: '前不见古人，后不见来者。

    念天地之悠悠，独怆然而涕下。

    '
  annotations:
  - word: 前
    meaning: 过去
  - word: 古人
    meaning: 古代那些能够礼贤下士的圣君
  - word: 后
    meaning: 未来
  - word: 来者
    meaning: 后世那些重视人才的贤明君主
  - word: 念
    meaning: 想到
  translation: 往前不见古代招贤的圣君，向后不见后世求才的明君。 只有那苍茫天地悠悠无限，止不住满怀悲伤热泪纷纷。
  appreciation: 《登幽州台歌》这首短诗，深刻地表现了诗人怀才不遇、寂寞无聊的情绪。语言苍劲奔放，富有感染力，成为历来传诵的名篇。 “前不见古人，后不见来者。”这里的古人是指古代那些能够礼贤下士的贤明君主。《蓟丘览古赠卢居士藏用》与《登幽州台歌》是同时之作，其内容可资参证。《蓟丘览古赠卢居士藏用》七首，对战国时代燕昭王礼遇乐毅、郭隗，燕太子丹礼遇田光等历史事迹，表示无限钦慕。但是，像燕昭王那样前代的贤君既不复可见，后来的贤明之主也来不及见到，自己真是生不逢时；当登台远眺时，只见茫茫宇宙，天长地久，不禁感到孤单寂寞，悲从中来，怆然流泪了。因此以“山河依旧，人物不同”来抒发自己“生不逢辰”的哀叹。这里免不了有对时世的感伤，但也有诗人对诗坛污浊的憎恶。诗人看不见前古贤人，古人也没来得及看见诗人；诗人看不见未来英杰，未来英杰同样看不见诗人，诗人所能看见以及能看见诗人的，只有眼前这个时代。这首诗以慷慨悲凉的调子，表现了诗人失意的境遇和寂寞苦闷的情怀。这种悲哀常常为旧社会许多怀才不遇的人士所共有，因而获得广泛的共鸣。
    这首诗没有对幽州台作一字描写，而只是登台的感慨，却成为千古名篇。诗篇风格明朗刚健，是具有“汉魏风骨”的唐代诗歌的先驱之作，对扫除齐梁浮艳纤。
  background: "陈子昂随军北征，登幽州台有感而作。短短四句，写尽时空苍茫与孤独，为千古绝唱。"
