    meaning: 谓天行秋肃之气
  - word: 城阙
    meaning: 宫城前两边的楼观，泛指城池
  - word: 千重
    meaning: 千层，层层迭迭，形容夜色浓重
  - word: 会
    meaning: 聚会
  - word: 翻疑
    meaning: 反而怀疑
  translation: "秋天月又圆了，城阙夜色千重。又在江南相会，反疑是梦里重逢。风吹枝条惊了暗鹊，露草覆盖着寒蛩。羁旅中最该一醉，相留只怕晓钟。"
  appreciation: "戴叔伦客夜偶集故人。「还作江南会，翻疑梦里逢」写乱离重逢；结以畏晓钟，不忍再别。"
