- id: poem_ext_335
  title: 阆水歌
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '嘉陵江色何所似？

    石黛碧玉相因依。

    正怜日破浪花出，更复春从沙际归。

    巴童荡桨欹侧过，水鸡衔鱼来去飞。

    阆中胜事可肠断，阆州城南天下稀！

    '
