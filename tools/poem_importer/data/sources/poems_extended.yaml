- id: poem_ext_189
  title: 望月有感
  author: 白居易
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '自河南经乱，关内阻饥，兄弟离散，各在一处。因望月有感，聊书所怀，寄上浮梁大兄、於潜七兄、乌江十五兄，兼示符离及下邽弟妹。时难年荒世业空，弟兄羁旅各西东。

    田园寥落干戈后，骨肉流离道路中。

    吊影分为千里雁，辞根散作九秋蓬。

    共看明月应垂泪，一夜乡心五处同。

    '
  annotations:
  - word: 时难
    meaning: 时局艰难
  - word: 田园
    meaning: 家乡田地
  - word: 雁行
    meaning: 兄弟的行列
  - word: 吊影
    meaning: 对着影子自怜
  translation: "时世艰难、年成荒歉，祖业成空，弟兄羁旅各在西东。田园在战乱后荒凉寥落，骨肉在道路上流离。形影相吊，像千里失群的雁；辞别故根，像九秋飞散的蓬。共看一轮明月都应落泪，一夜乡心在五处相同。"
  appreciation: "白居易写战乱中兄弟离散。「吊影分为千里雁，辞根散作九秋蓬」比喻精切；结句「一夜乡心五处同」把共月写到极致，真挚感人。"
