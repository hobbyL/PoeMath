  - id: poem_ext_060
    title: 归嵩山作
    author: 王维
    dynasty: 唐
    layer: extended
    is_required: false
    difficulty: 3
    content: |
      清川带长薄，车马去闲闲。
      流水如有意，暮禽相与还。
      荒城临古渡，落日满秋山。
      迢递嵩高下，归来且闭关。
    annotations:
      - {word: "清川", meaning: "清清的流水，当指伊水及其支流"}
      - {word: "川", meaning: "河川"}
      - {word: "带", meaning: "围绕，映带"}
      - {word: "薄", meaning: "草木丛生之地，草木交错曰薄"}
      - {word: "去", meaning: "行走"}
    translation: >-
      清澈的川水环绕一片草木，驾车马徐徐而去从容悠闲。 流水好像对我充满了情意，傍晚的鸟儿随我一同回还。 荒凉的城池靠着古老渡口，落日的余晖洒满金色秋山。 在遥远又高峻的嵩山脚下，闭上门谢绝世俗度过晚年。
    appreciation: >-
      这首诗写作者辞官归隐途中所见的景色和心情。嵩山，古称“中岳”，在今河南登封县北。 “清川带长薄，车马去闲闲。”首联描写归隐出发时的情景，扣题目中的“归”字。清澈的河川环绕着一片长长的草木丛生的草泽地，离归的车马缓缓前进，显得那样从容不迫。这里所写望中景色和车马动态，都反映出诗人归山出发时一种安详闲适的心境。 中间四句进一步描摹归隐路途中的景色。
    background: 入选《唐诗三百首》，由 yxcs/poems-db 原始数据整理。
    famous_lines: ["迢递嵩高下，归来且闭关"]
    tags: ["唐诗三百首", "山水", "写景", "抒情", "五言律诗"]
