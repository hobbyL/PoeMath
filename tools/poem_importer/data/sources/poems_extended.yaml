- id: poem_ext_129
  title: 蜀相
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '丞相祠堂何处寻，锦官城外柏森森。

    映阶碧草自春色，隔叶黄鹂空好音。

    三顾频烦天下计，两朝开济老臣心。

    出师未捷身先死，长使英雄泪满襟。

    '
