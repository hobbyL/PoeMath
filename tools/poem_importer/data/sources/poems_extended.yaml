  appreciation: "刘长卿寻隐者不遇。履痕、白云、闭门、松色水源，结以「溪花与禅意，相对亦忘言」，空灵有禅趣。"
  background: "刘长卿寻南溪常道人隐居，人不在而有所得。"
  famous_lines:
  - 溪花与禅意，相对亦忘言
  tags:
