  - word: 回
    meaning: 回旋
  - word: 落木
    meaning: 指秋天飘落的树叶
  - word: 萧萧
    meaning: 模拟草木飘落的声音
  translation: "风急天高，猿啸声哀；沙洲清冷、沙白，鸟儿盘旋。无边落叶萧萧而下，不尽长江滚滚东来。万里悲秋，我常年作客；一生多病，独自登上高台。艰难苦恨染白了鬓发，潦倒之中连浊酒杯也新近停了。"
  appreciation: "杜甫七律压卷。前四句写登高所见，气象阔大；后四句写客病潦倒，「无边落木」「不尽长江」与「万里悲秋」相生，沉郁至极。"
  background: "大历二年（767）杜甫在夔州重阳登高所作，被誉为古今七律之冠。"
