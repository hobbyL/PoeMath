- id: poem_exp_318
  title: 惠子相梁
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '惠子相梁，庄子往见之。

    或谓惠子曰：“庄子来，欲代子相。

    ”于是惠子恐，搜于国中三日三夜。

    庄子往见之，曰：“南方有鸟，其名为鹓鶵，子知之乎？

    夫鹓鶵发于南海，而飞于北海；非梧桐不止，非练实不食，非醴泉不饮。

    于是鸱得腐鼠，鹓鶵过之，仰而视之曰：‘吓！

    ’今子欲以子之梁国而吓我邪？

    ”

    '
