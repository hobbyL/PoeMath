- id: poem_exp_079
  title: 薛宝钗·雪竹
  author: 环山樵
  dynasty: 清
  layer: explore
  is_required: false
  difficulty: 4
  content: '大雪北风催，家家贫白屋。

    玉树犹难伸，压倒千竿竹。

    高节志凌云，不敢当滕六。

    君子本虚心，甘自低头伏。

    无复绿猗猗，何如在淇澳？

    寒林尽白封，奚第琅玕独。

    寒梅也不禁，何只君瑟缩？

    读书小窗前，不见青矗矗。

    搦管坐空斋，不听声谡谡。

    缅怀文典可，佳画添几幅。

    更思僵卧人，岂只食无肉。

    '
