- id: poem_ext_176
  title: 行路难·其一
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 4
  content: '金樽清酒斗十千，玉盘珍羞直万钱。(羞通：馐；直通：值)

    停杯投箸不能食，拔剑四顾心茫然。

    欲渡黄河冰塞川，将登太行雪满山。

    闲来垂钓碧溪上，忽复乘舟梦日边。

    行路难！行路难！多歧路，今安在？

    长风破浪会有时，直挂云帆济沧海。

    '
  annotations:
  - word: 直 通
    meaning: 值)金樽：古代盛酒的器具，以金为饰
  - word: 清酒
    meaning: 清醇的美酒
  - word: 斗十千
    meaning: 一斗值十千钱（即万钱），形容酒美价高
  - word: 玉盘
    meaning: 精美的食具
  - word: 珍羞
    meaning: 珍贵的菜肴
  translation: 金杯里装的名酒，每斗要价十千； 玉盘中盛的精美菜肴，收费万钱。 胸中郁闷啊，我停杯投箸吃不下； 拔剑环顾四周，我心里委实茫然。 想渡黄河，冰雪堵塞了这条大川； 要登太行，莽莽的风雪早已封山。 象吕尚垂钓溪，闲待东山再起； 又象伊尹做梦，他乘船经过日边。 世上行路呵多么艰难，多么艰难； 眼前歧路这么多，我该向北向南？ 相信总有一天，能乘长风破万里浪； 高高挂起云帆，在沧海中勇往直前！
  appreciation: 金樽清酒斗十千，玉盘珍羞直万钱。(羞 通：馐；直 通：值)停杯投箸不能食，拔剑四顾心茫然。欲渡黄河冰塞川，将登太行雪满山。闲来垂钓碧溪上，忽复乘舟梦日边。行路难！行路难！多歧路，今安在？长风破浪会有时，直挂云帆济沧海。 诗的前四句写朋友出于对李白的深厚友情，出于对这样一位天才被弃置的惋惜，不惜金钱，设下盛宴为之饯行。“嗜酒见天真”的李白，要是在平时，因为这美酒佳肴，再加上朋友的一片盛情，肯定是会“一饮三百杯”的。然而，这一次他端起酒杯，却又把酒杯推开了；拿起筷子，却又把筷子撂下了。他离开座席，拔下宝剑，举目四顾，心绪茫然。停、投、拔、顾四个连续的动作，形象地显示了内心的苦闷抑郁，感情的激荡变化。
    接着两句紧承“心茫然”，正面写“行路难”。诗人用“冰塞川”、“雪满山”象征人生道路上的艰难险阻，具有比兴的意味。一个怀有伟大政治抱负的人物，在受诏入京、有幸接近皇帝的时候，皇帝却不能任用，被“赐金还山”，变相撵出了长安，这正像是遇到了冰塞黄河、雪拥太行。但是，李白并不是那种软弱的性格，从“拔剑四顾”开始，就表示着不甘消沉，而要继续追求。“闲来垂钓碧溪上，忽复乘舟梦日边。”诗人在心境茫然之中，忽然想到两位开始在政治上并不顺利，而最后终。
