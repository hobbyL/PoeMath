- id: poem_exp_558
  title: 满江红·思家
  author: 郑燮
  dynasty: 清
  layer: explore
  is_required: false
  difficulty: 4
  content: '我梦扬州，便想到扬州梦我。

    第一是隋堤绿柳，不堪烟锁。

    潮打三更瓜步月，雨荒十里红桥火。

    更红鲜冷淡不成圆，樱桃颗。

    何日向，江村躲；何日上，江楼卧。

    有诗人某某，酒人个个。

    花径不无新点缀，沙鸥颇有闲功课。

    将白头供作折腰人，将毋左。

    '
