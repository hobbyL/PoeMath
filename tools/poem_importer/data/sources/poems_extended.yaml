  - 春天
  - 生活
  - 五言古诗
- id: poem_ext_158
  title: 初发扬子寄元大校书
  author: 韦应物
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '凄凄去亲爱，泛泛入烟雾。

    归棹洛阳人，残钟广陵树。

    今朝此为别，何处还相遇。

    世事波上舟，沿洄安得住。

    '
  annotations:
