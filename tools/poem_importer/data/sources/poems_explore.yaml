- id: poem_exp_260
  title: 朝三暮四
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '宋有狙公者，爱狙，养之成群，能解狙之意；狙亦得公之心。

    损其家口，充狙之欲。

    俄而匮焉，将限其食，恐众狙之不训于己也。

    先诳之曰：“与若芧，朝三而暮四，足乎？

    ”众狙皆起怒。

    俄而曰：“与若芧，朝四而暮三，足乎？

    ”众狙皆伏而喜。

    '
  annotations:
