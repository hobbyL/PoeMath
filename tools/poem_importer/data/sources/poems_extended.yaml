  - word: 莫洗颍川耳
    meaning: 典故，许由洗耳
  - word: 五湖
    meaning: 太湖一带
  translation: 不要学许由用颍水洗耳，不要学伯夷和叔齐隐居收养采薇而食。 在世上活着贵在韬光养晦，为什么要隐居清高自比云月？ 我看自古以来的贤达之人，功绩告成之后不自行隐退都死于非命。 伍子胥被吴王弃于吴江之上，屈原最终抱石自沉汨罗江中。 陆机如此雄才大略也无法自保，李斯以自己悲惨的结局为苦。 （陆机）是否还能听见华亭的别墅间的鹤唳？（李斯）是否还能在上蔡东门牵鹰打猎？ 你不知道吴中的张翰是个旷达之人，因见秋风起而想起江东故都。
