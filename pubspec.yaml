name: poemath
description: "PoeMath (诗算宝) - 面向 6-12 岁儿童的诗词背诵与口算训练助手"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.6.1

  # 路由（Navigator 2.0 语义落地）
  go_router: ^14.6.2

  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.5
  path_provider: ^2.1.5

  # 文本 / 语音 / 拼音
  lpinyin: ^2.0.3
  flutter_tts: ^4.2.0
  intl: ^0.20.0

  # UI / 渲染
  flutter_math_fork: ^0.7.3
  lottie: ^3.1.3
  flutter_svg: ^2.0.16

  # 音效（Phase 5 使用，Phase 0 声明）
  audioplayers: ^6.1.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Hive 代码生成
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

  # 测试 mock
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/icons/
    - assets/lottie/
    - assets/sounds/
    - assets/fonts/

  # 字体文件在 Phase 0 尚未提供实文件，占位声明先注释掉，避免 pub get 报错。
  # 待 Phase 1/2 补齐字体资源后启用。
  # fonts:
  #   - family: NotoSerifSC
  #     fonts:
  #       - asset: assets/fonts/NotoSerifSC-Regular.otf
  #   - family: NotoSansSC
  #     fonts:
  #       - asset: assets/fonts/NotoSansSC-Regular.otf
  #   - family: Nunito
  #     fonts:
  #       - asset: assets/fonts/Nunito-Regular.ttf
