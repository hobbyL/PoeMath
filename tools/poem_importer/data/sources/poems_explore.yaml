- id: poem_exp_159
  title: 喜迁莺·霜天秋晓
  author: 蔡挺
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '霜天秋晓，正紫塞故垒，黄云衰草。

