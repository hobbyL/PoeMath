- id: poem_ext_125
  title: 咏怀古迹五首·其五
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '诸葛大名垂宇宙，宗臣遗像肃清高。

    三分割据纡筹策，万古云霄一羽毛。

    伯仲之间见伊吕，指挥若定失萧曹。

    运移汉祚终难复，志决身歼军务劳。

    '
