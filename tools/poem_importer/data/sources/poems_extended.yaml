- id: poem_ext_094
  title: 灞上秋居
  author: 马戴
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '灞原风雨定，晚见雁行频。

    落叶他乡树，寒灯独夜人。

    空园白露滴，孤壁野僧邻。

    寄卧郊扉久，何年致此身。

    '
