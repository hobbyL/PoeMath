  - word: 凤凰台
    meaning: 在金陵凤凰山上
  - word: 江
    meaning: 长江
  - word: 吴宫
    meaning: 三国时孙吴曾于金陵建都筑宫
  - word: 晋代
    meaning: 指东晋，南渡后也建都于金陵
  - word: 衣冠
    meaning: 指的是东晋文学家郭璞的衣冠冢
  translation: 凤凰台上曾经有凤凰来悠游，凤去台空只有江水依旧东流。 吴宫鲜花芳草埋着荒凉小径，晋代多少王族已成荒冢古丘。 三山云雾中隐现如落青天外，江水被白鹭洲分成两条河流。 总有奸臣当道犹如浮云遮日，长安望不见心中郁闷长怀愁。
  appreciation: 《登金陵凤凰台》是唐代的律诗中脍炙人口的杰作。开头两句写凤凰台的传说，十四字中连用了三个凤字，却不觉得重复，音节流转明快，极其优美。“凤凰台”在金陵凤凰山上，相传南朝刘宋永嘉年间有凤凰集于此山，乃筑台，山和台也由此得名。在封建时代，凤凰是一种祥瑞。当年凤凰来游象征着王朝的兴盛；而“如今”凤去台空，就连六朝的繁华也一去不复返了，只有长江的水仍然不停地流着，大自然才是永恒的存在。
    三四句就“凤去台空”这一层意思进一步发挥。
