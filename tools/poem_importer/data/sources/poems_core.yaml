- id: poem_core_115
  title: 黄鹤楼
  author: 崔颢
  dynasty: 唐
  is_required: true
  difficulty: 3
  content: '昔人已乘黄鹤去，此地空余黄鹤楼。

    黄鹤一去不复返，白云千载空悠悠。

    晴川历历汉阳树，芳草萋萋鹦鹉洲。

    日暮乡关何处是？烟波江上使人愁。

    '
  annotations:
  - word: 昔人
    meaning: 传说中骑鹤飞去的仙人
  - word: 悠悠
    meaning: 飘荡的样子
  - word: 晴川
    meaning: 晴朗天气下的平原
  - word: 历历
    meaning: 清楚可数
  - word: 萋萋
    meaning: 草木茂盛的样子
  - word: 乡关
    meaning: 故乡
  translation: 昔日的仙人已乘着黄鹤飞去，这地方只留下空荡的黄鹤楼。 黄鹤一去再也没有返回这里，千万年来只有白云飘飘悠悠。 汉阳晴川阁的碧树历历可辨，更能看清芳草繁茂的鹦鹉洲。 时至黄昏不知何处是我家乡？看江面烟波渺渺更使人烦愁！
  appreciation: 这首诗是吊古怀乡之佳作。诗人登临古迹黄鹤楼，泛览眼前景物，即景而生情，诗兴大作，脱口而出，一泻千里。既自然宏丽，又饶有风骨。诗虽不协律，但音节浏亮而不拗口。真是信手而就，一气呵成，成为历代所推崇的珍品。传说李白登此楼，目睹此诗，大为折服。说：“眼前有景道不得，崔颢题诗在上头。”严沧浪也说唐人七言律诗，当以此为第一。足见诗贵自然，纵使格律诗也无不如此。历代写黄鹤楼的诗很多，但崔颢的一首七律，人称最佳，请看他是怎样写的：昔人已乘黄鹤去,此地空余黄鹤楼。
    黄鹤一去不复返，白云千载空悠悠。晴川历历汉阳树，芳草萋萋鹦鹉洲。日暮乡关何处是？烟波江上使人愁。 此诗写得意境开阔、气魄宏大，风景如画，情真意切。且淳朴生动，一如口语，不能不令人叹为观止。这一首诗不仅是崔颢的成名之作、传世之作，也为他奠定了一世诗名的基础。下这样的结论绝不是哪一个人，更不是我硬要往开封人脸上贴金。《唐诗三百首》是后人对唐诗的选集，就把崔颢这首诗列为七律诗中的第一首。可见对此诗的器重。元人辛文房《唐才子传》记李白登黄鹤楼本欲赋诗，因见崔颢此作，为之敛手说：“眼前有景道不得，崔颢题诗在上头。”有人说此说或出于后人附会，未必真有其事。但我以为也决非全部子虚乌有，李白写的。
  background: "崔颢登武昌黄鹤楼吊古怀乡之作。传说李白见此诗而搁笔，被誉为唐人七律压卷之一。"
  famous_lines:
  - 日暮乡关何处是？烟波江上使人愁。
  tags:
