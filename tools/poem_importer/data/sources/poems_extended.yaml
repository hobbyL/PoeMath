- id: poem_ext_379
  title: 菩萨蛮·书江西造口壁
  author: 辛弃疾
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 3
  content: '郁孤台下清江水，中间多少行人泪。

    西北望长安，可怜无数山。

    青山遮不住，毕竟东流去。

    江晚正愁余，山深闻鹧鸪。

    '
