- id: poem_exp_315
  title: 孙权劝学
  author: 司马光 撰
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '初，权谓吕蒙曰：“卿今当涂掌事，不可不学！

    ”蒙辞以军中多务。

    权曰：“孤岂欲卿治经为博士邪?

    但当涉猎，见往事耳。

    卿言多务，孰若孤？

    孤常读书，自以为大有所益。

    ”蒙乃始就学。

    及鲁肃过寻阳，与蒙论议，大惊曰：“卿今者才略，非复吴下阿蒙！

    ”蒙曰：“士别三日，即更刮目相待，大兄何见事之晚乎！

    ”肃遂拜蒙母，结友而别。

    '
