- id: poem_exp_023
  title: 临高台
  author: 佚名
  dynasty: 两汉
  layer: explore
  is_required: false
  difficulty: 3
  content: '临高台以轩，下有清水清且寒。

    江有香草目以兰，黄鹄高飞离哉翻。

    关弓射鹄，令我主寿万年。

    '
  annotations:
  - word: 临高台
    meaning: 登上高台
  - word: 远望
    meaning: 向远处眺望
  translation: "登临高台凭着轩栏，下有清水清且寒。江有香草名叫兰，黄鹄高飞离哉翻。弯弓射鹄，令我主寿万年。"
  appreciation: "汉铙歌临高台。祝寿早期乐府。"
  background: "汉《铙歌·临高台》。"
  famous_lines:
  - 关弓射鹄，令我主寿万年。
  tags:
