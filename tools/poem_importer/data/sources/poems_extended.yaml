  appreciation: "崔涂除夜客中。「乱山残雪夜，孤烛异乡人」写尽客况；「渐与骨肉远，转于僮仆亲」心理真切，是除夕诗名篇。"
  background: "晚唐崔涂漂泊巴蜀，除夕夜所作。"
  famous_lines:
