- id: poem_exp_497
  title: 解连环·柳
  author: 高观国
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '露条烟叶。

    惹长亭旧恨，几番风月。

    爱细缕、先窣轻黄，渐拂水藏鸦，翠阴相接。

    纤软风流，眉黛浅、三眠初歇。

    奈年华又晚，萦绊游蜂，絮飞晴雪。

    依依灞桥怨别。

    正千丝万绪，难禁愁绝。

    怅岁久、应长新条，念曾系花骢，屡停兰楫。

    弄影摇晴，恨闲损、春风时节。

    隔邮亭，故人望断，舞腰瘦怯。

    '
  annotations:
  - word: 解连环
    meaning: 词牌名
