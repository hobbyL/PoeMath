- id: poem_exp_263
  title: 汉宫春·梅
  author: 晁冲之
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '潇洒江梅，向竹梢疏处，横两三枝。

    东君也不爱惜，雪压霜欺。

    无情燕子，怕春寒、轻失花期。

    却是有，年年塞雁，归来曾见开时。

    清浅小溪如练，问玉堂何似，茅舍疏篱。

    伤心故人去后，冷落新诗。

    微云淡月，对江天、分付他谁。

    空自忆，清香未减，风流不在人知。

    '
