  - 七言律诗
- id: poem_ext_117
  title: 春雨
  author: 李商隐
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '怅卧新春白袷衣，白门寥落意多违。

    红楼隔雨相望冷，珠箔飘灯独自归。

    远路应悲春晼晚，残霄犹得梦依稀。

    玉珰缄札何由达，万里云罗一雁飞。

    '
  annotations:
  - word: 白袷衣
    meaning: 即白夹衣，唐人以白衫为闲居便服
  - word: 白门
    meaning: 指今江苏南京市
  - word: 红楼
    meaning: 华美的楼房，多指女子的住处
  - word: 珠箔
    meaning: 珠帘，此处比喻春雨细密
  - word: 晼晚
    meaning: 夕阳西下的光景，此处还蕴涵年复一年、人老珠黄之意
  translation: "怅然躺着，新春穿着白袷衣；白门寥落，事事多违心意。隔着雨望红楼更觉冷清，珠箔般的雨中提灯独自归去。远路上该悲春光已晚，残夜里还能得一点依稀的梦。玉珰和书信如何寄达？万里云网中一只雁飞。"
  appreciation: "李商隐写春雨怀人。「红楼隔雨相望冷，珠箔飘灯独自归」画面清冷；结以云罗一雁，音书难通，是其爱情诗名篇。"
  background: "李商隐《春雨》，写春日雨中怀远，一说寄内或寄恋。"
  famous_lines:
  - 玉珰缄札何由达，万里云罗一雁飞。
  tags:
  - 唐诗三百首
  - 爱情
  - 写雨
  - 七言律诗
- id: poem_ext_118
  title: 筹笔驿
  author: 李商隐
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '猿鸟犹疑畏简书，风云常为护储胥。

    徒令上将挥神笔，终见降王走传车。

    管乐有才原不忝，关张无命欲何如？

    他年锦里经祠庙，梁父吟成恨有余。

    '
  annotations:
  - word: 筹笔驿
    meaning: 地名，诸葛亮曾在此筹划军事
  - word: 徒令
    meaning: 只是让
  - word: 管乐
    meaning: 管仲和乐毅
  translation: "猿鸟仍似畏惧军令文书，风云常为护卫营垒。空教上将挥动神笔，最终却见降王坐着传车离开。管仲、乐毅之才本不逊色，关羽、张飞无命又该如何？他年在锦里经过祠庙，吟完《梁父吟》余恨犹存。"
  appreciation: "李商隐过筹笔驿吊诸葛亮。前写威严余韵，中写才高而功败，结以锦里祠庙与《梁父吟》，苍凉深沉。"
  background: "李商隐经蜀中筹笔驿（传诸葛亮驻军筹划处）有感而作，咏武侯遗恨。"
  famous_lines:
  - 他年锦里经祠庙，梁父吟成恨有余。
