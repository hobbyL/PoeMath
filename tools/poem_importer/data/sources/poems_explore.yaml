- id: poem_exp_477
  title: 唐多令·芦叶满汀洲
  author: 刘过
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '安远楼小集，侑觞歌板之姬黄其姓者，乞词于龙洲道人，为赋此《唐多令》。

    同柳阜之、刘去非、石民瞻、周嘉仲、陈孟参、孟容。

    时八月五日也。

    芦叶满汀洲，寒沙带浅流。

    二十年重过南楼。

    柳下系船犹未稳，能几日，又中秋。

    黄鹤断矶头，故人今在否？

    旧江山浑是新愁。

    欲买桂花同载酒，终不似，少年游。

    '
