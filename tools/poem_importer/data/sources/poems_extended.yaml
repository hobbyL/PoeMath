  translation: 旅途在青山外，在碧绿的江水前行舟。 潮水涨满，两岸之间水面宽阔，顺风行船恰好把帆儿高悬。 夜幕还没有褪尽，旭日已在江上冉冉升起，还在旧年时分，江南已有了春天的气息。 寄出去的家信不知何时才能到达，希望北归的大雁捎到洛阳去。
  appreciation: 《次北固山下》选自《全唐诗》。次，这里是停泊的意思。北固山，现在的江苏镇江北。王湾，洛阳（先河南洛阳）人。 《次北固山下》一诗中，无意说理，却在描写景物、节令之中，蕴含着一种自然理趣的诗句是：海日生残夜，江春入旧年。 写作特色 寓情于景，景中含理。 这是一首五律诗，颈联被明代胡应麟赞为“形容景物，妙绝千古”。时序匆匆交替，这怎不让身在“客路”的诗人顿生思乡之情？诗中“生”“入”用了拟人手法。是人物一说理。却在描写景物中蕴含理趣。
