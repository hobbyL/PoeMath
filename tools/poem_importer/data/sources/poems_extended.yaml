- id: poem_ext_114
  title: 无题·来是空言去绝踪
  author: 李商隐
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '来是空言去绝踪，月斜楼上五更钟。

    梦为远别啼难唤，书被催成墨未浓。

    蜡照半笼金翡翠，麝熏微度绣芙蓉。

    刘郎已恨蓬山远，更隔蓬山一万重！

    '
  annotations:
