- id: poem_exp_372
  title: 水调歌头·登多景楼
  author: 杨炎正
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '寒眼乱空阔，客意不胜秋。

    强呼斗酒，发兴特上最高楼。

    舒卷江山图画，应答龙鱼悲啸，不暇愿诗愁。

    风露巧欺客，分冷入衣裘。

    忽醒然，成感慨，望神州。

    可怜报国无路，空白一分头。

    都把平生意气，只做如今憔悴，岁晚若为谋。

    此意仗江月，分付与沙鸥。

    '
