- id: poem_core_111
  title: 过故人庄
  author: 孟浩然
  dynasty: 唐
  is_required: true
  difficulty: 3
  content: '故人具鸡黍，邀我至田家。

    绿树村边合，青山郭外斜。

    开轩面场圃，把酒话桑麻。

    待到重阳日，还来就菊花。

    '
  annotations:
  - word: 具
    meaning: 准备，置办
  - word: 鸡黍
    meaning: 指农家待客的丰盛饭食（字面指鸡和黄米饭）
  - word: 黍
    meaning: 黄米，古代认为是上等的粮食
  - word: 邀
    meaning: 邀请
  - word: 至
    meaning: 到
  translation: 预备丰盛的饭菜，邀请我到他好客的农家。 翠绿的树林围绕着村落，苍青的山峦在城外横卧。 推开窗户面对谷场菜园，手举酒杯闲谈庄稼情况。 等到九九重阳节到来时，再请君来这里观赏菊花。
  appreciation: 这是一首田园诗，描写农家恬静闲适的生活情景，也写老朋友的情谊。通过写田园生活的风光，写出作者对这种生活的向往。全文十分押韵。诗由“邀”到“至”到“望”又到“约”一径写去，自然流畅。语言朴实无华，意境清新隽永。作者以亲切省净的语言，如话家常的形式，写了从往访到告别的过程。其写田园景物清新恬静，写朋友情谊真挚深厚，写田家生活简朴亲切。
  background: "孟浩然访农家故人所作。写田园宴饮与友情，语言平淡而韵味深厚，是山水田园诗代表作。"
  famous_lines:
  - 待到重阳日，还来就菊花
  tags:
