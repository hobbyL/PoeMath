  - word: 对影成三人
    meaning: 自己、影子、月亮合为三人
  - word: 无情游
    meaning: 无心的游荡
  translation: "花间摆一壶酒，独酌无人亲近。举杯邀请明月，对影便成了三人。月本不会喝酒，影子徒然跟着我。暂且伴着月与影，行乐须趁着春。我唱歌月在徘徊，我起舞影零乱。醒时一同交欢，醉后各自散开。愿永远结下无情之游，相约在辽远的云汉。"
  appreciation: "李白写孤独却不消沉。「举杯邀明月，对影成三人」想象奇绝；由独酌写到与月影相期云汉，豪放中有寂寞，是其精神写照。"
