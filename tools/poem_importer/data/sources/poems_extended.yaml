  - 山水
  - 写景
  - 抒情
  - 五言律诗
- id: poem_ext_061
  title: 次北固山下
  author: 王湾
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '客路青山外，行舟绿水前。

    潮平两岸阔，风正一帆悬。

    海日生残夜，江春入旧年。

    乡书何处达？归雁洛阳边。

    '
  annotations:
  - word: 客路
    meaning: 旅途
  - word: 潮平两岸阔
    meaning: 潮水涨满时，两岸之间水面宽阔
  - word: 风正
    meaning: 顺风
  - word: 悬
    meaning: 挂
  - word: 海日
    meaning: 海上的旭日
  translation: "客路在青山之外，行舟在绿水之前。潮平两岸开阔，风正一帆高悬。海上的太阳从残夜里生出，江上的春意闯入了旧年。乡书寄到何处？归雁飞向洛阳那边。"
  appreciation: "王湾泊北固山。「潮平两岸阔，风正一帆悬」写景开阔；「海日生残夜，江春入旧年」写时序流转，是盛唐名联。"
  background: "王湾途经北固山（今镇江）停泊时所作。"
  famous_lines:
  - 乡书何处达？归雁洛阳边
  tags:
  - 唐诗三百首
  - 初中古诗
  - 地点
  - 思乡
  - 哲理
  - 最美
- id: poem_ext_062
  title: 云阳馆与韩绅宿别
  author: 司空曙
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '故人江海别，几度隔山川。

    乍见翻疑梦，相悲各问年。

    孤灯寒照雨，深竹暗浮烟。

    更有明朝恨，离杯惜共传。

    '
  annotations:
  - word: 云阳
    meaning: 地名，在今陕西泾阳
  - word: 故人
    meaning: 老朋友
  - word: 江海
    meaning: 代指远方
  translation: "故人自江海一别，几度被山川隔开。乍一见反而疑是梦，相对悲伤，各问年纪。孤灯寒光照着雨，深竹暗暗浮起烟。更有明朝的离恨，离杯珍惜着一起传饮。"
  appreciation: "司空曙写久别重逢又将别。「乍见翻疑梦，相悲各问年」写乱世重逢极真；结以明朝恨，喜中含悲。"
  background: "司空曙在云阳馆与友人韩绅夜宿又将别。"
  famous_lines:
  - 更有明朝恨，离杯惜共传
  tags:
  - 唐诗三百首
  - 惜别
  - 友情
  - 五言律诗
- id: poem_ext_063
  title: 贼平后送人北归
  author: 司空曙
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '世乱同南去，时清独北还。

    他乡生白发，旧国见青山。

    晓月过残垒，繁星宿故关。

    寒禽与衰草，处处伴愁颜。

    '
  annotations:
  - word: 时清
    meaning: 指时局已安定
  - word: “旧国”句
    meaning: 意谓你到故乡，所见者也惟有青山如故
  - word: 旧国
    meaning: 指故乡
  - word: 残垒
    meaning: 战争留下的军事壁垒
  translation: "世乱时一同南去，时局清平你独自北还。他乡生出了白发，旧国仍见青山。晓月下经过残垒，繁星下投宿故关。寒禽与衰草，处处伴着愁颜。"
  appreciation: "司空曙送人北归。世乱同去、时清独还，对照鲜明；残垒故关写乱后景象，沉痛含蓄。"
  background: "安史乱平后，司空曙送友人北归故乡。"
  famous_lines:
  - 寒禽与衰草，处处伴愁颜
  tags:
  - 唐诗三百首
  - 酬赠
  - 感伤
  - 五言律诗
- id: poem_ext_064
  title: 草
  author: 白居易
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '离离原上草，一岁一枯荣。

    野火烧不尽，春风吹又生。

    远芳侵古道，晴翠接荒城。

    又送王孙去，萋萋满别情。

    '
  annotations:
  - word: 离离
    meaning: 青草茂盛的样子
  - word: 一岁一枯荣
    meaning: 枯，枯萎
  - word: 远芳侵古道
    meaning: 芳，指野草那浓郁的香气
  - word: 远芳
    meaning: 草香远播
  - word: 晴翠
    meaning: 草原明丽翠绿
  translation: "原野上青草茂盛，一年一度枯萎又繁荣。野火烧不尽它，春风一吹又重新生长。远处的芳草侵入古道，晴日下的翠绿连向荒城。又一次送别游子远去，萋萋春草满含离别之情。"
  appreciation: "白居易借原上草写生命力与离情。前四句「野火烧不尽，春风吹又生」写草之坚韧；后四句以萋萋芳草托送别，情景交融，是小学与唐诗选本中的经典。"
  background: "白居易《赋得古原草送别》节选或通行选本常题作《草》。作于少年时期，以草喻别情。"
  famous_lines:
  - 又送王孙去，萋萋满别情
  tags:
  - 唐诗三百首
  - 小学古诗
  - 送别
  - 咏物
  - 写草
  - 五言律诗
- id: poem_ext_065
  title: 题大庾岭北驿
  author: 宋之问
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '阳月南飞雁，传闻至此回。

    我行殊未已，何日复归来。

    江静潮初落，林昏瘴不开。

    明朝望乡处，应见陇头梅。

    '
  annotations:
  - word: 阳月
    meaning: 阴历十月
  - word: 殊
    meaning: 还
  - word: 瘴
    meaning: 旧指南方湿热气候下山林间对人有害的毒气
  - word: 望乡处
    meaning: 远望故乡的地方，指站在大庾岭处
  - word: 陇头梅
    meaning: 大庾岭地处南方，其地气候和暖，故十月即可见梅，旧时红白梅夹道，故有梅岭之称
  translation: "十月南飞的大雁，听说飞到这里就折回。我的行程却还没完，何日才能再归来？江静潮水初落，林昏瘴气不开。明天遥望故乡的地方，该能看见陇头的梅花。"
  appreciation: "宋之问贬途过大庾岭。以雁回人未回写乡思，结以陇头梅，凄清中留一丝暖意。"
  background: "神龙初宋之问贬泷州，过大庾岭北驿时所作。"
  famous_lines:
  - 明朝望乡处，应见陇头梅
  tags:
  - 唐诗三百首
  - 思乡
  - 地名
  - 优美
  - 五言律诗
- id: poem_ext_066
  title: 寄左省杜拾遗
  author: 岑参
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '联步趋丹陛，分曹限紫微。

    晓随天仗入，暮惹御香归。

    白发悲花落，青云羡鸟飞。

    圣朝无阙事，自觉谏书稀。

    '
  annotations:
  - word: 左省
    meaning: 门下省，在宫殿东边
  - word: 杜拾遗
    meaning: 指杜甫，曾任左拾遗
  - word: 白发
    meaning: 年老
  - word: 天涯
    meaning: 远方
  translation: "我们并肩走上丹陛，分署办事，隔着紫微省。清晨跟随天子仪仗入朝，傍晚沾着御香归来。白发人为花落而悲，羡慕青云中的飞鸟。圣朝好像没有缺漏，自己也觉得谏书越来越少。"
  appreciation: "岑参寄杜甫。前写同朝供职，后以「白发悲花落」见失意，结句「谏书稀」似颂实讽，含蓄深婉。"
  background: "乾元元年前后，岑参任右补阙，寄左拾遗杜甫。"
  famous_lines:
  - 圣朝无阙事，自觉谏书稀
  tags:
  - 唐诗三百首
  - 仕途
  - 感慨
  - 五言律诗
- id: poem_ext_067
  title: 听蜀僧濬弹琴
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '蜀僧抱绿绮，西下峨眉峰。

    为我一挥手，如听万壑松。

    客心洗流水，余响入霜钟。

    不觉碧山暮，秋云暗几重。

    '
  annotations:
  - word: 蜀僧
    meaning: 四川的和尚
  - word: 濬
    meaning: 僧人的名字
  - word: 绿绮
    meaning: 古琴名
  - word: 万壑松
    meaning: 形容琴声如万壑松涛
  translation: "蜀中僧人抱着绿绮琴，自峨眉峰西下。为我挥手一弹，如听万壑松涛。客心被流水般的琴音洗净，余响融入霜天的钟声。不知不觉碧山已暮，秋云暗了几重。"
  appreciation: "以「万壑松」喻琴声，以流水洗心、霜钟余响写听琴境界，结尾不觉日暮，余味悠长。"
  background: "李白听蜀僧濬弹琴而作，写音乐与知音之感。"
  famous_lines:
  - 不觉碧山暮，秋云暗几重
  tags:
  - 唐诗三百首
  - 音乐
  - 五言律诗
- id: poem_ext_068
  title: 夜泊牛渚怀古
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '牛渚西江夜，青天无片云。

    登舟望秋月，空忆谢将军。

    余亦能高咏，斯人不可闻。

    明朝挂帆席，枫叶落纷纷。

    '
  annotations:
  - word: 牛渚
    meaning: 山名，在今安徽当涂县西北
  - word: 诗题下有注
    meaning: 此地即谢尚闻袁宏咏史处
  - word: 西江
    meaning: 从南京以西到江西境内的一段长江，古代称西江
  - word: 谢将军
    meaning: 东晋谢尚，今河南太康县人，官镇西将军，镇守牛渚时，秋夜泛舟赏月，适袁宏在运租船中诵己作《咏史》诗，音辞都很好，遂大加赞赏，邀其前来，谈到天明
  - word: 高咏
    meaning: 谢尚赏月时，曾闻诗人袁宏在船中高咏，大加赞赏
  translation: "牛渚西江的夜，青天没有一片云。登舟仰望秋月，空想着谢尚将军。我也能高声吟咏，却听不见那样的知音。明朝挂起船帆，枫叶纷纷飘落。"
  appreciation: "李白夜泊牛渚怀古。由清景写到忆谢尚知音，结以挂帆枫叶，寂寞中见自负与漂泊，是五律名篇。"
  background: "李白泊舟牛渚（今安徽马鞍山）怀东晋谢尚赏袁宏事而作。"
  famous_lines:
  - 明朝挂帆席，枫叶落纷纷
  tags:
  - 唐诗三百首
  - 月亮
  - 怀古
  - 五言律诗
- id: poem_ext_069
  title: 赠孟浩然
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '吾爱孟夫子，风流天下闻。

    红颜弃轩冕，白首卧松云。

    醉月频中圣，迷花不事君。

    高山安可仰，徒此揖清芬。

    '
  annotations:
  - word: 孟夫子
    meaning: 指孟浩然
  - word: 风流
    meaning: 古人以风流赞美文人，主要是指有文采，善词章，风度潇洒，不钻营苟且等
  - word: 红颜句
    meaning: 意谓从青年时代起就对轩冕荣华（仕宦）不感兴趣
  - word: 白首
    meaning: 白头，指老年
  - word: 中圣
    meaning: “中圣人”的简称，即醉酒
  translation: "我敬爱孟夫子，风流潇洒名闻天下。年轻时就弃绝官爵荣华，白发时高卧松云。醉月常常入酒，迷花而不事君王。他的品格如高山不可仰，我只能在此揖敬那清芬。"
  appreciation: "李白赠孟浩然，赞其弃轩冕、卧松云的风骨，结以高山揖清芬，敬慕真挚。"
  background: "李白与孟浩然交游时所作赠诗。"
  famous_lines:
  - 高山安可仰，徒此揖清芬
  tags:
  - 唐诗三百首
  - 赠别
  - 敬爱
  - 五言律诗
- id: poem_ext_070
  title: 渡荆门送别
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '渡远荆门外，来从楚国游。

    山随平野尽，江入大荒流。

    月下飞天镜，云生结海楼。

    仍怜故乡水，万里送行舟。

    '
  annotations:
  - word: 荆门
    meaning: 山名，位于今湖北省宜都县西北长江南岸，与北岸虎牙三对峙，地势险要，自古即有楚蜀咽喉之称
  - word: 远
    meaning: 远自
  - word: 楚国
    meaning: 楚地，指湖北一带，春秋时期属楚国
  - word: 平野
    meaning: 平坦广阔的原野
  - word: 江
    meaning: 长江
  translation: "远渡荆门之外，来到楚地漫游。山随着平野消失，江水进入广阔的荒原奔流。月影如飞下的天镜，云彩结成海市蜃楼。仍爱这故乡的水，不远万里送我行舟。"
  appreciation: "「山随平野尽，江入大荒流」写蜀山尽、楚原开的地理转换；结句故乡水送行舟，情深而不悲戚。"
  background: "开元十三年左右，李白出蜀东游、渡荆门时所作。"
  famous_lines:
  - 仍怜故乡水，万里送行舟
  tags:
  - 唐诗三百首
  - 初中古诗
  - 长江
  - 送别
  - 思乡
  - 五言律诗
- id: poem_ext_071
  title: 送友人
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '青山横北郭，白水绕东城。

    此地一为别，孤蓬万里征。

    浮云游子意，落日故人情。

    挥手自兹去，萧萧班马鸣。

    '
  annotations:
  - word: 郭
    meaning: 古代在城外修筑的一种外墙
  - word: 白水
    meaning: 清澈的水
  - word: 一
    meaning: 助词，加强语气
  - word: 别
    meaning: 告别
  - word: 蓬
    meaning: 古书上说的一种植物，干枯后根株断开，遇风飞旋，也称“飞蓬”
  translation: "青山横在城北，白水绕着东城。在这里一分别，你就像孤蓬万里远征。浮云像游子的心意，落日是故人的深情。挥手从此离去，马也萧萧长鸣。"
  appreciation: "李白送友。颔联「浮云游子意，落日故人情」对仗自然；结以班马萧萧，景中含情，是送别五律经典。"
  background: "李白送友人远行时所作，地点与对象不详。"
  famous_lines:
  - 挥手自兹去，萧萧班马鸣
  tags:
