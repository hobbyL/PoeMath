- id: poem_exp_044
  title: 鹦鹉曲·野渡新晴
  author: 冯子振
  dynasty: 元
  layer: explore
  is_required: false
  difficulty: 3
  content: '孤村三两人家住，终日对野叟田父。

    说今朝绿水平桥，昨日溪南新雨。

    碧天边岩穴云归，白鹭一行飞去。

    便芒鞋竹杖行春，问底是青帘舞处？

    '
  annotations:
  - word: 鹦鹉曲
    meaning: 曲牌名
  - word: 野渡
    meaning: 荒野渡口
  - word: 新晴
    meaning: 雨后初晴
  translation: "孤村的三两人在家住，终日的对野叟在田父。但见说今的朝绿水在平桥，昨日的溪南新雨。又见碧天的边岩穴在云归，白鹭的一行飞去。便芒的鞋竹杖在行春，问底的是青帘在舞处？。"
  appreciation: "《鹦鹉曲·野渡新晴》中「便芒鞋竹杖行春，问底是青帘舞处？」最见精神。冯子振写景，画面清楚。"
  background: "元冯子振《鹦鹉曲·野渡新晴》。"
  famous_lines:
  - 便芒鞋竹杖行春，问底是青帘舞处？
