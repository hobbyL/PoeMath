- id: poem_ext_247
  title: 南歌子·天上星河转
  author: 李清照
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 3
  content: '天上星河转，人间帘幕垂。凉生枕簟泪痕滋。起解罗衣聊问、夜何其。

    翠贴莲蓬小，金销藕叶稀。旧时天气旧时衣。只有情怀不似、旧家时。

    '
  annotations:
