- id: poem_exp_492
  title: 水龙吟·咏月
  author: 晁端礼
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '倦游京洛风尘，夜来病酒无人问。

    九衢雪小，千门月淡，元宵灯近。

    香散梅梢，冻消池面，一番春信。

    记南楼醉里，西城宴阕，都不管、人春困。

    屈指流年未几，早人惊、潘郎双鬓。

    当时体态，如今情绪，多应瘦损。

    马上墙头，纵教瞥见，也难相认。

    凭栏干，但有盈盈泪眼，罗襟揾。

    '
