    虽不同辛苦，怆离各自居。

    我自入秋浦，三年北信疏。

    红颜愁落尽，白发不能除。

    有客自梁苑，手携五色鱼。

    开鱼得锦字，归问我何如。

    江山虽道阻，意合不为殊。

    '
