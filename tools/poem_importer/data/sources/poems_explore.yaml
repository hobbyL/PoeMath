  tags:
  - 写景
  - 自然
  - 古诗词
- id: poem_exp_037
  title: 清江引·立春
  author: 贯云石
  dynasty: 元
  layer: explore
  is_required: false
  difficulty: 3
  content: '金钗影摇春燕斜，木杪生春叶。

    水塘春始波，火候春初热。

    土牛儿载将春到也。

    '
  annotations:
