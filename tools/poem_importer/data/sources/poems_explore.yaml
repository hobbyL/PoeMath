- id: poem_exp_646
  title: 忆江南词三首
  author: 白居易
  dynasty: 唐
  layer: explore
  is_required: false
  difficulty: 4
  content: '江南好，风景旧曾谙。

    日出江花红胜火，春来江水绿如蓝。

    能不忆江南？

    江南忆，最忆是杭州。

    山寺月中寻桂子，郡亭枕上看潮头。

    何日更重游！

    江南忆，其次忆吴宫。

    吴酒一杯春竹叶，吴娃双舞醉芙蓉。

    早晚复相逢！

    '
  annotations:
  - word: 忆江南
    meaning: 词牌名
  - word: 江南好
    meaning: 江南风景好
  - word: 日出江花红胜火
    meaning: 太阳出来江边的花红似火
  - word: 春来江水绿如蓝
    meaning: 春天江水绿得像蓝草
  translation: 江南的风景多么美好，如画的风景久已熟悉。春天到来时，太阳从江面升起，把江边的鲜花照得比火红，碧绿的江水绿得胜过蓝草。怎能叫人不怀念江南？ 江南的回忆，最能唤起追思的是像天堂一样的杭州：游玩灵隐寺寻找皎洁月亮中的桂子，登上郡亭，枕卧其上，欣赏那起落的钱塘江大潮。什么时候能够再次去游玩？ 江南的回忆，再来就是回忆苏州的吴宫，喝一喝吴宫的美酒春竹叶，看一看吴宫的歌女双双起舞像朵朵迷人的芙蓉。不知何时会再次相逢。
