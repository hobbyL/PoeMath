- id: poem_exp_246
  title: 揠苗助长
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '宋人有闵其苗之不长而揠之者，芒芒然归，谓其人曰：“今日病矣！

    予助苗长矣！

    ”其子趋而往视之，苗则槁矣。

    天下之不助苗长者寡矣。

    以为无益而舍之者，不耘苗者也；助之长者，揠苗者也，非徒无益，而又害之。

    '
