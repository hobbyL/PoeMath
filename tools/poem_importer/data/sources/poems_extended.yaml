- id: poem_ext_129
  title: 蜀相
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '丞相祠堂何处寻，锦官城外柏森森。

    映阶碧草自春色，隔叶黄鹂空好音。

    三顾频烦天下计，两朝开济老臣心。

    出师未捷身先死，长使英雄泪满襟。

    '
  annotations:
  - word: 丞相祠堂
    meaning: 即诸葛武侯祠，在现在成都，晋李雄初建
  - word: 锦官城
    meaning: 成都的别名
  - word: 柏森森
    meaning: 柏树茂盛繁密的样子
  - word: 空
    meaning: 白白的
  - word: 三顾频繁天下计
    meaning: 意思是刘备为统一天下而三顾茅庐，问计于诸葛亮
  translation: 何处去寻找武侯诸葛亮的祠堂？在成都城外那柏树茂密的地方。 碧草照映台阶自当显露春色，树上的黄鹂隔枝空对婉转鸣唱。 定夺天下先主曾三顾茅庐拜访，辅佐两朝开国与继业忠诚满腔。 可惜出师伐魏未捷而病亡军中，常使历代英雄们对此涕泪满裳！
  appreciation: 这首七律《蜀相》，抒发了诗人对诸葛亮才智品德的崇敬和功业未遂的感慨。全诗熔情、景、议于一炉，既有对历史的评说，又有现实的寓托，在历代咏赞诸葛亮的诗篇中，堪称绝唱。 古典诗歌中常以问答起句，突出感情的起伏不平。这首诗的首联也是如此。“丞相祠堂何处寻？锦官城外柏森森。”一问一答，一开始就形成浓重的感情氛围，笼罩全篇。上句“丞相祠堂”直切题意，语意亲切而又饱含崇敬。“何处寻”，不疑而问，加强语势，并非到哪里去寻找的意思。诸葛亮在历史上颇受人民爱戴，尤其在四川成都，祭祀他的庙宇很容易找到。“寻”字之妙在于它刻画出诗人那追慕先贤的执著感情和虔诚造谒的悠悠我思。下句“锦官城外柏森森”，指出诗人凭吊的是成都郊外的武侯祠。这里柏树成荫，高大茂密，呈现出一派静谧肃穆的气氛。柏树生命长久，常年不凋，高大挺拔，有象征意义，常被用作祠庙中的观赏树木。作者抓住武侯祠的这一景物，展现出柏树那伟岸、葱郁、苍劲、朴质的形象特征，使人联想到诸葛亮的精神，不禁肃然起敬。接着展现在读者面前的是茵茵春草，铺展到石阶之下，映现出一片绿色；只只黄莺，在林叶之间穿行，发出宛转清脆的叫声。
    第二联“映阶碧草自春色，隔叶黄鹂空好音”所描绘的这些景物，色彩鲜明，音韵浏亮，静动。
