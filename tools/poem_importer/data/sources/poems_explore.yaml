  - 怀人
  - 古诗词
- id: poem_exp_305
  title: 鱼藻
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '鱼在在藻，有颁其首。

    王在在镐，岂乐饮酒。

    鱼在在藻，有莘其尾。

    王在在镐，饮酒乐岂。

    鱼在在藻，依于其蒲。

    王在在镐，有那其居。

    '
  annotations:
  - word: 鱼
    meaning: 鱼
  - word: 藻
    meaning: 水草
  - word: 在藻
    meaning: 在水草间
  translation: "鱼在藻中，大着它的头。王在镐京，欢乐饮酒。鱼在藻中，长着它的尾。王在镐京，饮酒欢乐。鱼在藻中，依着蒲草。王在镐京，安然居住。"
  appreciation: "《诗经·小雅·鱼藻》。鱼藻起兴，写王者安乐。"
  background: "《诗经·小雅·鱼藻》。"
  famous_lines:
  - 王在在镐，有那其居。
  tags:
