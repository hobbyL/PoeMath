  - word: 初举进士
    meaning: 第一次参加科举考试
  translation: "当初张咏在成都，听说寇准拜相，对僚属说：「寇公是奇才，可惜学术不足。」等到寇准出知陕州，张咏正好从成都罢任回京，寇准盛设供帐接待。张咏将走，寇准送到郊外，问：「有何指教？」张咏慢慢说：「《霍光传》不可不读。」寇准不解其意，回去取传来读，读到「不学无术」，笑道：「这是张公说我啊。」"
  appreciation: "司马光记张咏谏寇准。以《霍光传》「不学无术」讽之，寇准悟而笑，交谊与风骨两见。"
