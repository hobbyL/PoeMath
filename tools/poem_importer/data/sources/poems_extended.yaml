  translation: "平沙浅草接天长。路茫茫。几兴亡。昨夜波声，洗岸骨如霜。千古英雄成底事，徒感慨，谩悲凉。少年有意制服中行说。馘名王。扫沙场。击楫中流，曾记泪沾裳。欲上治安双阙远，空怅望，过维扬。"
  appreciation: "李好古过维扬。上片兴亡洗骨，下片少年壮志成空，南渡后志士的苍凉。"
