- id: poem_ext_181
  title: 子夜吴歌·秋歌
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '长安一片月，万户捣衣声。

    秋风吹不尽，总是玉关情。

    何日平胡虏，良人罢远征。

    '
  annotations:
  - word: 一片月
    meaning: 一片皎洁的月光
  - word: 万户
    meaning: 千家万户
  - word: 捣衣
    meaning: 把衣料放在石砧上用棒槌捶击，使衣料绵软以便裁缝
  - word: 吹不尽
    meaning: 吹不散
  - word: 玉关
    meaning: 玉门关，故址在今甘肃省敦煌县西北，此处代指良人戍边之地
  translation: 长安城内一片月光，千户万户都在捣衣。 秋风吹送捣衣声声，家家怀念戍边之人。 何时才能平息边境战争，让我丈夫结束远征。
  appreciation: 全诗写征夫之妻秋夜怀思远征边陲的良人，希望早日结束战争，丈夫免于离家去远征。虽未直写爱情，却字字渗透着真挚情意；虽没有高谈时局，却又不离时局。情调用意，都没有脱离边塞诗的风韵。 月色如银的京城，表面上一片平静，但捣衣声中却蕴含着千家万户的痛苦；秋风不息，也寄托着对边关思念的深情。读来让人怦然心动。结句是闺妇的期待，也是征人的心声。 笼统而言，诗人的手法是先景语后情语，而情景始终交融。“长安一片月”是写景，同时又是紧扣题面，写出了“秋月扬明辉”的季节特点。而见月怀人是古典诗歌传统的表现方法，加之秋来是赶制征衣的季节，所以写月也有起兴的意义。此外，月明如昼，正好捣衣，而那“玉户帘中卷不去，捣衣砧上拂还来”的月光，也容易勾起思妇的相思之情。制衣的布帛须先置砧上，用杵捣平捣软，是谓“捣衣”。这明朗的月夜，长安城就沉浸在一片此起彼落的砧杵声中，而这种特殊的“秋声”，对于思妇又是一种难耐的挑拨。“一片”、“万户”，写光写声，似对非对，措辞天然而得咏叹味。秋风，也是撩人愁绪的，“秋风入窗里，罗帐起飘扬”，便是对思妇的第三重挑拨。月朗风清，风送砧声，声声都是怀念玉关征人的深情。用“总是”二字，情思益见深长。这里，秋月秋声与秋风织成浑成的境界。
