- id: poem_exp_457
  title: 喜迁莺·鸠雨细
  author: 许棐
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 3
  content: '鸠雨细，燕风斜。

    春悄谢娘家。

    一重帘外即天涯。

    何必暮云遮。

    钏金寒，钗玉冷。

    薄醉欲成还醒。

    一春梳洗不簪花。

    孤负几韶华。

