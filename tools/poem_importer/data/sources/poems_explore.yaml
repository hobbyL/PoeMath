- id: poem_exp_250
  title: 掩耳盗铃
  author: 吕不韦 撰
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '范氏之亡也，百姓有得钟者，欲负而走，则钟大不可负；以锤毁之，钟况然有声。

    恐人闻之而夺己也，遽掩其耳。

    恶人闻之，可也；恶己自闻之，悖也！

    '
  annotations:
  - word: 掩耳
    meaning: 捂住耳朵
  - word: 盗铃
    meaning: 偷铃铛
  - word: 钟
    meaning: 铃铛
  translation: "范氏灭亡时，有百姓得到一口钟，想背着跑，钟太大背不动；用锤子砸毁它，钟轰然作响。怕别人听见来抢，急忙捂住自己的耳朵。讨厌别人听见，还可以理解；讨厌自己听见，就荒谬了！"
  appreciation: "《吕氏春秋》寓言「掩耳盗铃」。讽自欺欺人：恶人闻之可，恶己自闻则悖，说理犀利。"
  background: "《吕氏春秋·自知》中的寓言。"
