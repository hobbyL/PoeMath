- id: poem_ext_055
  title: 汉江临泛
  author: 王维
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '楚塞三湘接，荆门九派通。

    江流天地外，山色有无中。

    郡邑浮前浦，波澜动远空。

    襄阳好风日，留醉与山翁。

    '
  annotations:
  - word: 楚塞
    meaning: 楚国边境地带，这里指汉水流域，此地古为楚国辖区
  - word: 三湘
    meaning: 湖南有湘潭、湘阴、湘乡，合称三湘
  - word: 荆门
    meaning: 山名，荆门山，在今湖北宜都县西北的长江南岸，战国时为楚之西塞
  - word: 九派
    meaning: 九条支流，长江至浔阳分为九支
  - word: 郡邑
    meaning: 指汉水两岸的城镇
  translation: 汉江流经楚塞又折入三湘，西起荆门往东与九江相通。 远望江水好像流到天地外，近看山色缥缈若有若无中。 岸边都城仿佛在水面浮动，水天相接波涛滚滚荡云空。 襄阳的风光的确令人陶醉，我愿在此地酣饮陪伴山翁。
  appreciation: 此诗可谓王维融画法入诗的力作。 “楚塞三湘接，荆门九派通”，语工形肖，一笔勾勒出汉江雄浑壮阔的景色，作为画幅的背景。春秋战国时期，湖北、湖南等地都属于楚国，而襄阳位于楚之北境，所以这里称“楚塞”。“三湘”，一说湘水合漓水为漓湘，合蒸水为蒸湘，合潇水为潇湘，合称三湘；一说为湖南的湘潭、湘阴、湘乡。古诗文中，三湘一般泛称今洞庭湖南北、湘江一带。“荆门”，山名，在今湖北宜都县西北。
