  - id: poem_exp_448
    title: 阮郎归·春风吹雨绕残枝
    author: 佚名
    dynasty: 宋
    layer: explore
    is_required: false
    difficulty: 3
    content: |
      春风吹雨绕残枝，落花无可飞。
      小池寒绿欲生漪，雨晴还日西。
      帘半卷，燕双归。
      讳愁无奈眉。
      翻身整顿着残棋，沉吟应劫迟。
