- id: poem_exp_248
  title: 愚人食盐
  author: 僧伽斯那
  dynasty: 南北朝
  layer: explore
  is_required: false
  difficulty: 3
  content: '昔有愚人，至于他家。

    主人与食，嫌淡无味。

    主人闻已，更为益盐。

    既得盐美，便自念言：“所以美者，缘有盐故。

    少有尚尔，况复多也？

    ”愚人无智，便空食盐。

    食已口爽，反为其患。

    '
  annotations:
