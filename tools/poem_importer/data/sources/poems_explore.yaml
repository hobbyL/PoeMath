- id: poem_exp_388
  title: 满江红·东武会流杯亭
  author: 苏轼
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '上巳日作。

    城南有坡，土色如丹，其下有堤，壅郑淇水入城。

    东武城南，新堤固、涟漪初溢。

    隐隐遍、长林高阜，卧红堆碧。

    枝上残花吹尽也，与君更向江头觅。

    问向前、犹有几多春，三之一。

    官里事，何时毕。

    风雨外，无多日。

    相将泛曲水，满城争出。

    君不见兰亭修禊事，当时坐上皆豪逸。

    到如今、修竹满山阴，空陈迹。

