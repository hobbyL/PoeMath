- id: poem_exp_514
  title: 庆清朝慢·踏青
  author: 王观
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '调雨为酥，催冰做水，东君分付春还。

    何人便将轻暖，点破残寒。

    结伴踏青去好，平头鞋子小双鸾。

    烟郊外，望中秀色，如有无间。

    晴则个，阴则个，饾饤得天气，有许多般。

