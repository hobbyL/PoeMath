- id: poem_exp_205
  title: 春日行
  author: 鲍照
  dynasty: 南北朝
  layer: explore
  is_required: false
  difficulty: 4
  content: '献岁发，吾将行。

    春山茂，春日明。

    园中鸟，多嘉声。

    梅始发，柳始青。

    泛舟舻，齐棹惊。

    奏《采菱》，歌《鹿鸣》。

    风微起，波微生。

    弦亦发，酒亦倾。

    入莲池，折桂枝。

    芳袖动，芬叶披。

    两相思，两不知。

