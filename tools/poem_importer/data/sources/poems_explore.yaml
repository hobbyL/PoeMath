  dynasty: 清
  layer: explore
  is_required: false
  difficulty: 4
  content: '满城社雨，又唤起无家，一年新恨。

    花轻柳重，隔断红楼芳径。

    旧垒谁家曾识，更生怕、主人相问。

    商量多少雕檐，还是差池不定。

    谁省、去年春静。

    直数到今年，丝魂絮影。

    前身应是，一片落红残粉。

    不住呢喃交讯，又惹得、莺儿闲听。

    输于池上鸳鸯，日日阑前双暝。

    '
