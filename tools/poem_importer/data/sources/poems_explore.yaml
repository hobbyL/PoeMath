- id: poem_exp_455
  title: 小重山·三山与客泛西湖
  author: 辛弃疾
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 3
  content: '绿涨连云翠拂空。

    十分风月处，著衰翁。

    垂杨影断岸西东。

    君恩重，教且种芙蓉。

    十里水晶宫。

    有时骑马去，笑儿童。

    殷勤却谢打头风。

    船儿住，且醉浪花中。

    '
