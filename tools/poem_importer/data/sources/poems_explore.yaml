- id: poem_exp_387
  title: 满江红·刘朔斋赋菊和韵
  author: 吴文英
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '露浥初英，早遗恨、参差九日。

    还却笑、萸随节过，桂凋无色。

    杯面寒香蜂共泛，篱根秋讯蛩催织。

    爱玲珑、筛月水屏风，千枝结。

    芳井韵，寒泉咽。

    霜著处，微红湿。

    共评花索句，看谁先得。

    好漉乌巾连夜醉，莫愁金钿无人拾。

    算遗踪、犹有枕囊留，相思物。

