- id: poem_ext_127
  title: 登高
  author: 杜甫
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '风急天高猿啸哀，渚清沙白鸟飞回。

    无边落木萧萧下，不尽长江滚滚来。

    万里悲秋常作客，百年多病独登台。

    艰难苦恨繁霜鬓，潦倒新停浊酒杯。

    '
  annotations:
  - word: 渚
    meaning: 水中的小洲
  - word: 鸟飞回
