  - 五言古诗
- id: poem_ext_266
  title: 感遇十二首·其二
  author: 张九龄
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '幽人归独卧，滞虑洗孤清。

    持此谢高鸟，因之传远情。

    日夕怀空意，人谁感至精？

    飞沈理自隔，何所慰吾诚?

    '
  annotations:
  - word: 感遇
    meaning: 有感于遭遇
  - word: 兰叶
    meaning: 兰花的叶子
  - word: 桂华
    meaning: 桂花
  translation: "幽人归来独自卧，滞涩的思虑被洗净，只剩孤清。持此心境辞别高鸟，借它传递远方的情。日夕怀着空洞的意绪，谁能感受这至精？飞与沉的道理本就隔绝，用什么安慰我的诚意？"
  appreciation: "张九龄感遇其二。写幽人孤清与知音难遇，「飞沈理自隔」见其孤独，理趣与情志交织。"
  background: "张九龄《感遇》十二首之二，写孤清与难遇。"
