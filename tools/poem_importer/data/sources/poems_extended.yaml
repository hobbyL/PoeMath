  - 酬答
  - 五言律诗
- id: poem_ext_263
  title: 望蓟门
  author: 祖咏
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '燕台一望客心惊，笳鼓喧喧汉将营。

    万里寒光生积雪，三边曙色动危旌。

    沙场烽火侵胡月，海畔云山拥蓟城。

    少小虽非投笔吏，论功还欲请长缨。

    '
  annotations:
  - word: 燕台
    meaning: 原为战国时燕昭王所筑的黄金台，这里代称燕地，用以泛指平卢、范阳这一带
  - word: 客
    meaning: 诗人自称
  - word: 笳
    meaning: 汉代流行于塞北和西域的一种类似于笛子的管乐器，此处代指号角
  - word: 三边
    meaning: 古称幽、并、凉为三边
  - word: 危旌
    meaning: 高扬的旗帜
  translation: "燕台一望，客心震惊；笳鼓喧喧，尽是汉将营。万里寒光生于积雪，三边曙色摇动危旌。沙场烽火侵着胡月，海畔云山拥着蓟城。少小虽不是投笔从戎的吏，论功还想请长缨。"
  appreciation: "祖咏望蓟门。笳鼓、积雪、危旌、烽火写边城气势，结以请长缨，见报国豪情，是盛唐边塞名篇。"
  background: "祖咏登蓟门（今北京一带）远望有感而作。"
  famous_lines:
  - 少小虽非投笔吏，论功还欲请长缨。
  tags:
