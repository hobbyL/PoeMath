    上有弦歌声，音响一何悲！

    谁能为此曲，无乃杞梁妻。

    清商随风发，中曲正徘徊。

    一弹再三叹，慷慨有余哀。

    不惜歌者苦，但伤知音稀。

    愿为双鸿鹄，奋翅起高飞。

