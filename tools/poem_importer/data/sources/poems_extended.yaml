- id: poem_ext_135
  title: 贫女
  author: 秦韬玉
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '蓬门未识绮罗香，拟托良媒益自伤。

    谁爱风流高格调，共怜时世俭梳妆。

    敢将十指夸针巧，不把双眉斗画长。

    苦恨年年压金线，为他人作嫁衣裳。

    '
  annotations:
  - word: 贫女
    meaning: 贫穷人家的女子
  - word: 嫁衣
    meaning: 结婚的衣服
  - word: 良媒
    meaning: 好的媒人
  translation: "蓬门里从未识绮罗香，想托良媒更自伤。谁爱风流高格调，却都爱时世俭梳妆。敢将十指夸针线巧，不把双眉斗画长。苦恨年年压金线，为他人作嫁衣裳。"
  appreciation: "秦韬玉咏贫女。前写格调不入时，结以「为他人作嫁衣裳」，寄托寒士不遇，千古共鸣。"
