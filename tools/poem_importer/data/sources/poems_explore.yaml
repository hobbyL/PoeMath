- id: poem_exp_257
  title: 邴原泣学
  author: 礼赞
  dynasty: 明
  layer: explore
  is_required: false
  difficulty: 4
  content: '邴原少孤，数岁时，过书舍而泣。

    师曰：“童子何泣？

    ”原曰：“孤者易伤，贫者易感。

    夫书者，凡得学者，有亲也。

    一则愿其不孤，二则羡其得学，中心伤感，故泣耳。

    ”师恻然曰：“欲书可耳!

    ”原曰：“无钱资。

    ”师曰：“童子苟有志,吾徒相教,不求资也。

    ”于是遂就书。

    一冬之间，诵《孝经》《论语》。

    '
