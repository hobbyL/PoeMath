  appreciation: "李白登金陵凤凰台吊古伤今。「浮云蔽日」「长安不见」寄托政治失意，与崔颢《黄鹤楼》争胜而自成一格。"
  background: "李白流放夜郎遇赦后，登金陵凤凰台所作。"
