  - 冬天
  - 七言绝句
- id: poem_core_054
  title: 村晚
  author: 雷震
  dynasty: 宋
  grade: 5
  semester: 下
  textbook_unit: 语文五年级下·课文1
  is_required: true
  difficulty: 2
  content: '草满池塘水满陂，山衔落日浸寒漪。

    牧童归去横牛背，短笛无腔信口吹。

    '
  pinyin: 'cǎo mǎn chí táng shuǐ mǎn bēi ， shān xián luò rì jìn hán yī 。

    mù tóng guī qù héng niú bèi ， duǎn dí wú qiāng xìn kǒu chuī 。

    '
  annotations:
  - word: 陂
    meaning: 池塘的岸
  - word: 衔
    meaning: 口里含着，此处形容夕阳沉山的样子
  - word: 漪
    meaning: 水中的波纹
  - word: 横
    meaning: 横坐
  - word: 无腔
    meaning: 没有一定的曲调
  - word: 信口
    meaning: 随口
  translation: 池塘里长满了青草塘岸也涨满了水，远山衔着落日倒映在冰冷的水波中。牧童归家时横坐在牛背上，随口吹着没有曲调的短笛。
  appreciation: 全诗以清淡的笔墨勾勒出一幅乡村晚景图，"横牛背"、"信口吹"写活了牧童无拘无束的悠然情态，充满田园野趣。
  background: 雷震为南宋诗人，此诗描绘乡村黄昏景致，具体年代不详。
  famous_lines:
  - 牧童归去横牛背，短笛无腔信口吹
  tags:
