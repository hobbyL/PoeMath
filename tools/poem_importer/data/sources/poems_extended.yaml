- id: poem_ext_109
  title: 积雨辋川庄作
  author: 王维
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '积雨空林烟火迟，蒸藜炊黍饷东菑。

    漠漠水田飞白鹭，阴阴夏木啭黄鹂。

    山中习静观朝槿，松下清斋折露葵。

    野老与人争席罢，海鸥何事更相疑。

    '
