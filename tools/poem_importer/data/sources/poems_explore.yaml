- id: poem_exp_536
  title: 凄凉犯·重台水仙
  author: 吴文英
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '空江浪阔。

    清尘凝、层层刻碎冰叶。

    水边照影，华裾曳翠，露搔泪湿。

    湘烟暮合。

    □尘袜、凌波半涉。

    怕临风、□欺瘦骨，护冷素衣叠。

    樊姊玉奴恨，小钿疏唇，洗妆轻怯。

    汜人最苦，纷痕深、几重愁靥。

    花隘香浓，猛熏透、霜绡细摺。

    倚瑶台，十二金钱晕半掐。

    '
