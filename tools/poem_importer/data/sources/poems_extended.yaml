- id: poem_ext_398
  title: 相见欢·无言独上西楼
  author: 李煜
  dynasty: 五代
  layer: extended
  is_required: false
  difficulty: 3
  content: '无言独上西楼，月如钩。

    寂寞梧桐深院锁清秋。

    剪不断，理还乱，是离愁。

    别是一般滋味在心头。

    '
