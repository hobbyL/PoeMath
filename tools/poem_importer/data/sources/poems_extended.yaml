- id: poem_ext_071
  title: 送友人
  author: 李白
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 3
  content: '青山横北郭，白水绕东城。

    此地一为别，孤蓬万里征。

    浮云游子意，落日故人情。

    挥手自兹去，萧萧班马鸣。

    '
