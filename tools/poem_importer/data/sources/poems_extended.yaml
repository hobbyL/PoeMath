  - word: 纷纷坠叶
    meaning: 树叶纷纷飘落
  - word: 秋声
    meaning: 秋天的声音
  - word: 砧杵
    meaning: 捣衣的工具
  translation: "落叶纷纷飘在芬芳的台阶上，夜很静，细碎的寒声不断。珠帘卷起，玉楼空空，天色清淡，银河低垂到地平线。年年今夜，月色白得像绢练，人却总在千里之外。愁肠已断，想醉也醉不了；酒还没到，泪先成行。残灯忽明忽灭，头斜靠着枕头，尝尽了孤独难眠的滋味。这种心事，全堆在眉间心上，没有办法可以回避。"
