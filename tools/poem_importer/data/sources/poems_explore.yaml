  - 古诗词
- id: poem_exp_251
  title: 梅花
  author: 崔道融
  dynasty: 唐
  layer: explore
  is_required: false
  difficulty: 3
  content: '数萼初含雪，孤标画本难。

    香中别有韵，清极不知寒。

    横笛和愁听，斜枝倚病看。

    朔风如解意，容易莫摧残。

    '
