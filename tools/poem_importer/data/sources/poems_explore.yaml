  - 诗经
  - 怀人
  - 古诗词
- id: poem_exp_303
  title: 菁菁者莪
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 3
  content: '菁菁者莪，在彼中阿。

    既见君子，乐且有仪。

    菁菁者莪，在彼中沚。

    既见君子，我心则喜。

    菁菁者莪，在彼中陵。

    既见君子，锡我百朋。

    泛泛杨舟，载沉载浮。

    既见君子，我心则休。

    '
