- id: poem_exp_321
  title: 明月皎夜光
  author: 佚名
  dynasty: 两汉
  layer: explore
  is_required: false
  difficulty: 4
  content: '明月皎夜光，促织鸣东壁。

    玉衡指孟冬，众星何历历。

    白露沾野草，时节忽复易。

    秋蝉鸣树间，玄鸟逝安适。

    昔我同门友，高举振六翮。

    不念携手好，弃我如遗迹。

    南箕北有斗，牵牛不负轭。

    良无盘石固，虚名复何益？

    '
