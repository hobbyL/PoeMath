- id: poem_ext_184
  title: 金缕衣
  author: 佚名
  dynasty: 唐
  layer: extended
  is_required: false
  difficulty: 2
  content: '劝君莫惜金缕衣，劝君惜取少年时。

    花开堪折直须折，莫待无花空折枝。

    '
  annotations:
  - word: 金缕衣
    meaning: 缀有金线的衣服，比喻荣华富贵
  - word: 惜取
    meaning: 珍惜
  - word: 堪
    meaning: 可以，能够
  - word: 直须
    meaning: 尽管
  - word: 直
    meaning: 直接，爽快
  translation: 我劝你不要顾惜华贵的金缕衣，我劝你一定要珍惜青春少年时。 花开宜折的时候就要抓紧去折，不要等到花谢时只折了个空枝。
  appreciation: 此诗含意很单纯，可以用“莫负好时光”一言以蔽之。这原是一种人所共有的思想感情。可是，它使得读者感到其情感虽单纯却强烈，能长久在人心中缭绕，有一种不可思议的魅力。它每个诗句似乎都在重复那单一的意思“莫负好时光！”而每句又都寓有微妙变化，重复而不单调，回环而有缓急，形成优美的旋律，反复咏叹强调爱惜时光，莫要错过青春年华。从字面看，是对青春和爱情的大胆歌唱，是热情奔放的坦诚流露。然而字面背后，仍然是“爱惜时光”的主旨。因此，若作“行乐及时”的宗旨看似乎低了，作“珍惜时光”看，便摇曳多姿，耐人寻味。
    一、二句式相同，都以“劝君”开始，“惜”字也两次出现，这是二句重复的因素。但第一句说的是“劝君莫惜”，二句说的是“劝君须惜”，“莫”与“须”意正相反，又形成重复中的变化。这两句诗意又是贯通的。“金缕衣”是华丽贵重之物，却“劝君莫惜”，可见还有远比它更为珍贵的东西，这就是“劝君须惜”的“少年时”了。至于其原因，诗句未直说，那本是不言而喻的：“一寸光阴一寸金，寸金难买寸光阴”，贵如黄金也有再得的时候，“千金散尽还复来”；然而青春对任何人也只有一次，它一旦逝去是永不复返的。可是，世人多惑于此，爱金如命、虚掷光阴的真不少呢。一再“劝君”，用对白。
