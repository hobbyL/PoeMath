- id: poem_exp_228
  title: 寒食
  author: 郑刚中
  dynasty: 宋
  layer: explore
  is_required: false
  difficulty: 4
  content: '江乡时节逢寒食，花落未将春减色，

    岭南能有几多花，寒食临之扫春迹。

    花多花少非我事，春去春来亦堪惜。

    柴门风雨小庭寒，无奈池塘烟草碧。

    欲将诗句慰穷愁，眼中万象皆相识。

    欣然应接已无暇，都为老来无笔力。

    '
