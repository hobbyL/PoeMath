  content: '野草凄凄经雨碧，远山一抹晴云积。

    午睡觉来愁似织。

    孤帆直，游丝绕梦飞无力。

    古渡人家烟水隔，乡心缭乱垂杨陌。

    鸿雁自南人自北。

    风萧瑟，荻花满地秋江白。

    '
