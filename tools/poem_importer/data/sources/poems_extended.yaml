  appreciation: "其三由悲妻转自悲，结以「终夜常开眼，报答平生未展眉」，誓约沉痛，三首一体，是中唐悼亡绝唱。"
  background: "元稹《遣悲怀》其三，写长恨与报答无门。"
  famous_lines:
