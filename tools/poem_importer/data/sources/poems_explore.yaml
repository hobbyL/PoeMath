- id: poem_exp_057
  title: 咏新竹
  author: 际智
  dynasty: 清
  layer: explore
  is_required: false
  difficulty: 2
  content: '此君志欲擎天碧，耸出云头高百尺。

    只恐年深化作龙，一朝飞去不留迹。

    '
  annotations:
  - word: 新竹
    meaning: 新长出的竹子
  - word: 凌云
    meaning: 高入云端
  - word: 虚心
    meaning: 竹子中空，喻谦虚
