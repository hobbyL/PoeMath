name: Build & Release Android APK

on:
  push:
    tags:
      - 'v*' # 仅在打 v 开头的 tag 时触发，如 v0.0.1, v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # 创建 Release 需要写权限

    env:
      ALIYUN_OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT || vars.ALIYUN_OSS_ENDPOINT }}
      ALIYUN_OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET || vars.ALIYUN_OSS_BUCKET }}
      ALIYUN_OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
      ALIYUN_OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
      ALIYUN_OSS_APP_UPDATE_DOWNLOAD_BASE_URL: ${{ secrets.ALIYUN_OSS_APP_UPDATE_DOWNLOAD_BASE_URL || vars.ALIYUN_OSS_APP_UPDATE_DOWNLOAD_BASE_URL }}
      ALIYUN_OSS_APP_UPDATE_OSS_PREFIX: ${{ secrets.ALIYUN_OSS_APP_UPDATE_OSS_PREFIX || vars.ALIYUN_OSS_APP_UPDATE_OSS_PREFIX || 'poemath/android/stable' }}

    steps:
      - uses: actions/checkout@v4

      # -------- 从 tag 提取版本号 --------
      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "version_name=$TAG" >> $GITHUB_OUTPUT
          # 用 tag 中的数字生成 versionCode: 0.0.1 → 1, 1.2.3 → 10203
          IFS='.' read -r major minor patch <<< "$TAG"
          VERSION_CODE=$(( ${major:-0} * 10000 + ${minor:-0} * 100 + ${patch:-0} ))
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "tag=v$TAG" >> $GITHUB_OUTPUT
          echo "→ versionName=$TAG, versionCode=$VERSION_CODE"

      # -------- 环境准备 --------
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.6'
          channel: stable
          cache: true

      # -------- 签名配置 --------
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo -n "$KEYSTORE_BASE64" | base64 --decode > android/app/poemath-release.jks
          # 校验 jks 文件完整性
          FILE_SIZE=$(stat --format=%s android/app/poemath-release.jks)
          echo "→ keystore file size: ${FILE_SIZE} bytes"
          if [ "$FILE_SIZE" -lt 100 ]; then
            echo "::error::Keystore file too small (${FILE_SIZE} bytes) — KEYSTORE_BASE64 secret may be corrupted"
            exit 1
          fi
          printf 'storeFile=poemath-release.jks\nstorePassword=${{ secrets.KEYSTORE_PASSWORD }}\nkeyAlias=${{ secrets.KEY_ALIAS }}\nkeyPassword=${{ secrets.KEY_PASSWORD }}\n' > android/key.properties

      - name: Verify keystore
        run: |
          keytool -list -keystore android/app/poemath-release.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" -storetype PKCS12 || {
            echo "::error::Keystore verification failed — check KEYSTORE_PASSWORD secret"
            exit 1
          }

      # -------- 构建 --------
      - name: Resolve UPDATE_CHECK_URL
        run: |
          oss_prefix="${ALIYUN_OSS_APP_UPDATE_OSS_PREFIX#/}"
          oss_prefix="${oss_prefix%/}"
          download_base="${ALIYUN_OSS_APP_UPDATE_DOWNLOAD_BASE_URL%/}"
          if [ -n "${download_base}" ] && [ -n "${oss_prefix}" ]; then
            echo "UPDATE_CHECK_URL=${download_base}/${oss_prefix}/latest.json" >> "${GITHUB_ENV}"
            echo "→ UPDATE_CHECK_URL=${download_base}/${oss_prefix}/latest.json"
          else
            echo "→ UPDATE_CHECK_URL not configured, in-app update will be disabled"
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Run analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: |
          flutter build apk --release \
            --target-platform=android-arm64 \
            --build-name=${{ steps.version.outputs.version_name }} \
            --build-number=${{ steps.version.outputs.version_code }} \
            --dart-define=UPDATE_CHECK_URL="${UPDATE_CHECK_URL:-}"

      # -------- 准备发布资产 --------
      - name: Prepare release assets
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk \
             "release/poemath.apk"

      # -------- OSS 上传 --------
      - name: Set up Go for ossutil
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Install ossutil
        run: |
          go install github.com/aliyun/ossutil@v1.7.19
          echo "$(go env GOPATH)/bin" >> "${GITHUB_PATH}"

      - name: Publish app update to Aliyun OSS
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_NAME: ${{ steps.version.outputs.version_name }}
          BUILD_NUMBER: ${{ steps.version.outputs.version_code }}
        run: |
          set -euo pipefail

          # 检查必要的 OSS 配置
          missing=()
          for name in \
            ALIYUN_OSS_ENDPOINT \
            ALIYUN_OSS_BUCKET \
            ALIYUN_OSS_ACCESS_KEY_ID \
            ALIYUN_OSS_ACCESS_KEY_SECRET \
            ALIYUN_OSS_APP_UPDATE_DOWNLOAD_BASE_URL \
            ALIYUN_OSS_APP_UPDATE_OSS_PREFIX
          do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required Aliyun OSS configuration: %s\n' "${missing[*]}" >&2
            exit 1
          fi

          # 获取 Release notes
          default_release_notes="韵算 ${GITHUB_REF_NAME}"
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --title "韵算 ${GITHUB_REF_NAME}" --notes "${default_release_notes}"
          release_notes="$(gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --json body --jq '.body')"
          if [ -z "${release_notes}" ]; then
            release_notes="${default_release_notes}"
          fi

          # 计算 SHA256 和文件大小
          apk_path="release/poemath.apk"
          version_key="${BUILD_NAME}+${BUILD_NUMBER}"
          oss_prefix="${ALIYUN_OSS_APP_UPDATE_OSS_PREFIX#/}"
          oss_prefix="${oss_prefix%/}"
          download_base="${ALIYUN_OSS_APP_UPDATE_DOWNLOAD_BASE_URL%/}"
          version_prefix="${oss_prefix}/versions/${version_key}"
          url_version_key="${version_key//+/%2B}"
          apk_url="${download_base}/${oss_prefix}/versions/${url_version_key}/poemath.apk"
          apk_sha256="$(sha256sum "${apk_path}" | awk '{print $1}')"
          apk_size="$(wc -c < "${apk_path}" | tr -d ' ')"
          export apk_url apk_sha256 apk_size release_notes

          # 生成 release.json / latest.json
          mkdir -p release/update
          printf '%s  poemath.apk\n' "${apk_sha256}" > release/update/poemath.apk.sha256
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "packageName": "com.poemath.app",
              "versionName": os.environ["BUILD_NAME"],
              "versionCode": int(os.environ["BUILD_NUMBER"]),
              "tagName": os.environ["GITHUB_REF_NAME"],
              "channel": "stable",
              "apkUrl": os.environ["apk_url"],
              "apkSha256": os.environ["apk_sha256"],
              "apkSize": int(os.environ["apk_size"]),
              "mandatory": False,
              "notes": os.environ["release_notes"],
          }

          update_dir = Path("release/update")
          update_dir.mkdir(parents=True, exist_ok=True)
          content = json.dumps(payload, ensure_ascii=False, indent=2) + "\n"
          (update_dir / "release.json").write_text(content, encoding="utf-8")
          (update_dir / "latest.json").write_text(content, encoding="utf-8")
          PY

          # 配置 ossutil
          oss_config="${RUNNER_TEMP}/ossutilconfig"
          ossutil config \
            -e "${ALIYUN_OSS_ENDPOINT}" \
            -i "${ALIYUN_OSS_ACCESS_KEY_ID}" \
            -k "${ALIYUN_OSS_ACCESS_KEY_SECRET}" \
            -c "${oss_config}"

          bucket_uri="oss://${ALIYUN_OSS_BUCKET}"

          # 上传版本目录（不可变资源）
          ossutil cp "${apk_path}" "${bucket_uri}/${version_prefix}/poemath.apk" -c "${oss_config}" -f --retry-times 5
          ossutil cp release/update/poemath.apk.sha256 "${bucket_uri}/${version_prefix}/poemath.apk.sha256" -c "${oss_config}" -f --retry-times 5
          ossutil cp release/update/release.json "${bucket_uri}/${version_prefix}/release.json" -c "${oss_config}" -f --retry-times 5

          ossutil set-meta "${bucket_uri}/${version_prefix}/poemath.apk" "Cache-Control:public,max-age=31536000,immutable#Content-Type:application/vnd.android.package-archive" -c "${oss_config}" -f
          ossutil set-meta "${bucket_uri}/${version_prefix}/poemath.apk.sha256" "Cache-Control:public,max-age=31536000,immutable#Content-Type:text/plain;charset=utf-8" -c "${oss_config}" -f
          ossutil set-meta "${bucket_uri}/${version_prefix}/release.json" "Cache-Control:public,max-age=31536000,immutable#Content-Type:application/json;charset=utf-8" -c "${oss_config}" -f

          # 更新 latest.json（短缓存）
          ossutil cp release/update/latest.json "${bucket_uri}/${oss_prefix}/latest.json" -c "${oss_config}" -f --retry-times 5
          ossutil set-meta "${bucket_uri}/${oss_prefix}/latest.json" "Cache-Control:no-cache,max-age=60#Content-Type:application/json;charset=utf-8" -c "${oss_config}" -f

          echo "✅ Published app update: ${download_base}/${oss_prefix}/latest.json"
          echo "✅ APK download URL: ${apk_url}"

      # -------- GitHub Release --------
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            "release/poemath.apk#PoeMath-${{ steps.version.outputs.tag }}.apk" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
