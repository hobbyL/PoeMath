    '
  annotations:
  - word: 贾生
    meaning: 指贾谊，西汉著名文学家
  - word: 宣室
    meaning: 汉未央宫前殿正室
  - word: 逐臣
    meaning: 被贬的臣子
  - word: 鬼神
