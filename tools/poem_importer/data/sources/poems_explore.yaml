- id: poem_exp_210
  title: 之广陵宿常二南郭幽居
  author: 李白
  dynasty: 唐
  layer: explore
  is_required: false
  difficulty: 3
  content: '绿水接柴门，有如桃花源。

    忘忧或假草，满院罗丛萱。

    暝色湖上来，微雨飞南轩。

    故人宿茅宇，夕鸟栖杨园。

    还惜诗酒别，深为江海言。

    明朝广陵道，独忆此倾樽。

    '
