- id: poem_exp_244
  title: 学弈
  author: 佚名
  dynasty: 先秦
  layer: explore
  is_required: false
  difficulty: 4
  content: '弈秋，通国之善弈者也。

    使弈秋诲二人弈，其一人专心致志，惟弈秋之为听；一人虽听之，一心以为有鸿鹄将至，思援弓缴而射之。

    虽与之俱学，弗若之矣。

    为是其智弗若与？

    曰：非然也。

    '
  annotations:
