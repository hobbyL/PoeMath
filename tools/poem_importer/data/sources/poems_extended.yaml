- id: poem_ext_217
  title: 高阳台·落梅
  author: 吴文英
  dynasty: 宋
  layer: extended
  is_required: false
  difficulty: 4
  content: '宫粉雕痕，仙云堕影，无人野水荒湾。古石埋香，金沙锁骨连环。南楼不恨吹横笛，恨晓风、千里关山。半飘零，庭上黄昏，月冷阑干。

